<!DOCTYPE html>
<html lang="ko">
<head>

  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      background: #fff;
      font-family: 'Segoe UI', '맑은 고딕', Arial, sans-serif;
      width: 100%;
      -webkit-text-size-adjust: 100%;
    }
    html { min-height: 100%; }
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
      min-height: 100vh;
      overflow-x: hidden;
    }

    .main-title {
      margin-top: 0;
      font-size: 1.1rem;
      font-weight: 700;
      color: #333862;
      text-shadow: 0 2px 12px #ffffff99;
      margin-bottom: 8px;
      text-align: center;
      user-select: none;
    }
    .main-subtitle {
      font-size: 0.9rem;
      color: #6a739c;
      margin-bottom: 5px;
      text-align: center;
      user-select: none;
    }

    .container {
      width: 100%;
      max-width: 560px;
      display: flex;
      flex-direction: column;
      align-items: center;
      margin: 0 auto;
      padding: 0 6px;
    }

    .logo-row {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 24px;
      margin-bottom: 32px;
      width: 100%;
      flex-wrap: nowrap;
    }

    .ai-logo-wrap {
      width: 74px;
      height: 74px;
      border-radius: 50%;
      background: #fff;
      box-shadow: 0 3px 24px 0 #b1c7e866;
      border: 3px solid #e5e8f6;
      display: flex;
      justify-content: center;
      align-items: center;
      transition: box-shadow 0.15s, border-color 0.15s, background-color 0.15s;
      cursor: pointer;
      overflow: hidden;
      margin: 0;
      flex: 0 0 auto;
    }
    .ai-logo-wrap:hover {
      box-shadow: 0 8px 32px 0 #7e94ff99;
      border-color: #94a2ff;
      background: #f7faff;
    }
    .ai-logo-img {
      width: 54px;
      height: 54px;
      object-fit: contain;
      background: transparent;
      border-radius: 50%;
      transition: transform 0.12s;
      display: block;
    }
    .ai-logo-wrap:hover .ai-logo-img {
      transform: scale(1.08) rotate(-3deg);
    }

    .group-title {
      width: 100%;
      max-width: 500px;
      font-size: 1.07rem;
      font-weight: 600;
      margin: 34px 0 10px 0;
      letter-spacing: -0.5px;
      color: #244;
      text-align: center;
      padding-left: 8px;
      user-select: none;
    }

    /* 사이징은 JS가 단독으로 책임지므로 미디어 쿼리에서 사이즈 강제 제거.
       컨테이너 max-width와 타이틀 폰트만 반응형으로 조절. */
    @media (max-width: 1100px) {
      .container { max-width: 98vw; }
    }
    @media (max-width: 900px) {
      .container { max-width: 99vw; }
      .main-title { font-size: 1.35rem; margin-top: 64px; }
      .main-subtitle { font-size: 1.07rem; }
    }
    @media (max-width: 480px) {
      .main-title { font-size: 1rem; }
      .main-subtitle { font-size: 0.95rem; }
      .container { margin-top: 6px; margin-bottom: 9px; }
    }
  </style>
</head>
<body>

  <div class="main-title"></div>
  <div class="main-subtitle"></div>
  <div class="container" id="aiLogoContainer"></div>

  <script>
    // 1번 그룹
    const group1 = [
      { url: "https://comic.naver.com/index", img: "https://i.namu.wiki/i/ugTlJol27avmPIWdkWY3fk18VR1J7BPr_AwwIKaF8fu2v9VW2Bmto6jQungo__wBfkhNMOGMDfemB_D1nctdyw.svg" },
      { url: "https://webtoon.kakao.com/", img: "https://upload.wikimedia.org/wikipedia/commons/8/8f/Kakao_page_logo.png" },
      { url: "https://www.toomics.com/", img: "https://play-lh.googleusercontent.com/DUS5sjyQsaE9Us4WuJ4_CPMyBgdqV4YJGpdWmoiOOQ-3GJALRprXWNlqDTPip6X1JTOw" },
      { url: "https://www.bomtoon.com/bom/comic/free", img: "https://play-lh.googleusercontent.com/kM5rMvD1lLEysyF7csBtsEwCxHtcCxc-9t2Kn05YPdUaGU4Z--0ySJDOKghhwdv5EBol" },
      { url: "https://sports.khan.co.kr/comics/comics_author.html", img: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSCg9Mkm6Y6g62qNOkqYXdujygQQ2CqYnLuxw&s" },
      { url: "https://spcartoon.kr/", img: "https://www.sportschosun.com/img/thum_sns.png" },
      { url: "https://comic.sportsseoul.com/", img: "https://play-lh.googleusercontent.com/xA3JvveLtwrIxiRGv_8pW5aP_hwZWoZXUdA8DKfm9PVMmwD8kWKAddGTQfM_Bnv-1HU" },
      { url: "https://www.webtoons.com/en/genres", img: "https://downthetubes.net/wp-content/uploads/2024/11/WEBTOON_2025_CONTEST-1_121634-808x1024.jpg" },
      { url: "https://www.anime-planet.com/manga/", img: "https://apkdirectory.in/logo/anime-planet-apk.webp" },
      { url: "https://comic-walker.com/", img: "https://img.utdstc.com/icon/e8c/034/e8c034399659782c5fcacae8cdc51f90a89780ed6e6806d1ec20d7877a4642dc:200" },
      { url: "https://www.comico.jp/", img: "https://nimage.g-enews.com/phpwas/restmb_allidxmake.php?idx=5&simg=20170928154109010309bdce8ae77106247255189.jpg" },
      { url: "https://mangaplus-creators.jp/genres", img: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQ1tZ9UOu-ofmnGqXMeHKt_m081LO1xs6LU3Cnl5_901SMTuMtOAcoI9QzfL05E7QgFb0A&usqp=CAU" }
    ];
    const group2 = [];
    const group3 = [];
    const group4 = [];

    /**
     * 레이아웃 결정 - 폭(width)만 사용.
     * 높이(h) 의존을 제거 → 모바일 주소창 표시/숨김 시 발생하던 재렌더링/흔들림 차단.
     */
    function getLayout() {
      const w = window.innerWidth;
      if (w <= 360)  return { iconsPerRow: 3, gap: 18, size: 64, imgSize: 46 };
      if (w <= 480)  return { iconsPerRow: 3, gap: 22, size: 72, imgSize: 54 };
      if (w <= 600)  return { iconsPerRow: 4, gap: 16, size: 70, imgSize: 52 };
      if (w <= 720)  return { iconsPerRow: 4, gap: 20, size: 78, imgSize: 60 };
      if (w <= 900)  return { iconsPerRow: 5, gap: 14, size: 64, imgSize: 46 };
      if (w <= 1100) return { iconsPerRow: 6, gap: 14, size: 60, imgSize: 40 };
      return         { iconsPerRow: 7, gap: 24, size: 74, imgSize: 54 };
    }

    function renderGroup(arr, layout) {
      const { iconsPerRow, gap, size, imgSize } = layout;
      const rows = [];
      let idx = 0;
      while (idx < arr.length) {
        const count = Math.min(iconsPerRow, arr.length - idx);
        const row = document.createElement('div');
        row.className = "logo-row";
        row.style.maxWidth = (size * count + gap * (count - 1)) + "px";
        row.style.gap = gap + "px";
        for (let i = 0; i < count; i++, idx++) {
          const l = arr[idx];
          const a = document.createElement('a');
          a.className = "ai-logo-wrap";
          a.href = l.url;
          a.target = "_blank";
          a.rel = "noopener";
          a.style.width = a.style.height = size + "px";
          const img = document.createElement('img');
          img.className = "ai-logo-img";
          img.src = l.img;
          img.alt = l.alt || "";
          img.loading = "lazy";
          img.decoding = "async";
          img.referrerPolicy = "no-referrer";
          img.style.width = img.style.height = imgSize + "px";
          a.appendChild(img);
          row.appendChild(a);
        }
        rows.push(row);
      }
      return rows;
    }

    function renderAll() {
      const container = document.getElementById('aiLogoContainer');
      const layout = getLayout();
      // DocumentFragment로 한 번에 교체 → 깜빡임/리플로우 최소화
      const frag = document.createDocumentFragment();

      const t1 = document.createElement("div");
      t1.className = "group-title";
      frag.appendChild(t1);
      renderGroup(group1, layout).forEach(row => frag.appendChild(row));

      const t2 = document.createElement("div");
      t2.className = "group-title";
      frag.appendChild(t2);
      renderGroup(group2, layout).forEach(row => frag.appendChild(row));

      const t3 = document.createElement("div");
      t3.className = "group-title";
      frag.appendChild(t3);
      renderGroup(group3, layout).forEach(row => frag.appendChild(row));

      const t4 = document.createElement("div");
      t4.className = "group-title";
      t4.innerHTML = '<a href="radiositesbar2.html" target="_blank" rel="noopener" style="color:inherit;text-decoration:none;"></a>';
      frag.appendChild(t4);
      renderGroup(group4, layout).forEach(row => frag.appendChild(row));

      container.replaceChildren(frag);
    }

    // 마지막 레이아웃 키 캐시 → 실제 레이아웃이 바뀌었을 때만 재렌더링
    let lastKey = "";
    function maybeRender() {
      const l = getLayout();
      const key = l.iconsPerRow + ":" + l.size + ":" + l.gap + ":" + l.imgSize;
      if (key === lastKey) return;
      lastKey = key;
      renderAll();
    }

    // resize는 debounce + rAF로 안정화. 모바일에서 빈번하게 발생해도 흔들리지 않음.
    let resizeTimer = null;
    let rafId = null;
    function onResize() {
      if (resizeTimer) clearTimeout(resizeTimer);
      resizeTimer = setTimeout(() => {
        if (rafId) cancelAnimationFrame(rafId);
        rafId = requestAnimationFrame(maybeRender);
      }, 120);
    }

    // 초기 렌더
    maybeRender();
    window.addEventListener('resize', onResize, { passive: true });
    window.addEventListener('orientationchange', onResize, { passive: true });
  </script>
</body>
</html>
