<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>MYWAY.KR: 네비바</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <style>
    /* CSS 변수로 네비 높이 관리 (JS에서 동적 갱신) */
    :root {
      --nav-height: 65px;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --safe-left: env(safe-area-inset-left, 0px);
      --safe-right: env(safe-area-inset-right, 0px);
    }

    html, body {
      height: 100%;
      height: 100dvh; /* 모바일 주소창 변화 대응 */
      overscroll-behavior: none; /* 모바일 당겨서 새로고침 방지 */
    }
    body {
      font-family: 'Segoe UI', '맑은 고딕', Arial, sans-serif;
      background: #fff;
      margin: 0; padding: 0;
      overflow: hidden;
      -webkit-text-size-adjust: 100%;
      -webkit-tap-highlight-color: transparent;
    }

    /* 네비바 영역 */
    .screen-links-wrap {
      width: 100%;
      position: relative;
      margin: 0 auto;
      padding: 0;
      box-sizing: border-box;
      z-index: 9;
      overflow: hidden;
      display: flex;
      justify-content: center;
      margin-top: calc(20px + var(--safe-top));
      filter: drop-shadow(0 6px 28px #b176f340);
      padding-left: var(--safe-left);
      padding-right: var(--safe-right);
    }
    .screen-links {
      display: flex;
      gap: 0px;
      font-size: 0.93rem;
      font-weight: 500;
      color: #fff;
      white-space: nowrap;
      background: linear-gradient(95deg, #7ed6fb 10%, #b176f3 90%);
      padding: 0 14px;
      user-select: none;
      -webkit-user-select: none;
      align-items: center;
      border-radius: 16px;
      box-shadow: 0 8px 32px 0 rgba(90,100,180,0.13), 0 2px 8px 0 rgba(255,255,255,0.10) inset;
      overflow-x: auto;
      overflow-y: hidden;
      scrollbar-width: none;
      -ms-overflow-style: none;
      -webkit-overflow-scrolling: touch; /* iOS 부드러운 스크롤 */
      min-height: 30px;
      min-width: 220px;
      max-width: calc(100vw - 24px);
      cursor: grab;
      transition: box-shadow 0.2s;
    }
    .screen-links::-webkit-scrollbar { display: none; }
    .screen-links a {
      color: rgba(255,255,255,0.85);
      text-decoration: none;
      padding: 5px 12px;
      border-radius: 10px;
      font-weight: 500;
      font-size: 0.97em;
      background: none;
      display: inline-block;
      opacity: 0.93;
      letter-spacing: 0.01em;
      transition: background 0.15s, color 0.13s, box-shadow 0.12s;
      cursor: pointer;
      white-space: nowrap;
      margin: 0 1px;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }
    .screen-links a:hover, .screen-links a.active {
      background: rgba(255,255,255,0.22);
      color: #fff;
      font-weight: 600;
      box-shadow: 0 2px 12px #b176f333;
    }
    @media (max-width: 700px) {
      .screen-links { font-size: 0.88rem; gap: 4px; padding: 0 6px; min-height: 28px; }
      .screen-links a { padding: 6px 10px; } /* 모바일 터치 영역 확보 */
      .screen-links-wrap { margin-top: calc(10px + var(--safe-top)); }
    }

    /* 프레임 위치 */
    #main-frame {
      position: fixed;
      left: var(--safe-left);
      top: var(--nav-height);
      width: calc(100vw - var(--safe-left) - var(--safe-right));
      height: calc(100dvh - var(--nav-height) - var(--safe-bottom));
      /* 100dvh 미지원 브라우저 fallback */
      height: calc(100vh - var(--nav-height) - var(--safe-bottom));
      height: calc(100dvh - var(--nav-height) - var(--safe-bottom));
      border: none;
      margin: 0;
      background: #f5f7fa;
      z-index: 10;
      border-radius: 0;
      display: block;
    }

    /* ◀▶ 좌우 화살표 */
    .nav-arrow {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 22px; height: 32px;
      display: flex; align-items: center; justify-content: center;
      background: linear-gradient(to right, #b176f3 40%, transparent 100%);
      border: none;
      outline: none;
      z-index: 11;
      cursor: pointer;
      opacity: 0.82;
      transition: opacity 0.18s;
      padding: 0;
      border-radius: 11px;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }
    .nav-arrow.right {
      right: calc(2px + var(--safe-right));
      background: linear-gradient(to left, #b176f3 44%, transparent 100%);
    }
    .nav-arrow.left {
      left: calc(2px + var(--safe-left));
      background: linear-gradient(to right, #b176f3 44%, transparent 100%);
    }
    .nav-arrow svg {
      display: block;
      width: 13px;
      height: 18px;
    }
    .nav-arrow:active { opacity: 1; }
    .nav-arrow[hidden] { display: none; }
  </style>
</head>
<body>
  <!-- 네비게이션 바 -->
  <div class="screen-links-wrap" id="nav-wrap">
    <button class="nav-arrow left" id="nav-arrow-left" aria-label="왼쪽 이동" hidden>
      <svg viewBox="0 0 13 20"><polygon points="9,3 2,10 9,17" fill="#fff" opacity="0.86"/></svg>
    </button>
    <div class="screen-links" id="parent-links">
      <a href="#" class="active" onclick="showScreenParent(event, 'https://todayunse.co.kr/ddi.php')">H</a>
      <a href="#" onclick="showScreenParent(event, 'https://todayunse.co.kr/ddi.php')">띠별운세1</a>
      <a href="#" onclick="showScreenParent(event, 'https://fortune.sportsseoul.com/')">띠별운세2</a>
      <a href="#" onclick="showScreenParent(event, 'https://www.unsin.co.kr/unse/free/todayline/form')">띠별운세3</a>
      <a href="#" onclick="showScreenParent(event, 'https://unse1.com/?g=106')">평생사주닷컴</a>
      <a href="#" onclick="showScreenParent(event, 'https://www.unsin.co.kr/unse/fortun/free/result')">운세의 신</a>
      <a href="#" onclick="showScreenParent(event, 'https://fortune.nate.com/contents/freeunse/freeunseframe.nate?freeUnseId=today03')">NATE운세</a>
    </div>
    <button class="nav-arrow right" id="nav-arrow-right" aria-label="오른쪽 이동" hidden>
      <svg viewBox="0 0 13 20"><polygon points="4,3 11,10 4,17" fill="#fff" opacity="0.88"/></svg>
    </button>
  </div>

  <iframe id="main-frame" src="https://todayunse.co.kr/ddi.php" title="운세 페이지"></iframe>

  <script>
    // ====== 네비바 클릭 시 페이지 전환 ======
    function showScreenParent(e, url) {
      e.preventDefault();
      document.querySelectorAll('#parent-links a').forEach(a => a.classList.remove('active'));
      e.target.classList.add('active');
      if (url) document.getElementById('main-frame').src = url;
    }

    // ====== 네비바 드래그/터치 스크롤 ======
    const nav = document.querySelector('.screen-links');
    const leftArrow = document.getElementById('nav-arrow-left');
    const rightArrow = document.getElementById('nav-arrow-right');

    (function(){
      let isDown = false, startX = 0, scrollLeft = 0, moved = false;

      nav.addEventListener('mousedown', (e) => {
        isDown = true; moved = false;
        startX = e.pageX - nav.offsetLeft;
        scrollLeft = nav.scrollLeft;
        nav.style.cursor = 'grabbing';
      });
      nav.addEventListener('mouseleave', () => { isDown = false; nav.style.cursor = ''; });
      nav.addEventListener('mouseup', () => { isDown = false; nav.style.cursor = ''; });
      nav.addEventListener('mousemove', (e) => {
        if (!isDown) return;
        const x = e.pageX - nav.offsetLeft;
        if (Math.abs(x - startX) > 3) moved = true;
        nav.scrollLeft = scrollLeft - (x - startX);
      });
      // 드래그 직후 클릭 방지 (실수로 메뉴 바뀌는 것 방지)
      nav.addEventListener('click', (e) => {
        if (moved) { e.preventDefault(); e.stopPropagation(); moved = false; }
      }, true);

      // 모바일은 네이티브 스크롤(-webkit-overflow-scrolling: touch)에 위임 → 가장 안정적
    })();

    // ====== 좌/우 화살표 표시 제어 ======
    function checkNavOverflow() {
      if (!nav) return;
      if (nav.scrollWidth > nav.clientWidth + 1) {
        leftArrow.hidden = nav.scrollLeft < 5;
        rightArrow.hidden = nav.scrollLeft + nav.clientWidth + 5 >= nav.scrollWidth;
      } else {
        leftArrow.hidden = true;
        rightArrow.hidden = true;
      }
    }
    nav.addEventListener('scroll', checkNavOverflow, { passive: true });
    leftArrow.addEventListener('click', () => {
      nav.scrollBy({ left: -120, behavior: 'smooth' });
      setTimeout(checkNavOverflow, 240);
    });
    rightArrow.addEventListener('click', () => {
      nav.scrollBy({ left: 120, behavior: 'smooth' });
      setTimeout(checkNavOverflow, 240);
    });

    // ====== 네비바 실제 높이 측정 → iframe 위치 자동 조정 ======
    function updateNavHeight() {
      const wrap = document.getElementById('nav-wrap');
      if (!wrap) return;
      const rect = wrap.getBoundingClientRect();
      // 네비바 아래쪽 끝 + 약간의 여백을 nav-height로 사용
      const h = Math.ceil(rect.bottom + 6);
      document.documentElement.style.setProperty('--nav-height', h + 'px');
    }

    // ====== 초기 로드 및 리사이즈 대응 ======
    function refreshLayout() {
      updateNavHeight();
      checkNavOverflow();
    }

    window.addEventListener('DOMContentLoaded', () => {
      refreshLayout();
      setTimeout(refreshLayout, 100);
      setTimeout(refreshLayout, 400);
    });
    window.addEventListener('load', refreshLayout);
    window.addEventListener('resize', refreshLayout);
    window.addEventListener('orientationchange', () => {
      setTimeout(refreshLayout, 200);
      setTimeout(refreshLayout, 600);
    });

    // 모바일 주소창 보이고/숨길 때 높이 변화 대응
    if (window.visualViewport) {
      window.visualViewport.addEventListener('resize', refreshLayout);
    }
  </script>
</body>
</html>
