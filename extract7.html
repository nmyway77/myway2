  <style>
    :root{
      --paper:#f7f3eb;
      --ink:#1c1a17;
      --muted:#7a7468;
      --line:#e3ddcf;
      --card:#fffdf8;
      --accent:#c63d2e;       /* 영상/유튜브 무드의 딥 레드 액센트 */
      --accent-soft:#f5e3df;
      --serif:'Fraunces',Georgia,serif;
      --sans:'Pretendard','맑은 고딕',sans-serif;
      --mono:'JetBrains Mono',monospace;
    }
    *{box-sizing:border-box;}
    html,body{margin:0;padding:0;}
    body{
      min-height:100vh;
      background:var(--paper);
      color:var(--ink);
      font-family:var(--sans);
      -webkit-user-select:none;
      -moz-user-select:none;
      user-select:none;
    }
    input,textarea{
      -webkit-user-select:text;
      -moz-user-select:text;
      user-select:text;
    }

    /* 좌측 상단 홈 링크 */
    .top-home{
      position:fixed;
      top:20px;left:24px;
      font-family:var(--mono);
      font-size:.78rem;
      letter-spacing:.08em;
      text-transform:uppercase;
      color:var(--muted);
      text-decoration:none;
      z-index:50;
    }
    .top-home:hover{color:var(--accent);}

    .wrap{
      max-width:880px;
      margin:0 auto;
      padding:96px 24px 120px;
      display:flex;
      flex-direction:column;
      align-items:center;
      text-align:center;
    }

    .eyebrow{
      font-family:var(--mono);
      font-size:.74rem;
      letter-spacing:.22em;
      text-transform:uppercase;
      color:var(--accent);
      margin-bottom:14px;
    }
    h1{
      font-family:var(--serif);
      font-weight:600;
      font-size:clamp(2rem,5vw,3rem);
      line-height:1.05;
      margin:0 0 12px;
      letter-spacing:-.01em;
    }
    .lede{
      color:var(--muted);
      font-size:1rem;
      line-height:1.6;
      margin:0 0 40px;
      max-width:520px;
    }

    /* 입력창 */
    .url-input-group{
      display:flex;
      gap:10px;
      width:100%;
      max-width:640px;
      margin-bottom:22px;
    }
    .url-input-group input{
      flex:1;
      font-family:var(--mono);
      font-size:.95rem;
      padding:15px 16px;
      border:1.5px solid var(--line);
      border-radius:12px;
      outline:none;
      background:var(--card);
      color:var(--ink);
      transition:border-color .15s,box-shadow .15s;
    }
    .url-input-group input::placeholder{color:#b3ab9c;}
    .url-input-group input:focus{
      border-color:var(--accent);
      box-shadow:0 0 0 4px var(--accent-soft);
    }
    .url-input-group button{
      padding:0 26px;
      background:var(--ink);
      color:var(--paper);
      font-family:var(--sans);
      font-size:.98rem;
      font-weight:600;
      border:none;
      border-radius:12px;
      cursor:pointer;
      transition:background .18s,transform .08s;
    }
    .url-input-group button:hover{background:var(--accent);}
    .url-input-group button:active{transform:translateY(1px);}

    /* 사이즈 선택 칩 */
    .size-filters{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      justify-content:center;
      margin-bottom:8px;
    }
    .size-chip{
      font-family:var(--mono);
      font-size:.76rem;
      letter-spacing:.04em;
      padding:7px 13px;
      border:1.5px solid var(--line);
      border-radius:999px;
      background:var(--card);
      color:var(--muted);
      cursor:pointer;
      user-select:none;
      transition:all .15s;
    }
    .size-chip[aria-pressed="true"]{
      background:var(--ink);
      border-color:var(--ink);
      color:var(--paper);
    }
    .size-chip:hover{border-color:var(--accent);}
    .filter-hint{
      font-family:var(--mono);
      font-size:.72rem;
      color:#b3ab9c;
      margin:0 0 36px;
    }

    /* 영상 메타(제목·채널) */
    .video-meta{
      width:100%;
      max-width:640px;
      margin:0 0 22px;
      font-size:.92rem;
      line-height:1.5;
      color:var(--ink);
      min-height:0;
    }
    .video-meta:empty{margin:0;}
    .video-meta strong{font-family:var(--serif);font-weight:600;}
    .video-meta span{color:var(--muted);font-size:.84rem;}

    /* 최근 기록 칩 */
    .history-chips{
      display:flex;
      flex-wrap:wrap;
      gap:6px;
      justify-content:center;
      margin:-10px 0 26px;
    }
    .history-chips:empty{margin:0 0 10px;}
    .history-chip{
      font-family:var(--mono);
      font-size:.7rem;
      padding:5px 11px;
      border:1.2px dashed var(--line);
      border-radius:999px;
      background:transparent;
      color:var(--muted);
      cursor:pointer;
      transition:all .15s;
    }
    .history-chip:hover{border-color:var(--accent);color:var(--accent);}

    /* 일괄 다운로드 바 */
    .bulk-bar{
      width:100%;
      display:none;
      justify-content:flex-end;
      margin:0 0 14px;
    }
    .bulk-bar.show{display:flex;}
    .bulk-bar button{
      font-family:var(--sans);
      font-size:.84rem;
      font-weight:600;
      padding:9px 16px;
      border:1.5px solid var(--ink);
      border-radius:10px;
      background:var(--ink);
      color:var(--paper);
      cursor:pointer;
      transition:background .18s,border-color .18s;
    }
    .bulk-bar button:hover{background:var(--accent);border-color:var(--accent);}

    /* 결과 리스트 */
    .thumbs-list{
      width:100%;
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
      gap:22px;
      text-align:left;
    }
    .thumb-item{
      background:var(--card);
      border:1.5px solid var(--line);
      border-radius:16px;
      overflow:hidden;
      transition:border-color .18s,box-shadow .18s;
      display:flex;
      flex-direction:column;
    }
    .thumb-item.selected{
      border-color:var(--accent);
      box-shadow:0 6px 24px rgba(198,61,46,.18);
    }
    .thumb-figure{
      position:relative;
      cursor:pointer;
      background:#ece6da;
      aspect-ratio:16/9;
      overflow:hidden;
    }
    .thumb-figure img{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
      transition:transform .25s;
    }
    .thumb-figure:hover img{transform:scale(1.04);}
    .size-badge{
      position:absolute;
      top:10px;left:10px;
      display:flex;
      align-items:baseline;
      gap:7px;
      background:rgba(28,26,23,.82);
      color:#fff;
      padding:5px 10px;
      border-radius:8px;
      font-family:var(--mono);
      font-size:.72rem;
      letter-spacing:.03em;
      backdrop-filter:blur(2px);
    }
    .size-badge .dim{opacity:.7;font-size:.66rem;}
    .check-mark{
      position:absolute;
      top:10px;right:10px;
      width:26px;height:26px;
      border-radius:50%;
      background:var(--accent);
      color:#fff;
      display:none;
      align-items:center;
      justify-content:center;
      font-size:.85rem;
      font-weight:700;
    }
    .thumb-item.selected .check-mark{display:flex;}

    .thumb-body{
      padding:14px 14px 16px;
      display:flex;
      flex-direction:column;
      gap:10px;
    }
    .url-row{
      display:flex;
      gap:8px;
    }
    .url-field{
      flex:1;
      font-family:var(--mono);
      font-size:.74rem;
      padding:9px 11px;
      border:1.4px solid var(--line);
      border-radius:9px;
      background:var(--paper);
      color:var(--ink);
      outline:none;
      min-width:0;
    }
    .url-field:focus{border-color:var(--accent);}
    .icon-btn{
      flex:0 0 auto;
      padding:0 13px;
      border:1.4px solid var(--line);
      border-radius:9px;
      background:var(--card);
      color:var(--ink);
      font-family:var(--sans);
      font-size:.8rem;
      font-weight:600;
      cursor:pointer;
      white-space:nowrap;
      transition:all .15s;
    }
    .icon-btn:hover{border-color:var(--accent);color:var(--accent);}
    .icon-btn.copied{background:var(--accent);border-color:var(--accent);color:#fff;}
    .btn-row{display:flex;gap:8px;}
    .btn-row .icon-btn{flex:1;text-align:center;}

    .thumb-item.unavailable{opacity:.45;}
    .thumb-item.unavailable .thumb-body{display:none;}
    .na-note{
      position:absolute;
      inset:0;
      display:flex;
      align-items:center;
      justify-content:center;
      font-family:var(--mono);
      font-size:.78rem;
      color:#fff;
      background:rgba(28,26,23,.55);
    }

    .empty-msg{
      grid-column:1/-1;
      text-align:center;
      color:var(--accent);
      font-size:.95rem;
      line-height:1.7;
      padding:30px 0;
    }
    .empty-msg.neutral{color:var(--muted);}

    /* 우측 하단 플로팅 홈 버튼 */
    .float-home{
      position:fixed;
      right:22px;bottom:22px;
      width:54px;height:54px;
      border-radius:50%;
      background:var(--ink);
      color:var(--paper);
      display:flex;
      align-items:center;
      justify-content:center;
      text-decoration:none;
      box-shadow:0 8px 22px rgba(28,26,23,.28);
      z-index:60;
      transition:background .18s,transform .18s;
    }
    .float-home:hover{background:var(--accent);transform:translateY(-2px);}
    .float-home svg{width:24px;height:24px;}

    /* 푸터 */
    footer{
      text-align:center;
      padding:30px 20px 40px;
      border-top:1px solid var(--line);
      color:var(--muted);
      font-family:var(--mono);
      font-size:.78rem;
      letter-spacing:.04em;
    }
    footer a{color:var(--accent);text-decoration:none;font-weight:600;}
    footer a:hover{text-decoration:underline;}

    @media (max-width:600px){
      .wrap{padding:80px 16px 100px;}
      .url-input-group{flex-direction:column;}
      .url-input-group button{padding:14px;}
      .thumbs-list{grid-template-columns:1fr;}
    }
  </style>
</head>
<body>
  <a href="https://myway.kr" class="top-home">← MYWAY.KR</a>

  <main class="wrap">
    <div class="eyebrow">Thumbnail Extractor</div>
    <h1>썸네일 추출기</h1>
    <p class="lede">YouTube · Vimeo · Dailymotion은 물론, 대표 이미지(썸네일)가 있는 거의 모든 사이트의 URL을 붙여넣으면 썸네일과 이미지 주소를 바로 보여드려요.</p>

    <div class="url-input-group">
      <input type="text" id="videoUrl" placeholder="URL 입력 (YouTube · Vimeo · 일반 사이트)" autocomplete="off" spellcheck="false">
      <button onclick="getThumbnails()">추출</button>
    </div>

    <div class="size-filters" id="sizeFilters"></div>
    <p class="filter-hint">사이즈 선택은 YouTube 전용 (장면 컷 / WebP 지원) · 일반 사이트는 대표 이미지를 자동 추출</p>

    <div class="history-chips" id="historyChips"></div>

    <div class="video-meta" id="videoMeta"></div>

    <div class="bulk-bar" id="bulkBar">
      <button type="button" onclick="bulkDownload()">표시된 썸네일 일괄 다운로드</button>
    </div>

    <div class="thumbs-list" id="thumbsList"></div>
  </main>

  <a href="https://myway.kr" class="float-home" aria-label="홈으로">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M3 11.5 12 4l9 7.5"/><path d="M5 10v9a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1v-9"/>
    </svg>
  </a>

  <footer>
    © MYWAY.KR · <a href="https://myway.kr">myway.kr</a>
  </footer>

  <script>
    /* ===== YouTube 사이즈 정의 ===== */
    const YT_SIZES = [
      { key:'maxresdefault', label:'HD',    dim:'1280×720' },
      { key:'sddefault',     label:'SD',    dim:'640×480'  },
      { key:'hqdefault',     label:'HQ',    dim:'480×360'  },
      { key:'mqdefault',     label:'MQ',    dim:'320×180'  },
      { key:'default',       label:'기본',  dim:'120×90'   },
      { key:'hq1',           label:'장면 1', dim:'480×360' },
      { key:'hq2',           label:'장면 2', dim:'480×360' },
      { key:'hq3',           label:'장면 3', dim:'480×360' },
    ];
    // 사이즈별 표시 여부 (기본: 작은 기본썸네일·장면 컷 제외 모두 켜짐)
    const sizeState = { maxresdefault:true, sddefault:true, hqdefault:true, mqdefault:true, default:false, hq1:false, hq2:false, hq3:false };
    // 포맷 상태 (jpg / webp)
    let fmtState = 'jpg';

    /* 사이즈 선택 칩 생성 */
    (function buildFilters(){
      const box = document.getElementById('sizeFilters');
      YT_SIZES.forEach(s=>{
        const chip = document.createElement('button');
        chip.className = 'size-chip';
        chip.type = 'button';
        chip.textContent = `${s.label} · ${s.dim}`;
        chip.setAttribute('aria-pressed', String(sizeState[s.key]));
        chip.onclick = ()=>{
          sizeState[s.key] = !sizeState[s.key];
          chip.setAttribute('aria-pressed', String(sizeState[s.key]));
          if (lastVideo) getThumbnails(); // 이미 추출했다면 즉시 갱신
        };
        box.appendChild(chip);
      });
      // WebP 포맷 토글 칩
      const webpChip = document.createElement('button');
      webpChip.className = 'size-chip';
      webpChip.type = 'button';
      webpChip.textContent = 'WebP 포맷';
      webpChip.setAttribute('aria-pressed', 'false');
      webpChip.onclick = ()=>{
        fmtState = (fmtState === 'jpg') ? 'webp' : 'jpg';
        webpChip.setAttribute('aria-pressed', String(fmtState === 'webp'));
        if (lastVideo && lastVideo.type === 'yt') getThumbnails();
      };
      box.appendChild(webpChip);
    })();

    let lastVideo = null; // {type, id}

    /* ===== URL 파싱 ===== */
    function parseYouTubeId(url){
      const m = url.match(/(?:youtube\.com\/(?:watch\?(?:.*&)?v=|shorts\/|embed\/|live\/)|youtu\.be\/)([\w-]{6,})/);
      return m ? m[1] : null;
    }
    function parseVimeoId(url){
      const m = url.match(/vimeo\.com\/(?:video\/)?(\d+)/);
      return m ? m[1] : null;
    }
    function parseDailymotionId(url){
      const m = url.match(/(?:dailymotion\.com\/video\/|dai\.ly\/)([a-zA-Z0-9]+)/);
      return m ? m[1] : null;
    }
    function hostOf(url){
      try{ return new URL(url).hostname.replace(/^www\./,''); }catch(e){ return 'web'; }
    }

    /* ===== 썸네일 URL 빌더 ===== */
    function ytThumbUrl(id, key){
      return fmtState === 'webp'
        ? `https://i.ytimg.com/vi_webp/${id}/${key}.webp`
        : `https://img.youtube.com/vi/${id}/${key}.jpg`;
    }

    /* ===== 영상 제목·채널명 로드 (oEmbed) ===== */
    function escapeHtml(s){
      return String(s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    }
    function setMetaText(title, sub){
      if (!title) return;
      document.getElementById('videoMeta').innerHTML =
        `<strong>${escapeHtml(title)}</strong>` +
        (sub ? ` · <span>${escapeHtml(sub)}</span>` : '');
    }
    function loadMeta(type, id){
      const box = document.getElementById('videoMeta');
      box.innerHTML = '';
      const api = type === 'yt'
        ? `https://www.youtube.com/oembed?url=${encodeURIComponent('https://www.youtube.com/watch?v='+id)}&format=json`
        : `https://vimeo.com/api/oembed.json?url=https://vimeo.com/${id}`;
      fetch(api)
        .then(r => r.ok ? r.json() : null)
        .then(d => {
          if (!d || !d.title) return;
          box.innerHTML = `<strong>${escapeHtml(d.title)}</strong>` +
            (d.author_name ? ` · <span>${escapeHtml(d.author_name)}</span>` : '');
        })
        .catch(()=>{});
    }

    /* ===== 최근 추출 기록 ===== */
    const HISTORY_KEY = 'mywayExtract7HistoryV1';
    function saveHistory(url){
      try{
        let h = JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]');
        h = h.filter(u => u !== url);
        h.unshift(url);
        h = h.slice(0, 5);
        localStorage.setItem(HISTORY_KEY, JSON.stringify(h));
        renderHistory();
      }catch(e){}
    }
    function renderHistory(){
      const box = document.getElementById('historyChips');
      box.innerHTML = '';
      let h = [];
      try{ h = JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]'); }catch(e){}
      h.forEach(u=>{
        const id = parseYouTubeId(u) || parseVimeoId(u) || parseDailymotionId(u) || (hostOf(u) !== 'web' ? hostOf(u) : u);
        const chip = document.createElement('button');
        chip.className = 'history-chip';
        chip.type = 'button';
        chip.textContent = id.length > 24 ? id.slice(0,24)+'…' : id;
        chip.title = u;
        chip.onclick = ()=>{
          document.getElementById('videoUrl').value = u;
          getThumbnails();
        };
        box.appendChild(chip);
      });
    }

    let currentItems = []; // 일괄 다운로드 대상

    /* ===== 추출 ===== */
    function getThumbnails(){
      const url = document.getElementById('videoUrl').value.trim();
      const thumbsList = document.getElementById('thumbsList');
      thumbsList.innerHTML = '';
      document.getElementById('videoMeta').innerHTML = '';
      document.getElementById('bulkBar').classList.remove('show');
      currentItems = [];

      if (!url){
        lastVideo = null;
        showMessage('동영상 URL을 입력해 주세요.', true);
        return;
      }

      const ytId = parseYouTubeId(url);
      if (ytId){
        lastVideo = { type:'yt', id:ytId };
        const items = YT_SIZES
          .filter(s => sizeState[s.key])
          .map(s => ({
            url: ytThumbUrl(ytId, s.key),
            label:s.label, dim:s.dim
          }));
        if (items.length === 0){
          showMessage('최소 한 개 이상의 사이즈를 선택해 주세요.', true);
          return;
        }
        saveHistory(url);
        loadMeta('yt', ytId);
        renderThumbs(items);
        return;
      }

      const vimeoId = parseVimeoId(url);
      if (vimeoId){
        lastVideo = { type:'vimeo', id:vimeoId };
        showMessage('Vimeo 썸네일을 불러오는 중…');
        saveHistory(url);
        fetch(`https://vimeo.com/api/oembed.json?url=https://vimeo.com/${vimeoId}`)
          .then(res => res.json())
          .then(data => {
            const w = data.thumbnail_width, h = data.thumbnail_height;
            if (data.title){
              document.getElementById('videoMeta').innerHTML =
                `<strong>${escapeHtml(data.title)}</strong>` +
                (data.author_name ? ` · <span>${escapeHtml(data.author_name)}</span>` : '');
            }
            const items = [{ url:data.thumbnail_url, label:'Vimeo', dim:(w&&h)?`${w}×${h}`:'원본' }];
            // i.vimeocdn.com 패턴이면 대형 사이즈 변형 추가
            const m = String(data.thumbnail_url||'').match(/_(\d+)x(\d+)/);
            if (m){
              items.unshift(
                { url:data.thumbnail_url.replace(/_\d+x\d+/, '_1280x720'), label:'대형', dim:'1280×720' },
                { url:data.thumbnail_url.replace(/_\d+x\d+/, '_640x360'),  label:'중형', dim:'640×360' }
              );
            }
            renderThumbs(items);
          })
          .catch(() => showMessage('Vimeo 썸네일을 가져올 수 없습니다.', false));
        return;
      }

      const dmId = parseDailymotionId(url);
      if (dmId){
        lastVideo = { type:'dm', id:dmId };
        showMessage('Dailymotion 썸네일을 불러오는 중…');
        saveHistory(url);
        fetch(`https://api.dailymotion.com/video/${dmId}?fields=title,owner.screenname,thumbnail_1080_url,thumbnail_720_url,thumbnail_480_url,thumbnail_360_url`)
          .then(r => r.json())
          .then(d => {
            setMetaText(d.title, d['owner.screenname']);
            const items = [];
            if (d.thumbnail_1080_url) items.push({ url:d.thumbnail_1080_url, label:'대형', dim:'1080p' });
            if (d.thumbnail_720_url)  items.push({ url:d.thumbnail_720_url,  label:'중형', dim:'720p'  });
            if (d.thumbnail_480_url)  items.push({ url:d.thumbnail_480_url,  label:'소형', dim:'480p'  });
            if (d.thumbnail_360_url)  items.push({ url:d.thumbnail_360_url,  label:'미니', dim:'360p'  });
            if (items.length) renderThumbs(items);
            else showMessage('Dailymotion 썸네일을 가져올 수 없습니다.', false);
          })
          .catch(() => showMessage('Dailymotion 썸네일을 가져올 수 없습니다.', false));
        return;
      }

      /* 그 외 모든 사이트: 대표 이미지(og:image) 추출 */
      let generic = url;
      if (!/^https?:\/\//i.test(generic)){
        if (/^[\w.-]+\.[a-z]{2,}([\/?#]|$)/i.test(generic)) generic = 'https://' + generic;
        else {
          lastVideo = null;
          showMessage('올바른 URL을 입력해 주세요.', true);
          return;
        }
      }
      extractGeneric(generic);
    }

    /* ===== 일반 사이트 대표 이미지 추출 ===== */
    async function extractGeneric(url){
      lastVideo = { type:'web', id:hostOf(url) };
      showMessage('썸네일을 찾는 중… 일반 사이트는 몇 초 걸릴 수 있어요.');

      /* 1) noembed — 동영상·SNS 등 100여 개 사이트 oEmbed 통합 */
      try{
        const r = await fetch('https://noembed.com/embed?url=' + encodeURIComponent(url));
        if (r.ok){
          const d = await r.json();
          if (d && d.thumbnail_url && !d.error){
            setMetaText(d.title, d.author_name || d.provider_name);
            saveHistory(url);
            renderThumbs([{
              url: d.thumbnail_url,
              label: d.provider_name || hostOf(url),
              dim: (d.thumbnail_width && d.thumbnail_height) ? `${d.thumbnail_width}×${d.thumbnail_height}` : ''
            }]);
            return;
          }
        }
      }catch(e){}

      /* 2) 공개 CORS 프록시로 페이지 HTML을 받아 og:image 파싱 */
      showMessage('페이지에서 대표 이미지를 찾는 중…');
      const proxies = [
        u => 'https://api.allorigins.win/raw?url=' + encodeURIComponent(u),
        u => 'https://api.codetabs.com/v1/proxy?quest=' + encodeURIComponent(u),
        u => 'https://corsproxy.io/?url=' + encodeURIComponent(u),
      ];
      for (const makeProxy of proxies){
        try{
          const r = await fetch(makeProxy(url));
          if (!r.ok) continue;
          const html = await r.text();
          if (!html || html.length < 40) continue;
          const found = parseOgImages(html, url);
          if (found.images.length){
            setMetaText(found.title, found.site || hostOf(url));
            saveHistory(url);
            renderThumbs(found.images.map((imgUrl, i) => ({
              url: imgUrl,
              label: i === 0 ? '대표 이미지' : `이미지 ${i + 1}`,
              dim: ''
            })));
            return;
          }
        }catch(e){}
      }

      /* 3) Microlink — JS로 화면을 그리는 SPA 사이트(KBS·방송사 VOD 등) 대응.
            헤드리스 브라우저로 실제 렌더링 후 대표 이미지를 찾아줌 (무료: IP당 1일 약 50회) */
      try{
        showMessage('페이지를 실제로 렌더링해서 찾는 중… (동적 사이트 대응, 최대 20초)');
        const r = await fetch('https://api.microlink.io/?url=' + encodeURIComponent(url) + '&prerender=auto');
        if (r.ok){
          const d = await r.json();
          if (d && d.status === 'success' && d.data){
            const imgs = [];
            if (d.data.image && d.data.image.url){
              imgs.push({
                url: d.data.image.url,
                label: '대표 이미지',
                dim: (d.data.image.width && d.data.image.height) ? `${d.data.image.width}×${d.data.image.height}` : ''
              });
            }
            if (d.data.logo && d.data.logo.url && !imgs.some(x => x.url === d.data.logo.url)){
              imgs.push({ url: d.data.logo.url, label: '로고', dim: '' });
            }
            if (imgs.length){
              setMetaText(d.data.title, d.data.publisher || hostOf(url));
              saveHistory(url);
              renderThumbs(imgs);
              return;
            }
          }
        }
      }catch(e){}

      lastVideo = null;
      showMessage('이 페이지에서 썸네일(대표 이미지)을 찾지 못했습니다.<br>로그인이 필요한 페이지, 봇 접근을 차단하는 사이트는 지원되지 않을 수 있어요.', false);
    }

    /* HTML에서 og:image·twitter:image 등 대표 이미지 후보 추출 */
    function parseOgImages(html, baseUrl){
      const doc = new DOMParser().parseFromString(html, 'text/html');
      const selectors = [
        'meta[property="og:image:secure_url"]',
        'meta[property="og:image"]',
        'meta[name="og:image"]',
        'meta[name="twitter:image"]',
        'meta[name="twitter:image:src"]',
        'meta[property="twitter:image"]',
        'meta[itemprop="image"]',
        'link[rel="image_src"]'
      ];
      const urls = [];
      selectors.forEach(sel=>{
        doc.querySelectorAll(sel).forEach(el=>{
          const v = el.getAttribute('content') || el.getAttribute('href');
          if (!v) return;
          try{
            const abs = new URL(v.trim(), baseUrl).href;
            if (/^https?:/.test(abs) && !urls.includes(abs)) urls.push(abs);
          }catch(e){}
        });
      });
      const ogTitle = doc.querySelector('meta[property="og:title"]');
      const siteName = doc.querySelector('meta[property="og:site_name"]');
      return {
        images: urls.slice(0, 6),
        title: (ogTitle && ogTitle.getAttribute('content')) || (doc.title || '').trim(),
        site: siteName ? siteName.getAttribute('content') : ''
      };
    }

    function showMessage(html, neutral){
      document.getElementById('thumbsList').innerHTML =
        `<div class="empty-msg${neutral?' neutral':''}">${html}</div>`;
    }

    /* ===== 렌더링 ===== */
    function renderThumbs(items){
      const thumbsList = document.getElementById('thumbsList');
      thumbsList.innerHTML = '';
      currentItems = items;
      document.getElementById('bulkBar').classList.toggle('show', items.length > 1);

      items.forEach(item=>{
        const card = document.createElement('div');
        card.className = 'thumb-item';

        const fig = document.createElement('div');
        fig.className = 'thumb-figure';
        fig.innerHTML = `
          <img src="${item.url}" alt="${item.label} 썸네일" loading="lazy">
          <div class="size-badge"><strong>${item.label}</strong><span class="dim">${item.dim}</span></div>
          <div class="check-mark">✓</div>
        `;
        fig.onclick = ()=>{
          if (card.classList.contains('unavailable')) return;
          document.querySelectorAll('.thumb-item').forEach(e=>e.classList.remove('selected'));
          card.classList.add('selected');
        };

        // 유튜브 maxres 등 없는 썸네일(120×90 회색 플레이스홀더) 자동 감지
        const img = fig.querySelector('img');
        img.addEventListener('load', ()=>{
          if (lastVideo && lastVideo.type === 'yt' && img.naturalWidth <= 120 && item.label !== '기본'){
            card.classList.add('unavailable');
            const na = document.createElement('div');
            na.className = 'na-note';
            na.textContent = '이 영상은 미지원 사이즈';
            fig.appendChild(na);
            return;
          }
          // 크기 미상(일반 사이트)이면 실제 해상도 표시
          if (!item.dim && img.naturalWidth){
            const dimEl = fig.querySelector('.size-badge .dim');
            if (dimEl) dimEl.textContent = `${img.naturalWidth}×${img.naturalHeight}`;
          }
        });
        img.addEventListener('error', ()=>{
          card.classList.add('unavailable');
          const na = document.createElement('div');
          na.className = 'na-note';
          na.textContent = '불러올 수 없음';
          fig.appendChild(na);
        });

        const body = document.createElement('div');
        body.className = 'thumb-body';

        const urlRow = document.createElement('div');
        urlRow.className = 'url-row';
        const field = document.createElement('input');
        field.className = 'url-field';
        field.type = 'text';
        field.readOnly = true;
        field.value = item.url;
        field.addEventListener('focus', ()=>field.select());
        const copyBtn = document.createElement('button');
        copyBtn.className = 'icon-btn';
        copyBtn.textContent = '복사';
        copyBtn.onclick = ()=>copyUrl(item.url, copyBtn);
        urlRow.appendChild(field);
        urlRow.appendChild(copyBtn);

        const btnRow = document.createElement('div');
        btnRow.className = 'btn-row';
        const openBtn = document.createElement('a');
        openBtn.className = 'icon-btn';
        openBtn.href = item.url;
        openBtn.target = '_blank';
        openBtn.rel = 'noopener';
        openBtn.textContent = '원본 열기';
        const dlBtn = document.createElement('button');
        dlBtn.className = 'icon-btn';
        dlBtn.textContent = '다운로드';
        dlBtn.onclick = ()=>downloadImage(item);
        btnRow.appendChild(openBtn);
        btnRow.appendChild(dlBtn);

        body.appendChild(urlRow);
        body.appendChild(btnRow);

        card.appendChild(fig);
        card.appendChild(body);
        thumbsList.appendChild(card);
      });
    }

    /* ===== 주소 복사 ===== */
    function copyUrl(url, btn){
      const done = ()=>{
        const t = btn.textContent;
        btn.textContent = '복사됨';
        btn.classList.add('copied');
        setTimeout(()=>{ btn.textContent = t; btn.classList.remove('copied'); }, 1400);
      };
      if (navigator.clipboard && navigator.clipboard.writeText){
        navigator.clipboard.writeText(url).then(done).catch(()=>fallbackCopy(url, done));
      } else {
        fallbackCopy(url, done);
      }
    }
    function fallbackCopy(text, done){
      const ta = document.createElement('textarea');
      ta.value = text;
      ta.style.position = 'fixed';
      ta.style.opacity = '0';
      document.body.appendChild(ta);
      ta.focus(); ta.select();
      try{ document.execCommand('copy'); done(); }catch(e){}
      document.body.removeChild(ta);
    }

    /* ===== 다운로드 (CORS 가능 시 blob, 아니면 새 탭) ===== */
    function downloadFileName(item){
      const ext = /\.webp(\?|$)/.test(item.url) ? 'webp' : (/\.png(\?|$)/.test(item.url) ? 'png' : 'jpg');
      const base = lastVideo ? `${lastVideo.type}_${String(lastVideo.id).replace(/[^\w-]+/g,'_')}` : 'thumbnail';
      const label = String(item.label).replace(/\s+/g, '');
      return `${base}_${label}.${ext}`;
    }
    function downloadImage(item){
      fetch(item.url)
        .then(r=>r.blob())
        .then(blob=>{
          const a = document.createElement('a');
          const obj = URL.createObjectURL(blob);
          a.href = obj;
          a.download = downloadFileName(item);
          document.body.appendChild(a);
          a.click();
          document.body.removeChild(a);
          URL.revokeObjectURL(obj);
        })
        .catch(()=>window.open(item.url, '_blank', 'noopener'));
    }

    /* ===== 일괄 다운로드 (사용 불가 카드 제외, 순차 실행) ===== */
    function bulkDownload(){
      const cards = Array.from(document.querySelectorAll('.thumb-item'));
      const targets = currentItems.filter((_, i) => cards[i] && !cards[i].classList.contains('unavailable'));
      targets.forEach((item, i)=>{
        setTimeout(()=>downloadImage(item), i * 450);
      });
    }

    /* Enter 키로 추출 */
    document.getElementById('videoUrl').addEventListener('keydown', e=>{
      if (e.key === 'Enter') getThumbnails();
    });

    /* 붙여넣기 시 자동 추출 */
    document.getElementById('videoUrl').addEventListener('paste', ()=>{
      setTimeout(()=>{
        const v = document.getElementById('videoUrl').value.trim();
        if (parseYouTubeId(v) || parseVimeoId(v) || parseDailymotionId(v) || /^https?:\/\//i.test(v)) getThumbnails();
      }, 60);
    });

    /* 초기화: 기록 렌더 + ?url= / ?v= 딥링크 지원 */
    (function init(){
      renderHistory();
      try{
        const p = new URLSearchParams(location.search);
        const q = p.get('url') || p.get('v');
        if (q){
          const v = /^[\w-]{6,}$/.test(q) ? 'https://youtu.be/' + q : q;
          document.getElementById('videoUrl').value = v;
          getThumbnails();
        }
      }catch(e){}
    })();

    /* ===== MYWAY.KR 복사 방지 정책 (input/textarea 예외) ===== */
    (function(){
      const isEditable = t => t && (t.tagName === 'INPUT' || t.tagName === 'TEXTAREA');
      ['contextmenu','selectstart','dragstart','copy','cut'].forEach(evt=>{
        document.addEventListener(evt, e=>{
          if (isEditable(e.target)) return;
          e.preventDefault();
        });
      });
      document.addEventListener('keydown', e=>{
        if (e.key === 'F12'){ e.preventDefault(); return; }
        const k = (e.key || '').toLowerCase();
        if (e.ctrlKey && e.shiftKey && ['i','j','c'].includes(k)){ e.preventDefault(); return; }
        if (e.ctrlKey && !e.shiftKey && ['u','s','c','x','a'].includes(k)){
          if (isEditable(e.target)) return; // 입력창 내 복사/전체선택 등은 허용
          e.preventDefault();
        }
      });
    })();
  </script>
</body>
