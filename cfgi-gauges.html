<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>코인별 공포·탐욕 지수 | MYWAY.KR</title>
<meta name="description" content="비트코인·이더리움·트론·XRP·솔라나·도지코인의 공포·탐욕 지수를 한 화면에서 비교하세요.">
<meta name="robots" content="index, follow">
<link rel="canonical" href="https://myway.kr/cfgi-gauges.html">
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
<style>
  :root{ --line:#e7e2d6;--ink:#1f1b16;--ink-sub:#8c8579;--paper:#f7f3eb;--card:#fff;--accent:#0b6b53;--body:"Pretendard",-apple-system,sans-serif; }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{min-height:100vh;min-height:100dvh;background:var(--paper);color:var(--ink);font-family:var(--body);-webkit-font-smoothing:antialiased;user-select:none;-webkit-user-select:none;display:flex;flex-direction:column;align-items:center;padding:22px 14px 90px}

  .wrap{width:100%;max-width:1080px}
  .head{text-align:center;margin:6px 0 16px}
  .head h1{font-size:22px;font-weight:800;letter-spacing:-0.03em;margin:0 0 4px}
  .head p{font-size:13px;color:var(--ink-sub);margin:0}

  .tf-bar{display:flex;gap:6px;justify-content:center;margin:14px 0 20px;flex-wrap:wrap}
  .tf-btn{border:1px solid var(--line);background:#fff;border-radius:999px;padding:8px 16px;font-family:var(--body);font-size:13px;font-weight:800;color:var(--ink-sub);cursor:pointer;transition:all .15s}
  .tf-btn:hover{border-color:#cdd9d3;color:var(--ink)}
  .tf-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}

  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px}
  .cell{background:var(--card);border:1px solid var(--line);border-radius:16px;overflow:hidden;box-shadow:0 1px 2px rgba(80,60,40,.04),0 8px 22px -10px rgba(80,60,40,.16)}
  .cell .ttl{display:flex;align-items:center;gap:8px;padding:11px 14px 8px;font-size:14px;font-weight:800;letter-spacing:-0.02em}
  .cell .ttl .sym{font-size:11px;font-weight:800;color:var(--ink-sub);font-family:ui-monospace,monospace;background:var(--paper);border-radius:6px;padding:2px 7px}
  .cell .frame{position:relative;width:100%;height:300px;background:#fff}
  .cell iframe{width:100%;height:100%;border:0;display:block}

  .foot-note{font-size:11.5px;color:var(--ink-sub);text-align:center;margin-top:18px;line-height:1.6}
  .foot-note a{color:var(--accent);text-decoration:none;font-weight:700}
  footer{text-align:center;padding:22px 0 0;color:var(--ink-sub);font-size:12px}
  footer a{color:var(--accent);text-decoration:none;font-weight:700}
  .home-fab{position:fixed;right:18px;bottom:18px;z-index:50;width:46px;height:46px;border-radius:50%;background:#fff;border:1px solid var(--line);box-shadow:0 4px 14px rgba(80,60,40,.18);display:flex;align-items:center;justify-content:center;color:var(--ink-sub);text-decoration:none;transition:color .15s,transform .15s}
  .home-fab:hover{color:var(--accent);transform:scale(1.06)}
  .home-fab svg{width:22px;height:22px}
</style>
</head>
<body>
<div class="wrap">
  <div class="head">
    <h1>코인별 공포 · 탐욕 지수</h1>
    <p>주요 코인 시장 심리를 한눈에 · Powered by CFGI</p>
  </div>

  <div class="tf-bar" id="tfBar">
    <button class="tf-btn" data-tf="15m">15분</button>
    <button class="tf-btn" data-tf="1h">1시간</button>
    <button class="tf-btn" data-tf="4h">4시간</button>
    <button class="tf-btn active" data-tf="1d">1일</button>
  </div>

  <div class="grid" id="grid"></div>

  <div class="foot-note">
    데이터 출처: <a href="https://cfgi.io/" target="_blank" rel="noopener">CFGI.io</a> · 15분마다 갱신돼요.<br>투자 판단의 참고용이며 투자 조언이 아니에요.
  </div>
  <footer>© MYWAY · <a href="https://myway.kr">myway.kr</a></footer>
</div>

<a class="home-fab" href="https://myway.kr" aria-label="홈">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 11.5 12 4l9 7.5"/><path d="M5 10v9h14v-9"/></svg>
</a>

<script>
/* 표시할 코인 (이름, CFGI 심볼) — 순서/구성 바꾸려면 이 배열만 수정 */
var COINS = [
  { name:'비트코인',  sym:'BTC'  },
  { name:'이더리움',  sym:'ETH'  },
  { name:'트론',      sym:'TRX'  },
  { name:'XRP 리플',  sym:'XRP'  },
  { name:'솔라나',    sym:'SOL'  },
  { name:'도지코인',  sym:'DOGE' }
];
var THEME = 'light';        /* light | dark */
var tf = '1d';              /* 현재 타임프레임 */

var grid = document.getElementById('grid');
function widgetSrc(sym, t){
  return 'https://cfgi.io/widget/embed/?symbol='+sym+'&theme='+THEME+'&timeframe='+t;
}
function render(){
  grid.innerHTML='';
  COINS.forEach(function(c){
    var cell=document.createElement('div'); cell.className='cell';
    var ttl=document.createElement('div'); ttl.className='ttl';
    ttl.innerHTML = c.name + '<span class="sym">'+c.sym+'</span>';
    var fr=document.createElement('div'); fr.className='frame';
    var ifr=document.createElement('iframe');
    ifr.src = widgetSrc(c.sym, tf);
    ifr.loading='lazy';
    ifr.title = c.name+' 공포·탐욕 지수';
    fr.appendChild(ifr);
    cell.appendChild(ttl); cell.appendChild(fr);
    grid.appendChild(cell);
  });
}
render();

/* 타임프레임 전환 → 모든 위젯 src 갱신 */
document.getElementById('tfBar').addEventListener('click', function(e){
  var b = e.target.closest('.tf-btn'); if(!b) return;
  tf = b.dataset.tf;
  document.querySelectorAll('.tf-btn').forEach(function(x){ x.classList.toggle('active', x===b); });
  render();
});

/* 복사 방지 */
(function(){
  var isField=function(el){ return el&&(el.tagName==='INPUT'||el.tagName==='TEXTAREA'||el.tagName==='SELECT'||el.isContentEditable); };
  ['contextmenu','selectstart','dragstart','copy','cut'].forEach(function(ev){
    document.addEventListener(ev,function(e){ if(isField(e.target)) return; e.preventDefault(); });
  });
  document.addEventListener('keydown',function(e){
    var k=(e.key||'').toLowerCase();
    if(e.key==='F12'){e.preventDefault();return;}
    if(e.ctrlKey&&e.shiftKey&&['i','j','c'].includes(k)){e.preventDefault();return;}
    if(e.ctrlKey&&['u','s','c','x','a'].includes(k)){ if(isField(e.target)&&['c','x','a'].includes(k)) return; e.preventDefault(); }
  });
})();
</script>
</body>
</html>
