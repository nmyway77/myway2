<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>라디오 플레이어 | MYWAY</title>
<meta name="description" content="한국 라디오를 한 페이지에서 듣는 통합 플레이어. 채널 목록·재생·즐겨찾기 지원.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/hls.js/1.5.13/hls.min.js"></script>
<style>
  :root{
    --paper:#f7f3eb; --ink:#1f2740; --sub:#6a739c; --line:#e6e2d6;
    --card:#fffdf8; --accent1:#7e6cf0; --accent2:#4a9fff;
    --grad:linear-gradient(120deg,#7e6cf0,#4a9fff);
    --star:#f5a623; --danger:#d6455c;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--paper); color:var(--ink);
    font-family:'Pretendard',system-ui,sans-serif;
    min-height:100vh; min-height:100dvh;
    padding-bottom:96px;
    -webkit-user-select:none; user-select:none;
  }
  input{ -webkit-user-select:text; user-select:text; }

  .wrap{ max-width:1100px; margin:0 auto; padding:22px 16px 30px; }

  header.top{ text-align:center; margin-bottom:18px; }
  header.top h1{
    font-family:'Fraunces',serif; font-weight:700; font-size:1.9rem;
    margin:0 0 4px; letter-spacing:-.01em;
    background:var(--grad); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent;
  }
  header.top p{ margin:0; color:var(--sub); font-size:.86rem; }

  .controls{ display:flex; gap:9px; flex-wrap:wrap; align-items:center; margin:16px 0 14px; }
  .search{ flex:1 1 220px; position:relative; min-width:0; }
  .search input{
    width:100%; padding:11px 14px 11px 38px; border:1.5px solid var(--line); border-radius:12px;
    font-size:.95rem; font-family:inherit; color:var(--ink); background:var(--card); outline:none;
  }
  .search input:focus{ border-color:var(--accent1); }
  .search svg{ position:absolute; left:12px; top:50%; transform:translateY(-50%); width:17px; height:17px; color:var(--sub); }
  .tabs{ display:flex; gap:6px; flex:0 0 auto; }
  .tab{
    padding:10px 15px; border:1.5px solid var(--line); border-radius:11px; background:var(--card);
    font-family:'JetBrains Mono',monospace; font-size:.8rem; font-weight:700; color:var(--sub); cursor:pointer; transition:.15s;
  }
  .tab.active{ background:var(--grad); color:#fff; border-color:transparent; }

  .status{ text-align:center; color:var(--sub); font-size:.9rem; padding:40px 12px; line-height:1.7; }
  .status button{ margin-top:12px; padding:9px 18px; border:none; border-radius:10px; background:var(--grad); color:#fff; font-weight:700; font-family:inherit; cursor:pointer; }

  .grid{ display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:11px; }
  .ch{
    display:flex; align-items:center; gap:11px; padding:11px 12px; background:var(--card);
    border:1.5px solid var(--line); border-radius:14px; cursor:pointer; transition:.14s; position:relative; text-align:left;
  }
  .ch:hover{ border-color:var(--accent1); transform:translateY(-1px); box-shadow:0 6px 18px rgba(60,70,120,.08); }
  .ch.playing{ border-color:transparent; background:linear-gradient(120deg,rgba(126,108,240,.12),rgba(74,159,255,.12)); box-shadow:0 0 0 1.5px var(--accent1) inset; }
  .ch .ico{ flex:0 0 auto; width:42px; height:42px; border-radius:11px; background:var(--grad); display:flex; align-items:center; justify-content:center; overflow:hidden; }
  .ch .ico img{ width:100%; height:100%; object-fit:cover; }
  .ch .ico span{ color:#fff; font-family:'Fraunces',serif; font-weight:700; font-size:1.1rem; }
  .ch .meta{ flex:1 1 auto; min-width:0; }
  .ch .nm{ font-weight:700; font-size:.92rem; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .ch .tg{ font-family:'JetBrains Mono',monospace; font-size:.68rem; color:var(--sub); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-top:2px; }
  .ch .fav{ flex:0 0 auto; width:30px; height:30px; border:none; background:transparent; cursor:pointer; font-size:1.15rem; line-height:1; color:#cfd4e6; }
  .ch .fav.on{ color:var(--star); }
  .ch .eq{ position:absolute; right:42px; bottom:11px; display:none; gap:2px; align-items:flex-end; height:13px; }
  .ch.playing .eq{ display:flex; }
  .ch .eq i{ width:3px; background:var(--accent1); border-radius:2px; animation:eq .9s ease-in-out infinite; }
  .ch .eq i:nth-child(2){ animation-delay:.25s; } .ch .eq i:nth-child(3){ animation-delay:.5s; }
  @keyframes eq{ 0%,100%{height:4px;} 50%{height:13px;} }

  /* 하단 플레이어 바 */
  .player{
    position:fixed; left:0; right:0; bottom:0; z-index:50;
    background:rgba(255,253,248,.96); backdrop-filter:blur(10px); -webkit-backdrop-filter:blur(10px);
    border-top:1.5px solid var(--line); box-shadow:0 -6px 24px rgba(40,44,70,.08);
  }
  .player-in{ max-width:1100px; margin:0 auto; display:flex; align-items:center; gap:13px; padding:11px 16px; }
  .pbtn{ flex:0 0 auto; width:50px; height:50px; border:none; border-radius:50%; background:var(--grad); color:#fff; cursor:pointer; display:flex; align-items:center; justify-content:center; box-shadow:0 4px 14px rgba(126,108,240,.35); }
  .pbtn svg{ width:22px; height:22px; }
  .pinfo{ flex:1 1 auto; min-width:0; }
  .pinfo .pn{ font-weight:700; font-size:.95rem; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .pinfo .ps{ font-family:'JetBrains Mono',monospace; font-size:.72rem; color:var(--sub); margin-top:2px; }
  .pinfo .ps.err{ color:var(--danger); }
  .vol{ flex:0 0 auto; display:flex; align-items:center; gap:7px; }
  .vol svg{ width:18px; height:18px; color:var(--sub); }
  .vol input{ width:86px; accent-color:var(--accent1); }
  @media (max-width:560px){ .vol input{ width:60px; } .player-in{ gap:10px; } }

  /* 플로팅 홈 */
  .home-fab{ position:fixed; right:16px; bottom:108px; z-index:60; width:48px; height:48px; border-radius:50%;
    background:var(--grad); color:#fff; display:flex; align-items:center; justify-content:center; text-decoration:none;
    box-shadow:0 6px 18px rgba(74,159,255,.4); }
  .home-fab svg{ width:22px; height:22px; }

  footer{ text-align:center; padding:24px 12px 8px; color:var(--sub); font-size:.78rem; }
  footer a{ color:var(--accent1); text-decoration:none; font-weight:700; }
  .ver{ font-family:'JetBrains Mono',monospace; font-size:.66rem; color:#bcc2d6; margin-top:4px; }
</style>
</head>
<body>
  <div class="wrap">
    <header class="top">
      <h1>라디오 플레이어</h1>
      <p>한국 라디오를 한 곳에서 — 채널을 누르면 바로 재생돼요</p>
    </header>

    <div class="controls">
      <div class="search">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
        <input id="q" type="text" placeholder="방송 이름 검색 (예: KBS, 클래식, MBC)" autocomplete="off">
      </div>
      <div class="tabs">
        <button class="tab active" id="tabAll">전체</button>
        <button class="tab" id="tabFav">즐겨찾기</button>
      </div>
    </div>

    <div id="status" class="status">한국 라디오 목록을 불러오는 중…</div>
    <div id="grid" class="grid"></div>
  </div>

  <div class="player">
    <div class="player-in">
      <button class="pbtn" id="playBtn" aria-label="재생/정지">
        <svg id="playIcon" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
      </button>
      <div class="pinfo">
        <div class="pn" id="pName">채널을 선택하세요</div>
        <div class="ps" id="pState">대기 중</div>
      </div>
      <div class="vol">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 5L6 9H2v6h4l5 4V5z"/><path d="M15.5 8.5a5 5 0 010 7"/></svg>
        <input id="vol" type="range" min="0" max="100" value="80">
      </div>
    </div>
  </div>

  <a class="home-fab" href="https://myway.kr" aria-label="홈">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 11l9-8 9 8"/><path d="M5 10v10h14V10"/></svg>
  </a>

  <footer>
    공개 라디오 디렉토리(radio-browser.info)를 사용합니다 · <a href="https://myway.kr">myway.kr</a>
    <div class="ver">radio player v1.0</div>
  </footer>

  <audio id="audio" crossorigin="anonymous"></audio>

<script>
(function(){
  "use strict";
  var SERVERS = [
    'https://de1.api.radio-browser.info',
    'https://fi1.api.radio-browser.info',
    'https://nl1.api.radio-browser.info',
    'https://all.api.radio-browser.info'
  ];
  var FAV_KEY = 'mywayRadioFavV1';
  var audio = document.getElementById('audio');
  var hls = null;
  var stations = [];
  var view = 'all';        // all | fav
  var current = null;      // 현재 재생 station
  var favs = loadFavs();

  function loadFavs(){
    try { var r = localStorage.getItem(FAV_KEY); return r ? JSON.parse(r) : []; } catch(e){ return []; }
  }
  function saveFavs(){ try { localStorage.setItem(FAV_KEY, JSON.stringify(favs)); } catch(e){} }
  function isFav(uuid){ return favs.indexOf(uuid) >= 0; }
  function toggleFav(uuid){
    var i = favs.indexOf(uuid);
    if (i >= 0) favs.splice(i,1); else favs.push(uuid);
    saveFavs();
  }

  function setStatus(msg, withRetry){
    var el = document.getElementById('status');
    if (!msg){ el.style.display='none'; return; }
    el.style.display='block';
    el.innerHTML = '';
    var p = document.createElement('div'); p.innerHTML = msg; el.appendChild(p);
    if (withRetry){
      var b = document.createElement('button'); b.textContent='다시 시도'; b.onclick = loadStations;
      el.appendChild(b);
    }
  }

  // 라디오 목록 불러오기 (서버 폴백)
  async function loadStations(){
    setStatus('한국 라디오 목록을 불러오는 중…');
    for (var i=0; i<SERVERS.length; i++){
      try {
        var url = SERVERS[i] + '/json/stations/bycountrycodeexact/KR?hidebroken=true&order=clickcount&reverse=true&limit=400';
        var r = await fetch(url, { headers: { 'Content-Type':'application/json' } });
        if (!r.ok) continue;
        var data = await r.json();
        if (Array.isArray(data) && data.length){
          // 재생 가능한 url 있는 것만, 이름 중복 정리
          var seen = {};
          stations = data.filter(function(s){
            var u = s.url_resolved || s.url;
            if (!u) return false;
            var key = (s.name||'').trim().toLowerCase();
            if (!key || seen[key]) return false;
            seen[key] = 1; return true;
          });
          setStatus('');
          render();
          return;
        }
      } catch(e){ /* 다음 서버 시도 */ }
    }
    setStatus('목록을 불러오지 못했어요.<br>네트워크 상태를 확인하거나 잠시 후 다시 시도해 주세요.', true);
  }

  function initials(name){
    var n = (name||'').replace(/\s+/g,'');
    return n ? n.slice(0,2) : '♪';
  }

  function render(){
    var grid = document.getElementById('grid');
    var q = (document.getElementById('q').value || '').trim().toLowerCase();
    var list = stations;
    if (view === 'fav') list = list.filter(function(s){ return isFav(s.stationuuid); });
    if (q) list = list.filter(function(s){
      return ((s.name||'')+' '+(s.tags||'')).toLowerCase().indexOf(q) >= 0;
    });

    grid.innerHTML = '';
    if (!list.length){
      setStatus(view==='fav' ? '즐겨찾기한 방송이 아직 없어요.<br>채널의 별(☆)을 눌러 추가해 보세요.' : '검색 결과가 없어요.');
      return;
    }
    setStatus('');

    list.forEach(function(s){
      var card = document.createElement('button');
      card.className = 'ch' + (current && current.stationuuid===s.stationuuid ? ' playing' : '');
      card.type = 'button';

      var ico = document.createElement('div'); ico.className='ico';
      if (s.favicon){
        var im = document.createElement('img'); im.src=s.favicon; im.alt=''; im.referrerPolicy='no-referrer';
        im.onerror = function(){ ico.innerHTML=''; var sp=document.createElement('span'); sp.textContent=initials(s.name); ico.appendChild(sp); };
        ico.appendChild(im);
      } else {
        var sp=document.createElement('span'); sp.textContent=initials(s.name); ico.appendChild(sp);
      }

      var meta = document.createElement('div'); meta.className='meta';
      var nm = document.createElement('div'); nm.className='nm'; nm.textContent = s.name || '(이름 없음)';
      var tg = document.createElement('div'); tg.className='tg';
      var bits = [];
      if (s.bitrate) bits.push(s.bitrate + 'k');
      if (s.codec) bits.push(s.codec);
      if (s.tags) bits.push(s.tags.split(',').slice(0,2).join(', '));
      tg.textContent = bits.join(' · ') || '라디오';
      meta.appendChild(nm); meta.appendChild(tg);

      var eq = document.createElement('div'); eq.className='eq'; eq.innerHTML='<i></i><i></i><i></i>';

      var fav = document.createElement('button'); fav.type='button';
      fav.className = 'fav' + (isFav(s.stationuuid) ? ' on' : '');
      fav.textContent = isFav(s.stationuuid) ? '★' : '☆';
      fav.title = '즐겨찾기';
      fav.onclick = function(ev){ ev.stopPropagation(); toggleFav(s.stationuuid); render(); };

      card.appendChild(ico); card.appendChild(meta); card.appendChild(eq); card.appendChild(fav);
      card.onclick = function(){ playStation(s); };
      grid.appendChild(card);
    });
  }

  function stopPlayback(){
    try { if (hls){ hls.destroy(); hls=null; } } catch(e){}
    try { audio.pause(); audio.removeAttribute('src'); audio.load(); } catch(e){}
  }

  function setPState(txt, isErr){
    var el = document.getElementById('pState');
    el.textContent = txt; el.className = 'ps' + (isErr ? ' err' : '');
  }
  function setPlayIcon(playing){
    document.getElementById('playIcon').innerHTML = playing
      ? '<path d="M6 5h4v14H6zM14 5h4v14h-4z"/>'
      : '<path d="M8 5v14l11-7z"/>';
  }

  function playStation(s){
    current = s;
    document.getElementById('pName').textContent = s.name || '재생 중';
    setPState('연결 중…');
    setPlayIcon(true);
    render();

    var url = s.url_resolved || s.url;
    stopPlayback();

    var isHls = /\.m3u8(\?|$)/i.test(url);
    try {
      if (isHls && window.Hls && window.Hls.isSupported()){
        hls = new window.Hls();
        hls.loadSource(url);
        hls.attachMedia(audio);
        hls.on(window.Hls.Events.MANIFEST_PARSED, function(){ audio.play().then(ok).catch(failPlay); });
        hls.on(window.Hls.Events.ERROR, function(ev, data){
          if (data && data.fatal) failPlay();
        });
      } else {
        // mp3/aac 또는 Safari 네이티브 HLS
        audio.src = url;
        audio.play().then(ok).catch(failPlay);
      }
    } catch(e){ failPlay(); }

    // 인기도 보고 (선택, 실패 무시)
    try { fetch(SERVERS[0] + '/json/url/' + s.stationuuid).catch(function(){}); } catch(e){}

    function ok(){ setPState('재생 중'); setPlayIcon(true); }
    function failPlay(){
      setPState('이 채널은 현재 브라우저에서 재생할 수 없어요', true);
      setPlayIcon(false);
    }
  }

  function togglePlay(){
    if (!current){ return; }
    if (audio.paused){
      audio.play().then(function(){ setPState('재생 중'); setPlayIcon(true); })
                   .catch(function(){ playStation(current); });
    } else {
      audio.pause(); setPState('일시정지'); setPlayIcon(false);
    }
  }

  // 이벤트
  document.getElementById('playBtn').onclick = togglePlay;
  document.getElementById('q').addEventListener('input', render);
  document.getElementById('tabAll').onclick = function(){ view='all'; this.classList.add('active'); document.getElementById('tabFav').classList.remove('active'); render(); };
  document.getElementById('tabFav').onclick = function(){ view='fav'; this.classList.add('active'); document.getElementById('tabAll').classList.remove('active'); render(); };
  document.getElementById('vol').addEventListener('input', function(){ audio.volume = this.value/100; });
  audio.volume = 0.8;
  audio.addEventListener('playing', function(){ setPState('재생 중'); setPlayIcon(true); });
  audio.addEventListener('pause', function(){ if(current) setPlayIcon(false); });
  audio.addEventListener('waiting', function(){ setPState('버퍼링…'); });
  audio.addEventListener('error', function(){ if(current) setPState('재생 오류 — 다른 채널을 눌러보세요', true); });

  // 복제방지 (입력창 예외)
  ['contextmenu','dragstart','copy','cut'].forEach(function(ev){
    document.addEventListener(ev, function(e){
      var t = e.target, tag=(t.tagName||'').toLowerCase();
      if (tag==='input' || tag==='textarea') return;
      e.preventDefault();
    }, {capture:true});
  });

  loadStations();
})();
</script>
</body>
</html>
