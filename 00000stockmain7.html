      color: var(--text-muted);
      font-weight: 500;
      letter-spacing: -0.1px;
    }
    .section-sub.is-upbit {
      font-size: 1.1rem;
      font-weight: 800;
      letter-spacing: .8px;
      color: #1b64da;
    }
    .section-newslink {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: .92rem;
      font-weight: 800;
      color: var(--accent);
      text-decoration: none;
      letter-spacing: 0.2px;
      border-bottom: 1.5px solid var(--accent);

    }
    .section-newslink svg { width: 16px; height: 16px; flex-shrink: 0; }

    /* 카드 그리드 */
    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      column-gap: 12px;
      row-gap: 28px;
    }

    .card {
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 18px 18px;
      text-decoration: none;
      color: inherit;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 10px;
      position: relative;
      overflow: visible;
      transition: transform .2s, box-shadow .2s, border-color .2s, background .2s;
      -webkit-tap-highlight-color: transparent;
      min-height: 78px;
      box-shadow: 0 2px 4px rgba(90, 90, 130, 0.06);
    }
    /* 라이트 카드에서는 좌상단 글로우 비활성 */
    .card::before { content: none; }
    /* 카드 아래 곡선 그림자 PNG (페이퍼 컬 효과) */
    .card::after {
      content: "";
      position: absolute;
      left: 3%;
      right: 3%;
      top: 100%;
      height: 22px;
      background: url('https://64.media.tumblr.com/f5f06009df6584ebb5539cad61f73c63/tumblr_inline_qsghz3XZRQ1r45nlo_500.png') center top / 100% 100% no-repeat;
      pointer-events: none;
      z-index: 1;
    }
    .card:hover {
      background: var(--card-bg-hover);
      border-color: var(--card-border-hover);
      transform: translateY(-3px);
      box-shadow: 0 4px 10px rgba(90, 90, 130, 0.12);
    }
    .card:active { transform: translateY(-1px); }

    /* ===== 분할 카드(한국 주식: 좌 알파스퀘어 / 우 네이버) ===== */
    .card-split { padding: 14px 14px 22px; justify-content: flex-start; }
    .card-split .card-content {
      position: relative;
      z-index: 1;
      pointer-events: none; /* 클릭은 좌/우 영역이 담당 */
    }
    .card-half {
      position: absolute;
      top: 0; bottom: 0;
      width: 50%;
      z-index: 2;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      padding-bottom: 7px;
      text-decoration: none;
      border-radius: 10px;
      transition: background .15s;
    }
    .card-half-l { left: 0;  border-top-right-radius: 0; border-bottom-right-radius: 0; }
    .card-half-r { right: 0; border-top-left-radius: 0;  border-bottom-left-radius: 0; }
    .card-half .src-label {
      font-size: .64rem;
      font-weight: 700;
      letter-spacing: -0.2px;
      color: var(--text-muted);
      opacity: .55;
      transition: opacity .15s, color .15s;
      white-space: nowrap;
    }
    .card-half-l .src-label::before { content: "◀ "; font-size: .58rem; }
    .card-half-r .src-label::after  { content: " ▶"; font-size: .58rem; }
    .card-half:hover { background: var(--card-bg-hover); }
    .card-half:hover .src-label { opacity: 1; color: var(--accent); }
    .card-half:active { background: var(--card-border-hover); }

    .card .ticker {
      font-size: 1.25rem;
      font-weight: 800;
      color: var(--text-main);
      letter-spacing: -0.4px;
      line-height: 1.15;
      margin-bottom: 4px;
      word-break: keep-all;
      overflow-wrap: anywhere;
    }
    /* 글자 수가 많은 카드(사이트명 등)는 자동으로 살짝 작게 */
    .card .ticker:has(+ .name-ko) { /* 보조 라벨 있는 모든 카드 */ }
    .card[data-long="1"] .ticker { font-size: 1.05rem; }
    .card .name-ko {
      font-size: .82rem;
      font-weight: 500;
      color: var(--text-sub);
      letter-spacing: -0.2px;
      line-height: 1.2;
    }
    /* 우상단 외부 링크 마커 */
    .card .arrow {
      position: absolute;
      top: 12px; right: 14px;
      font-size: .85rem;
      color: var(--text-muted);
      opacity: 0;
      transition: opacity .15s, transform .15s;
    }
    .card:hover .arrow {
      opacity: 1;
      transform: translate(2px, -2px);
      color: var(--accent);
    }

    /* 반응형 */
    @media (max-width: 720px) {
      .grid { grid-template-columns: repeat(2, 1fr); column-gap: 10px; row-gap: 24px; }
      .card { padding: 16px 16px; min-height: 72px; }

    }

    /* ===== MYWAY.KR 공통 ===== */

    .myway-footer {
      width: 100%;
      text-align: center;
      padding: 22px 14px calc(28px + var(--safe-bottom));

      color: var(--text-muted);
    }
    .myway-footer a {
      color: var(--text-sub);
      text-decoration: none;
      font-weight: 700;
    }
    .myway-footer a:hover { color: var(--accent); }
    .myway-footer .sep { display: inline-block; margin: 0 8px; opacity: .5; }
  
    /* ===== 첫화면 상단: 실시간 지표 + 종합정보 ===== */
    #chartTop .chart-top-inner{ max-width:1200px; margin:0 auto; padding:22px 16px 4px; }
    .ind-strip{ margin-bottom:28px; }
    .ind-head{ display:flex; align-items:baseline; gap:10px; padding:0 4px; margin-bottom:10px; }
    .ind-t{ font-size:.95rem; font-weight:800; color:var(--text-main); letter-spacing:-.2px; }
    .ind-t::before{ content:""; display:inline-block; width:7px; height:7px; border-radius:50%; background:#e0245e; margin-right:7px; vertical-align:middle; box-shadow:0 0 0 3px rgba(224,36,94,.15); }
    .ind-sub{ font-size:.72rem; color:var(--text-muted); }
    .tv-box{ border:1px solid var(--card-border); border-radius:16px; background:var(--card-bg); padding:6px 4px; overflow:hidden; box-shadow:0 1px 2px rgba(16,24,40,.05); }
    .tv-box .tradingview-widget-copyright{ font-size:10px; text-align:right; padding:2px 10px 0; }
    .tv-box .tradingview-widget-copyright a{ color:#7a86a8; text-decoration:none; }
    .tv-box .tradingview-widget-copyright .trademark{ color:var(--text-muted); }

    .info-head{ display:flex; align-items:baseline; gap:10px; padding:0 4px; margin-bottom:14px; }
    .info-title{ font-size:1.15rem; font-weight:800; color:var(--text-main); letter-spacing:-.4px; margin:0; }
    .info-title::before{ content:""; display:inline-block; width:4px; height:18px; border-radius:3px; background:linear-gradient(180deg,#2e7d4f,#10b981); margin-right:9px; vertical-align:-3px; }
    .info-desc{ font-size:.72rem; color:var(--text-muted); }
    .info-block + .info-block{ margin-top:1.6rem; }
    .info-grid{ display:grid; grid-template-columns:repeat(8,1fr); gap:10px; }
    .info-card{ position:relative; display:flex; flex-direction:column; gap:11px; padding:16px 12px; border-radius:16px; text-decoration:none;
      background:var(--card-bg); border:1px solid var(--card-border); box-shadow:0 1px 2px rgba(16,24,40,.05);
      transition:transform .2s cubic-bezier(.2,.7,.3,1), box-shadow .2s, border-color .2s; overflow:hidden;
      animation:infoIn .55s cubic-bezier(.2,.7,.3,1) both; }
    .info-card::after{ content:""; position:absolute; left:0; right:0; top:0; height:3px; background:linear-gradient(90deg,var(--c),var(--c2)); }
    .info-card:hover{ transform:translateY(-5px); box-shadow:0 16px 32px -14px var(--c); border-color:transparent; }
    .info-ico{ width:42px; height:42px; border-radius:13px; display:flex; align-items:center; justify-content:center;
      background:linear-gradient(135deg,var(--c),var(--c2)); box-shadow:0 8px 18px -8px var(--c); }
    .info-ico svg{ width:23px; height:23px; stroke:#fff; fill:none; stroke-width:2; stroke-linecap:round; stroke-linejoin:round; }
    .info-name{ font-size:.97rem; font-weight:800; color:var(--text-main); letter-spacing:-.3px; }
    .info-en{ font-size:.66rem; font-weight:700; color:var(--text-muted); text-transform:uppercase; letter-spacing:.7px; }
    .info-arrow{ position:absolute; top:16px; right:14px; width:16px; height:16px; color:var(--c); opacity:0; transform:translateX(-4px); transition:.2s; }
    .info-card:hover .info-arrow{ opacity:1; transform:translateX(0); }
    @keyframes infoIn{ from{opacity:0; transform:translateY(12px);} to{opacity:1; transform:none;} }
    @media (max-width:980px){ .info-grid{ grid-template-columns:repeat(4,1fr); } #chartTop .chart-top-inner{ padding:18px 14px 2px; } }
    @media (max-width:520px){ .info-grid{ grid-template-columns:repeat(2,1fr); gap:10px; } .info-card{ padding:16px 14px; } }

    /* ===== 모든 탭 네임카드: BBS바2 스타일 (전역) ===== */
    .grid { grid-template-columns: repeat(4, 1fr); column-gap: 10px; row-gap: 26px; }
    .card { padding: 14px 15px; min-height: 0; }
    .card .ticker { font-size: 15px; margin-bottom: 3px; line-height: 1.15; }
    .card[data-long="1"] .ticker { font-size: 14px; }
    .card .name-ko { font-size: 11px; line-height: 1.2; }
    .card::after { left: 2.5%; right: 2.5%; height: 18px; }
    .card .arrow { top: 10px; right: 12px; }
    .card-split { padding: 12px 12px 18px; min-height: 60px; }
    @media (max-width: 720px) {
      .grid { grid-template-columns: repeat(2, 1fr); column-gap: 10px; row-gap: 24px; }

      .card .name-ko { font-size: 11px; }
    }
    @media (max-width: 380px) {
      .grid { grid-template-columns: repeat(2, 1fr); column-gap: 9px; row-gap: 22px; }
    }

    /* ===== 편집 도구 ===== */
    .edit-toolbar { position: fixed; top: 8px; right: 12px; z-index: 300; }
    .tool-fab { width: 38px; height: 38px; border-radius: 50%; border: 0; background: linear-gradient(135deg,#2e7d4f,#3fae6f); color: #fff; cursor: pointer; box-shadow: 0 4px 12px rgba(46,125,79,.4); display: flex; align-items: center; justify-content: center; transition: transform .15s; -webkit-tap-highlight-color: transparent; }
    .tool-fab:hover { transform: scale(1.08); }
    .tool-fab.editing { box-shadow: 0 0 0 3px rgba(46,125,79,.3),0 4px 12px rgba(46,125,79,.4); }
    .tool-fab svg { display: block; }
    .tool-menu { display: none; position: absolute; top: 46px; right: 0; flex-direction: column; gap: 5px; min-width: 172px; background: #fff; border: 1px solid #e6e9f0; border-radius: 12px; box-shadow: 0 12px 32px rgba(26,31,54,.18); padding: 8px; }
    .tool-menu.open { display: flex; }
    .tb-btn { display: inline-flex; align-items: center; gap: 5px; border: 1px solid #e1e5ee; background: #fff; border-radius: 8px; padding: 9px 12px; font: inherit; font-size: 13px; font-weight: 700; color: #4a5170; cursor: pointer; transition: all .15s; width: 100%; text-align: left; justify-content: flex-start; }
    .tb-btn:hover { border-color: #c7cee0; color: #1a1f36; }
    .tb-btn.on { background: var(--accent); border-color: var(--accent); color: #fff; }
    .tb-btn.code { border-color: #b6dcc6; color: var(--accent); }
    /* 섹션 편집 컨트롤 */
    .sect-tools { display: none; gap: 5px; margin-left: 8px; }
    .sect-tools button { border: 1px solid #e1e5ee; background: #fff; border-radius: 7px; width: 24px; height: 22px; font-size: 12px; line-height: 1; cursor: pointer; color: #8590ad; }
    .sect-tools button:hover { border-color: var(--accent); color: var(--accent); }
    .sect-add { display: none; border: 1px dashed #b6dcc6; background: #f3faf5; color: var(--accent); border-radius: 8px; padding: 3px 9px; font-size: 11.5px; font-weight: 700; cursor: pointer; margin-left: 8px; }
    body.editing .sect-tools { display: inline-flex; }
    body.editing .sect-add { display: inline-block; }
    /* 카드 편집 오버레이 */
    .card-ctrl { display: none; position: absolute; inset: 0; z-index: 5; background: rgba(255,255,255,.86); border-radius: 10px; align-items: center; justify-content: center; gap: 6px; flex-wrap: wrap; }
    body.editing .card .card-ctrl { display: flex; }
    body.editing .card:hover { transform: none; }
    .card-ctrl button { border: 1px solid #dfe3ec; background: #fff; border-radius: 8px; width: 32px; height: 32px; font-size: 14px; line-height: 1; cursor: pointer; color: #444; box-shadow: 0 1px 3px rgba(0,0,0,.08); }
    .card-ctrl button:hover { border-color: var(--accent); color: var(--accent); }
    .card-ctrl button.del:hover { border-color: #e0456b; color: #e0456b; }
    /* 모달 */
    .modal-back { position: fixed; inset: 0; z-index: 200; background: rgba(20,24,30,.5); display: none; align-items: center; justify-content: center; padding: 18px; }
    .modal-back.show { display: flex; }
    .modal { width: 100%; max-width: 440px; background: #fff; border-radius: 16px; padding: 22px; box-shadow: 0 20px 50px rgba(0,0,0,.25); max-height: 90vh; overflow: auto; }
    .modal h3 { margin: 0 0 16px; font-size: 17px; font-weight: 800; color: #1a1f36; }

    .modal input, .modal select { width: 100%; border: 1px solid #e1e5ee; border-radius: 9px; padding: 10px 12px; font: inherit; font-size: 14px; color: #1a1f36; background: #fff; }
    .modal input:focus, .modal select:focus { outline: none; border-color: var(--accent); }
    .modal-row { display: flex; gap: 10px; margin-top: 20px; }
    .modal-row button { flex: 1; border: 0; border-radius: 10px; padding: 11px; font: inherit; font-size: 14px; font-weight: 800; cursor: pointer; }
    .btn-ok { background: var(--accent); color: #fff; }
    .btn-cancel { background: #eef0f2; color: #555; }

    /* info-card 편집 오버레이 */
    body.editing .info-card .card-ctrl { display: flex; }

    body.editing .info-card:hover { transform: none; }
    .icon-prev { margin-top: 8px; }

</head>
<body>
  <!-- SEO: 한글 브랜드명 명시 (화면 비표시, 검색엔진 인식용) -->
  <h1 style="position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0;">마이웨이(MYWAY.KR) 주식·코인 차트 - 코인, 미국주식, 한국주식, 지수선물, 공포탐욕지수 한자리</h1>

    function coerceSections(arr){ if(!Array.isArray(arr)) return null; return arr.filter(s=>s&&typeof s==='object').map(s=>({label:String(s.label||''),sub:String(s.sub||''),items:coerceItems(s.items)})); }
    function coerceTabs(p){
      if(!p||typeof p!=='object'||Array.isArray(p)) return null;
      var out={}, any=false;
      Object.keys(p).forEach(function(k){ var t=p[k]; if(t&&typeof t==='object'&&Array.isArray(t.sections)){ out[k]={sections:coerceSections(t.sections)||[]}; any=true; } });
      return any?out:null;
    }
    function cloneTabs(t){ return coerceTabs(t)||{}; }

    }

    function moveInfoCard(bi,ci,dir){ var cards=INFO[bi].cards; var ni=ci+dir; if(ni<0||ni>=cards.length) return; var t=cards[ci]; cards[ci]=cards[ni]; cards[ni]=t; saveInfo(); renderInfo(); }

    function serializeInfo(arr){

    /* @TABSMETA_START */
    const DEFAULT_TABS_META = [
      { id:"today", label:"TODAY" },
      { id:"news", label:"리포트&뉴스" },
      { id:"chart", label:"주요 차트" },
      { id:"sites", label:"주요 사이트" },
      { id:"community", label:"커뮤니티" },
    ];
    /* @TABSMETA_END */
    function coerceMeta(p){
      if(!Array.isArray(p)) return null;
      var out=p.filter(t=>t&&typeof t==='object'&&t.id).map(t=>({id:String(t.id),label:String(t.label||t.id)}));
      return out.length?out:null;
    }
    function loadMeta(){
      ensureDistFresh();
      try{ var raw=localStorage.getItem(STORE_KEY+'_tabsmeta'); if(raw){ var c=coerceMeta(JSON.parse(raw)); if(c) return c; } }catch(_){}
      return DEFAULT_TABS_META.map(t=>({id:t.id,label:t.label}));
    }
    function saveMeta(){ try{ localStorage.setItem(STORE_KEY+'_tabsmeta', JSON.stringify(TABS_META)); }catch(_){} }
    var TABS_META = loadMeta();

    function selectTab(id){
      curTab=id;
      try{ sessionStorage.setItem('mywayTab_stockmain7', id); }catch(_){}
      renderNav(); renderTab(id);
      try{ window.scrollTo({top:0,behavior:'smooth'}); }catch(_){}
      try{ var b=document.querySelector('#tabNav .tab-btn[data-tab="'+id+'"]'); if(b) b.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'}); }catch(_){}
    }
    function renderNav(){
      var nav=document.getElementById('tabNav'); if(!nav) return; nav.innerHTML='';
      TABS_META.forEach(function(t){
        var b=document.createElement('button'); b.className='tab-btn'+(curTab===t.id?' is-active':''); b.dataset.tab=t.id; b.textContent=t.label;
        b.onclick=function(){ selectTab(t.id); };
        nav.appendChild(b);
      });
    }
    function newTabId(label){ var base=String(label||'').toLowerCase().replace(/[^a-z0-9]+/g,''); if(!base) base='tab'; var id=base,i=2; while(TABS_META.some(t=>t.id===id)||tabs[id]) id=base+(i++); return id; }
    function addTab(){ var v=prompt('\uC0C8 \uD0ED \uC774\uB984'); if(v===null) return; var nm=v.trim(); if(!nm) return; var id=newTabId(nm); TABS_META.push({id:id,label:nm}); tabs[id]={sections:[]}; saveMeta(); saveTabs(); renderNav(); renderNavList(); }
    function renameTab(i){ var v=prompt('\uD0ED \uC774\uB984', TABS_META[i].label); if(v===null) return; TABS_META[i].label=v.trim()||TABS_META[i].label; saveMeta(); renderNav(); renderNavList(); }
    function deleteTab(i){ var t=TABS_META[i]; if(!confirm('\uC774 \uD0ED\uC744 \uC0AD\uC81C\uD560\uAE4C\uC694?\n['+t.label+']\n\uD0ED \uC548 \uB0B4\uC6A9\uB3C4 \uD568\uAED8 \uC0AD\uC81C\uB3FC\uC694.')) return; if(tabs[t.id]) delete tabs[t.id]; TABS_META.splice(i,1); saveMeta(); saveTabs(); if(curTab===t.id){ curTab=(TABS_META[0]&&TABS_META[0].id)||'today'; } renderNav(); renderNavList(); renderTab(curTab); }
    function moveTab(i,dir){ var ni=i+dir; if(ni<0||ni>=TABS_META.length) return; var t=TABS_META[i]; TABS_META[i]=TABS_META[ni]; TABS_META[ni]=t; saveMeta(); renderNav(); renderNavList(); }

    var navBack=document.getElementById('navBack');

    function closeNavMgr(){ navBack.classList.remove('show'); }
    function renderNavList(){

    function serializeMeta(arr){ var out='[\n'; arr.forEach(function(t){ out+='      { id:'+JSON.stringify(t.id)+', label:'+JSON.stringify(t.label)+' },\n'; }); out+='    ]'; return out; }

    /* ============ 렌더 ============ */
    function renderTab(tabId) {
      /* 미국 지수 선물·지수의 네이버 차트 매핑 (ticker 기준) */
      const NAVER_INDEX = {
        '다우 선물':      'https://stock.naver.com/fchart/foreign/futures/YMcv1',
        '나스닥100 미니': 'https://stock.naver.com/fchart/foreign/futures/NQcv1',
        'S&P 500':        'https://stock.naver.com/fchart/foreign/futures/EScv1',
        '러셀 2000':      'https://stock.naver.com/fchart/foreign/futures/RTYcv1',
        'VIX':            'https://stock.naver.com/fchart/foreign/index/.VIX',
        'DXY':            'https://stock.naver.com/fchart/marketindex/exchange/.DXY'
      };
      const root = document.getElementById('main');
      curTab = tabId;
      root.dataset.tab = tabId;
      var _ct = document.getElementById('chartTop'); if(_ct){ _ct.style.display = (tabId === 'today') ? '' : 'none'; }
      const frag = document.createDocumentFragment();
      const tab = tabs[tabId];
      if (!tab) { root.replaceChildren(); return; }

      tab.sections.forEach((sec, si) => {
        const section = document.createElement('section');
        section.className = 'section';

        const head = document.createElement('div');
        head.className = 'section-head';
        const label = document.createElement('span');
        label.className = 'section-label';
        label.textContent = sec.label;
        head.appendChild(label);

        /* '미국 지수 선물' 섹션: 영어 sub 대신 비교차트 링크를 그 자리에 */
        if (sec.label === '미국 지수 선물') {
          const cmpLink = document.createElement('a');
          cmpLink.className = 'section-newslink';
          cmpLink.href = 'https://myway.kr/multichart.html';
          cmpLink.target = '_blank';
          cmpLink.rel = 'noopener';
          cmpLink.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 3v18h18"/><rect x="7" y="11" width="3" height="6"/><rect x="12.5" y="7" width="3" height="10"/><rect x="18" y="13" width="3" height="4"/></svg><span>비교차트</span>';
          head.appendChild(cmpLink);
        } else {
          const sub = document.createElement('span');
          sub.className = 'section-sub' + (sec.label === '코인 주요 차트' ? ' is-upbit' : '');
          sub.textContent = sec.sub;
          head.appendChild(sub);
        }

        if (SHOW_EDIT) {
          const stools = document.createElement('span'); stools.className = 'sect-tools';
          const sm = (t, title, fn) => { const b=document.createElement('button'); b.type='button'; b.textContent=t; b.title=title; b.onclick=fn; return b; };
          stools.appendChild(sm('▲','섹션 위로',()=>moveSection(si,-1)));
          stools.appendChild(sm('▼','섹션 아래로',()=>moveSection(si,1)));
          stools.appendChild(sm('✏','이름변경',()=>renameSection(si)));
          stools.appendChild(sm('✕','섹션삭제',()=>deleteSection(si)));
          head.appendChild(stools);
          const sadd = document.createElement('button'); sadd.className='sect-add'; sadd.type='button'; sadd.textContent='＋ 이 섹션에 추가'; sadd.onclick=()=>openDlg(null, si);
          head.appendChild(sadd);
        }

        section.appendChild(head);

        const grid = document.createElement('div');
        grid.className = 'grid';
        sec.items.forEach((it, ii) => {
          /* 우측 네이버 차트 + 좌측 라벨 결정
             - 한국주식: ko가 6자리 종목코드 → 좌 알파스퀘어
             - 코인: url에 upbit.com → 좌 업비트
             - 미국 나스닥 주식: url에 NASDAQ: → 좌 트레이딩뷰
             (선물·원자재 등은 네이버 종목이 아니므로 제외) */
          const itUrl = String(it.url || '');
          const krCode = /^[0-9]{6}$/.test(String(it.ko).trim()) ? String(it.ko).trim() : null;
          let naverUrl = null, leftLabel = null, leftUrl = null;

          if (krCode) {
            naverUrl = 'https://stock.naver.com/fchart/domestic/stock/' + krCode;
            leftLabel = '알파스퀘어';
            leftUrl = it.url;
          } else if (/upbit\.com/i.test(itUrl)) {
            naverUrl = 'https://stock.naver.com/fchart/crypto/BITHUMB/' + String(it.ticker).trim();
            leftLabel = '빗썸';
            leftUrl = 'https://www.bithumb.com/react/trade/order/' + String(it.ticker).trim() + '-KRW';
          } else if (/NASDAQ(%3A|:)/i.test(itUrl)) {
            naverUrl = 'https://stock.naver.com/fchart/foreign/stock/' + String(it.ticker).trim() + '.O';
            leftLabel = '트레이딩뷰';
            leftUrl = it.url;
          } else if (NAVER_INDEX[String(it.ticker).trim()] && /tradingview\.com/i.test(itUrl)) {
            /* 미국 지수 선물·지수 → 네이버 (ticker 기반 매칭, URL 형식 무관) */
            naverUrl = NAVER_INDEX[String(it.ticker).trim()];
            leftLabel = '트레이딩뷰';
            leftUrl = it.url;
          }

          if (naverUrl) {
            const card = document.createElement('div');
            card.className = 'card card-split';
            if (String(it.ticker).length > 6) card.dataset.long = '1';

            /* 표시 내용 (클릭은 아래 두 영역이 담당) */
            const content = document.createElement('div');
            content.className = 'card-content';
            const tk = document.createElement('div');
            tk.className = 'ticker';
            tk.textContent = it.ticker;
            const ko = document.createElement('div');
            ko.className = 'name-ko';
            ko.textContent = it.ko;
            content.appendChild(tk);
            content.appendChild(ko);
            card.appendChild(content);

            /* 좌측: 원본(알파스퀘어/빗썸/트레이딩뷰) */
            const left = document.createElement('a');
            left.className = 'card-half card-half-l';
            left.href = leftUrl;
            left.target = '_blank';
            left.rel = 'noopener';
            left.setAttribute('aria-label', it.ticker + ' ' + leftLabel + ' 차트');
            const lLbl = document.createElement('span');
            lLbl.className = 'src-label';
            lLbl.textContent = leftLabel;
            left.appendChild(lLbl);
            card.appendChild(left);

            /* 우측: 네이버 차트 */
            const right = document.createElement('a');
            right.className = 'card-half card-half-r';
            right.href = naverUrl;
            right.target = '_blank';
            right.rel = 'noopener';
            right.setAttribute('aria-label', it.ticker + ' 네이버 차트');
            const rLbl = document.createElement('span');
            rLbl.className = 'src-label';
            rLbl.textContent = '네이버';
            right.appendChild(rLbl);
            card.appendChild(right);

            addCardCtrl(card, si, ii);
            grid.appendChild(card);
            return;
          }

          /* 그 외(선물·원자재 등): 기존 단일 링크 카드 */
          const a = document.createElement('a');
          a.className = 'card';
          a.href = it.url;
          a.target = '_blank';
          a.rel = 'noopener';
          a.setAttribute('aria-label', it.ko);

          const tk = document.createElement('div');
          tk.className = 'ticker';
          tk.textContent = it.ticker;
          a.appendChild(tk);
          /* 사이트명 등 긴 라벨은 자동 축소 (6자 이상) */
          if (String(it.ticker).length > 6) a.dataset.long = '1';

          const ko = document.createElement('div');
          ko.className = 'name-ko';
          ko.textContent = it.ko;
          a.appendChild(ko);

          const arr = document.createElement('span');
          arr.className = 'arrow';
          arr.textContent = '↗';
          a.appendChild(arr);

          addCardCtrl(a, si, ii);
          grid.appendChild(a);
        });
        section.appendChild(grid);
        frag.appendChild(section);
      });

      if(SHOW_EDIT && tab){ var sw=document.createElement('div'); sw.style.cssText='text-align:center;margin-top:4px'; var sa=document.createElement('button'); sa.type='button'; sa.className='sect-add'; sa.textContent='＋ 새 섹션'; sa.onclick=function(){addSection();}; sw.appendChild(sa); frag.appendChild(sw); }
      root.replaceChildren(frag);

    /* ===== 편집 동작 (현재 탭 기준) ===== */
    function curSections(){ return (tabs[curTab] && tabs[curTab].sections) || []; }
    function addCardCtrl(cardEl, si, ii){
      if(!SHOW_EDIT) return;
      const ctrl=document.createElement('div'); ctrl.className='card-ctrl';
      const mk=(t,title,fn,cls)=>{ const b=document.createElement('button'); b.type='button'; b.textContent=t; b.title=title; if(cls)b.className=cls; b.onclick=e=>{e.preventDefault();e.stopPropagation();fn();}; return b; };
      ctrl.appendChild(mk('◀','왼쪽으로',()=>moveItem(si,ii,-1)));
      ctrl.appendChild(mk('✏','수정',()=>openDlg({si:si,ii:ii})));
      ctrl.appendChild(mk('✕','삭제',()=>deleteItem(si,ii),'del'));
      ctrl.appendChild(mk('▶','오른쪽으로',()=>moveItem(si,ii,1)));
      cardEl.appendChild(ctrl);
      cardEl.addEventListener('click',e=>{ if(editMode) e.preventDefault(); }, true);
    }
    function moveItem(si,ii,dir){ const items=curSections()[si].items; const ni=ii+dir; if(ni<0||ni>=items.length) return; const t=items[ii]; items[ii]=items[ni]; items[ni]=t; saveTabs(); renderTab(curTab); }
    function deleteItem(si,ii){ const items=curSections()[si].items; if(!confirm('이 항목을 삭제할까요?\n'+items[ii].ticker)) return; items.splice(ii,1); saveTabs(); renderTab(curTab); }
    function moveSection(si,dir){ const secs=curSections(); const ni=si+dir; if(ni<0||ni>=secs.length) return; const t=secs[si]; secs[si]=secs[ni]; secs[ni]=t; saveTabs(); renderTab(curTab); }
    function renameSection(si){ const secs=curSections(); const v=prompt('섹션 이름', secs[si].label); if(v===null) return; secs[si].label=v.trim()||secs[si].label; const s2=prompt('섹션 부제(영문 등, 선택)', secs[si].sub); if(s2!==null) secs[si].sub=s2.trim(); saveTabs(); renderTab(curTab); }
    function deleteSection(si){ const secs=curSections(); if(!confirm('이 섹션 전체를 삭제할까요?\n['+secs[si].label+'] '+secs[si].items.length+'개 항목')) return; secs.splice(si,1); saveTabs(); renderTab(curTab); }
    function addSection(){ const v=prompt('새 섹션 이름'); if(v===null) return; const nm=v.trim(); if(!nm) return; curSections().push({label:nm,sub:'',items:[]}); saveTabs(); renderTab(curTab); }

    /* ===== 추가/수정 모달 ===== */
    let dlgEdit=null;
    const dlgBack=document.getElementById('dlgBack');
    function openDlg(target, presetSi){
      const secs=curSections();
      if(!secs.length){ if(confirm('이 탭에 섹션이 없어요. 먼저 섹션을 만들까요?')) addSection(); return; }
      dlgEdit = target||null;
      document.getElementById('dlgTitle').textContent = target?'항목 수정':'항목 추가';
      const sel=document.getElementById('dlgSec'); sel.innerHTML='';
      secs.forEach((s,i)=>{ const o=document.createElement('option'); o.value=i; o.textContent=s.label; sel.appendChild(o); });
      const it = target ? secs[target.si].items[target.ii] : {ticker:'',ko:'',url:''};
      document.getElementById('dlgTicker').value=it.ticker;
      document.getElementById('dlgKo').value=it.ko;
      document.getElementById('dlgUrl').value=it.url;
      sel.value = target ? target.si : (presetSi!=null ? presetSi : 0);
      dlgBack.classList.add('show');
    }
    function closeDlg(){ dlgBack.classList.remove('show'); dlgEdit=null; }
    document.getElementById('dlgCancel').onclick=closeDlg;
    dlgBack.addEventListener('click',e=>{ if(e.target===dlgBack) closeDlg(); });
    document.getElementById('dlgOk').onclick=function(){
      const ticker=document.getElementById('dlgTicker').value.trim();
      const ko=document.getElementById('dlgKo').value.trim();
      let url=document.getElementById('dlgUrl').value.trim();
      const si=parseInt(document.getElementById('dlgSec').value,10)||0;
      if(!ticker){ alert('이름(티커)을 입력해 주세요.'); return; }
      if(!url){ alert('URL을 입력해 주세요.'); return; }
      if(!/^https?:\/\//i.test(url)) url='https://'+url;
      const rec={ticker:ticker,ko:ko,url:url};
      const secs=curSections();
      if(dlgEdit){
        if(dlgEdit.si===si) secs[si].items[dlgEdit.ii]=rec;
        else { secs[dlgEdit.si].items.splice(dlgEdit.ii,1); secs[si].items.push(rec); }
      } else secs[si].items.push(rec);
      saveTabs(); renderTab(curTab); closeDlg();
    };

    /* ===== 내보내기 / 가져오기 ===== */
    function exportData(){
      const payload={ kind:DATA_KIND, tabsMeta:TABS_META, tabs:tabs, info:INFO };
      const blob=new Blob([JSON.stringify(payload,null,2)],{type:'application/json'});
      const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='myway-stock.json'; a.click();
      setTimeout(()=>URL.revokeObjectURL(a.href),1500);
    }
    function importData(){
      const inp=document.createElement('input'); inp.type='file'; inp.accept='.json,.html,.htm,text/html,application/json';
      inp.onchange=()=>{
        const f=inp.files[0]; if(!f) return;
        const r=new FileReader();
        r.onload=()=>{
          let tb=null, inf=null, mt=null, foreignKind=null;
          const txt=String(r.result).replace(/^\uFEFF/, '').trim();
          try{
            const p=JSON.parse(txt);
            if(p&&typeof p==='object'){
              if(p.kind && p.kind!==DATA_KIND) foreignKind=p.kind;
              tb=coerceTabs(p.tabs||p); inf=coerceInfo(p.info); mt=coerceMeta(p.tabsMeta);
            }
          }catch(_){}
          if(!tb){ const m=txt.match(/DEFAULT_TABS\s*=\s*(\{[\s\S]*?\})\s*;\s*\/\* @DATA_END/); if(m){ try{ tb=coerceTabs(eval('('+m[1]+')')); }catch(_){} } }
          if(!inf){ const mi=txt.match(/DEFAULT_INFO\s*=\s*(\[[\s\S]*?\])\s*;\s*\/\* @INFO_END/); if(mi){ try{ inf=coerceInfo(eval('('+mi[1]+')')); }catch(_){} } }
          if(!mt){ const mm=txt.match(/DEFAULT_TABS_META\s*=\s*(\[[\s\S]*?\])\s*;\s*\/\* @TABSMETA_END/); if(mm){ try{ mt=coerceMeta(eval('('+mm[1]+')')); }catch(_){} } }
          if(!tb && !inf && !mt){ alert('읽을 수 있는 데이터가 없어요.'); return; }
          if(foreignKind){ if(!confirm('다른 도구에서 만든 JSON일 수 있어요. (종류: '+foreignKind+')\n그래도 가져올까요?')) return; }
          var msg=[];
          if(mt){ TABS_META=mt; saveMeta(); if(!TABS_META.some(t=>t.id===curTab)) curTab=(TABS_META[0]&&TABS_META[0].id)||'today'; renderNav(); msg.push('네비 '+TABS_META.length+'개'); }
          if(tb){ Object.keys(tb).forEach(k=>{ tabs[k]=tb[k]; }); saveTabs(); msg.push('탭 '+Object.keys(tb).length+'개'); }
          if(inf){ INFO=inf; saveInfo(); renderInfo(); msg.push('TODAY 카드 '+INFO.reduce((a,b)=>a+b.cards.length,0)+'개'); }
          renderTab(curTab);
          alert('가져왔어요. '+msg.join(' · '));
        };
        r.readAsText(f);
      };
      inp.click();
    }

    /* ===== 편집 도구 FAB ===== */
    function closeTool(){ toolOpen=false; const m=document.querySelector('.tool-menu'); if(m)m.classList.remove('open'); const f=document.querySelector('.tool-fab'); if(f)f.classList.remove('open'); }
    function buildToolbar(){
      if(!SHOW_EDIT) return;
      const tb=document.getElementById('editToolbar'); tb.innerHTML='';
      const fab=document.createElement('button'); fab.type='button'; fab.className='tool-fab'+(editMode?' editing':''); fab.title='편집 도구';
      fab.innerHTML = toolOpen
        ? '<svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M18 6 6 18M6 6l12 12"/></svg>'
        : '<svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4 12.5-12.5z"/></svg>';
      const menu=document.createElement('div'); menu.className='tool-menu'+(toolOpen?' open':'');
      const mk=(label,fn,cls)=>{ const b=document.createElement('button'); b.type='button'; b.className='tb-btn'+(cls?' '+cls:''); b.textContent=label; b.addEventListener('click',e=>{e.stopPropagation();fn();}); return b; };
      menu.appendChild(mk(editMode?'✏ 편집 끝':'✏ 편집 ('+curTab+')', ()=>{ editMode=!editMode; document.body.classList.toggle('editing',editMode); renderTab(curTab); renderInfo(); buildToolbar(); }, editMode?'on':''));
      menu.appendChild(mk('＋ 항목추가', ()=>{ openDlg(null); closeTool(); }));
      menu.appendChild(mk('🧭 네비 편집', ()=>{ openNavMgr(); closeTool(); }));
      menu.appendChild(mk('📥 가져오기', ()=>{ importData(); closeTool(); }));
      menu.appendChild(mk('📤 내보내기', ()=>{ exportData(); closeTool(); }));
      if(!IS_DIST) menu.appendChild(mk('</> 코드', ()=>{ openCode(); closeTool(); }, 'code'));
      fab.addEventListener('click',e=>{ e.stopPropagation(); toolOpen=!toolOpen; buildToolbar(); });
      tb.appendChild(fab); tb.appendChild(menu);
    }

    /* ===== 코드 / 파일 저장 ===== */
    const codeBack=document.getElementById('codeBack');
    function openCode(){ codeBack.classList.add('show'); }
    function closeCode(){ codeBack.classList.remove('show'); }
    document.getElementById('codeClose').onclick=closeCode;
    codeBack.addEventListener('click',e=>{ if(e.target===codeBack) closeCode(); });
    function serializeTabs(t){
      let out='{\n';
      Object.keys(t).forEach(k=>{
        out+='      '+JSON.stringify(k)+': { sections: [\n';
        (t[k].sections||[]).forEach(s=>{
          out+='        { label:'+JSON.stringify(s.label)+', sub:'+JSON.stringify(s.sub)+', items: [\n';
          (s.items||[]).forEach(it=>{ out+='          { ticker:'+JSON.stringify(it.ticker)+', ko:'+JSON.stringify(it.ko)+', url:'+JSON.stringify(it.url)+' },\n'; });
          out+='        ] },\n';
        });
        out+='      ] },\n';
      });
      out+='    }'; return out;
    }
    function buildHTML(cfg){
      const clone=document.documentElement.cloneNode(true);
      const m=clone.querySelector('#main'); if(m) m.innerHTML='';
      const iw=clone.querySelector('#infoWrap'); if(iw) iw.innerHTML='';
      const tn=clone.querySelector('#tabNav'); if(tn) tn.innerHTML='';
      const nl=clone.querySelector('#navList'); if(nl) nl.innerHTML='';
      const nbk=clone.querySelector('#navBack'); if(nbk) nbk.classList.remove('show');
      const ib=clone.querySelector('#infoBack'); if(ib) ib.classList.remove('show');
      ['#infIcon','#infBlock','#infPrev'].forEach(id=>{ const x=clone.querySelector(id); if(x) x.innerHTML=''; });
      const et=clone.querySelector('#editToolbar'); if(et) et.innerHTML='';
      ['#dlgBack','#codeBack'].forEach(id=>{ const x=clone.querySelector(id); if(x) x.classList.remove('show'); });
      const ds=clone.querySelector('#dlgSec'); if(ds) ds.innerHTML='';
      const ca=clone.querySelector('#codeArea'); if(ca) ca.value='';
      const b=clone.querySelector('body'); if(b) b.classList.remove('editing');
      let html='<!DOCTYPE html>\n'+clone.outerHTML;
      html=html.replace(/\/\* @DATA_START \*\/[\s\S]*?\/\* @DATA_END \*\//,
        '/* @DATA_START */\n    const DEFAULT_TABS = '+serializeTabs(tabs)+';\n    /* @DATA_END */');
      html=html.replace(/\/\* @CONFIG \*\/[\s\S]*?\/\* @CONFIG_END \*\//,
        '/* @CONFIG */\n    const IS_DIST = '+cfg.dist+';\n    const SHOW_EDIT = '+cfg.edit+';\n    const COPY_PROTECT = '+cfg.prot+';\n    const STORE_KEY = '+JSON.stringify(cfg.key)+';\n    const DIST_SIG = '+JSON.stringify(cfg.sig)+';\n    /* @CONFIG_END */');
      html=html.replace(/\/\* @TABSMETA_START \*\/[\s\S]*?\/\* @TABSMETA_END \*\//,
        '/* @TABSMETA_START */\n    const DEFAULT_TABS_META = '+serializeMeta(TABS_META)+';\n    /* @TABSMETA_END */');
      html=html.replace(/\/\* @INFO_START \*\/[\s\S]*?\/\* @INFO_END \*\//,
        '/* @INFO_START */\n    const DEFAULT_INFO = '+serializeInfo(INFO)+';\n    /* @INFO_END */');
      return html;
    }
    function dl(name,html){ const blob=new Blob([html],{type:'text/html'}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=name; a.click(); setTimeout(()=>URL.revokeObjectURL(a.href),1500); }
    document.getElementById('saveEdit').onclick=function(){ dl('stockmain7-edit.html', buildHTML({dist:true,edit:true,prot:false,key:'mywayStockV1_dist',sig:'sig'+Date.now()})); closeCode(); };
    document.getElementById('saveView').onclick=function(){ dl('stockmain7-view.html', buildHTML({dist:false,edit:false,prot:true,key:'mywayStockV1',sig:''})); closeCode(); };
    document.getElementById('copyCode').onclick=function(){
      const code='const DEFAULT_TABS = '+serializeTabs(tabs)+';';
      const ta=document.getElementById('codeArea'); ta.value=code; ta.style.pointerEvents='auto'; ta.select(); ta.setSelectionRange(0,code.length);
      let ok=false; try{ ok=document.execCommand('copy'); }catch(_){}
      if(navigator.clipboard){ navigator.clipboard.writeText(code).then(()=>{},()=>{}); ok=true; }
      ta.style.pointerEvents='none';
      alert(ok?'데이터 코드를 복사했어요.':'복사 실패 — 수동으로 복사해 주세요.');
    };

    /* ============ 탭 네비 ============ */
    (function(){
      var saved='today';
      try { saved = sessionStorage.getItem('mywayTab_stockmain7') || 'today'; } catch(_) {}
      if(!TABS_META.some(t=>t.id===saved)) saved=(TABS_META[0]&&TABS_META[0].id)||'today';
      curTab=saved; renderNav(); renderTab(saved);
    })();
    renderInfo();
    if(SHOW_EDIT){ buildToolbar(); document.addEventListener('click', function(e){ if(toolOpen && !e.target.closest('.edit-toolbar')) closeTool(); }); }
  </script>
<script>
/* 모바일: iframe 안에서 열릴 때 외부 링크를 최상위 창에서 직접 열어
   뒤로가기로 MYWAY 복귀 가능하게. PC·태블릿은 새 탭 유지. */
(function(){
  if(!/Mobi/i.test(navigator.userAgent)) return;
  document.addEventListener('click', function(e){
    if(document.body.classList.contains('editing')) return;
    var a = e.target.closest ? e.target.closest('a[href]') : null;
    if(!a) return;
    var href = a.getAttribute('href') || '';
    if(!href || href.charAt(0) === '#' || /^javascript:/i.test(href)) return;
    e.preventDefault();
    try { (window.top || window).location.href = a.href; }
    catch(_) { window.open(a.href, '_blank'); }
  }, true);
  /* 뒤로가기(bfcache) 복원 시 버튼 먹통 방지: 복원되면 새로고침 */
  window.addEventListener('pageshow', function(e){ if(e.persisted){ location.reload(); } });
  var _open = window.open.bind(window);
  window.open = function(url, name, feat){
    if(url){ try{ (window.top||window).location.href = url; }catch(_){ location.href = url; } return null; }
    return _open(url, name, feat);
  };
})();
</script>
<script>
(function(){
  document.querySelectorAll('.info-card').forEach(function(a){
    a.addEventListener('click', function(e){ if(a.getAttribute('href')==='#') e.preventDefault(); });
  });
})();
</script>
