<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>MYWAY 인플루언서 influencer</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { background: #fff; font-family: 'Segoe UI','맑은 고딕','NanumGothic',Arial,sans-serif; margin:0; padding:0;}
    .dashboard { max-width: 1200px; margin: 0 auto;      padding:    0px            0 40px 0;} /* 상단여백 축소 */
    .gallery-label {


      
      font-weight: bold; font-size: 1.0rem;       margin: 3px        0 14px 0;


      
      color: #232356; text-align: center; letter-spacing: 0.5px; display: block; width: 100%;
    }
    .gallery-row {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;  /* 중앙정렬 */
      gap: 0 16px;
      max-width: 1235px;  /* 5개씩 딱 맞게! (283*5 + 16*4) */
      margin: 0 auto;
      min-height: 200px;
      align-items: flex-start;
    }
    .list-row {
      box-sizing: border-box;
      position: relative;
      background: #fff;
      margin-bottom: 36px;
      transition: width 0.2s, height 0.2s;
      display: block;
      max-width: 283px;
    }
    .imgframe {
      width: 100%; height: 100%;
      background: #fff;
      position: relative;
      box-sizing: border-box;
      z-index: 0;
      border-radius: 0;
      box-shadow: 0 6px 6px 0 rgba(90,90,130,0.11);
      overflow: hidden;
      display: flex;
      align-items: flex-start;
      justify-content: center;
    }
    .img-wrap { position: relative; height: 100%; width: 100%; overflow: hidden; margin:0; padding:0;}
    .img-item { position: relative; width: 100%; height: 100%; overflow: hidden;}
    .img-item img {
      display: block; width: 100%; height: 100%;
      object-fit: contain;
      background: #fff;
      margin: 0;
      border: none;
      padding: 0;
    }
    .shadow-line { text-align: center; margin: 0; padding: 0; max-width: 100%; overflow: hidden !important; vertical-align: top;}
    .shadow-line img { display: block; margin: 0 auto; width: 95%; height: 20px; pointer-events: none; user-select: none; }

    /* ----------- 크기 강제 지정 ------------ */
    .box-portrait  { width:200px; height:283px; }
    .box-landscape { width:283px; height:200px; }

    /* 반응형(모바일) */
    @media (max-width: 1235px) {
      .gallery-row { max-width: 98vw; }
    }
    @media (max-width: 1080px) {
      .gallery-row { max-width: 98vw; }
      .box-portrait  { width:28vw; height:40vw; min-width:80px; min-height:100px;}
      .box-landscape { width:40vw; height:28vw; min-width:80px; min-height:100px;}
      .list-row { max-width: 40vw; }
    }
    @media (max-width: 700px) {
      .gallery-row { max-width: 99vw; }
      .box-portrait  { width:44vw; height:62vw; min-width:65px; min-height:85px;}
      .box-landscape { width:62vw; height:44vw; min-width:65px; min-height:85px;}
      .list-row { max-width: 62vw; }
    }
  </style>
</head>

  <style>
    .mv-toolbar{position:sticky;top:0;z-index:200;display:flex;gap:8px;align-items:center;justify-content:center;flex-wrap:wrap;padding:10px 14px;background:rgba(255,255,255,.93);-webkit-backdrop-filter:blur(8px);backdrop-filter:blur(8px);border-bottom:1px solid #ececf2;}
    .mv-toolbar button{font-family:inherit;font-size:.85rem;font-weight:700;padding:8px 15px;border-radius:10px;border:1px solid #d7dae8;background:#f5f6fb;color:#39406a;cursor:pointer;transition:.15s;}
    .mv-toolbar button:hover{background:#ebedf7;border-color:#b9c0dd;}
    .mv-toolbar button.primary{background:#5b6bff;color:#fff;border-color:#5b6bff;}
    .mv-toolbar button.primary:hover{background:#4757f5;}
    .mvm-bg{position:fixed;inset:0;background:rgba(20,28,55,.5);-webkit-backdrop-filter:blur(3px);backdrop-filter:blur(3px);display:none;align-items:center;justify-content:center;z-index:9999;padding:18px;}
    .mvm-bg.show{display:flex;}
    .mvm{background:#fff;border-radius:18px;width:100%;max-width:440px;padding:22px;box-shadow:0 24px 60px rgba(30,40,80,.35);max-height:90vh;overflow:auto;color:#232356;text-align:left;}
    .mvm h3{margin:0 0 4px;font-size:1.1rem;font-weight:800;}
    .mvm label{display:block;font-size:.76rem;font-weight:700;color:#6a749c;margin:11px 0 5px;}
    .mvm select,.mvm input[type=text]{width:100%;padding:10px 12px;border:1.5px solid #e2e6f3;border-radius:10px;font-size:.92rem;color:#232356;background:#fafbff;outline:none;font-family:inherit;box-sizing:border-box;}
    .mvm select:focus,.mvm input[type=text]:focus{border-color:#7e94ff;background:#fff;}
    .mvm-save{width:100%;margin-top:14px;padding:11px;border:none;border-radius:11px;background:#5b6bff;color:#fff;font-weight:700;font-size:.92rem;cursor:pointer;}
    .mvm-save:hover{background:#4757f5;}
    .mvm-list{margin-top:16px;border-top:1px solid #eef0f7;padding-top:12px;display:flex;flex-direction:column;gap:7px;max-height:230px;overflow:auto;}
    .mvm-row{display:flex;align-items:center;gap:9px;}
    .mvm-row img{width:46px;height:30px;object-fit:cover;border-radius:6px;border:1px solid #eef0f7;flex:0 0 auto;background:#f0f0f5;}
    .mvm-row .u{flex:1;font-size:.74rem;color:#5a648c;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .mvm-row button{flex:0 0 auto;border:none;border-radius:7px;width:28px;height:28px;cursor:pointer;font-size:.82rem;line-height:1;}
    .mvm-row .e{background:#eef2ff;color:#4757f5;}
    .mvm-row .d{background:#fdecec;color:#e0483a;}
    .mvm-empty{font-size:.8rem;color:#9aa2c0;text-align:center;padding:8px;}
    .mvm-io{display:flex;gap:9px;margin-top:14px;}
    .mvm-done{width:100%;margin-top:12px;padding:10px;border:none;border-radius:10px;background:#eef0f7;color:#5a648c;font-weight:700;cursor:pointer;}
    .mvm-done:hover{background:#e4e7f2;}
    .mvm-code{max-width:560px;}
    .mvm-hint{font-size:.76rem;color:#8a92b5;line-height:1.55;margin:6px 0 10px;}
    .mvm-codearea{width:100%;height:300px;border:1.5px solid #e2e6f3;border-radius:10px;padding:11px;font-family:'Courier New',monospace;font-size:.76rem;color:#2a2a3a;background:#fafbff;outline:none;resize:vertical;white-space:pre;box-sizing:border-box;}
  </style>

    const gallery7Data = [];
    const gallery8Data = [];
    const gallery9Data = [];
    const gallery10Data = [];
    const shadowUrl = "https://64.media.tumblr.com/f5f06009df6584ebb5539cad61f73c63/tumblr_inline_qsghz3XZRQ1r45nlo_500.png";

    // 이미지 비율에 따라 박스 클래스 동적부여(최대한 단순, 기존과 구조/디자인 동일)
    function renderGallery(data, targetId) {
      const el = document.getElementById(targetId);
      el.innerHTML = data.map(item => `
        <div class="list-row">
          <div class="imgframe">
            <div class="img-wrap">
              <div class="img-item">
                <a href="${item.url}" target="_blank" rel="noopener">
                  <img src="${item.img}">
                </a>
              </div>
            </div>
          </div>
          <div class="shadow-line">
            <img src="${shadowUrl}">
          </div>
        </div>
      `).join('');
      // 동적 크기 클래스 부여
      Array.from(el.querySelectorAll('.list-row')).forEach((box, i) => {
        const img = box.querySelector('img');
        function applyBoxClass() {
          if (img.naturalWidth > img.naturalHeight) {
            box.classList.add('box-landscape');
            box.classList.remove('box-portrait');
          } else {
            box.classList.add('box-portrait');
            box.classList.remove('box-landscape');
          }
        }
        img.onload = applyBoxClass;
        if (img.complete) setTimeout(applyBoxClass, 20);
      });
    }
    /* ===== 데이터 관리 (추가/수정/삭제 · 내보내기/가져오기 · 코드) ===== */
    const DEFAULTS = {
      gallery1: gallery1Data, gallery2: gallery2Data, gallery3: gallery3Data, gallery4: gallery4Data, gallery5: gallery5Data,
      gallery6: gallery6Data, gallery7: gallery7Data, gallery8: gallery8Data, gallery9: gallery9Data, gallery10: gallery10Data
    };
    const MV_KEY = 'mywayMovieGalleriesV1';
    function deepClone(o) { return JSON.parse(JSON.stringify(o)); }
    function normGallery(a) { return Array.isArray(a) ? a.filter(x => x && x.url).map(x => ({ url: String(x.url), img: x.img || '' })) : []; }
    function loadG() {
      try {
        const o = JSON.parse(localStorage.getItem(MV_KEY));
        if (o && typeof o === 'object') { const r = {}; for (let i = 1; i <= 10; i++) r['gallery' + i] = normGallery(o['gallery' + i]); return r; }
      } catch (_) {}
      return null;
    }
    let galleries = loadG() || deepClone(DEFAULTS);
    function saveG() { try { localStorage.setItem(MV_KEY, JSON.stringify(galleries)); } catch (_) {} }
    function renderAll() { for (let i = 1; i <= 10; i++) renderGallery(galleries['gallery' + i], 'gallery' + i); }
    renderAll();

    function ytId(u) { const m = (u || '').match(/(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/|youtube\.com\/shorts\/|youtube\.com\/live\/)([a-zA-Z0-9_-]{11})/); return m ? m[1] : null; }
    function autoImg(u) { const id = ytId(u); return id ? ('https://img.youtube.com/vi/' + id + '/sddefault.jpg') : ''; }

    /* 관리 모달 */
    const mvmBg = document.getElementById('mvmBg');
    const mvGallery = document.getElementById('mvGallery');
    const mvUrl = document.getElementById('mvUrl');
    const mvImg = document.getElementById('mvImg');
    const mvSaveBtn = document.getElementById('mvSaveBtn');
    let mvEditIdx = null;
    function curKey() { return 'gallery' + mvGallery.value; }
    function clearMv() { mvUrl.value = ''; mvImg.value = ''; mvEditIdx = null; mvSaveBtn.textContent = '추가하기'; }
    function openManage() { clearMv(); renderItems(); mvmBg.classList.add('show'); }
    function closeManage() { mvmBg.classList.remove('show'); clearMv(); }
    function renderItems() {
      const arr = galleries[curKey()] || [];
      const list = document.getElementById('mvList');
      list.innerHTML = '';
      if (!arr.length) { const e = document.createElement('div'); e.className = 'mvm-empty'; e.textContent = '이 갤러리에 항목이 없어요.'; list.appendChild(e); return; }
      arr.forEach((it, idx) => {
        const row = document.createElement('div'); row.className = 'mvm-row';
        const im = document.createElement('img'); im.src = it.img || autoImg(it.url); im.alt = '';
        const u = document.createElement('span'); u.className = 'u'; u.textContent = it.url;
        const e = document.createElement('button'); e.className = 'e'; e.textContent = '\u270E'; e.title = '수정';
        e.onclick = () => { mvUrl.value = it.url; mvImg.value = it.img || ''; mvEditIdx = idx; mvSaveBtn.textContent = '수정 저장'; mvUrl.focus(); };
        const d = document.createElement('button'); d.className = 'd'; d.textContent = '\u2715'; d.title = '삭제';
        d.onclick = () => { galleries[curKey()].splice(idx, 1); saveG(); renderItems(); renderAll(); clearMv(); };
        row.appendChild(im); row.appendChild(u); row.appendChild(e); row.appendChild(d);
        list.appendChild(row);
      });
    }
    mvGallery.addEventListener('change', () => { clearMv(); renderItems(); });
    mvSaveBtn.addEventListener('click', () => {
      let url = mvUrl.value.trim();
      if (!url) { alert('영상 주소(URL)를 입력하세요.'); mvUrl.focus(); return; }
      if (!/^https?:\/\//i.test(url)) url = 'https://' + url;
      let img = mvImg.value.trim(); if (!img) img = autoImg(url);
      const arr = galleries[curKey()];
      if (mvEditIdx != null && arr[mvEditIdx]) arr[mvEditIdx] = { url: url, img: img };
      else arr.push({ url: url, img: img });
      saveG(); clearMv(); renderItems(); renderAll(); mvUrl.focus();
    });
    document.getElementById('mvAddBtn').addEventListener('click', openManage);
    document.getElementById('mvDoneBtn').addEventListener('click', closeManage);
    mvmBg.addEventListener('click', e => { if (e.target === mvmBg) closeManage(); });

    /* 코드 출력 */
    const mvmCodeBg = document.getElementById('mvmCodeBg');
    function buildCode() {
      let out = '';
      for (let i = 1; i <= 10; i++) {
        const arr = galleries['gallery' + i] || [];
        out += '    const gallery' + i + 'Data = [';
        if (arr.length) out += '\n' + arr.map(it => '      { url: ' + JSON.stringify(it.url) + ', img: ' + JSON.stringify(it.img) + ' }').join(',\n') + '\n    ];';
        else out += '];';
        out += '\n';
      }
      return out;
    }
    document.getElementById('mvCodeBtn').addEventListener('click', () => { document.getElementById('mvCodeArea').value = buildCode(); mvmCodeBg.classList.add('show'); });
    document.getElementById('mvCodeCloseBtn').addEventListener('click', () => mvmCodeBg.classList.remove('show'));
    mvmCodeBg.addEventListener('click', e => { if (e.target === mvmCodeBg) mvmCodeBg.classList.remove('show'); });
    document.getElementById('mvCopyBtn').addEventListener('click', async () => {
      const ta = document.getElementById('mvCodeArea');
      const btn = document.getElementById('mvCopyBtn');
      try { await navigator.clipboard.writeText(ta.value); btn.textContent = '복사됨!'; setTimeout(() => btn.textContent = '복사', 1200); }
      catch (_) { ta.select(); try { document.execCommand('copy'); btn.textContent = '복사됨!'; setTimeout(() => btn.textContent = '복사', 1200); } catch (e2) {} }
    });

    /* 내보내기 / 가져오기 */
    document.getElementById('mvExportBtn').addEventListener('click', () => {
      const blob = new Blob([JSON.stringify(galleries, null, 2)], { type: 'application/json' });
      const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'myway-movie-galleries.json';
      document.body.appendChild(a); a.click(); setTimeout(() => { URL.revokeObjectURL(a.href); a.remove(); }, 100);
    });
    /* 기존 HTML 파일에서 galleryNData 추출 */
    function parseHtmlGalleries(text) {
      let found = false;
      const result = {};
      for (let i = 1; i <= 10; i++) {
        const blockRe = new RegExp('gallery' + i + 'Data\\s*=\\s*\\[([\\s\\S]*?)\\]\\s*;');
        const mb = text.match(blockRe);
        const arr = [];
        if (mb) {
          found = true;
          const objRe = /\{\s*url:\s*(['"])([\s\S]*?)\1\s*,\s*img:\s*(['"])([\s\S]*?)\3\s*\}/g;
          let mo;
          while ((mo = objRe.exec(mb[1])) !== null) arr.push({ url: mo[2], img: mo[4] });
        }
        result['gallery' + i] = arr;
      }
      return found ? result : null;
    }

    const mvFile = document.getElementById('mvImportFile');
    document.getElementById('mvImportBtn').addEventListener('click', () => mvFile.click());
    mvFile.addEventListener('change', e => {
      const f = e.target.files && e.target.files[0]; if (!f) return;
      const rd = new FileReader();
      rd.onload = () => {
        const text = rd.result || '';
        let data = null;
        try {
          const o = JSON.parse(text);
          if (o && typeof o === 'object' && !Array.isArray(o)) { data = {}; for (let i = 1; i <= 10; i++) data['gallery' + i] = normGallery(o['gallery' + i]); }
        } catch (_) {}
        if (!data) {
          const h = parseHtmlGalleries(text);
          if (h) { data = {}; for (let i = 1; i <= 10; i++) data['gallery' + i] = normGallery(h['gallery' + i]); }
        }
        if (!data) { alert('JSON 파일이나, 갤러리 데이터가 들어있는 HTML 파일을 선택해 주세요.'); mvFile.value = ''; return; }
        galleries = data; saveG(); renderItems(); renderAll();
        const total = Object.keys(galleries).reduce((s, k) => s + galleries[k].length, 0);
        alert('가져오기 완료: 총 ' + total + '개 항목');
        mvFile.value = '';
      };
      rd.readAsText(f);
    });
  </script>
