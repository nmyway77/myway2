      gap: 8px;
      overflow-x: visible;
      scrollbar-width: none;
      -ms-overflow-style: none;
      padding: 2px 0;
    }
    .tab-nav::-webkit-scrollbar { display: none; }
    .tab-btn {
      font: inherit;
      font-size: .9rem;
      font-weight: 700;
      letter-spacing: -0.2px;
      padding: 7px 14px;
      border-radius: 999px;
      border: 1.5px solid rgba(0,0,0,0.08);
      background: rgba(0,0,0,0.03);
      color: var(--text-sub);
      cursor: pointer;
      transition: all .18s;
      white-space: nowrap;
      flex: 0 0 auto;
      -webkit-tap-highlight-color: transparent;
    }
    .tab-btn:hover {
      background: rgba(0,0,0,0.06);

      border-color: rgba(0,0,0,0.16);
    }
    .tab-btn:active { transform: scale(0.96); }
    .tab-btn.is-active {
      background: #1f2740;
      color: #fff;
      border-color: #1f2740;
      box-shadow: 0 4px 16px rgba(31, 39, 64, 0.25);
    }
    .tab-btn .count {
      display: inline-block;
      margin-left: 4px;
      font-size: .72rem;
      opacity: .7;
      font-weight: 500;
    }

    /* ===== 본체 ===== */
    .main {
      max-width: 1200px;
      margin: 0 auto;
      padding: 56px 16px 60px;
      padding-bottom: calc(60px + var(--safe-bottom));
    }

    .section { margin-bottom: 32px; }
    .section:last-child { margin-bottom: 0; }

    .section-head {
      display: flex;
      align-items: baseline;
      gap: 10px;
      padding: 0 4px;
      margin-bottom: 12px;
    }
    .section-label {
      font-size: .85rem;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: 0.5px;
      text-transform: uppercase;
      text-shadow: 0 0 16px var(--accent-glow);
    }
    .section-sub {
      font-size: .75rem;
      color: var(--text-muted);
      font-weight: 500;
      letter-spacing: -0.1px;
    }
    .section-newslink {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: .92rem;
      font-weight: 800;
      color: var(--accent);
      text-decoration: none;
      letter-spacing: 0.2px;
      border-bottom: 1.5px solid var(--accent);
      padding-bottom: 1px;
      transition: opacity .15s ease;
    }
    .section-newslink svg { width: 16px; height: 16px; flex-shrink: 0; }
    .section-newslink:hover { opacity: .6; }

    /* 카드 그리드 */
    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      column-gap: 12px;
      row-gap: 28px;  /* 카드 아래 그림자 PNG 공간 */
    }

    .card {
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 18px 18px;
      text-decoration: none;
      color: inherit;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 10px;
      position: relative;
      overflow: visible;  /* ::after 그림자 PNG가 카드 밖으로 나와야 함 */
      transition: transform .2s, box-shadow .2s, border-color .2s, background .2s;
      -webkit-tap-highlight-color: transparent;
      min-height: 78px;
      /* 카드 자체는 미세 그림자만 (입체감 메인은 ::after 그림자 PNG가 담당) */
      box-shadow: 0 2px 4px rgba(90, 90, 130, 0.06);
    }
    /* 라이트 카드에서는 좌상단 글로우 비활성 */
    .card::before { content: none; }
    /* 카드 아래 곡선 그림자 PNG (shopping.html 동일 효과) */
    .card::after {
      content: "";
      position: absolute;
      left: 2.5%;
      right: 2.5%;
      top: 100%;
      height: 18px;
      background: url('https://64.media.tumblr.com/f5f06009df6584ebb5539cad61f73c63/tumblr_inline_qsghz3XZRQ1r45nlo_500.png') center top / 100% 100% no-repeat;
      pointer-events: none;
      z-index: 1;
    }
    .card:hover {
      background: var(--card-bg-hover);
      border-color: var(--card-border-hover);
      transform: translateY(-3px);
      box-shadow: 0 4px 10px rgba(90, 90, 130, 0.12);
    }
    .card:active { transform: translateY(-1px); }

    .card .ticker {
      font-size: 1.25rem;
      font-weight: 800;
      color: var(--text-main);
      letter-spacing: -0.4px;
      line-height: 1.15;
      margin-bottom: 4px;
      word-break: keep-all;
      overflow-wrap: anywhere;
    }
    /* 글자 수가 많은 카드(사이트명 등)는 자동으로 살짝 작게 */
    .card .ticker:has(+ .name-ko) { /* 보조 라벨 있는 모든 카드 */ }
    .card[data-long="1"] .ticker { font-size: 1.05rem; }
    .card .name-ko {
      font-size: .82rem;
      font-weight: 500;
      color: var(--text-sub);
      letter-spacing: -0.2px;
      line-height: 1.2;
    }
    /* 우상단 외부 링크 마커 */
    .card .arrow {
      position: absolute;
      top: 12px; right: 14px;
      font-size: .85rem;
      color: var(--text-muted);
      opacity: 0;
      transition: opacity .15s, transform .15s;
    }
    .card:hover .arrow {
      opacity: 1;
      transform: translate(2px, -2px);
      color: var(--accent);
    }

    /* 반응형 */
    @media (max-width: 720px) {
      .grid { grid-template-columns: repeat(2, 1fr); column-gap: 10px; row-gap: 24px; }
      .card { padding: 16px 16px; min-height: 72px; }
      .card .ticker { font-size: 1.1rem; }

    /* 태블릿/PC: 탭 네비 중앙정렬 (모바일은 좌측 정렬 그대로 유지) */
    /* safe 키워드: 콘텐츠가 컨테이너보다 클 경우 자동으로 좌측 정렬로 폴백 */
    @media (min-width: 721px) {

    /* ===== 생활정보 탭 전용 : 라이트 톤 + 원형 로고 ===== */

    /* 원형 로고 그리드 (INDEXMAIN 디자인) - 기본: 고정 10열 74px */
    .logo-grid {

    /* + 추가 타일 (위 logo-tile과 동일 규격, 점선) */
    .logo-tile.fav-add { border-style: dashed; border-color: #c2cbe8; background: #f6f8ff; }
    .logo-tile.fav-add::before { content: "+"; font-size: 36px; font-weight: 300; color: #9aa6cf; line-height: 1; }
    .logo-tile.fav-add:hover { border-color: #7e94ff; background: #eef2ff; box-shadow: 0 8px 32px 0 #7e94ff66; }

    /* 즐겨찾기 추가 모달 */
    .favm-bg { position: fixed; inset: 0; background: rgba(20,28,55,.5); -webkit-backdrop-filter: blur(3px); backdrop-filter: blur(3px); display: none; align-items: center; justify-content: center; z-index: 99999; padding: 18px; }
    .favm-bg.show { display: flex; }
    .favm { background: #fff; border-radius: 20px; width: 100%; max-width: 380px; padding: 22px; box-shadow: 0 24px 60px rgba(30,40,80,.35); max-height: 90vh; overflow: auto; }
    .favm h3 { margin: 0 0 6px; font-size: 1.12rem; color: #222a4a; font-weight: 800; }

    .favm-paste:hover { background: #e9eeff; border-color: #7e94ff; }
    .favm-paste:active { transform: scale(.99); }
    .favm-hint { font-size: .76rem; color: #9aa2c0; margin: 8px 2px 0; line-height: 1.5; }
    .favm label { display: block; font-size: .76rem; font-weight: 700; color: #6a749c; margin: 12px 0 5px; }
    .favm input[type=text] { width: 100%; padding: 11px 13px; border: 1.5px solid #e2e6f3; border-radius: 11px; font-size: .95rem; color: #222a4a; outline: none; transition: .15s; background: #fafbff; }
    .favm input[type=text]:focus { border-color: #7e94ff; background: #fff; }
    .favm-add-btn { width: 100%; margin-top: 16px; padding: 12px; border: none; border-radius: 12px; background: #5b6bff; color: #fff; font-weight: 700; font-size: .95rem; cursor: pointer; transition: .15s; }
    .favm-add-btn:hover { background: #4757f5; }
    .favm-list { margin-top: 16px; border-top: 1px solid #eef0f7; padding-top: 12px; display: flex; flex-direction: column; gap: 7px; max-height: 190px; overflow: auto; }
    .favm-row { display: flex; align-items: center; gap: 10px; }
    .favm-row img { width: 26px; height: 26px; border-radius: 50%; object-fit: contain; border: 1px solid #eef0f7; flex: 0 0 auto; background: #fff; }
    .favm-row .nm { flex: 1; font-size: .85rem; color: #39406a; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    /* ===== logo-grid 반응형 (INDEXMAIN과 동일한 9분기) ===== */
    /* 1) 초대형 PC (1600px+) */
    @media (min-width: 1600px) {
      .logo-grid {
        grid-template-columns: repeat(12, 80px);
        gap: 28px;
      }
      .logo-tile { width: 80px; height: 80px; }
      .logo-tile img { width: 58px; height: 58px; }
    }
    /* 2) 일반 PC (1101 ~ 1599px) */
    @media (min-width: 1101px) and (max-width: 1599px) {
      .logo-grid {
        grid-template-columns: repeat(10, 74px);
        gap: 22px;
      }
      .logo-tile { width: 74px; height: 74px; }
      .logo-tile img { width: 54px; height: 54px; }
    }
    /* 3) 노트북 / 작은 PC (901 ~ 1100px) */
    @media (min-width: 901px) and (max-width: 1100px) {
      .logo-grid {
        grid-template-columns: repeat(8, 70px);
        gap: 18px;
      }
      .logo-tile { width: 70px; height: 70px; }
      .logo-tile img { width: 50px; height: 50px; }
    }
    /* 4) 태블릿 (701 ~ 900px) */
    @media (min-width: 701px) and (max-width: 900px) {
      .logo-grid {
        grid-template-columns: repeat(7, 70px);
        gap: 16px;
      }
      .logo-tile { width: 70px; height: 70px; }
      .logo-tile img { width: 50px; height: 50px; }
    }
    /* 5) 핸드폰 세로 (~ 700px) */
    @media (max-width: 700px) {
      .logo-grid {
        grid-template-columns: repeat(5, minmax(0, 64px));
        gap: 12px;
        justify-content: center;
        margin-bottom: 18px;
      }
      .logo-tile { width: 64px; height: 64px; }
      .logo-tile img { width: 46px; height: 46px; }
    }
    /* 6) 작은 핸드폰 세로 (~ 420px) */
    @media (max-width: 420px) {
      .logo-grid {
        grid-template-columns: repeat(4, minmax(0, 64px));
        gap: 10px;
      }
      .logo-tile { width: 60px; height: 60px; }
      .logo-tile img { width: 42px; height: 42px; }
    }
    /* 7) 매우 작은 핸드폰 세로 (~ 340px) */
    @media (max-width: 340px) {
      .logo-grid {
        grid-template-columns: repeat(4, minmax(0, 56px));
        gap: 8px;
      }
      .logo-tile { width: 54px; height: 54px; border-width: 2px; }

    /* 8) 핸드폰 가로 모드 (landscape + 짧은 높이) */
    @media (orientation: landscape) and (max-height: 500px) {

        grid-template-columns: repeat(10, minmax(0, 52px));
        gap: 10px;
        margin-bottom: 10px;

    @media (orientation: landscape) and (max-height: 380px) {
      .logo-grid {
        grid-template-columns: repeat(11, minmax(0, 46px));
        gap: 8px;
        margin-bottom: 8px;

      .logo-tile img { width: 32px; height: 32px; }

    function coerceTabs(p){
      if(!p||typeof p!=='object'||Array.isArray(p)) return null;

      }); } } }catch(_){}

    }
    function saveTabs(){ try{ localStorage.setItem(STORE_KEY, JSON.stringify(tabs)); }catch(_){} }
    let tabs = loadTabs();

    // 영문 보조 라벨(작은 글씨)을 숨길 탭 목록

    }

    /* ===== 편집 동작 (현재 탭 기준) ===== */
    function curSections(){ return (tabs[curTab] && tabs[curTab].sections) || []; }
    function isLogoTab(){ return !!(tabs[curTab] && tabs[curTab].logoStyle); }
    function addCardCtrl(cardEl, si, ii){
      if(!SHOW_EDIT) return;
      const ctrl=document.createElement('div'); ctrl.className='card-ctrl';
      const mk=(t,title,fn,cls)=>{ const b=document.createElement('button'); b.type='button'; b.textContent=t; b.title=title; if(cls)b.className=cls; b.onclick=e=>{e.preventDefault();e.stopPropagation();fn();}; return b; };
      ctrl.appendChild(mk('◀','앞으로',()=>moveItem(si,ii,-1)));
      ctrl.appendChild(mk('✏','수정',()=>openDlg({si:si,ii:ii})));
      ctrl.appendChild(mk('✕','삭제',()=>deleteItem(si,ii),'del'));
      ctrl.appendChild(mk('▶','뒤로',()=>moveItem(si,ii,1)));
      cardEl.appendChild(ctrl);
      cardEl.addEventListener('click',e=>{ if(editMode) e.preventDefault(); }, true);
    }
    function moveItem(si,ii,dir){ const items=curSections()[si].items; const ni=ii+dir; if(ni<0||ni>=items.length) return; const t=items[ii]; items[ii]=items[ni]; items[ni]=t; saveTabs(); renderTab(curTab); }
    function deleteItem(si,ii){ const items=curSections()[si].items; const it=items[ii]; if(!confirm('이 항목을 삭제할까요?\n'+(it.ticker||it.name||''))) return; items.splice(ii,1); saveTabs(); renderTab(curTab); }
    function moveSection(si,dir){ const secs=curSections(); const ni=si+dir; if(ni<0||ni>=secs.length) return; const t=secs[si]; secs[si]=secs[ni]; secs[ni]=t; saveTabs(); renderTab(curTab); }
    function renameSection(si){ const secs=curSections(); const v=prompt('섹션 이름', secs[si].label); if(v===null) return; secs[si].label=v.trim()||secs[si].label; const s2=prompt('섹션 부제(영문 등, 선택)', secs[si].sub); if(s2!==null) secs[si].sub=s2.trim(); saveTabs(); renderTab(curTab); }
    function deleteSection(si){ const secs=curSections(); if(!confirm('이 섹션 전체를 삭제할까요?\n['+secs[si].label+'] '+secs[si].items.length+'개 항목')) return; secs.splice(si,1); saveTabs(); renderTab(curTab); }
    function addSection(){ const v=prompt('새 섹션 이름'); if(v===null) return; const nm=v.trim(); if(!nm) return; curSections().push({label:nm,sub:'',items:[]}); saveTabs(); renderTab(curTab); }

    /* ===== 추가/수정 모달 ===== */
    let dlgEdit=null;
    const dlgBack=document.getElementById('dlgBack');
    function setRow(inputId, show){ var inp=document.getElementById(inputId); if(!inp) return; inp.style.display=show?'block':'none'; var lab=inp.previousElementSibling; if(lab && lab.tagName==='LABEL') lab.style.display=show?'block':'none'; }
    function openDlg(target, presetSi){
      const secs=curSections();
      if(!secs.length){ if(confirm('이 탭에 섹션이 없어요. 먼저 섹션을 만들까요?')) addSection(); return; }
      dlgEdit = target||null;
      document.getElementById('dlgTitle').textContent = target?'항목 수정':'항목 추가';
      const logo=isLogoTab();
      setRow('dlgKo', !logo);
      setRow('dlgImg', logo);
      const sel=document.getElementById('dlgSec'); sel.innerHTML='';
      secs.forEach((s,i)=>{ const o=document.createElement('option'); o.value=i; o.textContent=s.label; sel.appendChild(o); });
      const it = target ? secs[target.si].items[target.ii] : {ticker:'',ko:'',url:'',name:'',img:''};
      document.getElementById('dlgTicker').value = it.ticker || it.name || '';
      document.getElementById('dlgKo').value = it.ko || '';
      document.getElementById('dlgUrl').value = it.url || '';
      document.getElementById('dlgImg').value = it.img || '';
      sel.value = target ? target.si : (presetSi!=null ? presetSi : 0);

    function closeDlg(){ dlgBack.classList.remove('show'); dlgEdit=null; }
    document.getElementById('dlgCancel').onclick=closeDlg;
    dlgBack.addEventListener('click',e=>{ if(e.target===dlgBack) closeDlg(); });
    document.getElementById('dlgOk').onclick=function(){
      const ticker=document.getElementById('dlgTicker').value.trim();
      const ko=document.getElementById('dlgKo').value.trim();
      let url=document.getElementById('dlgUrl').value.trim();
      let img=document.getElementById('dlgImg').value.trim();
      const si=parseInt(document.getElementById('dlgSec').value,10)||0;

      if(!url){ alert('URL을 입력해 주세요.'); return; }
      if(!/^https?:\/\//i.test(url)) url='https://'+url;
      if(img && !/^https?:\/\//i.test(img)) img='https://'+img;
      const logo=isLogoTab();
      const rec={ticker:ticker, ko:ko, url:url};
      if(logo){ rec.name=ticker; if(img) rec.img=img; }
      else if(img){ rec.img=img; }
      const secs=curSections();
      if(dlgEdit){
        if(dlgEdit.si===si) secs[si].items[dlgEdit.ii]=rec;
        else { secs[dlgEdit.si].items.splice(dlgEdit.ii,1); secs[si].items.push(rec); }

    /* ===== 내보내기 / 가져오기 ===== */
    function exportData(){
      const payload={ kind:DATA_KIND, tabsMeta:TABS_META, tabs:tabs };
      const blob=new Blob([JSON.stringify(payload,null,2)],{type:'application/json'});
      const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='myway-index.json'; a.click();
      setTimeout(()=>URL.revokeObjectURL(a.href),1500);
    }
    function importData(){
      const inp=document.createElement('input'); inp.type='file'; inp.accept='.json,.html,.htm,text/html,application/json';
      inp.onchange=()=>{
        const f=inp.files[0]; if(!f) return;
        const r=new FileReader();
        r.onload=()=>{
          let tb=null, mt=null, foreignKind=null;
          const txt=String(r.result).replace(/^\uFEFF/, '').trim();
          try{
            const p=JSON.parse(txt);
            if(p&&typeof p==='object'){
              if(p.kind && p.kind!==DATA_KIND) foreignKind=p.kind;
              tb=coerceTabs(p.tabs||p); mt=coerceMeta(p.tabsMeta);
            }
          }catch(_){}
          if(!tb){ const m=txt.match(/DEFAULT_TABS\s*=\s*(\{[\s\S]*?\})\s*;\s*\/\* @DATA_END/); if(m){ try{ tb=coerceTabs(eval('('+m[1]+')')); }catch(_){} } }
          if(!mt){ const mm=txt.match(/DEFAULT_TABS_META\s*=\s*(\[[\s\S]*?\])\s*;\s*\/\* @TABSMETA_END/); if(mm){ try{ mt=coerceMeta(eval('('+mm[1]+')')); }catch(_){} } }
          if(!tb && !mt){ alert('읽을 수 있는 데이터가 없어요.'); return; }
          if(foreignKind){ if(!confirm('다른 도구에서 만든 JSON일 수 있어요. (종류: '+foreignKind+')\n그래도 가져올까요?')) return; }
          var msg=[];
          if(mt){ TABS_META=mt; saveMeta(); if(!TABS_META.some(t=>t.id===curTab)) curTab=(TABS_META[0]&&TABS_META[0].id)||'daily'; renderNav(); msg.push('네비 '+TABS_META.length+'개'); }
          if(tb){ Object.keys(tb).forEach(k=>{ tabs[k]=tb[k]; }); saveTabs(); msg.push('탭 '+Object.keys(tb).length+'개'); }
          renderTab(curTab);
          alert('가져왔어요. '+msg.join(' · '));
        };
        r.readAsText(f);
      };
      inp.click();
    }

    /* ===== 편집 도구 FAB ===== */
    function closeTool(){ toolOpen=false; const m=document.querySelector('.tool-menu'); if(m)m.classList.remove('open'); const f=document.querySelector('.tool-fab'); if(f)f.classList.remove('open'); }
    function buildToolbar(){

        : '<svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4 12.5-12.5z"/></svg>';

      menu.appendChild(mk(editMode?'✏ 편집 끝':'✏ 편집 ('+curTab+')', ()=>{ editMode=!editMode; document.body.classList.toggle('editing',editMode); renderTab(curTab); buildToolbar(); }, editMode?'on':''));
      menu.appendChild(mk('＋ 항목추가', ()=>{ openDlg(null); closeTool(); }));
      menu.appendChild(mk('＋ 섹션추가', ()=>{ addSection(); closeTool(); }));
      menu.appendChild(mk('🧭 네비 편집', ()=>{ openNavMgr(); closeTool(); }));
      menu.appendChild(mk('📥 가져오기', ()=>{ importData(); closeTool(); }));
      menu.appendChild(mk('📤 내보내기', ()=>{ exportData(); closeTool(); }));
      if(!IS_DIST) menu.appendChild(mk('</> 코드', ()=>{ openCode(); closeTool(); }, 'code'));

    /* ===== 코드 / 파일 저장 ===== */
    const codeBack=document.getElementById('codeBack');
    function openCode(){ codeBack.classList.add('show'); }
    function closeCode(){ codeBack.classList.remove('show'); }
    document.getElementById('codeClose').onclick=closeCode;
    codeBack.addEventListener('click',e=>{ if(e.target===codeBack) closeCode(); });
    function serializeTabs(t){
      let out='{\n';
      Object.keys(t).forEach(function(k){
        var tb=t[k];
        out+='      '+JSON.stringify(k)+': { '+(tb.logoStyle?'logoStyle: true, ':'')+'sections: [\n';
        (tb.sections||[]).forEach(function(s){
          out+='        { label:'+JSON.stringify(s.label)+', sub:'+JSON.stringify(s.sub)+', items: [\n';
          (s.items||[]).forEach(function(it){
            var f='ticker:'+JSON.stringify(it.ticker)+', ko:'+JSON.stringify(it.ko)+', url:'+JSON.stringify(it.url);
            if(it.name) f+=', name:'+JSON.stringify(it.name);
            if(it.img) f+=', img:'+JSON.stringify(it.img);
            out+='          { '+f+' },\n';
          });
          out+='        ] },\n';
        });
        out+='      ] },\n';
      });
      out+='    }'; return out;
    }
    function buildHTML(cfg){
      const clone=document.documentElement.cloneNode(true);
      const m=clone.querySelector('#main'); if(m) m.innerHTML='';
      const et=clone.querySelector('#editToolbar'); if(et) et.innerHTML='';
      const tn=clone.querySelector('#tabNav'); if(tn) tn.innerHTML='';
      const nl=clone.querySelector('#navList'); if(nl) nl.innerHTML='';
      ['#dlgBack','#codeBack','#navBack'].forEach(id=>{ const x=clone.querySelector(id); if(x) x.classList.remove('show'); });
      const ds=clone.querySelector('#dlgSec'); if(ds) ds.innerHTML='';
      const ca=clone.querySelector('#codeArea'); if(ca) ca.value='';
      const b=clone.querySelector('body'); if(b){ b.classList.remove('editing'); b.classList.remove('hcs-collapsed'); b.removeAttribute('data-active-tab'); }
      let html='<!DOCTYPE html>\n'+clone.outerHTML;
      html=html.replace(/\/\* @DATA_START \*\/[\s\S]*?\/\* @DATA_END \*\//,
        '/* @DATA_START */\n    const DEFAULT_TABS = '+serializeTabs(tabs)+';\n    /* @DATA_END */');
      html=html.replace(/\/\* @TABSMETA_START \*\/[\s\S]*?\/\* @TABSMETA_END \*\//,
        '/* @TABSMETA_START */\n    const DEFAULT_TABS_META = '+serializeMeta(TABS_META)+';\n    /* @TABSMETA_END */');
      html=html.replace(/\/\* @CONFIG \*\/[\s\S]*?\/\* @CONFIG_END \*\//,
        '/* @CONFIG */\n    const IS_DIST = '+cfg.dist+';\n    const SHOW_EDIT = '+cfg.edit+';\n    const COPY_PROTECT = '+cfg.prot+';\n    const STORE_KEY = '+JSON.stringify(cfg.key)+';\n    const DIST_SIG = '+JSON.stringify(cfg.sig)+';\n    /* @CONFIG_END */');
      return html;
    }
    function dl(name,html){ const blob=new Blob([html],{type:'text/html'}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=name; a.click(); setTimeout(()=>URL.revokeObjectURL(a.href),1500); }
    document.getElementById('saveEdit').onclick=function(){ dl('indexmain7-edit.html', buildHTML({dist:true,edit:true,prot:false,key:'mywayIndexV1_dist',sig:'sig'+Date.now()})); closeCode(); };
    document.getElementById('saveView').onclick=function(){ dl('indexmain7-view.html', buildHTML({dist:false,edit:false,prot:true,key:'mywayIndexV1',sig:''})); closeCode(); };
    document.getElementById('copyCode').onclick=function(){
      const code='const DEFAULT_TABS = '+serializeTabs(tabs)+';';
      const ta=document.getElementById('codeArea'); ta.value=code; ta.style.pointerEvents='auto'; ta.select(); ta.setSelectionRange(0,code.length);
      let ok=false; try{ ok=document.execCommand('copy'); }catch(_){}
      if(navigator.clipboard){ navigator.clipboard.writeText(code).then(()=>{},()=>{}); ok=true; }
      ta.style.pointerEvents='none';
      alert(ok?'데이터 코드를 복사했어요.':'복사 실패 — 수동으로 복사해 주세요.');
    };

    /* ===== 상단 네비(탭) 데이터/편집 ===== */
    function coerceMeta(p){ if(!Array.isArray(p)) return null; var out=p.filter(t=>t&&typeof t==='object'&&t.id).map(t=>({id:String(t.id),label:String(t.label||t.id)})); return out.length?out:null; }
    function loadMeta(){ ensureDistFresh(); try{ var raw=localStorage.getItem(STORE_KEY+'_tabsmeta'); if(raw){ var c=coerceMeta(JSON.parse(raw)); if(c) return c; } }catch(_){} return DEFAULT_TABS_META.map(t=>({id:t.id,label:t.label})); }
    function saveMeta(){ try{ localStorage.setItem(STORE_KEY+'_tabsmeta', JSON.stringify(TABS_META)); }catch(_){} }
    let TABS_META = loadMeta();
    function selectTab(id){
      curTab=id;
      try{ sessionStorage.setItem('mywayTab_indexmain7', id); }catch(_){}
      renderNav(); renderTab(id);
      try{ window.scrollTo({top:0,behavior:'smooth'}); }catch(_){}
      try{ var b=document.querySelector('#tabNav .tab-btn[data-tab="'+id+'"]'); if(b) b.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'}); }catch(_){}
    }
    function renderNav(){
      var nav=document.getElementById('tabNav'); if(!nav) return; nav.innerHTML='';
      TABS_META.forEach(function(t){
        var b=document.createElement('button'); b.className='tab-btn'+(curTab===t.id?' is-active':''); b.dataset.tab=t.id; b.textContent=t.label;
        b.onclick=function(){ selectTab(t.id); };
        nav.appendChild(b);

    (function () {
      const FAV_KEY = 'mywayFavTilesV1';
      function loadFavs() { try { const a = JSON.parse(localStorage.getItem(FAV_KEY) || '[]'); return Array.isArray(a) ? a : []; } catch (_) { return []; } }
      function saveFavs(a) { try { localStorage.setItem(FAV_KEY, JSON.stringify(a)); } catch (_) {} }
      function favicon(url) { try { return 'https://www.google.com/s2/favicons?sz=128&domain=' + new URL(url).hostname; } catch (_) { return ''; } }
      function tileImg(f) { return f.img || favicon(f.url); }
      function fallbackImg(f) {
        const ch = ((f.name || f.url || '?').trim()[0] || '?');
        const svg = '<svg xmlns="http://www.w3.org/2000/svg" width="54" height="54"><rect width="54" height="54" rx="27" fill="#eceffb"/><text x="27" y="36" font-size="26" text-anchor="middle" fill="#8a96c0" font-family="sans-serif">' + ch.replace(/[<>&"]/g, '') + '</text></svg>';
        return 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(svg);
      }

      function favTile(f, idx) {
        const a = document.createElement('a');
        a.className = 'logo-tile fav-item';
        a.href = f.url; a.target = '_blank'; a.rel = 'noopener noreferrer';
        a.title = f.name || f.url;
        const img = document.createElement('img');
        img.src = tileImg(f); img.alt = f.name || ''; img.loading = 'lazy'; img.decoding = 'async';
        img.onerror = function () { img.onerror = null; img.src = fallbackImg(f); };
        a.appendChild(img);
        /* 편집 모드(body.editing)에서 타일 위에 ✏ 수정 · × 삭제 — 차트 카드와 동일 패턴 */
        const ctrl = document.createElement('div'); ctrl.className = 'card-ctrl';
        const mk = (t, title, fn, cls) => { const b = document.createElement('button'); b.type = 'button'; b.textContent = t; b.title = title; if (cls) b.className = cls; b.addEventListener('click', e => { e.preventDefault(); e.stopPropagation(); fn(); }); return b; };
        ctrl.appendChild(mk('\u270f', '수정', () => { openFavModal(); startEdit(idx); }));
        ctrl.appendChild(mk('\u00d7', '삭제', () => {
          if (!confirm('이 즐겨찾기를 삭제할까요?\n' + (f.name || f.url))) return;
          const arr = loadFavs(); arr.splice(idx, 1); saveFavs(arr);
          if (editIdx === idx) { exitEdit(); clearInputs(); } else if (editIdx > idx) { editIdx--; }
          renderFavList(); mountFavGrid();
        }, 'del'));
        a.appendChild(ctrl);
        a.addEventListener('click', e => { if (document.body.classList.contains('editing')) e.preventDefault(); }, true);
        return a;

      function addTile() {
        const add = document.createElement('div');
        add.className = 'logo-tile fav-add';

        add.setAttribute('tabindex', '0');

        add.addEventListener('click', openFavModal);
        add.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); openFavModal(); } });
        return add;
      }
      /* 마지막 버튼 그리드에 즐겨찾기 + 추가버튼을 이어 붙임 */
      function mountFavGrid() {
        const root = document.getElementById('extraLogoSection');
        if (!root) return;
        root.querySelectorAll('.fav-item, .fav-add').forEach(el => el.remove());
        const grids = root.querySelectorAll('.logo-grid');
        let grid = grids.length ? grids[grids.length - 1] : null;

        grid.appendChild(addTile());
      }

      const bg = document.getElementById('favmBg');
      const elUrl = document.getElementById('favUrl');
      const elName = document.getElementById('favName');
      const elImg = document.getElementById('favImg');
      let editIdx = -1;
      const addBtn = document.getElementById('favAddBtn');
      const titleEl = document.getElementById('favmTitle');
      const cancelBtn = document.getElementById('favEditCancelBtn');
      function clearInputs() { elUrl.value = ''; elName.value = ''; elImg.value = ''; }
      function exitEdit() {
        editIdx = -1;
        addBtn.textContent = '추가하기';
        addBtn.classList.remove('is-editing');
        titleEl.textContent = '즐겨찾기 추가';
        cancelBtn.classList.remove('show');
      }
      function startEdit(idx) {
        const favs = loadFavs();
        const f = favs[idx]; if (!f) return;
        editIdx = idx;
        elUrl.value = f.url || '';
        elName.value = f.name || '';
        elImg.value = f.img || '';
        addBtn.textContent = '수정 완료';
        addBtn.classList.add('is-editing');
        titleEl.textContent = '즐겨찾기 수정';
        cancelBtn.classList.add('show');

      cancelBtn.addEventListener('click', () => { exitEdit(); clearInputs(); elUrl.focus(); });
      function openFavModal() { exitEdit(); clearInputs(); renderFavList(); bg.classList.add('show'); setTimeout(() => elUrl.focus(), 30); }
      function closeFavModal() { bg.classList.remove('show'); exitEdit(); clearInputs(); }
      bg.addEventListener('click', e => { if (e.target === bg) closeFavModal(); });
      document.getElementById('favDoneBtn').addEventListener('click', closeFavModal);

      function renderFavList() {
        const favs = loadFavs();
        const list = document.getElementById('favList');

          const e = document.createElement('div'); e.className = 'favm-empty'; e.textContent = '아직 추가한 즐겨찾기가 없어요.';
          list.appendChild(e); return;

          edit.addEventListener('click', () => startEdit(idx));
          const del = document.createElement('button'); del.className = 'del'; del.textContent = '\u00d7'; del.title = '삭제';
          del.addEventListener('click', () => {
            const a = loadFavs(); a.splice(idx, 1); saveFavs(a);
            if (editIdx === idx) { exitEdit(); clearInputs(); }

          row.appendChild(im); row.appendChild(nm); row.appendChild(edit); row.appendChild(del);
          list.appendChild(row);
        });
      }

      function hostName(u) { try { return new URL(/^https?:\/\//i.test(u) ? u : 'https://' + u).hostname.replace(/^www\./, ''); } catch (_) { return ''; } }

      document.getElementById('favPasteBtn').addEventListener('click', async () => {
        try {
          const txt = ((await navigator.clipboard.readText()) || '').trim();
          if (!txt) { alert('클립보드가 비어 있어요. 먼저 사이트 주소를 복사해 주세요.'); return; }

          if (!elName.value.trim()) { const h = hostName(txt); if (h) elName.value = h; }
          elUrl.focus();
        } catch (_) {
          alert('클립보드를 읽을 수 없어요. 주소 칸을 길게 눌러 직접 붙여넣어 주세요.');
          elUrl.focus();
        }
      });

      document.getElementById('favAddBtn').addEventListener('click', () => {
        let url = elUrl.value.trim();
        if (!url) { alert('주소(URL)를 입력하세요.'); elUrl.focus(); return; }
        if (!/^https?:\/\//i.test(url)) url = 'https://' + url;
        let name = elName.value.trim();
        if (!name) name = hostName(url);
        const favs = loadFavs();
        const rec = { name: name, url: url, img: elImg.value.trim() };
        if (editIdx >= 0 && editIdx < favs.length) {
          favs[editIdx] = rec; saveFavs(favs);
          exitEdit(); clearInputs();
        } else {
          favs.push(rec); saveFavs(favs); clearInputs();
        }
        renderFavList(); mountFavGrid();
        elUrl.focus();
      });

      /* 내보내기 */
      document.getElementById('favExportBtn').addEventListener('click', () => {
        const blob = new Blob([JSON.stringify(loadFavs(), null, 2)], { type: 'application/json' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'myway-favorites.json';
        document.body.appendChild(a); a.click();
        setTimeout(() => { URL.revokeObjectURL(a.href); a.remove(); }, 100);
      });
      /* 가져오기 */
      const fileInput = document.getElementById('favImportFile');
      document.getElementById('favImportBtn').addEventListener('click', () => fileInput.click());
      fileInput.addEventListener('change', e => {
        const file = e.target.files && e.target.files[0];
        if (!file) return;
        const rd = new FileReader();
        rd.onload = () => {
          try {
            const arr = JSON.parse(rd.result);
            if (!Array.isArray(arr)) throw new Error('not array');
            const clean = arr.filter(x => x && x.url).map(x => ({ name: x.name || '', url: String(x.url), img: x.img || '' }));
            const cur = loadFavs();
            const seen = new Set(cur.map(f => f.url));
            let added = 0;
            clean.forEach(f => { if (!seen.has(f.url)) { cur.push(f); seen.add(f.url); added++; } });
            saveFavs(cur); renderFavList(); mountFavGrid();
            alert('가져오기 완료: ' + added + '개 추가됨 (중복 제외)');
          } catch (_) { alert('올바른 즐겨찾기 JSON 파일이 아니에요.'); }
          fileInput.value = '';
        };
        rd.readAsText(file);
      });

      mountFavGrid();
    })();
  </script>

<script>
/* 모바일: iframe 안에서 열릴 때 외부 링크를 최상위 창에서 직접 열어
   뒤로가기로 MYWAY 복귀 가능하게. PC·태블릿은 새 탭 유지. */
(function(){
  if(!/Mobi/i.test(navigator.userAgent)) return;
  document.addEventListener('click', function(e){
    if(document.body.classList.contains('editing')) return;
    var a = e.target.closest ? e.target.closest('a[href]') : null;
    if(!a) return;
    var href = a.getAttribute('href') || '';
    if(!href || href.charAt(0) === '#' || /^javascript:/i.test(href)) return;
    e.preventDefault();
    try { (window.top || window).location.href = a.href; }
    catch(_) { window.open(a.href, '_blank'); }
  }, true);
  var _open = window.open.bind(window);
  window.open = function(url, name, feat){
    if(url){ try{ (window.top||window).location.href = url; }catch(_){ location.href = url; } return null; }
    return _open(url, name, feat);
  };
})();
</script>
<script>
/* 화면 네비(H·C&S): 부모(index)가 postMessage로 항목을 보내면 탭바 앞에 토글 생성.
   네비 항목은 부모에서만 관리하므로 이 파일은 손댈 필요 없음. file://·배포 모두 동작. */
(function(){
  /* 활성(현재 화면) 토글을 다시 누르면 본문 접기/펼치기.
     상태는 저장하지 않음 → 새로고침/재방문 시 항상 펼친 상태로 시작. */
  function applyHcsCollapse(on){ if(document.body) document.body.classList.toggle('hcs-collapsed', !!on); }
  function toggleHcsCollapse(){ applyHcsCollapse(!document.body.classList.contains('hcs-collapsed')); }
  applyHcsCollapse(false); /* 로드 시 항상 펼침(혹시 남아있는 접힘 흔적 제거) */
  function buildSwitch(items, current){
    var topbar = document.querySelector('.topbar');
    var tabNav = document.getElementById('tabNav');
    if(!topbar || !tabNav || !items || !items.length) return;
    var old = document.getElementById('hcsSwitch');
    if(old && old.parentNode) old.parentNode.removeChild(old);
    var sw = document.createElement('div');
    sw.className = 'hcs-switch'; sw.id = 'hcsSwitch';
    items.forEach(function(s){
      var a = document.createElement('a');
      a.href = '#'; a.textContent = s.label;
      if((current || '').indexOf(s.url) !== -1) a.className = 'active';
      a.addEventListener('click', function(e){
        e.preventDefault();
        if(a.classList.contains('active')){ toggleHcsCollapse(); return; }
        try { parent.postMessage({ type:'MYWAY_SCREEN_SWITCH', url: s.url }, '*'); } catch(_){}
      });
      sw.appendChild(a);
    });
    topbar.insertBefore(sw, tabNav);
  }
  window.addEventListener('message', function(e){
    var d = e.data || {};
    if(d.type === 'MYWAY_SCREEN_NAV'){ buildSwitch(d.items, d.current); }
  });
  function announce(){ try { if(parent !== window) parent.postMessage({ type:'MYWAY_SCREEN_READY' }, '*'); } catch(_){} }
  if(document.readyState !== 'loading') announce();
  else document.addEventListener('DOMContentLoaded', announce);
  window.addEventListener('load', announce);
})();
</script>
