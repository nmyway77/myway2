  <script>
    /* 복제방지 */
    (function(){
      function isEditable(t) {
        if (!t) return false;
        const tag = (t.tagName || '').toLowerCase();
        if (tag === 'input' || tag === 'textarea') return true;
        if (t.isContentEditable) return true;
        /* 자주가는 사이트 영역(.sc-section)은 우클릭 편집·드래그 정렬 필요해서 예외 */
        if (t.closest && t.closest('.sc-section')) return true;
        return false;
      }
      ['contextmenu','dragstart','selectstart','copy','cut'].forEach(ev => {
        document.addEventListener(ev, e => {
          if (isEditable(e.target)) return;
          e.preventDefault();
        }, { capture: true });
      });
      document.addEventListener('keydown', e => {
        if (isEditable(e.target)) return;
        const k = (e.key || '').toLowerCase();

    // 영문 보조 라벨(작은 글씨)을 숨길 탭 목록
    const HIDE_SUB_TABS = ['news', 'bbs', 'broadcast', 'magazine'];

    function renderTab(tabId) {
      // body 속성 변경 → CSS 라이트/다크 톤 토글
      document.body.dataset.activeTab = tabId;

      const root = document.getElementById('main');
      const frag = document.createDocumentFragment();
      const tab = tabs[tabId];
      if (!tab) return;

      const isLogo = !!tab.logoStyle;

      tab.sections.forEach(sec => {
        const section = document.createElement('section');
        section.className = 'section';

        const head = document.createElement('div');
        head.className = 'section-head';
        const label = document.createElement('span');
        label.className = 'section-label';
        label.textContent = sec.label;
        head.appendChild(label);

        // 영문 보조 라벨(작은 글씨)은 지정 탭에서 미표시
        if (!HIDE_SUB_TABS.includes(tabId) && sec.sub) {
          const sub = document.createElement('span');
          sub.className = 'section-sub';
          sub.textContent = sec.sub;
          head.appendChild(sub);
        }

        // 특정 섹션 옆 '바로보기' 링크 (신문 아이콘 + 텍스트)
        const quick = SECTION_QUICKLINKS[sec.label];
        if (quick) {
          const newsLink = document.createElement('a');
          newsLink.className = 'section-newslink';
          newsLink.href = quick.url;
          newsLink.target = '_blank';
          newsLink.rel = 'noopener';
          newsLink.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M4 22h16a2 2 0 0 0 2-2V4a2 2 0 0 0-2-2H8a2 2 0 0 0-2 2v16a2 2 0 0 1-2 2Zm0 0a2 2 0 0 1-2-2v-9c0-1.1.9-2 2-2h2"/><path d="M18 14h-8"/><path d="M15 18h-5"/><path d="M10 6h8v4h-8z"/></svg><span>' + quick.text + '</span>';
          head.appendChild(newsLink);
        }

        section.appendChild(head);

        const grid = document.createElement('div');
        grid.className = isLogo ? 'logo-grid' : 'grid';

        sec.items.forEach(it => {
          if (isLogo) {
            // 원형 로고 타일 (INDEXMAIN 스타일)
            const a = document.createElement('a');
            a.className = 'logo-tile';
            a.href = it.url;
            a.target = '_blank';
            a.rel = 'noopener noreferrer';
            a.setAttribute('aria-label', it.name || '');
            const img = document.createElement('img');
            img.src = it.img;
            img.alt = it.name || '';
            img.loading = 'lazy';
            img.decoding = 'async';
            img.referrerPolicy = 'no-referrer';
            a.appendChild(img);
            grid.appendChild(a);
          } else {
            // 기존 다크 카드
            const a = document.createElement('a');
            a.className = 'card';
            a.href = it.url;
            a.target = '_blank';
            a.rel = 'noopener';
            a.setAttribute('aria-label', it.ko || it.ticker);
            const tk = document.createElement('div');
            tk.className = 'ticker';
            tk.textContent = it.ticker;
            a.appendChild(tk);
            if (String(it.ticker).length > 6) a.dataset.long = '1';
            const ko = document.createElement('div');
            ko.className = 'name-ko';
            ko.textContent = it.ko;
            a.appendChild(ko);
            const arr = document.createElement('span');
            arr.className = 'arrow';
            arr.textContent = '↗';
            a.appendChild(arr);
            grid.appendChild(a);
          }
        });
        section.appendChild(grid);
        frag.appendChild(section);
      });

      root.replaceChildren(frag);
    }

    /* ============ 탭 네비 ============ */
    function setupTabs() {
      const nav = document.getElementById('tabNav');
      nav.addEventListener('click', e => {
        const btn = e.target.closest('.tab-btn');
        if (!btn) return;
        nav.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('is-active'));
        btn.classList.add('is-active');
        renderTab(btn.dataset.tab);
        try { sessionStorage.setItem('mywayTab_indexmain7', btn.dataset.tab); } catch(_) {}
        window.scrollTo({ top: 0, behavior: 'smooth' });
        // 클릭한 탭을 가시 영역 가운데로 부드럽게 가로 스크롤
        // block: 'nearest' → 세로 페이지 스크롤은 건드리지 않음
        btn.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
      });
    }

    setupTabs();
    (function(){
      var saved = 'daily';
      try { saved = sessionStorage.getItem('mywayTab_indexmain7') || 'daily'; } catch(_) {}
      var nav = document.getElementById('tabNav');
      var btn = nav.querySelector('.tab-btn[data-tab="' + saved + '"]');
      if (!btn) { saved = 'daily'; btn = nav.querySelector('.tab-btn[data-tab="daily"]'); }
      nav.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('is-active'));
      if (btn) btn.classList.add('is-active');
      renderTab(saved);
    })();

    /* group을 logo-grid로 렌더링 (기존 logo-tile 스타일 재사용) */
    function renderExtraGroup(arr) {
      if (!arr || arr.length === 0) return null;
      const grid = document.createElement('div');
      grid.className = 'logo-grid';
      arr.forEach(item => {
        const a = document.createElement('a');
        a.className = 'logo-tile';
        a.href = item.url;
        a.target = '_blank';
        a.rel = 'noopener noreferrer';
        const img = document.createElement('img');
        img.src = item.img;
        img.alt = item.alt || '';
        img.loading = 'lazy';
        img.decoding = 'async';
        a.appendChild(img);
        grid.appendChild(a);
      });
      return grid;

      if (!root) return;

  <script>
    /* ===== 사용자 즐겨찾기 (+ 버튼) — extra-logo-section 맨 끝에 원형 타일 ===== */
    (function () {
      const FAV_KEY = 'mywayFavTilesV1';
      function loadFavs() { try { const a = JSON.parse(localStorage.getItem(FAV_KEY) || '[]'); return Array.isArray(a) ? a : []; } catch (_) { return []; } }
      function saveFavs(a) { try { localStorage.setItem(FAV_KEY, JSON.stringify(a)); } catch (_) {} }
      function favicon(url) { try { return 'https://www.google.com/s2/favicons?sz=128&domain=' + new URL(url).hostname; } catch (_) { return ''; } }
      function tileImg(f) { return f.img || favicon(f.url); }
      function fallbackImg(f) {
        const ch = ((f.name || f.url || '?').trim()[0] || '?');
        const svg = '<svg xmlns="http://www.w3.org/2000/svg" width="54" height="54"><rect width="54" height="54" rx="27" fill="#eceffb"/><text x="27" y="36" font-size="26" text-anchor="middle" fill="#8a96c0" font-family="sans-serif">' + ch.replace(/[<>&"]/g, '') + '</text></svg>';
        return 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(svg);
      }

      function favTile(f) {
        const a = document.createElement('a');
        a.className = 'logo-tile fav-item';
        a.href = f.url; a.target = '_blank'; a.rel = 'noopener noreferrer';
        a.title = f.name || f.url;
        const img = document.createElement('img');
        img.src = tileImg(f); img.alt = f.name || ''; img.loading = 'lazy'; img.decoding = 'async';
        img.onerror = function () { img.onerror = null; img.src = fallbackImg(f); };
        a.appendChild(img);
        return a;
      }
      function addTile() {
        const add = document.createElement('div');
        add.className = 'logo-tile fav-add';
        add.setAttribute('role', 'button');
        add.setAttribute('tabindex', '0');
        add.title = '즐겨찾기 추가';
        add.addEventListener('click', openFavModal);
        add.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); openFavModal(); } });
        return add;
      }
      /* 마지막 버튼 그리드에 즐겨찾기 + 추가버튼을 이어 붙임 */
      function mountFavGrid() {
        const root = document.getElementById('extraLogoSection');
        if (!root) return;
        root.querySelectorAll('.fav-item, .fav-add').forEach(el => el.remove());
        const grids = root.querySelectorAll('.logo-grid');
        let grid = grids.length ? grids[grids.length - 1] : null;
        if (!grid) { grid = document.createElement('div'); grid.className = 'logo-grid'; root.appendChild(grid); }
        loadFavs().forEach(f => grid.appendChild(favTile(f)));
        grid.appendChild(addTile());
      }

      /* 모달 */
      const bg = document.getElementById('favmBg');
      const elUrl = document.getElementById('favUrl');
      const elName = document.getElementById('favName');
      const elImg = document.getElementById('favImg');
      function clearInputs() { elUrl.value = ''; elName.value = ''; elImg.value = ''; }
      function openFavModal() { clearInputs(); renderFavList(); bg.classList.add('show'); setTimeout(() => elUrl.focus(), 30); }
      function closeFavModal() { bg.classList.remove('show'); clearInputs(); }
      bg.addEventListener('click', e => { if (e.target === bg) closeFavModal(); });
      document.getElementById('favDoneBtn').addEventListener('click', closeFavModal);

      function renderFavList() {
        const favs = loadFavs();
        const list = document.getElementById('favList');
        list.innerHTML = '';
        if (!favs.length) {
          const e = document.createElement('div'); e.className = 'favm-empty'; e.textContent = '아직 추가한 즐겨찾기가 없어요.';
          list.appendChild(e); return;
        }
        favs.forEach((f, idx) => {
          const row = document.createElement('div'); row.className = 'favm-row';
          const im = document.createElement('img'); im.src = tileImg(f); im.alt = '';
          im.onerror = function () { im.onerror = null; im.src = fallbackImg(f); };
          const nm = document.createElement('span'); nm.className = 'nm'; nm.textContent = f.name || f.url;
          const del = document.createElement('button'); del.className = 'del'; del.textContent = '\u00d7'; del.title = '삭제';
          del.addEventListener('click', () => { const a = loadFavs(); a.splice(idx, 1); saveFavs(a); renderFavList(); mountFavGrid(); });
          row.appendChild(im); row.appendChild(nm); row.appendChild(del);
          list.appendChild(row);
        });
      }

      function hostName(u) { try { return new URL(/^https?:\/\//i.test(u) ? u : 'https://' + u).hostname.replace(/^www\./, ''); } catch (_) { return ''; } }

      document.getElementById('favPasteBtn').addEventListener('click', async () => {
        try {
          const txt = ((await navigator.clipboard.readText()) || '').trim();
          if (!txt) { alert('클립보드가 비어 있어요. 먼저 사이트 주소를 복사해 주세요.'); return; }
          elUrl.value = txt;
          if (!elName.value.trim()) { const h = hostName(txt); if (h) elName.value = h; }
          elUrl.focus();
        } catch (_) {
          alert('클립보드를 읽을 수 없어요. 주소 칸을 길게 눌러 직접 붙여넣어 주세요.');
          elUrl.focus();
        }
      });

      document.getElementById('favAddBtn').addEventListener('click', () => {
        let url = elUrl.value.trim();
        if (!url) { alert('주소(URL)를 입력하세요.'); elUrl.focus(); return; }
        if (!/^https?:\/\//i.test(url)) url = 'https://' + url;
        let name = elName.value.trim();
        if (!name) name = hostName(url);
        const favs = loadFavs();
        favs.push({ name: name, url: url, img: elImg.value.trim() });
        saveFavs(favs);
        clearInputs();
        renderFavList(); mountFavGrid();
        elUrl.focus();
      });

      /* 내보내기 */
      document.getElementById('favExportBtn').addEventListener('click', () => {
        const blob = new Blob([JSON.stringify(loadFavs(), null, 2)], { type: 'application/json' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'myway-favorites.json';
        document.body.appendChild(a); a.click();
        setTimeout(() => { URL.revokeObjectURL(a.href); a.remove(); }, 100);
      });
      /* 가져오기 */
      const fileInput = document.getElementById('favImportFile');
      document.getElementById('favImportBtn').addEventListener('click', () => fileInput.click());
      fileInput.addEventListener('change', e => {
        const file = e.target.files && e.target.files[0];
        if (!file) return;
        const rd = new FileReader();
        rd.onload = () => {
          try {
            const arr = JSON.parse(rd.result);
            if (!Array.isArray(arr)) throw new Error('not array');
            const clean = arr.filter(x => x && x.url).map(x => ({ name: x.name || '', url: String(x.url), img: x.img || '' }));
            const cur = loadFavs();
            const seen = new Set(cur.map(f => f.url));
            let added = 0;
            clean.forEach(f => { if (!seen.has(f.url)) { cur.push(f); seen.add(f.url); added++; } });
            saveFavs(cur); renderFavList(); mountFavGrid();
            alert('가져오기 완료: ' + added + '개 추가됨 (중복 제외)');
          } catch (_) { alert('올바른 즐겨찾기 JSON 파일이 아니에요.'); }
          fileInput.value = '';
        };
        rd.readAsText(file);
      });

      mountFavGrid();
    })();
  </script>

<script>
/* 모바일: iframe 안에서 열릴 때 외부 링크를 최상위 창에서 직접 열어
   뒤로가기로 MYWAY 복귀 가능하게. PC·태블릿은 새 탭 유지. */
(function(){
  if(!/Mobi/i.test(navigator.userAgent)) return;
  document.addEventListener('click', function(e){
    var a = e.target.closest ? e.target.closest('a[href]') : null;
    if(!a) return;
    var href = a.getAttribute('href') || '';
    if(!href || href.charAt(0) === '#' || /^javascript:/i.test(href)) return;
    e.preventDefault();
    try { (window.top || window).location.href = a.href; }
    catch(_) { window.open(a.href, '_blank'); }
  }, true);
  var _open = window.open.bind(window);
  window.open = function(url, name, feat){
    if(url){ try{ (window.top||window).location.href = url; }catch(_){ location.href = url; } return null; }
    return _open(url, name, feat);
  };
})();
</script>
