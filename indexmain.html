<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>MYWAY.KR HOME</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#ffffff">
  <style>
    /* ========== 기본 안정화 ========== */
    *, *::before, *::after {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      max-width: 100%;
      overflow-x: hidden;       /* 가로 스크롤 차단 - 흔들림 방지 핵심 */
      overscroll-behavior-x: none; /* 가로 바운스 차단 */
      -webkit-text-size-adjust: 100%; /* iOS 텍스트 크기 자동조정 차단 */
    }

    html {
      /* iOS 부드러운 스크롤 */
      -webkit-overflow-scrolling: touch;
      scroll-behavior: smooth;
    }

    body {
      min-height: 100vh;
      background: #fff;
      font-family: 'Segoe UI', '맑은 고딕', Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      /* 모바일 주소창 높이 변화로 인한 점프 방지 */
      min-height: 100dvh;
    }

    /* ========== 타이틀 ========== */
    .main-title {
      margin-top: 0;
      font-size: 1.1rem;
      font-weight: 700;
      color: #333862;
      text-shadow: 0 2px 12px #ffffff99;
      margin-bottom: 8px;
      text-align: center;
      user-select: none;
    }

    .main-subtitle {
      font-size: 0.9rem;
      color: #6a739c;
      margin-bottom: 5px;
      text-align: center;
      user-select: none;
    }

    /* ========== 컨테이너 ========== */
    .container {
      width: 100%;
      max-width: 800px;
      display: flex;
      flex-direction: column;
      align-items: center;
      margin: 0 auto;
      padding: 0 12px 80px 12px;  /* 좌우 안전 여백 + 하단 여백 */
    }

    /* ========== 로고 그리드 (CSS Grid 사용으로 흔들림 원천 차단) ========== */
    .logo-row {
      display: grid;
      grid-template-columns: repeat(10, 74px);
      gap: 24px;
      justify-content: center;
      width: 100%;
      max-width: 100%;
      margin-bottom: 24px;
    }

    .ai-logo-wrap {
      width: 74px;
      height: 74px;
      border-radius: 50%;
      background: #fff;
      box-shadow: 0 3px 24px 0 #b1c7e866;
      border: 3px solid #e5e8f6;
      display: flex;
      justify-content: center;
      align-items: center;
      transition: box-shadow 0.15s, border-color 0.15s, transform 0.12s;
      cursor: pointer;
      overflow: hidden;
      margin: 0;
      text-decoration: none;
      -webkit-tap-highlight-color: transparent;  /* 모바일 탭 하이라이트 제거 */
    }

    .ai-logo-wrap:hover,
    .ai-logo-wrap:active {
      box-shadow: 0 8px 32px 0 #7e94ff99;
      border-color: #94a2ff;
      background: #f7faff;
    }

    .ai-logo-img {
      width: 54px;
      height: 54px;
      object-fit: contain;
      background: transparent;
      border-radius: 50%;
      transition: transform 0.12s;
      pointer-events: none;
      -webkit-user-drag: none;
    }

    .ai-logo-wrap:hover .ai-logo-img {
      transform: scale(1.08) rotate(-3deg);
    }

    .group-title {
      width: 100%;
      max-width: 500px;
      font-size: 1.07rem;
      font-weight: 600;
      margin: 34px 0 10px 0;
      letter-spacing: -0.5px;
      color: #244;
      text-align: center;
      padding: 0 8px;
      user-select: none;
    }

    /* ========== 반응형 (CSS만으로 처리, JS 의존 X) ==========
       구조 원칙:
       1) 큰 PC → 와이드 데스크톱 → 노트북 → 태블릿 → 핸드폰 세로 → 핸드폰 가로
       2) 핸드폰 가로(landscape + 짧은 높이)는 별도 처리 — 모양 깨짐 방지
    ========================================================== */

    /* ===== 1) 초대형 PC (1600px+) ===== */
    @media (min-width: 1600px) {
      .container { max-width: 1280px; padding: 0 24px 100px 24px; }
      .logo-row {
        grid-template-columns: repeat(12, 80px);
        gap: 28px;
      }
      .ai-logo-wrap { width: 80px; height: 80px; }
      .ai-logo-img { width: 58px; height: 58px; }
    }

    /* ===== 2) 일반 PC (1101px ~ 1599px) ===== */
    @media (min-width: 1101px) and (max-width: 1599px) {
      .container { max-width: 1000px; }
      .logo-row {
        grid-template-columns: repeat(10, 74px);
        gap: 22px;
      }
      .ai-logo-wrap { width: 74px; height: 74px; }
      .ai-logo-img { width: 54px; height: 54px; }
    }

    /* ===== 3) 노트북 / 작은 PC (901px ~ 1100px) ===== */
    @media (min-width: 901px) and (max-width: 1100px) {
      .container { max-width: 820px; }
      .logo-row {
        grid-template-columns: repeat(8, 70px);
        gap: 18px;
      }
      .ai-logo-wrap { width: 70px; height: 70px; }
      .ai-logo-img { width: 50px; height: 50px; }
    }

    /* ===== 4) 태블릿 (701px ~ 900px) ===== */
    @media (min-width: 701px) and (max-width: 900px) {
      .main-title { font-size: 1.2rem; margin-top: 20px; }
      .main-subtitle { font-size: 1rem; }
      .container { max-width: 700px; padding: 0 14px 70px 14px; }
      .logo-row {
        grid-template-columns: repeat(7, 70px);
        gap: 16px;
      }
      .ai-logo-wrap { width: 70px; height: 70px; }
      .ai-logo-img { width: 50px; height: 50px; }
    }

    /* ===== 5) 핸드폰 (세로, ~ 700px) ===== */
    @media (max-width: 700px) {
      .main-title { font-size: 1.05rem; margin-top: 8px; }
      .main-subtitle { font-size: 0.9rem; margin-bottom: 4px; }
      .container { padding: 0 10px 60px 10px; }
      .logo-row {
        grid-template-columns: repeat(5, minmax(0, 64px));
        gap: 12px;
        justify-content: center;
        margin-bottom: 18px;
      }
      .ai-logo-wrap { width: 64px; height: 64px; }
      .ai-logo-img { width: 46px; height: 46px; }
      .group-title { font-size: 1rem; margin: 22px 0 8px 0; }
    }

    /* ===== 6) 작은 핸드폰 (세로, ~ 420px) ===== */
    @media (max-width: 420px) {
      .container { padding: 0 8px 50px 8px; }
      .logo-row {
        grid-template-columns: repeat(4, minmax(0, 64px));
        gap: 10px;
      }
      .ai-logo-wrap { width: 60px; height: 60px; }
      .ai-logo-img { width: 42px; height: 42px; }
    }

    /* ===== 7) 매우 작은 핸드폰 (세로, ~ 340px) ===== */
    @media (max-width: 340px) {
      .logo-row {
        grid-template-columns: repeat(4, minmax(0, 56px));
        gap: 8px;
      }
      .ai-logo-wrap { width: 54px; height: 54px; border-width: 2px; }
      .ai-logo-img { width: 38px; height: 38px; }
    }

    /* ===== 8) 핸드폰 가로 모드 (landscape, 높이 짧음) =====
       핸드폰을 옆으로 돌렸을 때: 가로는 넓어도 세로가 짧아 로고가
       너무 크면 한 화면에 안 들어오고 스크롤이 과해짐.
       → 작은 로고 + 많은 컬럼 + 좁은 여백으로 가독성 확보 */
    @media (orientation: landscape) and (max-height: 500px) {
      body { padding-top: 4px; }
      .main-title { font-size: 0.95rem; margin: 4px 0 2px 0; }
      .main-subtitle { font-size: 0.85rem; margin-bottom: 2px; }
      .group-title { font-size: 0.9rem; margin: 12px 0 6px 0; }
      .container { padding: 0 16px 30px 16px; max-width: 100%; }
      .logo-row {
        grid-template-columns: repeat(10, minmax(0, 52px));
        gap: 10px;
        margin-bottom: 10px;
      }
      .ai-logo-wrap {
        width: 52px;
        height: 52px;
        border-width: 2px;
        box-shadow: 0 2px 12px 0 #b1c7e855;
      }
      .ai-logo-img { width: 36px; height: 36px; }
    }

    /* ===== 9) 작은 핸드폰 가로 (예: iPhone SE 가로) ===== */
    @media (orientation: landscape) and (max-height: 380px) {
      .main-title, .main-subtitle { display: none; }
      .group-title { font-size: 0.85rem; margin: 8px 0 4px 0; }
      .container { padding: 0 12px 24px 12px; }
      .logo-row {
        grid-template-columns: repeat(11, minmax(0, 46px));
        gap: 8px;
        margin-bottom: 8px;
      }
      .ai-logo-wrap { width: 46px; height: 46px; }
      .ai-logo-img { width: 32px; height: 32px; }
    }

    /* ===== 10) 큰 핸드폰 가로 / 작은 태블릿 가로 (501px ~ 600px height) ===== */
    @media (orientation: landscape) and (min-height: 501px) and (max-height: 600px) and (max-width: 1100px) {
      .container { padding: 0 16px 50px 16px; }
      .logo-row {
        grid-template-columns: repeat(9, minmax(0, 60px));
        gap: 14px;
      }
      .ai-logo-wrap { width: 60px; height: 60px; }
      .ai-logo-img { width: 42px; height: 42px; }
    }

    /* 접근성: 모션 줄이기 선호 시 트랜지션 비활성 */
    @media (prefers-reduced-motion: reduce) {
      .ai-logo-wrap, .ai-logo-img { transition: none !important; }
      .ai-logo-wrap:hover .ai-logo-img { transform: none !important; }
    }
  </style>
</head>
<body>
  <div class="main-title"></div>
  <div class="main-subtitle"></div>
  <div class="container" id="aiLogoContainer"></div>

  <!-- ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ -->
  <!-- 자주가는 사이트 추가 섹션 (자체 포함 - 통째로 옮기거나 제거 가능) -->
  <!-- ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ -->
  <link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&display=swap" rel="stylesheet">
  <style>
    .sc-section {
      width: 100%;
      max-width: 1280px;
      margin: 28px auto 24px;
      padding: 0 24px;
      font-family: 'Segoe UI', '맑은 고딕', Arial, sans-serif;
      color: #333862;
    }

    .sc-header {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 10px;
      padding: 0 2px 14px;
      margin-bottom: 14px;
    }
    .sc-title {
      grid-column: 2;
      margin: 0;
      text-align: center;
      font-family: 'Gowun Batang', 'Segoe UI', '맑은 고딕', serif;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 0.04em;
      color: #2a2f55;
      white-space: nowrap;
    }
    .sc-actions {
      grid-column: 3;
      justify-self: end;
      display: inline-flex;
      align-items: center;
      gap: 2px;
    }
    .sc-icon-btn {
      width: 30px; height: 30px;
      border: none;
      background: transparent;
      color: #8a93b8;
      border-radius: 7px;
      cursor: pointer;
      font-size: 14px;
      line-height: 1;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: all 0.12s;
      padding: 0;
    }
    .sc-icon-btn:hover { color: #333862; background: #f1f3f8; }
    .sc-icon-btn.danger:hover { color: #d33; background: #fdecec; }

    /* ───── 그리드: .logo-row와 동일한 구조 ───── */
    .sc-grid {
      display: grid;
      grid-template-columns: repeat(10, 74px);
      gap: 24px;
      justify-content: center;
      width: 100%;
      max-width: 100%;
    }

    /* ───── 타일: .ai-logo-wrap와 동일한 원형 ───── */
    .sc-tile {
      position: relative;
      width: 74px;
      height: 74px;
      border-radius: 50%;
      background: #fff;
      box-shadow: 0 3px 24px 0 #b1c7e866;
      border: 3px solid #e5e8f6;
      display: flex;
      justify-content: center;
      align-items: center;
      transition: box-shadow 0.15s, border-color 0.15s, transform 0.12s;
      cursor: pointer;
      overflow: hidden;
      text-decoration: none;
      -webkit-tap-highlight-color: transparent;
      color: inherit;
    }
    .sc-tile:hover {
      box-shadow: 0 8px 32px 0 #7e94ff99;
      border-color: #94a2ff;
      background: #f7faff;
    }
    .sc-tile.sc-dragging { opacity: 0.4; }
    .sc-tile.sc-drag-over {
      border-color: #4a9eff;
      box-shadow: 0 0 0 3px rgba(74,158,255,0.3);
    }

    .sc-fav {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: transparent;
      border: none;
      border-radius: 50%;
      overflow: hidden;
    }
    .sc-fav img {
      width: 60%;
      height: 60%;
      object-fit: contain;
    }
    .sc-fav.sc-ph {
      background: linear-gradient(135deg, #6fc8ff, #4a9eff);
      color: #fff;
      font-weight: 700;
      font-size: 28px;
    }

    /* + 추가 타일 (점선 원) */
    .sc-tile.sc-add {
      background: transparent;
      border: 2.5px dashed #cdd2de;
      box-shadow: none;
      color: #aab1c4;
    }
    .sc-tile.sc-add:hover {
      border-color: #94a2ff;
      color: #6fc8ff;
      background: #f7faff;
      box-shadow: none;
    }
    .sc-tile.sc-add .sc-fav {
      background: transparent;
      font-size: 32px;
      font-weight: 300;
    }

    /* × 삭제 버튼 - 평소엔 숨김, 호버 시 빨갛게 표시 */
    .sc-menu-btn {
      position: absolute;
      top: -4px; right: -4px;
      width: 24px; height: 24px;
      border-radius: 50%;
      background: #ef4444;
      border: 2px solid #fff;
      color: #fff;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      line-height: 1;
      z-index: 2;
      opacity: 0;
      pointer-events: none;
      transform: scale(0.7);
      box-shadow: 0 3px 10px rgba(239,68,68,0.5);
      transition: opacity 0.15s, transform 0.15s, background 0.15s;
    }
    .sc-tile:hover .sc-menu-btn {
      opacity: 1;
      pointer-events: auto;
      transform: scale(1);
    }
    .sc-menu-btn:hover {
      background: #dc2626 !important;
      transform: scale(1.15) !important;
      box-shadow: 0 4px 14px rgba(239,68,68,0.65) !important;
    }
    /* 모바일(호버 없음)에선 살짝 보이게 */
    @media (hover: none) {
      .sc-menu-btn {
        opacity: 0.75;
        pointer-events: auto;
        transform: scale(1);
        background: rgba(26,26,26,0.6);
      }
    }

    /* ───── 반응형 (logo-row와 완전 동일하게) ───── */
    @media (min-width: 1600px) {
      .sc-section { max-width: 1280px; padding: 0 24px; }
      .sc-grid { grid-template-columns: repeat(12, 80px); }
      .sc-tile { width: 80px; height: 80px; }
      .sc-fav.sc-ph { font-size: 30px; }
    }
    @media (min-width: 1101px) and (max-width: 1599px) {
      .sc-section { max-width: 1000px; }
      .sc-grid { grid-template-columns: repeat(10, 74px); }
      .sc-tile { width: 74px; height: 74px; }
    }
    @media (min-width: 901px) and (max-width: 1100px) {
      .sc-section { max-width: 820px; }
      .sc-grid { grid-template-columns: repeat(8, 70px); }
      .sc-tile { width: 70px; height: 70px; }
    }
    @media (min-width: 701px) and (max-width: 900px) {
      .sc-section { max-width: 700px; padding: 0 14px; }
      .sc-grid { grid-template-columns: repeat(7, 70px); }
      .sc-tile { width: 70px; height: 70px; }
    }
    @media (max-width: 700px) {
      .sc-section { padding: 0 10px; }
      .sc-grid { grid-template-columns: repeat(5, minmax(0, 64px)); gap: 18px; }
      .sc-tile { width: 64px; height: 64px; border-width: 2.5px; }
      .sc-fav.sc-ph { font-size: 24px; }
      .sc-tile.sc-add { border-width: 2px; }
      .sc-tile.sc-add .sc-fav { font-size: 28px; }
      .sc-title { font-size: 16px; }
    }
    @media (max-width: 420px) {
      .sc-section { padding: 0 8px; }
      .sc-grid { grid-template-columns: repeat(4, minmax(0, 64px)); gap: 14px; }
      .sc-title { font-size: 15px; letter-spacing: 0.02em; }
    }
    @media (max-width: 340px) {
      .sc-grid { grid-template-columns: repeat(4, minmax(0, 56px)); gap: 12px; }
      .sc-tile { width: 56px; height: 56px; }
      .sc-fav.sc-ph { font-size: 20px; }
      .sc-menu-btn { width: 18px; height: 18px; font-size: 10px; }
    }
    @media (orientation: landscape) and (max-height: 500px) {
      .sc-section { max-width: 100%; padding: 0 16px; margin-top: 4px; }
      .sc-grid { grid-template-columns: repeat(10, minmax(0, 52px)); gap: 12px; }
      .sc-tile { width: 52px; height: 52px; border-width: 2px; }
      .sc-fav.sc-ph { font-size: 18px; }
      .sc-tile.sc-add .sc-fav { font-size: 22px; }
    }
    @media (orientation: landscape) and (max-height: 380px) {
      .sc-grid { grid-template-columns: repeat(11, minmax(0, 46px)); gap: 10px; }
      .sc-tile { width: 46px; height: 46px; }
      .sc-fav.sc-ph { font-size: 16px; }
    }

    /* 모달 */
    .sc-modal {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.4);
      backdrop-filter: blur(4px);
      z-index: 9999;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .sc-modal.sc-show { display: flex; }
    .sc-card {
      background: #fff;
      border-radius: 14px;
      padding: 22px;
      width: 100%;
      max-width: 360px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.25);
      color: #333862;
    }
    .sc-card h2 {
      margin: 0 0 16px;
      font-size: 15px;
      font-weight: 600;
    }
    .sc-field { margin-bottom: 12px; }
    .sc-field label {
      display: block;
      font-size: 11px;
      color: #777;
      margin-bottom: 5px;
    }
    .sc-field input {
      width: 100%;
      background: #fff;
      border: 1px solid #d8dae3;
      color: #1a1a1a;
      border-radius: 8px;
      padding: 9px 11px;
      font-size: 13.5px;
      font-family: inherit;
    }
    .sc-field input:focus {
      outline: none;
      border-color: #4a9eff;
      box-shadow: 0 0 0 3px rgba(74,158,255,0.15);
    }
    .sc-modal-actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
      margin-top: 16px;
    }
    .sc-modal-actions button {
      padding: 8px 14px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-size: 13px;
      font-family: inherit;
      font-weight: 500;
    }
    .sc-btn-cancel { background: #f1f1f1; color: #444; }
    .sc-btn-cancel:hover { background: #e8e8e8; }
    .sc-btn-primary { background: #4a9eff; color: #fff; }
    .sc-btn-primary:hover { background: #357fde; }
    .sc-btn-danger { background: #fdecec; color: #d33; border: 1px solid #f8c4c4; }
    .sc-btn-danger:hover { background: #fad6d6; }

    .sc-ctx {
      position: fixed;
      background: #fff;
      border: 1px solid #e5e5e5;
      border-radius: 10px;
      padding: 4px;
      z-index: 9998;
      min-width: 120px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.12);
      display: none;
    }
    .sc-ctx.sc-show { display: block; }
    .sc-ctx button {
      display: block;
      width: 100%;
      background: transparent;
      border: none;
      color: #1a1a1a;
      padding: 8px 12px;
      text-align: left;
      cursor: pointer;
      font-size: 13px;
      font-family: inherit;
      border-radius: 6px;
    }
    .sc-ctx button:hover { background: #f3f3f3; }
    .sc-ctx button.sc-danger { color: #d33; }
    .sc-ctx button.sc-danger:hover { background: #fdecec; }

    .sc-toast {

  <section class="sc-section" id="sc-root">
    <div class="sc-header">
      <h2 class="sc-title">자주가는 사이트 추가</h2>

        <button class="sc-icon-btn" id="sc-export" title="내보내기 (JSON 다운로드)" aria-label="내보내기">↓</button>
        <button class="sc-icon-btn" id="sc-import" title="가져오기 (JSON 업로드)" aria-label="가져오기">↑</button>

        </div>
        <div class="sc-field">
          <label for="sc-name">이름 (생략 가능)</label>
          <input type="text" id="sc-name" placeholder="비우면 자동" autocomplete="off">
        </div>
        <div class="sc-modal-actions">
          <button class="sc-btn-cancel" id="sc-cancel">취소</button>
          <button class="sc-btn-primary" id="sc-save">저장</button>

    <div class="sc-modal" id="sc-import-modal">
      <div class="sc-card">
        <h2>가져오기 방법</h2>
        <p style="font-size:12.5px;color:#555;margin:0 0 14px;line-height:1.6;">
          파일: <strong id="sc-import-count">N</strong>개 · 현재: <strong id="sc-current-count">N</strong>개

  <script>
  (function() {
    'use strict';
    const KEY = 'mywayShortcutsV1';
    const FAV = 'https://www.google.com/s2/favicons?sz=64&domain=';
    const SAMPLES = [
      { name: '네이버', url: 'https://www.naver.com' },
      { name: '다음', url: 'https://www.daum.net' },
      { name: '구글', url: 'https://www.google.com' },
      { name: '유튜브', url: 'https://www.youtube.com' },
      { name: '카카오', url: 'https://www.kakaocorp.com' },
    ];

    let items = [];
    let editingId = null;
    let pending = null;
    let ctxId = null;
    let dragId = null;

    const $ = (id) => document.getElementById(id);

    function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 8); }
    function normUrl(u) {
      u = (u || '').trim();
      if (!u) return '';
      if (!/^https?:\/\//i.test(u)) u = 'https://' + u;
      try { new URL(u); return u; } catch (e) { return ''; }
    }
    function dom(u) { try { return new URL(u).hostname; } catch (e) { return ''; } }
    function guess(u) { const d = dom(u); return d ? d.replace(/^www\./, '').split('.')[0] : ''; }

    function load() {
      try {
        const r = localStorage.getItem(KEY);
        if (r) { const a = JSON.parse(r); if (Array.isArray(a)) return a; }
      } catch (e) {}
      return SAMPLES.map(s => ({ id: uid(), ...s }));
    }
    function persist() { try { localStorage.setItem(KEY, JSON.stringify(items)); } catch (e) {} }

    function toast(msg) {
      const t = $('sc-toast');
      t.textContent = msg;
      t.classList.add('sc-show');
      clearTimeout(toast._t);
      toast._t = setTimeout(() => t.classList.remove('sc-show'), 1900);
    }

    function render() {
      const grid = $('sc-grid');
      grid.innerHTML = '';
      items.forEach(s => {
        const tile = document.createElement('a');
        tile.className = 'sc-tile';
        tile.href = s.url;
        tile.target = '_blank';
        tile.rel = 'noopener';
        tile.title = s.name || dom(s.url);
        tile.draggable = true;
        tile.dataset.id = s.id;

        const d = dom(s.url);
        const fav = document.createElement('div');
        fav.className = 'sc-fav';
        if (d) {
          const img = document.createElement('img');
          img.src = FAV + encodeURIComponent(d);
          img.alt = '';
          img.onerror = () => {
            fav.classList.add('sc-ph');
            fav.textContent = (s.name || d).charAt(0).toUpperCase();
          };
          fav.appendChild(img);
        } else {
          fav.classList.add('sc-ph');
          fav.textContent = (s.name || '?').charAt(0).toUpperCase();
        }
        tile.appendChild(fav);

        const mb = document.createElement('button');
        mb.className = 'sc-menu-btn';
        mb.textContent = '×';
        mb.title = '삭제 (편집은 우클릭)';
        mb.setAttribute('aria-label', '삭제');
        mb.onclick = (e) => {
          e.preventDefault(); e.stopPropagation();
          if (confirm('"' + (s.name || dom(s.url)) + '" 삭제할까요?')) {
            items = items.filter(x => x.id !== s.id);
            persist();
            render();
            toast('삭제됨');
          }
        };
        tile.appendChild(mb);

        // 우클릭으로 편집 메뉴 (편집/삭제 둘 다 가능)
        tile.addEventListener('contextmenu', (e) => {
          e.preventDefault();
          openCtx(e, s.id);
        });

        tile.addEventListener('dragstart', dStart);
        tile.addEventListener('dragover', dOver);
        tile.addEventListener('dragleave', dLeave);
        tile.addEventListener('drop', dDrop);
        tile.addEventListener('dragend', dEnd);
        grid.appendChild(tile);
      });

      const add = document.createElement('div');
      add.className = 'sc-tile sc-add';
      add.title = '새 바로가기 추가';
      add.innerHTML = '<div class="sc-fav">+</div>';
      add.onclick = () => openEdit(null);
      grid.appendChild(add);
    }

    function dStart(e) {
      dragId = this.dataset.id;
      this.classList.add('sc-dragging');
      e.dataTransfer.effectAllowed = 'move';
      try { e.dataTransfer.setData('text/plain', dragId); } catch (err) {}
    }
    function dOver(e) {
      if (!dragId || this.dataset.id === dragId) return;
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      this.classList.add('sc-drag-over');
    }
    function dLeave() { this.classList.remove('sc-drag-over'); }
    function dDrop(e) {
      e.preventDefault();
      this.classList.remove('sc-drag-over');
      if (!dragId || this.dataset.id === dragId) return;
      const f = items.findIndex(x => x.id === dragId);
      const t = items.findIndex(x => x.id === this.dataset.id);
      if (f < 0 || t < 0) return;
      const [m] = items.splice(f, 1);
      items.splice(t, 0, m);
      persist();
      render();
    }
    function dEnd() {
      document.querySelectorAll('.sc-tile').forEach(t =>
        t.classList.remove('sc-dragging', 'sc-drag-over'));
      dragId = null;
    }

    function openEdit(id) {
      editingId = id;
      const m = $('sc-edit-modal');
      const t = $('sc-modal-title');
      const u = $('sc-url');
      const n = $('sc-name');
      if (id) {
        const s = items.find(x => x.id === id);
        if (!s) return;
        t.textContent = '바로가기 편집';
        u.value = s.url;
        n.value = s.name || '';
      } else {
        t.textContent = '바로가기 추가';
        u.value = '';
        n.value = '';
      }
      m.classList.add('sc-show');
      setTimeout(() => u.focus(), 50);
    }
    function closeEdit() { $('sc-edit-modal').classList.remove('sc-show'); editingId = null; }
    function saveEdit() {
      const u = $('sc-url'), n = $('sc-name');
      const url = normUrl(u.value);
      if (!url) { toast('올바른 URL을 입력해주세요'); u.focus(); return; }
      const name = n.value.trim() || guess(url);
      if (editingId) {
        const s = items.find(x => x.id === editingId);
        if (s) { s.url = url; s.name = name; }
        toast('수정 완료');
      } else {
        items.push({ id: uid(), name, url });
        toast('추가됨');
      }
      persist();
      render();
      closeEdit();
    }

    function openCtx(e, id) {
      ctxId = id;
      const m = $('sc-ctx');
      m.style.left = Math.min(e.clientX, window.innerWidth - 140) + 'px';
      m.style.top = Math.min(e.clientY, window.innerHeight - 100) + 'px';
      m.classList.add('sc-show');
    }
    function closeCtx() { $('sc-ctx').classList.remove('sc-show'); ctxId = null; }
    document.addEventListener('click', (e) => {
      if (!e.target.closest('#sc-ctx') && !e.target.closest('.sc-menu-btn')) closeCtx();
    });
    $('sc-ctx').addEventListener('click', (e) => {
      const b = e.target.closest('button');
      if (!b || !ctxId) return;
      if (b.dataset.act === 'edit') openEdit(ctxId);
      else if (b.dataset.act === 'delete') {
        const s = items.find(x => x.id === ctxId);
        if (s && confirm('"' + (s.name || dom(s.url)) + '" 삭제할까요?')) {
          items = items.filter(x => x.id !== ctxId);
          persist();
          render();
          toast('삭제됨');
        }
      }
      closeCtx();
    });

    function doExport() {
      const data = {
        app: 'myway.kr', type: 'shortcuts', version: 1,
        exportedAt: new Date().toISOString(),
        count: items.length, shortcuts: items,
      };
      const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
      const ymd = new Date().toISOString().slice(0,10).replace(/-/g, '');
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'myway-shortcuts-' + ymd + '.json';
      document.body.appendChild(a);
      a.click();
      setTimeout(() => { URL.revokeObjectURL(a.href); a.remove(); }, 100);
      toast(items.length + '개 내보내기 완료');
    }
    function readFile(file) {
      const r = new FileReader();
      r.onload = () => {
        try {
          const d = JSON.parse(r.result);
          const arr = Array.isArray(d) ? d : (Array.isArray(d.shortcuts) ? d.shortcuts : null);
          if (!arr) throw new Error('형식 오류');
          const v = arr.filter(s => s && s.url && normUrl(s.url));
          if (!v.length) { toast('유효한 항목 없음'); return; }
          pending = v.map(s => ({ id: s.id || uid(), name: s.name || guess(s.url), url: normUrl(s.url) }));
          $('sc-import-count').textContent = pending.length;
          $('sc-current-count').textContent = items.length;
          $('sc-import-modal').classList.add('sc-show');
        } catch (e) { toast('파일 읽기 실패'); }
      };
      r.readAsText(file);
    }
    function doImport(mode) {
      if (!pending) return;
      if (mode === 'replace') {
        items = pending.map(s => ({ ...s, id: uid() }));
        toast('전체 교체: ' + items.length + '개');
      } else {
        const ex = new Set(items.map(s => s.url));
        const add = pending.filter(s => !ex.has(s.url));
        add.forEach(s => items.push({ ...s, id: uid() }));
        toast(add.length + '개 추가');
      }
      persist(); render();
      pending = null;
      $('sc-import-modal').classList.remove('sc-show');
    }

    $('sc-export').onclick = doExport;
    $('sc-import').onclick = () => $('sc-file').click();
    $('sc-file').onchange = (e) => { if (e.target.files[0]) readFile(e.target.files[0]); e.target.value = ''; };
    $('sc-clear').onclick = () => {
      if (!items.length) { toast('비어있음'); return; }
      if (confirm(items.length + '개 전부 삭제할까요?')) {
        items = []; persist(); render(); toast('모두 삭제됨');
      }
    };
    $('sc-cancel').onclick = closeEdit;
    $('sc-save').onclick = saveEdit;
    $('sc-url').addEventListener('keydown', (e) => { if (e.key === 'Enter') $('sc-name').focus(); });
    $('sc-name').addEventListener('keydown', (e) => { if (e.key === 'Enter') saveEdit(); });
    $('sc-imp-merge').onclick = () => doImport('merge');
    $('sc-imp-replace').onclick = () => doImport('replace');
    $('sc-imp-cancel').onclick = () => { pending = null; $('sc-import-modal').classList.remove('sc-show'); };
    document.querySelectorAll('.sc-modal').forEach(m => {
      m.addEventListener('click', (e) => { if (e.target === m) m.classList.remove('sc-show'); });
    });
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        document.querySelectorAll('.sc-modal.sc-show').forEach(m => m.classList.remove('sc-show'));
        closeCtx();
      }
    });

    items = load();
    render();
  })();
  </script>

    const group3 = [
      { url: "https://nol.yanolja.com/", img: "https://daoift3qrrnil.cloudfront.net/employment_companies/images/000/091/619/original/_EC_95_BC_EB_86_80_EC_9E_90__ED_94_84_EB_A1_9C_ED_95_84.png?1710895583", alt: "yanolja" },

    ];

    // 4번 그룹 (현재 비어있음)
    const group4 = [];

    /* ===== 렌더링: 한 번만 실행, resize 이벤트 의존 X ===== */
    /* CSS Grid가 자동으로 wrap을 처리하므로 JS 재계산 불필요 = 흔들림 0 */

    function renderGroup(arr) {
      if (arr.length === 0) return null;
      const row = document.createElement('div');
      row.className = "logo-row";
      arr.forEach(l => {
        const a = document.createElement('a');
        a.className = "ai-logo-wrap";
        a.href = l.url;
        a.target = "_blank";
        a.rel = "noopener noreferrer";
        const img = document.createElement('img');
        img.className = "ai-logo-img";
        img.src = l.img;
        img.alt = l.alt || "";
        img.loading = "lazy";          // 모바일 성능 최적화: 지연 로딩
        img.decoding = "async";         // 비동기 디코딩
        a.appendChild(img);
        row.appendChild(a);
      });
      return row;
    }

    function renderAll() {
      const container = document.getElementById('aiLogoContainer');
      container.innerHTML = "";

      // 1단
      const g1Title = document.createElement("div");
      g1Title.className = "group-title";
      g1Title.textContent = "";
      container.appendChild(g1Title);
      const g1 = renderGroup(group1);
      if (g1) container.appendChild(g1);

      // ★ 자주가는 사이트 추가 섹션 - g1과 g2 사이에 삽입
      const scSection = document.getElementById('sc-root');
      if (scSection) container.appendChild(scSection);

      // 2단
      const g2Title = document.createElement("div");
      g2Title.className = "group-title";
      g2Title.textContent = "";
      container.appendChild(g2Title);
      const g2 = renderGroup(group2);
      if (g2) container.appendChild(g2);

      // 3단
      const g3Title = document.createElement("div");
      g3Title.className = "group-title";
      g3Title.textContent = "";
      container.appendChild(g3Title);
      const g3 = renderGroup(group3);
      if (g3) container.appendChild(g3);

      // 4단
      const g4Title = document.createElement("div");
      g4Title.className = "group-title";
      g4Title.innerHTML = `<a href="00makingcircletext.html" target="_blank" rel="noopener noreferrer" style="color:inherit; text-decoration:none;">myway.kr</a>`;
      container.appendChild(g4Title);
      const g4 = renderGroup(group4);
      if (g4) container.appendChild(g4);
    }

    // 초기 1회만 렌더링
    renderAll();

    /* ===== resize 이벤트 처리: width 변화 시에만, 디바운스 적용 =====
       모바일에서 스크롤 시 주소창 표시/숨김으로 인한 height 변화는 무시
       → 이게 흔들림의 핵심 원인이었음 */
    let lastWidth = window.innerWidth;
    let resizeTimer = null;
    window.addEventListener('resize', () => {
      const currentWidth = window.innerWidth;
      // 너비가 실제로 변했을 때만 (모바일 스크롤 시 height만 변하는 경우는 무시)
      if (currentWidth === lastWidth) return;
      lastWidth = currentWidth;
      // 디바운스: 연속 호출 차단
      if (resizeTimer) clearTimeout(resizeTimer);
      resizeTimer = setTimeout(() => {
        // CSS Grid 사용으로 사실 재렌더 불필요하지만 안전장치로 유지
        // renderAll();  // CSS만으로 처리되므로 호출 불필요
      }, 200);
    }, { passive: true });
  </script>
