<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>MYWAY.KR HOME</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, viewport-fit=cover">
  <meta name="theme-color" content="#ffffff">
  <style>
    /* ========== 기본 안정화 ========== */
    *, *::before, *::after {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      max-width: 100%;
      overflow-x: hidden;       /* 가로 스크롤 차단 - 흔들림 방지 핵심 */
      overscroll-behavior-x: none; /* 가로 바운스 차단 */
      -webkit-text-size-adjust: 100%; /* iOS 텍스트 크기 자동조정 차단 */
    }

    html {
      /* iOS 부드러운 스크롤 */
      -webkit-overflow-scrolling: touch;
      scroll-behavior: smooth;
    }

    body {
      min-height: 100vh;
      background: #fff;
      font-family: 'Segoe UI', '맑은 고딕', Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      /* 모바일 주소창 높이 변화로 인한 점프 방지 */
      min-height: 100dvh;
    }

    /* ========== 타이틀 ========== */
    .main-title {
      margin-top: 0;
      font-size: 1.1rem;
      font-weight: 700;
      color: #333862;
      text-shadow: 0 2px 12px #ffffff99;
      margin-bottom: 8px;
      text-align: center;
      user-select: none;
    }

    .main-subtitle {
      font-size: 0.9rem;
      color: #6a739c;
      margin-bottom: 5px;
      text-align: center;
      user-select: none;
    }

    /* ========== 컨테이너 ========== */
    .container {
      width: 100%;
      max-width: 800px;
      display: flex;
      flex-direction: column;
      align-items: center;
      margin: 0 auto;
      padding: 0 12px 80px 12px;  /* 좌우 안전 여백 + 하단 여백 */
    }

    /* ========== 로고 그리드 (CSS Grid 사용으로 흔들림 원천 차단) ========== */
    .logo-row {
      display: grid;
      grid-template-columns: repeat(10, 74px);
      gap: 24px;
      justify-content: center;
      width: 100%;
      max-width: 100%;
      margin-bottom: 24px;
    }

    .ai-logo-wrap {
      width: 74px;
      height: 74px;
      border-radius: 50%;
      background: #fff;
      box-shadow: 0 3px 24px 0 #b1c7e866;
      border: 3px solid #e5e8f6;
      display: flex;
      justify-content: center;
      align-items: center;
      transition: box-shadow 0.15s, border-color 0.15s, transform 0.12s;
      cursor: pointer;
      overflow: hidden;
      margin: 0;
      text-decoration: none;
      -webkit-tap-highlight-color: transparent;  /* 모바일 탭 하이라이트 제거 */
    }

    .ai-logo-wrap:hover,
    .ai-logo-wrap:active {
      box-shadow: 0 8px 32px 0 #7e94ff99;
      border-color: #94a2ff;
      background: #f7faff;
    }

    .ai-logo-img {
      width: 54px;
      height: 54px;
      object-fit: contain;
      background: transparent;
      border-radius: 50%;
      transition: transform 0.12s;
      pointer-events: none;
      -webkit-user-drag: none;
    }

    .ai-logo-wrap:hover .ai-logo-img {
      transform: scale(1.08) rotate(-3deg);
    }

    .group-title {
      width: 100%;
      max-width: 500px;
      font-size: 1.07rem;
      font-weight: 600;
      margin: 34px 0 10px 0;
      letter-spacing: -0.5px;
      color: #244;
      text-align: center;
      padding: 0 8px;
      user-select: none;
    }

    /* ========== 반응형 (CSS만으로 처리, JS 의존 X) ========== */
    @media (max-width: 1100px) {
      .logo-row {
        grid-template-columns: repeat(7, 60px);
        gap: 14px;
      }
      .ai-logo-wrap { width: 60px; height: 60px; }
      .ai-logo-img { width: 40px; height: 40px; }
    }

    @media (max-width: 900px) {
      .main-title { font-size: 1.35rem; margin-top: 24px; }
      .main-subtitle { font-size: 1.07rem; }
      .logo-row {
        grid-template-columns: repeat(5, 52px);
        gap: 10px;
      }
      .ai-logo-wrap { width: 52px; height: 52px; }
      .ai-logo-img { width: 34px; height: 34px; }
    }

    @media (max-width: 700px) {
      .container { padding: 0 8px 60px 8px; }
      .logo-row {
        grid-template-columns: repeat(4, minmax(0, 78px));
        gap: 12px;
        justify-content: center;
      }
      .ai-logo-wrap { width: 78px; height: 78px; }
      .ai-logo-img { width: 60px; height: 60px; }
    }

    @media (max-width: 500px) {
      .main-title { font-size: 1rem; }
      .main-subtitle { font-size: 0.95rem; }
      .container { padding: 0 6px 50px 6px; }
      .logo-row {
        grid-template-columns: repeat(3, minmax(0, 80px));
        gap: 10px;
      }
      .ai-logo-wrap { width: 70px; height: 70px; }
      .ai-logo-img { width: 52px; height: 52px; }
    }

    @media (max-width: 360px) {
      .logo-row {
        grid-template-columns: repeat(3, minmax(0, 70px));
        gap: 8px;
      }
      .ai-logo-wrap { width: 62px; height: 62px; }
      .ai-logo-img { width: 46px; height: 46px; }
    }
  </style>
</head>

    /* ===== 렌더링: 한 번만 실행, resize 이벤트 의존 X ===== */
    /* CSS Grid가 자동으로 wrap을 처리하므로 JS 재계산 불필요 = 흔들림 0 */

    function renderGroup(arr) {
      if (arr.length === 0) return null;
      const row = document.createElement('div');
      row.className = "logo-row";
      arr.forEach(l => {
        const a = document.createElement('a');
        a.className = "ai-logo-wrap";
        a.href = l.url;
        a.target = "_blank";
        a.rel = "noopener noreferrer";
        const img = document.createElement('img');
        img.className = "ai-logo-img";
        img.src = l.img;
        img.alt = l.alt || "";
        img.loading = "lazy";          // 모바일 성능 최적화: 지연 로딩
        img.decoding = "async";         // 비동기 디코딩
        a.appendChild(img);
        row.appendChild(a);
      });
      return row;
    }

    function renderAll() {
      const container = document.getElementById('aiLogoContainer');
      container.innerHTML = "";

      // 1단
      const g1Title = document.createElement("div");
      g1Title.className = "group-title";
      g1Title.textContent = "";
      container.appendChild(g1Title);
      const g1 = renderGroup(group1);
      if (g1) container.appendChild(g1);

      // 2단
      const g2Title = document.createElement("div");
      g2Title.className = "group-title";
      g2Title.textContent = "";
      container.appendChild(g2Title);
      const g2 = renderGroup(group2);
      if (g2) container.appendChild(g2);

      // 3단
      const g3Title = document.createElement("div");
      g3Title.className = "group-title";
      g3Title.textContent = "";
      container.appendChild(g3Title);
      const g3 = renderGroup(group3);
      if (g3) container.appendChild(g3);

      // 4단
      const g4Title = document.createElement("div");
      g4Title.className = "group-title";
      g4Title.innerHTML = `<a href="00makingcircletext.html" target="_blank" rel="noopener noreferrer" style="color:inherit; text-decoration:none;">myway.kr</a>`;
      container.appendChild(g4Title);
      const g4 = renderGroup(group4);
      if (g4) container.appendChild(g4);
    }

    // 초기 1회만 렌더링
    renderAll();

    /* ===== resize 이벤트 처리: width 변화 시에만, 디바운스 적용 =====
       모바일에서 스크롤 시 주소창 표시/숨김으로 인한 height 변화는 무시
       → 이게 흔들림의 핵심 원인이었음 */
    let lastWidth = window.innerWidth;
    let resizeTimer = null;
    window.addEventListener('resize', () => {
      const currentWidth = window.innerWidth;
      // 너비가 실제로 변했을 때만 (모바일 스크롤 시 height만 변하는 경우는 무시)
      if (currentWidth === lastWidth) return;
      lastWidth = currentWidth;
      // 디바운스: 연속 호출 차단
      if (resizeTimer) clearTimeout(resizeTimer);
      resizeTimer = setTimeout(() => {
        // CSS Grid 사용으로 사실 재렌더 불필요하지만 안전장치로 유지
        // renderAll();  // CSS만으로 처리되므로 호출 불필요
      }, 200);
    }, { passive: true });
  </script>
</body>
</html>
