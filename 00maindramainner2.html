    .topbar {

    @media (min-width: 721px) {

    /* ===== 안내 정보 (핀 로고 + 팝오버) ===== */
    .info-wrap {

      flex: 0 0 auto;
      line-height: 0;
    }
    .info-btn {
      width: 30px;
      height: 36px;
      border: none;
      background: transparent;
      color: #2DBAC0;       /* 핀 색상 (청록) */
      cursor: pointer;
      padding: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      -webkit-tap-highlight-color: transparent;
      transition: transform .15s, color .15s;
      filter: drop-shadow(0 2px 4px rgba(45,186,192,.35));
      /* 모바일 흔들림 방지: 합성 레이어 분리 */
      transform: translateZ(0);
    }
    /* 모바일에서 hover 상태가 잠금되며 흔들림 발생 - 마우스 환경에서만 hover transform */
    @media (hover: hover) {
      .info-btn:hover { color: #1f9ea2; transform: translateY(-2px); }
    }
    .info-btn.is-open { color: #16797d; }
    .info-btn:active { transform: translateY(0) scale(0.95); }
    .info-btn svg { width: 100%; height: 100%; display: block; }

    /* 첫 진입 시 3번 펄스 (시선 유도) */
    @keyframes info-pulse {
      0%, 100% { transform: scale(1); }
      50%      { transform: scale(1.18); }
    }
    .info-btn.pulse {
      animation: info-pulse 0.55s ease-in-out 3;
      transform-origin: center bottom;
    }

    .info-popover {
      position: absolute;
      top: calc(100% + 10px);
      left: 50%;
      transform: translateX(-50%) translateY(-4px);
      width: 290px;
      background: #fff;
      border: 1px solid #eef0f4;
      border-radius: 10px;
      box-shadow: 0 8px 24px rgba(31,39,64,.18), 0 2px 6px rgba(0,0,0,.06);
      padding: 12px 14px;
      font-size: .85rem;
      line-height: 1.55;
      color: #4a5170;
      z-index: 30;
      opacity: 0;
      visibility: hidden;
      transition: opacity .15s, transform .15s, visibility .15s;
      pointer-events: none;
      text-align: left;
    }
    /* 호버(PC) 또는 클릭(.is-open) 시 모두 열림 */
    .info-wrap:hover .info-popover,
    .info-popover.is-open {
      opacity: 1;
      visibility: visible;
      transform: translateX(-50%) translateY(0);
      pointer-events: auto;
    }
    .info-popover::before {
      content: "";
      position: absolute;
      top: -6px;
      left: 50%;
      margin-left: -6px;
      width: 12px; height: 12px;
      background: #fff;
      border-top: 1px solid #eef0f4;
      border-left: 1px solid #eef0f4;
      transform: rotate(45deg);

      padding-top: 8px;

    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 24px 16px;
      width: 100%;

    /* 카테고리 필터 - JS 재렌더 없이 CSS만으로 토글 */

    .gallery[data-active="sbs"] > [data-ch]:not([data-ch="sbs"]) { display: none; }
    .gallery[data-active="cha"] > [data-ch]:not([data-ch="cha"]) { display: none; }

    /* 카드 */
    .list-row {
      display: flex;
      flex-direction: column;
      width: 100%;
      margin: 0;
    }
    .imgframe {
      width: 100%;
      /* 기본 portrait 비율 (200:283 ≈ 2:2.83) — 이미지 로드 전에도 자리 고정 */
      aspect-ratio: 200 / 283;
      background: #fff;
      box-shadow: 0 6px 6px 0 rgba(90,90,130,0.11);
      overflow: hidden;
      position: relative;
    }
    /* landscape 오버라이드 */
    .list-row.box-landscape .imgframe {
      aspect-ratio: 283 / 200;
    }
    .imgframe a {
      display: block;
      width: 100%; height: 100%;
    }
    .imgframe img {
      display: block;
      width: 100%; height: 100%;
      object-fit: contain;
      background: #fff;
    }
    .shadow-line {
      text-align: center;
      margin: 0;
      padding: 0;
      max-width: 100%;
      overflow: hidden;
    }
    .shadow-line img {
      display: block;
      margin: 0 auto;
      width: 95%;
      height: 20px;
      pointer-events: none;
    }

    /* 반응형 컬럼 */
    @media (max-width: 900px) {
      .gallery { grid-template-columns: repeat(auto-fill, minmax(170px, 1fr)); gap: 20px 14px; }
    }
    @media (max-width: 600px) {
      .gallery { grid-template-columns: repeat(2, 1fr); gap: 18px 12px; }

    }
    @media (max-width: 360px) {
      .gallery { grid-template-columns: repeat(2, 1fr); gap: 14px 8px; }

    /* ===== VOD iframe 영역 (네비 외부 링크 클릭 시 표시) ===== */
    /* ===== VOD iframe 영역: position:fixed로 viewport 전체 차지 (inner.html 방식) ===== */
    .vod-frame-wrap {
      position: fixed;
      left: 0;
      top: 60px;
      width: 100vw;
      /* 높이 fallback 체인 (구버전 모바일 호환): vh → dvh → svh */
      height: calc(100vh - 60px);          /* 구버전 모바일 fallback */
      height: calc(100dvh - 60px);         /* 최신 - 동적 viewport */
      height: calc(100svh - 60px);         /* 최신 - small viewport */
      z-index: 10;
      background: #f5f7fa;
      overflow: hidden;
      display: none;                       /* 기본 숨김 - class로 토글 */
      -webkit-overflow-scrolling: touch;   /* iOS 스크롤 부드럽게 */
    }
    .vod-frame-wrap.is-open { display: block; }
    .vod-frame-wrap iframe {
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
    }
    /* vod-mode일 때 갤러리/라벨/footer 숨김 (iframe 풀화면) */
    body.vod-mode .gallery-label-wrap,

    (function(){

        if (tag === 'input' || tag === 'textarea') return true;
        if (t.isContentEditable) return true;
        return false;
      }
      ['contextmenu','dragstart','selectstart','copy','cut'].forEach(ev => {
        document.addEventListener(ev, e => {
          if (isEditable(e.target)) return;
          e.preventDefault();
        }, { capture: true });

        if (isEditable(e.target)) return;

    const labels = { kbs: 'KBS 무료 VOD 모음', sbs: 'SBS 무료 VOD 모음', cha: '채널A 무료 VOD 모음' };
    const shadowUrl = "https://64.media.tumblr.com/f5f06009df6584ebb5539cad61f73c63/tumblr_inline_qsghz3XZRQ1r45nlo_500.png";

    /* ============ 렌더링 (1회만) ============ */
    function renderAll() {
      const root = document.getElementById('gallery');
      const frag = document.createDocumentFragment();
      Object.keys(vodData).forEach(ch => {
        vodData[ch].forEach(item => {
          const row = document.createElement('div');
          row.className = 'list-row';
          row.dataset.ch = ch;
          row.innerHTML =
            '<div class="imgframe">' +
              '<a href="' + item.url + '" target="_blank" rel="noopener">' +
                '<img loading="lazy" decoding="async" referrerpolicy="no-referrer" src="' + item.img + '" alt="">' +
              '</a>' +
            '</div>' +
            '<div class="shadow-line"><img src="' + shadowUrl + '" alt=""></div>';
          frag.appendChild(row);
        });
      });
      root.replaceChildren(frag);

      /* 이미지 로드 후 landscape 비율 적용 — aspect-ratio가 미리 잡혀 있으니 깜빡임 최소 */
      root.querySelectorAll('.list-row').forEach(row => {
        const img = row.querySelector('img');
        function check() {
          if (img.naturalWidth && img.naturalHeight) {
            if (img.naturalWidth > img.naturalHeight) {
              row.classList.add('box-landscape');
            }
          }
        }
        if (img.complete) check();
        else img.addEventListener('load', check, { once: true });
      });
    }

    /* ============ 채널 카운트 ============ */
    function updateCounts() {
      ['kbs','sbs','cha'].forEach(ch => {
        const el = document.getElementById('cnt-' + ch);
        if (el) el.textContent = (vodData[ch] || []).length;
      });
    }

    /* ============ 네비 동작 ============ */
    function setupNav() {
      const nav = document.getElementById('catNav');
      const gallery = document.getElementById('gallery');
      const label = document.getElementById('galleryLabel');
      const frameWrap = document.getElementById('vodFrameWrap');
      const frame = document.getElementById('vodFrame');

      nav.addEventListener('click', e => {
        /* ─── A. 외부 VOD 링크 (.cat-link) 클릭 → iframe 모드 ─── */
        const link = e.target.closest('a.cat-link');
        if (link) {
          e.preventDefault();
          /* iframe에 해당 URL 로드 + 표시 */
          frame.src = link.href;
          frameWrap.classList.add('is-open');
          document.body.classList.add('vod-mode');
          /* 활성 표시: 카테고리/VOD 통합 토글 */
          nav.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('is-active'));
          link.classList.add('is-active');
          /* 가운데 스크롤 + 상단으로 */
          link.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
          window.scrollTo({ top: 0, behavior: 'smooth' });
          return;
        }

        /* ─── B. 카테고리 버튼 (data-ch 있는 button) 클릭 → 갤러리 모드 ─── */
        const btn = e.target.closest('.cat-btn[data-ch]');
        if (!btn) return;
        /* iframe 모드 해제 */
        if (document.body.classList.contains('vod-mode')) {
          document.body.classList.remove('vod-mode');
          frameWrap.classList.remove('is-open');
          frame.src = '';  /* 메모리/네트워크 해제 */
        }
        const ch = btn.dataset.ch;
        nav.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('is-active'));
        btn.classList.add('is-active');
        gallery.dataset.active = ch;
        label.textContent = labels[ch];
        /* 채널 전환 시 페이지 상단으로 스크롤 + 클릭 버튼 가운데로 */
        window.scrollTo({ top: 0, behavior: 'smooth' });
        btn.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
      });
    }

    renderAll();
    updateCounts();
    setupNav();

    /* ============ 안내 팝오버 토글 ============ */
    (function(){
      const btn = document.getElementById('infoBtn');
      const pop = document.getElementById('infoPopover');
      if (!btn || !pop) return;

      function setOpen(open) {
        btn.classList.toggle('is-open', open);
        pop.classList.toggle('is-open', open);
        btn.setAttribute('aria-expanded', open ? 'true' : 'false');
      }
      btn.addEventListener('click', e => {
        e.stopPropagation();
        setOpen(!pop.classList.contains('is-open'));
      });
      document.addEventListener('click', e => {
        if (!pop.classList.contains('is-open')) return;
        if (e.target === btn || btn.contains(e.target)) return;
        if (pop.contains(e.target)) return;
        setOpen(false);
      });
      document.addEventListener('keydown', e => {
        if (e.key === 'Escape' && pop.classList.contains('is-open')) setOpen(false);
      });

      /* 진입 시 시선 유도 펄스 (애니메이션 종료 후 클래스 제거) */
      window.addEventListener('load', () => {
        setTimeout(() => {
          btn.classList.add('pulse');
          btn.addEventListener('animationend', () => btn.classList.remove('pulse'), { once: true });
        }, 600);
      });
