  <script>
    /* @CONFIG */
    const IS_DIST = true;

    const DIST_SIG = "sig1782269950102";

    const DATA_KIND = 'myway-people-v1';   // JSON 식별자 — 다른 도구 JSON과 섞임 방지
    let _distChecked = false;
    function ensureDistFresh(){
      if(_distChecked || !IS_DIST) return; _distChecked = true;
      try{ var sk = STORE_KEY+'_sig'; if(localStorage.getItem(sk) !== DIST_SIG){ localStorage.setItem(sk, DIST_SIG); localStorage.removeItem(STORE_KEY); localStorage.removeItem(STORE_KEY+'_cats'); } }catch(_){}
    }

    /* ============ 복제방지 ============ */
    (function(){
      if(typeof COPY_PROTECT !== 'undefined' && !COPY_PROTECT) return;
      function isEditable(t) {
        if (!t) return false;
        const tag = (t.tagName || '').toLowerCase();
        if (tag === 'input' || tag === 'textarea') return true;
        if (t.isContentEditable) return true;
        return false;
      }
      ['contextmenu','dragstart','selectstart','copy','cut'].forEach(ev => {
        document.addEventListener(ev, e => {
          if (isEditable(e.target)) return;
          e.preventDefault();
        }, { capture: true });
      });
      document.addEventListener('keydown', e => {
        if (isEditable(e.target)) return;
        const k = (e.key || '').toLowerCase();
        if (k === 'f12') { e.preventDefault(); return; }
        if (e.ctrlKey && e.shiftKey && (k === 'i' || k === 'j' || k === 'c')) { e.preventDefault(); return; }
        if (e.ctrlKey && !e.shiftKey && (k === 'u' || k === 's' || k === 'c' || k === 'x' || k === 'a')) { e.preventDefault(); return; }
      }, { capture: true });
    })();

    /* ===== 카테고리(네비) 데이터 ===== */
    /* @CATS_START */
    const DEFAULT_CATS = [
      { code:"youtuber", label:"유튜버" },
      { code:"singer", label:"가수" },
      { code:"celeb", label:"연예인" },
      { code:"actor", label:"배우" },
    ];
    /* @CATS_END */
    function coerceCats(p){
      if(!Array.isArray(p)) return null;
      var out = p.filter(x=>x && typeof x==='object' && x.code).map(x=>({ code:String(x.code), label:String(x.label||x.code) }));
      return out.length ? out : null;
    }
    function loadCats(){
      ensureDistFresh();
      try{ var raw=localStorage.getItem(STORE_KEY+'_cats'); if(raw){ var c=coerceCats(JSON.parse(raw)); if(c) return c; } }catch(_){}
      return DEFAULT_CATS.map(c=>({ code:c.code, label:c.label }));
    }
    function saveCats(){ try{ localStorage.setItem(STORE_KEY+'_cats', JSON.stringify(CATS)); }catch(_){} }
    function catLabel(code){ var c=CATS.find(x=>x.code===code); return c?c.label:code; }

    /* ===== 인물 데이터 로드/저장 (편집 데이터 우선) ===== */
    function coercePeople(p){
      if(!Array.isArray(p)) return null;
      var out = p.filter(x=>x && typeof x==='object').map(x=>({
        name: String(x.name||''),
        cats: Array.isArray(x.cats) ? x.cats.map(String) : [],
        url:  String(x.url||''),
        img:  String(x.img||'')
      }));
      return out.length ? out : null;
    }
    function clonePeople(arr){ return arr.map(x=>({ name:x.name, cats:(x.cats||[]).slice(), url:x.url, img:x.img })); }
    function loadPeople(){
      ensureDistFresh();
      try{ var raw=localStorage.getItem(STORE_KEY); if(raw){ var c=coercePeople(JSON.parse(raw)); if(c) return c; } }catch(_){}
      return clonePeople(DEFAULT_PEOPLE);
    }
    function savePeople(){ try{ localStorage.setItem(STORE_KEY, JSON.stringify(people)); }catch(_){} }
    let people = loadPeople();
    let CATS = loadCats();
    let curFilter = 'all';
    let editMode = false, toolOpen = false;

    /* ============ 갤러리 렌더 (1회) ============ */
    function renderGallery() {
      const root = document.getElementById('masonryGallery');
      const frag = document.createDocumentFragment();
      people.forEach((p, idx) => {
        const a = document.createElement('a');
        a.className = 'card';
        a.href = p.url || '#';
        a.target = '_blank';
        a.rel = 'noopener';
        a.dataset.cats = (p.cats || []).join(' ');
        a.setAttribute('aria-label', p.name);

        const img = document.createElement('img');
        img.src = p.img;
        img.alt = p.name;
        img.loading = 'lazy';
        img.decoding = 'async';
        img.referrerPolicy = 'no-referrer';
        a.appendChild(img);

        const cap = document.createElement('div');
        cap.className = 'cap';
        cap.textContent = p.name;
        a.appendChild(cap);

        if (SHOW_EDIT) {
          const ctrl = document.createElement('div');
          ctrl.className = 'card-ctrl';
          const mk = (t, title, fn, cls) => {
            const b = document.createElement('button');
            b.type = 'button'; b.textContent = t; b.title = title; if(cls) b.className = cls;
            b.onclick = e => { e.preventDefault(); e.stopPropagation(); fn(); };
            return b;
          };
          ctrl.appendChild(mk('◀', '왼쪽으로', () => moveItem(idx, -1)));
          ctrl.appendChild(mk('✏', '수정', () => openDlg(idx)));
          ctrl.appendChild(mk('✕', '삭제', () => deleteItem(idx), 'del'));
          ctrl.appendChild(mk('▶', '오른쪽으로', () => moveItem(idx, 1)));
          a.appendChild(ctrl);
          a.addEventListener('click', e => { if(editMode) e.preventDefault(); });
        }

        frag.appendChild(a);
      });
      root.replaceChildren(frag);
      refreshNav();
    }

    /* ============ 카테고리 네비 (동적) ============ */
    function applyFilter(code){
      curFilter = code;
      var cards = document.querySelectorAll('#masonryGallery .card');
      cards.forEach(function(c){
        var cats = (c.dataset.cats||'').split(/\s+/);
        c.style.display = (code==='all' || cats.indexOf(code)>=0) ? '' : 'none';
      });
      var sub=document.getElementById('filterSub'); if(sub) sub.textContent = (code==='all' ? '전체' : catLabel(code));
      try { sessionStorage.setItem('mywayCat_people2', code); } catch(_) {}
    }
    function buildCatNav(){
      var nav=document.getElementById('catNav'); nav.innerHTML='';
      function mkBtn(code,label,count){
        var b=document.createElement('button');
        b.className='cat-btn'+(curFilter===code?' is-active':'');
        b.dataset.cat=code;
        var c=document.createElement('span'); c.className='count'; c.textContent=(count==null?'':count);
        b.appendChild(document.createTextNode(label+' ')); b.appendChild(c);
        b.onclick=function(){ curFilter=code; nav.querySelectorAll('.cat-btn').forEach(function(x){x.classList.remove('is-active');}); b.classList.add('is-active'); applyFilter(code); };
        return b;
      }
      nav.appendChild(mkBtn('all','전체', people.length));
      CATS.forEach(function(cat){
        var n=people.filter(function(p){ return (p.cats||[]).indexOf(cat.code)>=0; }).length;
        nav.appendChild(mkBtn(cat.code, cat.label, n));
      });
    }
    function refreshNav(){ buildCatNav(); applyFilter(curFilter); }

    /* ============ 보정 프리셋 (제거됨) ============ */

    /* ===== 편집 동작 ===== */
    function moveItem(i, dir){ const ni=i+dir; if(ni<0||ni>=people.length) return; const t=people[i]; people[i]=people[ni]; people[ni]=t; savePeople(); renderGallery(); }
    function deleteItem(i){ if(!confirm('이 항목을 삭제할까요?\n'+people[i].name)) return; people.splice(i,1); savePeople(); renderGallery(); }

    /* ===== 추가/수정 모달 ===== */
    let dlgEdit = null;
    const dlgBack = document.getElementById('dlgBack');
    function renderCatChecks(sel){
      const box = document.getElementById('dlgCats'); box.innerHTML='';
      if(!CATS.length){ box.textContent='(카테고리가 없어요 — 먼저 🧭 카테고리편집에서 추가하세요)'; return; }
      CATS.forEach(c=>{
        const lab=document.createElement('label');
        const cb=document.createElement('input'); cb.type='checkbox'; cb.value=c.code; cb.checked=sel.indexOf(c.code)>=0;
        lab.appendChild(cb); lab.appendChild(document.createTextNode(c.label));
        box.appendChild(lab);
      });
    }
    function openDlg(idx){
      dlgEdit = (idx==null ? null : idx);
      document.getElementById('dlgTitle').textContent = (idx==null ? '항목 추가' : '항목 수정');
      const p = (idx==null ? {name:'',cats:[],url:'',img:''} : people[idx]);
      document.getElementById('dlgName').value = p.name;
      document.getElementById('dlgUrl').value  = p.url;
      document.getElementById('dlgImg').value  = p.img;
      renderCatChecks(p.cats||[]);
      dlgBack.classList.add('show');
    }
    function closeDlg(){ dlgBack.classList.remove('show'); dlgEdit=null; }
    document.getElementById('dlgCancel').onclick = closeDlg;
    dlgBack.addEventListener('click', e=>{ if(e.target===dlgBack) closeDlg(); });
    document.getElementById('dlgOk').onclick = function(){
      const name = document.getElementById('dlgName').value.trim();
      let url    = document.getElementById('dlgUrl').value.trim();
      const img  = document.getElementById('dlgImg').value.trim();
      const cats = Array.prototype.slice.call(document.querySelectorAll('#dlgCats input:checked')).map(c=>c.value);
      if(!name){ alert('이름을 입력해 주세요.'); return; }
      if(!url){ alert('URL을 입력해 주세요.'); return; }
      if(!/^https?:\/\//i.test(url)) url='https://'+url;
      const rec = { name:name, cats:cats, url:url, img:img };
      if(dlgEdit==null) people.push(rec); else people[dlgEdit]=rec;
      savePeople(); renderGallery(); closeDlg();
    };

    /* ===== 카테고리(네비) 편집 ===== */
    const catBack=document.getElementById('catBack');
    function openCatMgr(){ renderCatList(); catBack.classList.add('show'); }
    function closeCatMgr(){ catBack.classList.remove('show'); }
    function renderCatList(){
      const list=document.getElementById('catList'); list.innerHTML='';
      function mk(t,fn,cls){ const b=document.createElement('button'); b.type='button'; b.textContent=t; if(cls)b.className=cls; b.onclick=fn; return b; }
      if(!CATS.length){ const e=document.createElement('div'); e.style.cssText='color:#8590ad;font-size:.85rem;padding:6px 2px'; e.textContent='카테고리가 없어요. 아래에서 추가하세요.'; list.appendChild(e); }
      CATS.forEach((c,i)=>{
        const row=document.createElement('div'); row.className='nav-row';
        const nm=document.createElement('div'); nm.className='nm'; nm.textContent=c.label;
        row.appendChild(mk('▲',()=>moveCat(i,-1)));
        row.appendChild(mk('▼',()=>moveCat(i,1)));
        row.appendChild(nm);
        row.appendChild(mk('✏',()=>renameCat(i)));
        row.appendChild(mk('✕',()=>deleteCat(i),'del'));
        list.appendChild(row);
      });
    }
    function newCatCode(label){
      var base=String(label||'').toLowerCase().replace(/[^a-z0-9]+/g,''); if(!base) base='cat';
      var code=base, i=2; while(CATS.some(c=>c.code===code)) code=base+(i++); return code;
    }
    function moveCat(i,dir){ const ni=i+dir; if(ni<0||ni>=CATS.length) return; const t=CATS[i]; CATS[i]=CATS[ni]; CATS[ni]=t; saveCats(); buildCatNav(); renderCatList(); }
    function renameCat(i){ const v=prompt('카테고리 이름', CATS[i].label); if(v===null) return; const nv=v.trim(); if(!nv) return; CATS[i].label=nv; saveCats(); buildCatNav(); renderCatList(); if(curFilter===CATS[i].code) applyFilter(curFilter); }
    function deleteCat(i){ if(!confirm('이 카테고리를 삭제할까요?\n['+CATS[i].label+']\n인물 데이터는 유지돼요.')) return; const removed=CATS[i].code; CATS.splice(i,1); if(curFilter===removed) curFilter='all'; saveCats(); buildCatNav(); renderCatList(); applyFilter(curFilter); }
    function addCat(){ const v=prompt('새 카테고리 이름 (예: 코미디언)'); if(v===null) return; const nv=v.trim(); if(!nv) return; CATS.push({ code:newCatCode(nv), label:nv }); saveCats(); buildCatNav(); renderCatList(); }
    document.getElementById('catAdd').onclick=addCat;
    document.getElementById('catClose').onclick=closeCatMgr;
    catBack.addEventListener('click',e=>{ if(e.target===catBack) closeCatMgr(); });

    /* ===== 내보내기 / 가져오기 ===== */
    function exportData(){
      const payload = { kind:DATA_KIND, cats:CATS, people:people };
      const blob = new Blob([JSON.stringify(payload,null,2)], {type:'application/json'});
      const a = document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='myway-people.json'; a.click();
      setTimeout(()=>URL.revokeObjectURL(a.href),1500);
    }
    function importData(){
      const inp=document.createElement('input'); inp.type='file'; inp.accept='.json,.html,.htm,text/html,application/json';
      inp.onchange=()=>{
        const f=inp.files[0]; if(!f) return;
        const r=new FileReader();
        r.onload=()=>{
          let arr=null, cats=null, foreignKind=null;
          const txt=String(r.result).replace(/^\uFEFF/, '').trim();   // BOM 제거
          // 1) JSON 우선
          try{
            const p=JSON.parse(txt);
            if(Array.isArray(p)){
              // 배열만 온 경우: code만 있으면 카테고리, 아니면 인물로 추정
              if(p.length && p[0] && p[0].code && !p[0].name && !p[0].url && !p[0].img) cats=coerceCats(p);
              else arr=coercePeople(p);
            } else if(p && typeof p==='object'){
              if(p.kind && p.kind!==DATA_KIND) foreignKind=p.kind;   // 거부 대신 표시만
              arr  = coercePeople(p.people || p.items || p.data || p.list);
              cats = coerceCats(p.cats || p.categories || p.nav);
            }
          }catch(_){}
          // 2) HTML 파일에서 추출 (마커 유무와 무관하게)
          if(!arr){ const m=txt.match(/DEFAULT_PEOPLE\s*=\s*(\[[\s\S]*?\])\s*;/); if(m){ try{ arr=coercePeople(eval('('+m[1]+')')); }catch(_){} } }
          if(!cats){ const mc=txt.match(/DEFAULT_CATS\s*=\s*(\[[\s\S]*?\])\s*;/); if(mc){ try{ cats=coerceCats(eval('('+mc[1]+')')); }catch(_){} } }
          if(!arr && !cats){ alert('읽을 수 있는 인물/카테고리 데이터가 없어요.'); return; }
          if(foreignKind){
            if(!confirm('다른 도구에서 만든 JSON일 수 있어요. (종류: '+foreignKind+')\n그래도 가져올까요?')) return;
          }
          let msg=[];
          if(cats){ CATS=cats; saveCats(); curFilter='all'; msg.push('카테고리 '+CATS.length+'개'); }
          if(arr){ people=arr; savePeople(); msg.push('항목 '+people.length+'개'); }
          buildCatNav(); renderGallery();
          alert('가져왔어요. '+(msg.join(' · ')||'(변경 없음)'));
        };
        r.readAsText(f);
      };
      inp.click();
    }

    /* ===== 편집 도구 FAB ===== */
    function closeTool(){ toolOpen=false; var m=document.querySelector('.tool-menu'); if(m)m.classList.remove('open'); var f=document.querySelector('.tool-fab'); if(f)f.classList.remove('open'); }
    function buildToolbar(){
      if(!SHOW_EDIT) return;
      var tb=document.getElementById('editToolbar'); tb.innerHTML='';
      var fab=document.createElement('button'); fab.type='button'; fab.className='tool-fab'+(editMode?' editing':''); fab.title='편집 도구';
      fab.innerHTML = toolOpen
        ? '<svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M18 6 6 18M6 6l12 12"/></svg>'
        : '<svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4 12.5-12.5z"/></svg>';
      var menu=document.createElement('div'); menu.className='tool-menu'+(toolOpen?' open':'');
      var mk=function(label,fn,cls){ var b=document.createElement('button'); b.type='button'; b.className='tb-btn'+(cls?' '+cls:''); b.textContent=label; b.addEventListener('click',function(e){ e.stopPropagation(); fn(); }); return b; };
      menu.appendChild(mk(editMode?'✏ 편집 끝':'✏ 편집', function(){ editMode=!editMode; document.body.classList.toggle('editing',editMode); renderGallery(); buildToolbar(); }, editMode?'on':''));
      menu.appendChild(mk('＋ 항목추가', function(){ openDlg(null); closeTool(); }));
      menu.appendChild(mk('🧭 카테고리편집', function(){ openCatMgr(); closeTool(); }));
      menu.appendChild(mk('📥 가져오기', function(){ importData(); closeTool(); }));
      menu.appendChild(mk('📤 내보내기', function(){ exportData(); closeTool(); }));
      if(!IS_DIST) menu.appendChild(mk('</> 코드', function(){ openCode(); closeTool(); }, 'code'));
      fab.addEventListener('click', function(e){ e.stopPropagation(); toolOpen=!toolOpen; buildToolbar(); });
      tb.appendChild(fab); tb.appendChild(menu);
    }

    /* ===== 코드 / 파일 저장 ===== */
    const codeBack=document.getElementById('codeBack');
    function openCode(){ codeBack.classList.add('show'); }
    function closeCode(){ codeBack.classList.remove('show'); }
    document.getElementById('codeClose').onclick=closeCode;
    codeBack.addEventListener('click',e=>{ if(e.target===codeBack) closeCode(); });
    function serializePeople(arr){
      let out='[\n';
      arr.forEach(p=>{ out+='      { name:'+JSON.stringify(p.name)+', cats:'+JSON.stringify(p.cats)+', url:'+JSON.stringify(p.url)+', img:'+JSON.stringify(p.img)+' },\n'; });
      out+='    ]'; return out;
    }
    function serializeCats(arr){
      let out='[\n';
      arr.forEach(c=>{ out+='      { code:'+JSON.stringify(c.code)+', label:'+JSON.stringify(c.label)+' },\n'; });
      out+='    ]'; return out;
    }
    function buildHTML(cfg){
      const clone=document.documentElement.cloneNode(true);
      const g=clone.querySelector('#masonryGallery'); if(g) g.innerHTML='';
      const cn=clone.querySelector('#catNav'); if(cn) cn.innerHTML='';
      const cl=clone.querySelector('#catList'); if(cl) cl.innerHTML='';
      const et=clone.querySelector('#editToolbar'); if(et) et.innerHTML='';
      ['#dlgBack','#codeBack','#catBack'].forEach(id=>{ const m=clone.querySelector(id); if(m) m.classList.remove('show'); });
      const dc=clone.querySelector('#dlgCats'); if(dc) dc.innerHTML='';
      const ca=clone.querySelector('#codeArea'); if(ca) ca.value='';
      let html='<!DOCTYPE html>\n'+clone.outerHTML;
      html=html.replace(/\/\* @DATA_START \*\/[\s\S]*?\/\* @DATA_END \*\//,
        '/* @DATA_START */\n    const DEFAULT_PEOPLE = '+serializePeople(people)+';\n    /* @DATA_END */');
      html=html.replace(/\/\* @CATS_START \*\/[\s\S]*?\/\* @CATS_END \*\//,
        '/* @CATS_START */\n    const DEFAULT_CATS = '+serializeCats(CATS)+';\n    /* @CATS_END */');
      html=html.replace(/\/\* @CONFIG \*\/[\s\S]*?\/\* @CONFIG_END \*\//,
        '/* @CONFIG */\n    const IS_DIST = '+cfg.dist+';\n    const SHOW_EDIT = '+cfg.edit+';\n    const COPY_PROTECT = '+cfg.prot+';\n    const STORE_KEY = '+JSON.stringify(cfg.key)+';\n    const DIST_SIG = '+JSON.stringify(cfg.sig)+';\n    /* @CONFIG_END */');
      return html;
    }
    function dl(name,html){ const blob=new Blob([html],{type:'text/html'}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=name; a.click(); setTimeout(()=>URL.revokeObjectURL(a.href),1500); }
    document.getElementById('saveEdit').onclick=function(){ dl('people2-edit.html', buildHTML({dist:true,edit:true,prot:false,key:'mywayPeopleDirV1_dist',sig:'sig'+Date.now()})); closeCode(); };
    document.getElementById('saveView').onclick=function(){ dl('people2-view.html', buildHTML({dist:false,edit:false,prot:true,key:'mywayPeopleDirV1',sig:''})); closeCode(); };
    document.getElementById('copyCode').onclick=function(){
      const code='const DEFAULT_CATS = '+serializeCats(CATS)+';\n\nconst DEFAULT_PEOPLE = '+serializePeople(people)+';';
      const ta=document.getElementById('codeArea'); ta.value=code; ta.style.pointerEvents='auto'; ta.select(); ta.setSelectionRange(0,code.length);
      let ok=false; try{ ok=document.execCommand('copy'); }catch(_){}
      if(navigator.clipboard){ navigator.clipboard.writeText(code).then(()=>{},()=>{}); ok=true; }
      ta.style.pointerEvents='none';
      alert(ok?'데이터 코드를 복사했어요.':'복사 실패 — 수동으로 복사해 주세요.');
    };

    (function(){
      var saved='all';
      try { saved = sessionStorage.getItem('mywayCat_people2') || 'all'; } catch(_) {}
      if(saved==='all' || CATS.some(c=>c.code===saved)) curFilter=saved;
    })();
    renderGallery();
    if(SHOW_EDIT){ buildToolbar(); document.addEventListener('click', function(e){ if(toolOpen && !e.target.closest('.edit-toolbar')) closeTool(); }); }
  </script>
<script>
/* 모바일: 외부 링크를 최상위 창에서 열어 뒤로가기로 MYWAY 복귀. PC·태블릿은 새 탭. */
(function(){
  if(!/Mobi/i.test(navigator.userAgent)) return;
  document.addEventListener("click", function(e){
    if(document.body.classList.contains('editing')) return;
    var a = e.target.closest ? e.target.closest("a[href]") : null;
    if(!a) return;
    var href = a.getAttribute("href") || "";
    if(!href || href.charAt(0) === "#" || /^javascript:/i.test(href)) return;
    e.preventDefault();
    try { (window.top || window).location.href = a.href; }
    catch(_) { window.open(a.href, "_blank"); }
  }, true);
  var _open = window.open.bind(window);
  window.open = function(url, name, feat){
    if(url){ try{ (window.top||window).location.href = url; }catch(_){ location.href = url; } return null; }
    return _open(url, name, feat);
  };
})();
</script>
