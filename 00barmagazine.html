  <style>
    /* ================================================================
       기본 안정화 - PC / 태블릿 / 모바일 / 가로 모드 모두 견고하게
       =================================================================*/
    *, *::before, *::after { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      max-width: 100%;
      height: 100%;
      /* 모바일 주소창 변화 대응: dvh 지원 브라우저에서는 dvh 사용 */
      height: 100dvh;
      overflow: hidden;
      overscroll-behavior: none;
      font-family: 'Segoe UI', '맑은 고딕', Arial, sans-serif;
      background: #fff;
      -webkit-text-size-adjust: 100%;
      -webkit-font-smoothing: antialiased;
    }

    /* === 헤더 높이를 CSS 변수로 관리 (모든 디바이스에서 일관 적용) === */
    :root {
      --nav-height: 44px;
    }

    /* === 네비바 영역 === */
    .nav-wrap {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: var(--nav-height);
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 8px;
      /* 노치 디바이스 안전영역 대응 */
      padding-top: max(6px, env(safe-area-inset-top));
      padding-left: max(8px, env(safe-area-inset-left));
      padding-right: max(8px, env(safe-area-inset-right));
      background: #fff;
      z-index: 100;
      filter: drop-shadow(0 4px 14px rgba(177, 118, 243, 0.22));
    }

    /* === 홈 버튼 === */
    .home-btn {
      flex: 0 0 auto;
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #b176f3 0%, #7ed6fb 100%);
      border: none;
      border-radius: 10px;
      cursor: pointer;
      padding: 0;
      box-shadow: 0 4px 12px rgba(177, 118, 243, 0.35), 0 1px 3px rgba(126, 214, 251, 0.25);
      transition: transform 0.15s ease, box-shadow 0.15s ease;
      -webkit-tap-highlight-color: transparent;
      text-decoration: none;
      position: relative;
      overflow: hidden;
    }
    .home-btn::before {
      content: '';
      position: absolute;
      inset: 1px;
      border-radius: 9px;
      background: linear-gradient(135deg, rgba(255,255,255,0.25) 0%, rgba(255,255,255,0) 60%);
      pointer-events: none;
    }
    .home-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 16px rgba(177, 118, 243, 0.45), 0 2px 4px rgba(126, 214, 251, 0.3);
    }
    .home-btn:active {
      transform: translateY(0);
      box-shadow: 0 2px 6px rgba(177, 118, 243, 0.3);
    }
    .home-btn svg {
      width: 17px;
      height: 17px;
      display: block;
      filter: drop-shadow(0 1px 1px rgba(0,0,0,0.15));
      position: relative;
      z-index: 1;
    }

    /* === 네비바 안쪽 (좌우 화살표 + 링크) === */
    .nav-bar-inner {
      position: relative;
      display: flex;
      align-items: center;
      flex: 1 1 auto;
      min-width: 0;
      height: 100%;
    }

    .screen-links {
      display: flex;
      gap: 4px;
      font-size: 0.93rem;
      font-weight: 500;
      color: #fff;
      white-space: nowrap;
      background: linear-gradient(95deg, #7ed6fb 10%, #b176f3 90%);
      padding: 0 36px;
      align-items: center;
      border-radius: 14px;
      box-shadow: 0 4px 18px rgba(90,100,180,0.13), 0 2px 8px rgba(255,255,255,0.10) inset;
      width: 100%;
      height: 32px;
      overflow-x: auto;
      overflow-y: hidden;
      scrollbar-width: none;
      -ms-overflow-style: none;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior-x: contain;
      touch-action: pan-x;
      cursor: grab;
      scroll-behavior: smooth;
    }
    .screen-links::-webkit-scrollbar { display: none; }
    .screen-links.dragging { cursor: grabbing; scroll-behavior: auto; }

    .screen-links a {
      color: rgba(255,255,255,0.88);
      text-decoration: none;
      padding: 4px 11px;
      border-radius: 10px;
      font-weight: 500;
      font-size: 0.95em;
      background: none;
      display: inline-block;
      white-space: nowrap;
      flex: 0 0 auto;
      letter-spacing: 0.01em;
      transition: background 0.15s, color 0.13s;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      -webkit-user-select: none;
    }
    .screen-links a:hover,
    .screen-links a.active {
      background: rgba(255,255,255,0.24);
      color: #fff;
      font-weight: 600;
      box-shadow: 0 2px 12px rgba(177, 118, 243, 0.25);
    }

    /* === 좌/우 화살표 === */
    .nav-arrow {
      position: absolute;
      top: 0;
      bottom: 0;
      width: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: none;
      outline: none;
      z-index: 5;
      cursor: pointer;
      padding: 0;
      border-radius: 14px;
      -webkit-tap-highlight-color: transparent;
      transition: opacity 0.15s;
    }
    .nav-arrow.left {
      left: 0;
      background: linear-gradient(to right, #b176f3 55%, rgba(177,118,243,0) 100%);
    }
    .nav-arrow.right {
      right: 0;
      background: linear-gradient(to left, #b176f3 55%, rgba(177,118,243,0) 100%);
    }
    .nav-arrow svg {
      width: 12px;
      height: 18px;
      display: block;
    }
    .nav-arrow:active { opacity: 0.7; }
    .nav-arrow[hidden] { display: none; }

    /* === iframe === */
    #main-frame {
      position: fixed;
      left: 0;
      top: var(--nav-height);
      width: 100%;
      /* 두 단계로 안정성 확보: vh fallback → dvh 우선 */
      height: calc(100vh - var(--nav-height));
      height: calc(100dvh - var(--nav-height));
      border: none;
      margin: 0;
      background: #f5f7fa;
      display: block;
      /* 하단 노치/홈 인디케이터 영역 보호 */
      padding-bottom: env(safe-area-inset-bottom);
    }

    /* ================================================================
       반응형 - 디바이스별로 차근차근 분리
       =================================================================*/

    /* === 큰 PC (1400px+): 여유 있는 헤더 === */
    @media (min-width: 1400px) {
      :root { --nav-height: 48px; }
      .nav-wrap { padding: 8px 14px; gap: 10px; }
      .home-btn { width: 34px; height: 34px; }
      .home-btn svg { width: 18px; height: 18px; }
      .screen-links {
        height: 34px;
        font-size: 0.97rem;
        padding: 0 40px;
      }
      .screen-links a { padding: 5px 13px; font-size: 0.97em; }
      .nav-arrow { width: 32px; }
    }

    /* === 일반 PC / 태블릿 가로 (1025~1399px): 기본 (위에 정의됨) === */

    /* === 태블릿 (701~1024px): 약간 컴팩트 === */
    @media (min-width: 701px) and (max-width: 1024px) {
      :root { --nav-height: 44px; }
      .nav-wrap { gap: 8px; }
      .screen-links { font-size: 0.92rem; }
      .screen-links a { padding: 4px 10px; font-size: 0.93em; }
    }

    /* === 모바일 (~700px): 컴팩트 === */
    @media (max-width: 700px) {
      :root { --nav-height: 42px; }
      .nav-wrap { padding: 5px 6px; gap: 6px; }
      .home-btn { width: 30px; height: 30px; border-radius: 9px; }
      .home-btn svg { width: 15px; height: 15px; }
      .screen-links {
        font-size: 0.88rem;
        padding: 0 32px;
        height: 30px;
      }
      .screen-links a {
        padding: 3px 9px;
        font-size: 0.92em;
      }
      .nav-arrow { width: 26px; }
    }

    /* === 작은 모바일 (~420px): 더 컴팩트 === */
    @media (max-width: 420px) {
      :root { --nav-height: 40px; }
      .nav-wrap { padding: 4px 5px; gap: 5px; }
      .home-btn { width: 28px; height: 28px; border-radius: 8px; }
      .home-btn svg { width: 14px; height: 14px; }
      .screen-links {
        font-size: 0.85rem;
        padding: 0 28px;
        height: 28px;
      }
      .screen-links a {
        padding: 3px 8px;
        font-size: 0.9em;
      }
      .nav-arrow { width: 24px; }
    }

    /* === 매우 작은 화면 (~340px): 최소 사이즈 === */
    @media (max-width: 340px) {
      .screen-links { font-size: 0.8rem; padding: 0 26px; }
      .screen-links a { padding: 2px 7px; }
    }

    /* === 핸드폰 가로 모드 (높이 짧음): 헤더 압축 ===
       세로 공간 확보가 가장 중요 → 헤더 최소화 */
    @media (orientation: landscape) and (max-height: 500px) {
      :root { --nav-height: 38px; }
      .nav-wrap { padding: 3px 6px; gap: 6px; }
      .home-btn { width: 28px; height: 28px; border-radius: 8px; }
      .home-btn svg { width: 14px; height: 14px; }
      .screen-links {
        height: 28px;
        font-size: 0.85rem;
        padding: 0 28px;
      }
      .screen-links a { padding: 2px 8px; font-size: 0.88em; }
      .nav-arrow { width: 24px; }
    }

    /* === 매우 짧은 가로 (~380px 높이): 더 압축 === */
    @media (orientation: landscape) and (max-height: 380px) {
      :root { --nav-height: 34px; }
      .nav-wrap { padding: 2px 5px; gap: 5px; }
      .home-btn { width: 24px; height: 24px; border-radius: 7px; }
      .home-btn svg { width: 12px; height: 12px; }
      .screen-links {
        height: 24px;
        font-size: 0.78rem;
        padding: 0 24px;
      }
      .screen-links a { padding: 1px 6px; font-size: 0.85em; }
      .nav-arrow { width: 20px; }
    }

    /* === 접근성: 모션 감소 선호 시 트랜지션 비활성 === */
    @media (prefers-reduced-motion: reduce) {
      .home-btn, .nav-arrow, .screen-links, .screen-links a {
        transition: none !important;
        scroll-behavior: auto !important;
      }
    }
  </style>
</head>
<body>

  <!-- 네비게이션 바 -->
  <div class="nav-wrap">
    <!-- 홈 버튼 -->
    <a href="https://myway.kr/" class="home-btn" aria-label="MYWAY.KR 홈으로" title="MYWAY.KR 홈">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 3.2 3 10.4V20a1 1 0 0 0 1 1h5v-6h6v6h5a1 1 0 0 0 1-1v-9.6L12 3.2z"
              fill="#fff" stroke="#fff" stroke-width="0.5" stroke-linejoin="round"/>
      </svg>
    </a>

    <div class="nav-bar-inner">
      <button class="nav-arrow left" id="nav-arrow-left" aria-label="왼쪽 이동" hidden>
        <svg viewBox="0 0 13 20"><polygon points="9,3 2,10 9,17" fill="#fff" opacity="0.9"/></svg>
      </button>

      <div class="screen-links" id="parent-links">
        <a href="#" onclick="showScreenParent(event, '00mainmaga.html')">H</a>
        <a href="#" class="active" onclick="showScreenParent(event, 'https://www.vogue.co.kr/')">VOGUE</a>
        <a href="#" onclick="showScreenParent(event, 'https://www.allurekorea.com/')">allure</a>
        <a href="#" onclick="showScreenParent(event, 'https://woman.donga.com/')">여성동아</a>
        <a href="#" onclick="showScreenParent(event, 'https://www.marieclairekorea.com/')">marieclaire</a>
        <a href="#" onclick="showScreenParent(event, 'https://m.singleskorea.com/')">싱글즈</a>
        <a href="#" onclick="showScreenParent(event, 'https://www.wkorea.com/')">더블유코리아</a>
        <a href="#" onclick="showScreenParent(event, 'https://www.gqkorea.co.kr/')">GQ코리아</a>
        <a href="#" onclick="showScreenParent(event, 'https://www.lofficielkorea.com/')">로피시엘</a>
        <a href="#" onclick="showScreenParent(event, 'https://www.noblesse.com/home/main.php')">노블레스</a>
        <a href="#" onclick="showScreenParent(event, 'https://health.chosun.com/')">헬스조선</a>
        <a href="#" onclick="showScreenParent(event, 'https://shindonga.donga.com/')">월간신동아</a>
        <a href="#" onclick="showScreenParent(event, 'https://www.mk.co.kr/economy/')">매경이코노미</a>
        <a href="#" onclick="showScreenParent(event, 'https://ktxmagazine.kr/')">KTX</a>
      </div>

      <button class="nav-arrow right" id="nav-arrow-right" aria-label="오른쪽 이동" hidden>
        <svg viewBox="0 0 13 20"><polygon points="4,3 11,10 4,17" fill="#fff" opacity="0.9"/></svg>
      </button>
    </div>
  </div>

  <iframe id="main-frame" src="https://www.vogue.co.kr/"></iframe>

  <script>
    const nav = document.getElementById('parent-links');
    const leftArrow = document.getElementById('nav-arrow-left');
    const rightArrow = document.getElementById('nav-arrow-right');
    const mainFrame = document.getElementById('main-frame');

    /* === 네비게이션 클릭 핸들러 (드래그와 클릭 구분) === */
    function showScreenParent(e, url) {
      e.preventDefault();
      // 드래그가 발생한 직후라면 클릭 무시
      if (justDragged) { justDragged = false; return; }

      document.querySelectorAll('#parent-links a').forEach(a => a.classList.remove('active'));
      e.currentTarget.classList.add('active');
      mainFrame.src = url;

      // 클릭한 항목을 네비바 중앙으로 스크롤
      const el = e.currentTarget;
      const offset = el.offsetLeft - nav.clientWidth / 2 + el.clientWidth / 2;
      nav.scrollTo({ left: offset, behavior: 'smooth' });
      setTimeout(checkNavOverflow, 250);
    }

    /* === 드래그 / 터치 스크롤 (PC 마우스 + 모바일 터치 모두 지원) === */
    let isDown = false;
    let startX = 0;
    let scrollStart = 0;
    let dragDistance = 0;
    let justDragged = false;

    function dragStart(clientX) {
      isDown = true;
      dragDistance = 0;
      startX = clientX;
      scrollStart = nav.scrollLeft;
      nav.classList.add('dragging');
    }
    function dragMove(clientX) {
      if (!isDown) return;
      const dx = clientX - startX;
      dragDistance = Math.abs(dx);
      nav.scrollLeft = scrollStart - dx;
    }
    function dragEnd() {
      if (!isDown) return;
      isDown = false;
      nav.classList.remove('dragging');
      if (dragDistance > 8) {
        justDragged = true;
        setTimeout(() => { justDragged = false; }, 50);
      }
      checkNavOverflow();
    }

    // PC 마우스 드래그
    nav.addEventListener('mousedown', e => dragStart(e.pageX));
    nav.addEventListener('mousemove', e => { if (isDown) { e.preventDefault(); dragMove(e.pageX); } });
    nav.addEventListener('mouseup', dragEnd);
    nav.addEventListener('mouseleave', dragEnd);

    // 모바일 터치 (네이티브 스크롤 사용, 클릭/드래그 구분만)
    nav.addEventListener('touchstart', e => {
      dragDistance = 0;
      startX = e.touches[0].pageX;
    }, { passive: true });
    nav.addEventListener('touchmove', e => {
      dragDistance = Math.abs(e.touches[0].pageX - startX);
    }, { passive: true });
    nav.addEventListener('touchend', () => {
      if (dragDistance > 8) {
        justDragged = true;
        setTimeout(() => { justDragged = false; }, 50);
      }
      setTimeout(checkNavOverflow, 80);
    });

    /* === 좌/우 화살표 표시 여부 자동 체크 === */
    function checkNavOverflow() {
      if (nav.scrollWidth > nav.clientWidth + 2) {
        leftArrow.hidden = nav.scrollLeft < 5;
        rightArrow.hidden = nav.scrollLeft + nav.clientWidth + 5 >= nav.scrollWidth;
      } else {
        leftArrow.hidden = true;
        rightArrow.hidden = true;
      }
    }
    nav.addEventListener('scroll', checkNavOverflow, { passive: true });
    window.addEventListener('resize', () => setTimeout(checkNavOverflow, 50));
    window.addEventListener('orientationchange', () => setTimeout(checkNavOverflow, 200));

    leftArrow.addEventListener('click', () => {
      nav.scrollBy({ left: -120, behavior: 'smooth' });
      setTimeout(checkNavOverflow, 250);
    });
    rightArrow.addEventListener('click', () => {
      nav.scrollBy({ left: 120, behavior: 'smooth' });
      setTimeout(checkNavOverflow, 250);
    });

    /* === 초기 진입 시 및 페이지 로드 후 체크 === */
    window.addEventListener('DOMContentLoaded', checkNavOverflow);
    window.addEventListener('load', checkNavOverflow);
    setTimeout(checkNavOverflow, 200);
  </script>
</body>
