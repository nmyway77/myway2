  <!-- 본문 스크립트 -->
  <script>
    /* @CONFIG */
    const NEWS_IS_DIST = true;
    const NEWS_SHOW_EDIT = true;
    const NEWS_COPY_PROTECT = false;
    const NEWS_STORE_KEY = "mywayNewsEditV1";
    const NEWS_DIST_SIG = "sig1782527701136";
    /* @CONFIG_END */

    /* ============ 복제방지 ============ */
    (function(){
      if (typeof NEWS_COPY_PROTECT !== 'undefined' && !NEWS_COPY_PROTECT) return;
      function isEditable(t) {
        if (!t) return false;
        const tag = (t.tagName || '').toLowerCase();
        if (tag === 'input' || tag === 'textarea') return true;
        if (t.isContentEditable) return true;
        return false;
      }
      ['contextmenu','dragstart','selectstart','copy','cut'].forEach(ev => {
        document.addEventListener(ev, e => {
          if (isEditable(e.target)) return;
          if (ev === 'dragstart' && e.target.closest && e.target.closest('.card')) return;
          e.preventDefault();
        }, { capture: true });
      });
      document.addEventListener('keydown', e => {
        if (isEditable(e.target)) return;
        const k = (e.key || '').toLowerCase();
        if (k === 'f12') { e.preventDefault(); return; }
        if (e.ctrlKey && e.shiftKey && (k === 'i' || k === 'j' || k === 'c')) { e.preventDefault(); return; }
        if (e.ctrlKey && !e.shiftKey && (k === 'u' || k === 's' || k === 'c' || k === 'x' || k === 'a')) { e.preventDefault(); return; }
      }, { capture: true });
    })();

    /* ============ 뉴스 즐겨찾기 (news 전용 스코프) ============
       이 블록 전체를 IIFE로 감싸 모든 함수·변수를 이 페이지 안에만 가둡니다.
       (다른 즐겨찾기 페이지와 같은 도메인에 있어도 전역 이름·데이터가 충돌하지 않습니다)
       · localStorage('mywayNewsV1')에 저장됩니다. (다른 파일과 분리)
       · 카드 맨 끝의 [+] 카드를 눌러 추가합니다.
       · 카드 우측 상단 색 코너를 누르면 수정/삭제 창이 열립니다.
    ============================================================ */
    (function(){

    /* @DEFAULTS_START */
    const DEFAULTS = {

        ],
        "entNews": [
          { name: "하퍼스바자", url: "https://www.harpersbazaar.co.kr/", img: "https://image.yes24.com/goods/103932601/XL" },
          { name: "우먼센스", url: "https://www.womansense.co.kr/", img: "https://i.ytimg.com/vi/DTQjqK4_Ml4/hq720_2.jpg?sqp=-oaymwEiCLQEENAFSFryq4qpAxQIARUAAAAAJQAAyEI9AICiQ9ABAQ==&rs=AOn4CLBlZcELGfCcm06hnVjMfWxNO1fDZg" },
          { name: "우먼동", url: "https://woman.donga.com/", img: "https://contents.kyobobook.co.kr/sih/fit-in/400x0/pdt/3904000558677.jpg" },
          { name: "우먼조선", url: "https://woman.chosun.com/", img: "https://img.ridicdn.net/cover/486000697/xxlarge#1" },
        ],
        "catmqowpz71o63": [
        ],
        "catmqowqkk3zz4": [
        ],
        "catmqowr6dd24k": [
        ],
        "catmqowrr3ix0v": [
        ],
        "catmqowslyjvp0": [
        ],
        "catmqowtgt883p": [
        ],
        "catmqowu1iuivi": [
        ]
      }
    };
    /* @DEFAULTS_END */

    /* ===== 로드/저장 (편집 데이터 우선) ===== */
    let _distChecked = false;
    function ensureDistFresh(){
      if (_distChecked || !NEWS_IS_DIST) return; _distChecked = true;
      try { var sk = NEWS_STORE_KEY + '_sig'; if (localStorage.getItem(sk) !== NEWS_DIST_SIG){ localStorage.setItem(sk, NEWS_DIST_SIG); localStorage.removeItem(NEWS_STORE_KEY); } } catch(_){}
    }
    function cleanBundle(b){
      if (!b || typeof b !== 'object') return null;
      var cats = Array.isArray(b.cats) ? b.cats : null;
      var dat = (b.data && typeof b.data === 'object') ? b.data : null;
      if (!cats && !dat){ /* 레거시 평면 {genNews:[...]} */ if (b.genNews || b.entNews || b.etcNews){ dat = b; } }
      if (!cats){ var keys = dat ? Object.keys(dat) : []; cats = keys.map(function(k){ return { code:k, label:k, mode:'photo' }; }); }
      cats = cats.map(function(c){ return { code:String(c.code||('cat'+Math.random().toString(36).slice(2,7))), label:String(c.label||c.code||''), mode:(c.mode==='frame'?'frame':'photo'), url:String(c.url||'') }; });
      if (!cats.length) return null;
      var out = {};
      cats.forEach(function(c){
        var arr = (dat && Array.isArray(dat[c.code])) ? dat[c.code] : [];
        out[c.code] = arr.filter(function(x){ return x && !x.section; }).map(function(x){ return { name:String(x.name||''), url:String(x.url||''), img:String(x.img||'') }; });
      });
      return { cats:cats, data:out };
    }
    function loadBundle(){
      ensureDistFresh();
      try { var raw = localStorage.getItem(NEWS_STORE_KEY); if (raw){ var c = cleanBundle(JSON.parse(raw)); if (c) return c; } } catch(_){}
      return cleanBundle(JSON.parse(JSON.stringify(DEFAULTS)));
    }
    function saveBundle(){ try { localStorage.setItem(NEWS_STORE_KEY, JSON.stringify({ cats:CATS, data:data })); } catch(_){} }

    var _b = loadBundle();
    let CATS = _b.cats;
    let data = _b.data;
    let currentFilter = CATS.length ? CATS[0].code : '';
    let editRef = null;
    let dragSrc = null;

    /* ===== 유틸 ===== */
    function ytId(url){ if(!url) return ''; var m = String(url).match(/(?:youtube\.com\/(?:watch\?v=|embed\/|shorts\/|live\/)|youtu\.be\/)([A-Za-z0-9_-]{11})/); return m ? m[1] : ''; }
    function ytThumb(id){ return 'https://img.youtube.com/vi/' + id + '/hqdefault.jpg'; }
    function cardImage(item){ if (item.img && item.img.trim()) return item.img.trim(); var id = ytId(item.url); if (id) return ytThumb(id); return ''; }
    function domainOf(url){ if(!url) return ''; try { return new URL(url).hostname.replace(/^www\./,''); } catch(e){ return String(url).replace(/^https?:\/\//i,'').replace(/^www\./,'').split('/')[0]; } }
    function catOf(code){ return CATS.find(function(c){ return c.code === code; }); }
    function modeOf(code){ var c = catOf(code); return (c && c.mode === 'frame') ? 'frame' : 'photo'; }

    /* ===== 상단 네비 (탭) ===== */
    function renderNav(){
      var nav = document.getElementById('catNav');
      Array.prototype.slice.call(nav.querySelectorAll('.cat-btn')).forEach(function(b){ b.remove(); });
      var toggle = document.getElementById('collapseToggle');
      CATS.forEach(function(c){
        var b = document.createElement('button'); b.type = 'button';
        b.className = 'cat-btn' + (c.code === currentFilter ? ' is-active' : '');
        b.dataset.cat = c.code;
        b.appendChild(document.createTextNode(c.label + ' '));
        var cnt = document.createElement('span'); cnt.className = 'count'; cnt.textContent = (data[c.code] || []).length;
        b.appendChild(cnt);
        nav.insertBefore(b, toggle);
      });
    }
    function setActiveTab(code){
      if (!catOf(code)) code = CATS.length ? CATS[0].code : '';
      currentFilter = code;
      render();
    }
    function setupCatNav(){
      document.getElementById('catNav').addEventListener('click', function(e){
        var btn = e.target.closest('.cat-btn'); if (!btn) return;
        setActiveTab(btn.dataset.cat);
      });
    }

    /* ===== 본문 렌더 (선택 탭만) ===== */
    function setFrameTop(){
      var top = document.querySelector('.topbar');
      document.documentElement.style.setProperty('--frame-top', (top ? top.offsetHeight : 0) + 'px');
    }
    function render(){
      var root = document.getElementById('masonryGallery');
      var viewer = document.getElementById('frameView');
      var mode = modeOf(currentFilter);
      if (mode === 'frame'){
        document.body.classList.add('frame-active');
        root.style.display = 'none';
        viewer.style.display = '';
        renderFrame();
        setFrameTop();
      } else {
        document.body.classList.remove('frame-active');
        viewer.style.display = 'none';
        root.style.display = '';
        var frag = document.createDocumentFragment();
        (data[currentFilter] || []).forEach(function(item, idx){ frag.appendChild(buildCard(item, currentFilter, idx)); });
        root.replaceChildren(frag);
      }
      renderNav();
    }
    /* iframe형 탭 = 단일 사이트: 탭의 url 을 iframe 으로 표시 */
    function renderFrame(){
      var wrap = document.getElementById('frameView'); wrap.innerHTML = '';
      var c = catOf(currentFilter) || {};
      var url = String(c.url || '');
      var box = document.createElement('div'); box.className = 'frame-box';
      if (url){
        box.innerHTML = '<iframe title="사이트 뷰어" referrerpolicy="no-referrer" allow="autoplay; encrypted-media; fullscreen" allowfullscreen src="' + url.replace(/"/g,'%22') + '"></iframe>';
        wrap.appendChild(box);
        var open = document.createElement('a'); open.className = 'frame-open'; open.href = url; open.target = '_blank'; open.rel = 'noopener';
        open.textContent = '↗ 새 탭에서 열기 (iframe 차단 사이트용)';
        wrap.appendChild(open);
      } else {
        box.innerHTML = '<div class="frame-empty">📑 섹션편집에서 사이트 주소를 입력하면 여기에 바로 표시됩니다.</div>';
        wrap.appendChild(box);
      }
    }
    function buildCard(item, cat, idx){
      var a = document.createElement('a'); a.className = 'card';
      if (item.url){ a.href = item.url; a.target = '_blank'; a.rel = 'noopener'; } else { a.style.cursor = 'default'; }
      a.setAttribute('aria-label', item.name);
      a.draggable = true;
      a.addEventListener('dragstart', function(e){ dragSrc = { cat:cat, idx:idx }; a.classList.add('dragging'); try { e.dataTransfer.effectAllowed='move'; e.dataTransfer.setData('text/plain', String(idx)); } catch(er){} });
      a.addEventListener('dragend', function(){ a.classList.remove('dragging'); clearDragOver(); });
      a.addEventListener('dragover', function(e){ if(!dragSrc || dragSrc.cat!==cat) return; e.preventDefault(); a.classList.add('drag-over'); });
      a.addEventListener('dragleave', function(){ a.classList.remove('drag-over'); });
      a.addEventListener('drop', function(e){ e.preventDefault(); a.classList.remove('drag-over'); if(!dragSrc || dragSrc.cat!==cat) return; moveItem(cat, dragSrc.idx, idx); dragSrc = null; });
      var imgSrc = cardImage(item);
      if (!imgSrc){
        a.classList.add('site-card');
        var body = document.createElement('div'); body.className = 'site-body';
        var nm = document.createElement('div'); nm.className = 'site-name'; nm.textContent = item.name;
        var dm = document.createElement('div'); dm.className = 'site-domain'; dm.textContent = domainOf(item.url);
        body.appendChild(nm); body.appendChild(dm); a.appendChild(body);
        attachCtrl(a, cat, idx); return a;
      }
      var img = document.createElement('img'); img.src = imgSrc; img.alt = item.name;
      img.loading = 'lazy'; img.decoding = 'async'; img.referrerPolicy = 'no-referrer'; img.draggable = false;
      a.appendChild(img);
      var cap = document.createElement('div'); cap.className = 'cap'; cap.textContent = item.name; a.appendChild(cap);
      attachCtrl(a, cat, idx); return a;
    }
    function attachCtrl(a, cat, idx){

    function serializeBundle(b){
      var out = '{\n      cats: [\n';
      b.cats.forEach(function(c){ out += '        { code: ' + JSON.stringify(c.code) + ', label: ' + JSON.stringify(c.label) + ', mode: ' + JSON.stringify(c.mode === 'frame' ? 'frame' : 'photo') + ', url: ' + JSON.stringify(c.url || '') + ' },\n'; });
      out += '      ],\n      data: {\n';
      b.cats.forEach(function(c, ci){
        out += '        ' + JSON.stringify(c.code) + ': [\n';
        (b.data[c.code]||[]).forEach(function(it){ out += '          { name: ' + JSON.stringify(it.name) + ', url: ' + JSON.stringify(it.url) + ', img: ' + JSON.stringify(it.img) + ' },\n'; });
        out += '        ]' + (ci < b.cats.length-1 ? ',' : '') + '\n';

    (function(){

      /* iframe 안에서는 100vh 높이 강제를 풀어, 내용 높이만큼만 차지하도록 함

      document.documentElement.style.minHeight = '0';

        try {
          var h = Math.max(
            document.body ? document.body.scrollHeight : 0,
            document.body ? document.body.offsetHeight : 0
          );
          window.parent.postMessage({ type: 'favHeightHome', height: h }, '*');
        } catch (e) {}
      }
      window.addEventListener('load', reportHeight);
      window.addEventListener('resize', reportHeight);
      document.addEventListener('DOMContentLoaded', reportHeight);

          var collapsed = document.body.classList.toggle('is-collapsed');

          reportHeight();
          setTimeout(reportHeight, 60);
          setTimeout(reportHeight, 350);

      }

        document.querySelectorAll('img').forEach(function (img) {

    (function(){
