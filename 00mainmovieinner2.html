<style>
  :root{ --line:#e7e2d6;--ink:#1f1b16;--ink-sub:#8c8579;--accent:#c1121f;--accent-soft:#fbeaea;--paper:#f7f3eb;--body:"Pretendard",-apple-system,sans-serif; }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{min-height:100vh;min-height:100dvh;background:var(--paper);color:var(--ink);font-family:var(--body);-webkit-font-smoothing:antialiased;user-select:none;-webkit-user-select:none}

  .topnav{position:sticky;top:0;z-index:40;display:flex;gap:8px;align-items:center;flex-wrap:nowrap;overflow-x:auto;overflow-y:hidden;white-space:nowrap;padding:10px 14px;background:rgba(247,243,235,.92);backdrop-filter:blur(8px);border-bottom:1px solid var(--line);cursor:grab;scrollbar-width:none}
  .topnav::-webkit-scrollbar{display:none}
  .topnav.dragging{cursor:grabbing}
  .nav-home{flex:none;display:inline-flex;align-items:center;justify-content:center;color:var(--ink-sub);padding:8px;border-radius:10px;transition:color .15s,background .15s}
  .nav-home:hover{color:var(--accent);background:#fff}
  .nav-home svg{width:20px;height:20px;display:block}
  .nav-track{flex:none;display:flex;align-items:center;gap:8px}
  .topnav button.tab{flex:none;display:inline-flex;align-items:center;gap:6px;border:1px solid var(--line);background:#fff;border-radius:999px;padding:9px 16px;font-family:var(--body);font-size:14px;font-weight:700;color:var(--ink-sub);cursor:pointer;transition:all .16s}
  .topnav button.tab:hover{border-color:#d9bcbc;color:var(--ink)}
  .topnav button.tab.active{background:var(--accent);border-color:var(--accent);color:#fff}

  .stage{max-width:1180px;margin:0 auto;padding:22px 16px 90px}
  .stage-head{font-family:var(--body);font-size:23px;font-weight:800;letter-spacing:-0.035em;color:var(--ink);margin:6px 4px 20px;position:relative;padding-left:13px}
  .stage-head::before{content:"";position:absolute;left:0;top:50%;transform:translateY(-50%);width:4px;height:0.82em;border-radius:3px;background:var(--accent)}
  .card-grid{column-width:232px;column-gap:18px}
  @media (max-width:760px){ .card-grid{column-width:168px;column-gap:13px} }
  @media (max-width:430px){ .card-grid{column-width:150px;column-gap:11px} }
  .card{position:relative;display:block;width:100%;margin:0 0 18px;break-inside:avoid;-webkit-column-break-inside:avoid;border-radius:16px;background:#fff;padding:5px;border:1px solid rgba(120,90,70,.09);box-shadow:0 1px 2px rgba(80,60,40,.05),0 8px 22px -8px rgba(80,60,40,.16);text-decoration:none;color:inherit;transition:transform .2s cubic-bezier(.2,.7,.3,1),box-shadow .2s,border-color .2s}
  @media (max-width:760px){ .card{margin-bottom:13px} }
  .card:hover{transform:translateY(-4px);box-shadow:0 4px 10px rgba(120,30,40,.10),0 18px 34px -10px rgba(120,30,40,.30);border-color:rgba(193,18,31,.45)}
  .card .thumb{position:relative;width:100%;border-radius:12px;overflow:hidden;background:#efe9dd;line-height:0}
  .card .thumb img{width:100%;height:auto;display:block}
  .card .thumb::after{content:"";position:absolute;inset:0;border-radius:12px;box-shadow:inset 0 0 0 1px rgba(0,0,0,.04);pointer-events:none}
  .card .cap{padding:9px 8px 5px;font-size:13px;font-weight:700;color:var(--ink);line-height:1.3;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .card.noname .cap{display:none}
  .empty{text-align:center;color:var(--ink-sub);font-size:14px;padding:60px 0;column-span:all}

  footer{text-align:center;padding:26px 0 34px;color:var(--ink-sub);font-size:12.5px}
  footer a{color:var(--accent);text-decoration:none;font-weight:700}

  /* 우하단 홈 */
  .home-fab{position:fixed;right:18px;bottom:18px;z-index:50;width:46px;height:46px;border-radius:50%;background:#fff;border:1px solid var(--line);box-shadow:0 4px 14px rgba(80,60,40,.18);display:flex;align-items:center;justify-content:center;color:var(--ink-sub);text-decoration:none;transition:color .15s,transform .15s}
  .home-fab:hover{color:var(--accent);transform:scale(1.06)}
  .home-fab svg{width:22px;height:22px}

  /* ===== 편집 머신러리 ===== */
  .pentool-bar{position:fixed;top:64px;right:16px;z-index:60;display:flex;flex-direction:column;align-items:flex-end;gap:8px}
  .pentool-fab{width:40px;height:40px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#fff;background:linear-gradient(135deg,#e23744,#c1121f);box-shadow:0 4px 14px rgba(193,18,31,.4);transition:transform .15s}
  .pentool-fab:hover{transform:scale(1.06)}
  .pentool-fab svg{width:19px;height:19px;display:block}
  .pentool-menu{display:none;flex-direction:column;gap:4px;background:#fff;border:1px solid var(--line);border-radius:12px;padding:6px;box-shadow:0 8px 26px rgba(60,40,40,.18);min-width:152px}
  .pentool-menu.show{display:flex}
  .pentool-menu button{border:none;background:transparent;text-align:left;padding:9px 12px;border-radius:8px;font-family:var(--body);font-size:13.5px;font-weight:700;color:var(--ink);cursor:pointer}
  .pentool-menu button:hover{background:var(--accent-soft);color:var(--accent)}
  .pentool-menu button.danger:hover{background:#fdecec;color:#c0392b}
  .pentool-menu .sep{height:1px;background:var(--line);margin:4px 2px}

  body.editing .card{cursor:default}
  .card-tools{display:none;position:absolute;top:-9px;right:-7px;z-index:6;gap:3px}
  body.editing .card-tools{display:flex}
  .card-move{display:none;position:absolute;top:-9px;left:-7px;z-index:6;gap:3px}
  body.editing .card-move{display:flex}
  .mini-btn{width:24px;height:24px;border-radius:50%;border:1px solid var(--line);background:#fff;color:var(--ink-sub);font-size:12px;font-weight:800;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 1px 4px rgba(0,0,0,.14);padding:0}
  .mini-btn:hover{color:var(--accent);border-color:var(--accent)}
  .mini-btn.del:hover{color:#c0392b;border-color:#c0392b}
  .add-card{display:none;align-items:center;justify-content:center;gap:6px;border:1.5px dashed #e0bcbc;border-radius:16px;background:#fdf4f4;color:var(--accent);font-weight:800;font-size:14px;cursor:pointer;padding:40px 0;width:100%;margin-bottom:18px;break-inside:avoid;-webkit-column-break-inside:avoid;font-family:var(--body)}
  body.editing .add-card{display:flex}
  .add-card:hover{background:#fbeaea;border-color:var(--accent)}

  /* 모달 */
  .modal-back{position:fixed;inset:0;z-index:120;background:rgba(20,16,12,.5);display:none;align-items:center;justify-content:center;padding:18px}
  .modal-back.show{display:flex}
  .modal{width:100%;max-width:430px;max-height:86vh;overflow-y:auto;background:#fff;border-radius:16px;padding:20px;box-shadow:0 20px 60px rgba(0,0,0,.3);scrollbar-width:none}
  .modal::-webkit-scrollbar{display:none}
  .modal h3{margin:0 0 14px;font-size:17px;font-weight:800;color:var(--ink)}
  .modal label{display:block;font-size:12px;font-weight:700;color:var(--ink-sub);margin:12px 0 5px}
  .modal input[type=text],.modal input[type=url],.modal textarea{width:100%;border:1px solid var(--line);border-radius:9px;padding:10px 12px;font-family:var(--body);font-size:14px;color:var(--ink);background:#faf8f3;-webkit-user-select:text;user-select:text}
  .modal input:focus,.modal textarea:focus{outline:none;border-color:var(--accent);background:#fff}
  .modal textarea{min-height:140px;resize:vertical;font-family:"JetBrains Mono",ui-monospace,monospace;font-size:12px}
  .prev{margin-top:10px;width:100%;aspect-ratio:16/9;border-radius:9px;overflow:hidden;background:#efe9dd;display:none}
  .prev.show{display:block}
  .prev img{width:100%;height:100%;object-fit:cover}
  .modal-row{display:flex;gap:8px;margin-top:18px}
  .modal-row button{flex:1;border:none;border-radius:9px;padding:11px;font-family:var(--body);font-size:14px;font-weight:800;cursor:pointer}
  .btn-ok{background:var(--accent);color:#fff}
  .btn-ok:hover{background:#a30f1a}
  .btn-cancel{background:#efece5;color:var(--ink-sub)}
  .btn-cancel:hover{background:#e5e1d8}
  .tb-btn{width:100%;border:1px solid var(--line);background:#faf8f3;border-radius:9px;padding:11px;font-family:var(--body);font-size:13.5px;font-weight:800;color:var(--accent);cursor:pointer}
  .tb-btn:hover{background:var(--accent-soft);border-color:var(--accent)}
  .ch-list{display:flex;flex-direction:column;gap:6px}
  .ch-row{display:flex;align-items:center;gap:6px;border:1px solid var(--line);border-radius:9px;padding:7px 9px;background:#faf8f3}
  .ch-row .nm{flex:1;font-size:13.5px;font-weight:700;color:var(--ink);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .ch-row .cnt{font-size:11px;font-weight:800;color:var(--accent);background:var(--accent-soft);border-radius:5px;padding:1px 6px}
  .ch-row .mini-btn{width:26px;height:26px}
  .hint{font-size:11.5px;color:var(--ink-sub);line-height:1.5;margin-top:10px}
</style>
</head>

/* ---- 데이터 로드/저장 ---- */
function cloneData(d){ return JSON.parse(JSON.stringify(d)); }
function coerceData(o){
  if(!o || typeof o!=='object' || !Array.isArray(o.cats)) return null;
  var d={ cats:[] };
  o.cats.forEach(function(c){
    if(!c||typeof c.label!=='string'||!Array.isArray(c.items)) return;
    var items=[];
    c.items.forEach(function(it){
      if(it&&typeof it.img==='string'){ items.push({img:it.img,url:(it.url||''),name:(it.name||'')}); }
    });
    d.cats.push({label:c.label,items:items});
  });
  if(!d.cats.length) return null;
  return d;
}
function loadData(){
  if(IS_DIST) return cloneData(DEFAULT_DATA);
  try{
    var raw=localStorage.getItem(STORE_KEY);
    if(raw){ var c=coerceData(JSON.parse(raw)); if(c) return c; }
  }catch(_){}
  return cloneData(DEFAULT_DATA);
}
function saveData(){
  if(IS_DIST) return;
  try{ localStorage.setItem(STORE_KEY, JSON.stringify({kind:DATA_KIND, cats:data.cats})); }catch(_){}
}
var data = loadData();
var active = 0;

/* ---- 요소 ---- */
var nav=document.getElementById('topnav');
var track=document.getElementById('navTrack');
var grid=document.getElementById('cardGrid');
var stageHead=document.getElementById('stageHead');

function miniBtn(txt,title,fn){
  var b=document.createElement('button'); b.className='mini-btn'; b.textContent=txt; b.title=title;
  b.addEventListener('click',fn); return b;
}
function centerNavBtn(btn){
  var navRect=nav.getBoundingClientRect();
  var btnRect=btn.getBoundingClientRect();
  var target=nav.scrollLeft + (btnRect.left - navRect.left) - (nav.clientWidth/2) + (btnRect.width/2);
  nav.scrollTo({left:Math.max(0,target),behavior:'smooth'});
}

/* ---- 탭 렌더 ---- */
function renderNav(){
  track.innerHTML='';
  data.cats.forEach(function(c,i){
    var b=document.createElement('button'); b.className='tab'; b.textContent=c.label; b.dataset.cat=i;
    if(i===active) b.classList.add('active');
    b.addEventListener('click',function(){ selectCat(i,b); });
    track.appendChild(b);
  });
}
function selectCat(i,btn){
  active=i;
  track.querySelectorAll('button.tab').forEach(function(b){b.classList.remove('active');});
  if(btn){ btn.classList.add('active'); centerNavBtn(btn); }
  try{ sessionStorage.setItem(SESS_KEY,'cat:'+i); }catch(_){}
  renderGrid();
}

/* ---- 카드 그리드 렌더 ---- */
function renderGrid(){
  grid.innerHTML='';
  var cat=data.cats[active];
  stageHead.textContent = cat ? cat.label : '';
  if(!cat){ return; }
  if(!cat.items.length && !document.body.classList.contains('editing')){
    var em=document.createElement('div'); em.className='empty'; em.textContent='항목이 없어요.';
    grid.appendChild(em); return;
  }
  cat.items.forEach(function(it,ii){
    var a=document.createElement('a'); a.className='card'+(it.name?'':' noname');
    a.href=it.url||'#'; a.target='_blank'; a.rel='noopener';
    var th=document.createElement('div'); th.className='thumb';
    var img=document.createElement('img'); img.loading='lazy'; img.src=it.img; img.alt=it.name||''; th.appendChild(img);
    a.appendChild(th);
    var cap=document.createElement('div'); cap.className='cap'; cap.textContent=it.name||''; a.appendChild(cap);
    /* 편집 도구 */
    var tools=document.createElement('div'); tools.className='card-tools';
    tools.appendChild(miniBtn('✎','수정',function(e){e.preventDefault();e.stopPropagation();openItemModal(ii);}));
    var dl=miniBtn('✕','삭제',function(e){e.preventDefault();e.stopPropagation();delItem(ii);}); dl.classList.add('del'); tools.appendChild(dl);
    var mv=document.createElement('div'); mv.className='card-move';
    mv.appendChild(miniBtn('◀','앞으로',function(e){e.preventDefault();e.stopPropagation();moveItem(ii,-1);}));
    mv.appendChild(miniBtn('▶','뒤로',function(e){e.preventDefault();e.stopPropagation();moveItem(ii,1);}));
    a.appendChild(tools); a.appendChild(mv);
    if(editing){ a.addEventListener('click',function(e){e.preventDefault();}); }
    grid.appendChild(a);
  });
  /* 항목 추가 버튼 */
  var add=document.createElement('button'); add.className='add-card'; add.textContent='＋ 항목 추가';
  add.addEventListener('click',function(){openItemModal(-1);});
  grid.appendChild(add);
}

renderNav();

/* 네비 드래그 스크롤 */
(function(){
  var down=false,startX=0,startL=0,moved=false;
  nav.addEventListener('pointerdown',function(e){ if(e.button!==0) return; down=true;moved=false;startX=e.clientX;startL=nav.scrollLeft;nav.classList.add('dragging'); });
  nav.addEventListener('pointermove',function(e){ if(!down) return; var dx=e.clientX-startX; if(Math.abs(dx)>4) moved=true; nav.scrollLeft=startL-dx; });
  var end=function(){ down=false; nav.classList.remove('dragging'); };
  nav.addEventListener('pointerup',end);
  nav.addEventListener('pointercancel',end);
  nav.addEventListener('pointerleave',end);
  nav.addEventListener('click',function(e){ if(moved){ e.stopPropagation(); e.preventDefault(); moved=false; } },true);
  nav.addEventListener('wheel',function(e){ if(Math.abs(e.deltaY)>Math.abs(e.deltaX)){ nav.scrollLeft+=e.deltaY; e.preventDefault(); } },{passive:false});
})();

var editing=false;

/* 항목 조작 */
function delItem(ii){ if(!confirm('이 항목을 삭제할까요?'))return; data.cats[active].items.splice(ii,1); saveData(); renderGrid(); }
function moveItem(ii,dir){ var arr=data.cats[active].items; var j=ii+dir; if(j<0||j>=arr.length)return; var t=arr[ii];arr[ii]=arr[j];arr[j]=t; saveData(); renderGrid(); }

/* 항목 모달 */
var itemBack=document.getElementById('itemBack'), itemEdit=-1;
var itemImg=document.getElementById('itemImg'), itemPrev=document.getElementById('itemPrev'), itemPrevImg=document.getElementById('itemPrevImg');
function openItemModal(ii){
  itemEdit=ii;
  document.getElementById('itemTitle').textContent = ii<0?'항목 추가':'항목 수정';
  var it = ii<0?{img:'',url:'',name:''}:data.cats[active].items[ii];
  itemImg.value=it.img||'';
  document.getElementById('itemUrl').value=it.url||'';
  document.getElementById('itemName').value=it.name||'';
  updatePrev();
  itemBack.classList.add('show');
}
function updatePrev(){
  var v=itemImg.value.trim();
  if(v){ itemPrevImg.src=v; itemPrev.classList.add('show'); } else { itemPrev.classList.remove('show'); }
}
itemImg.addEventListener('input',updatePrev);
document.getElementById('itemCancel').addEventListener('click',function(){itemBack.classList.remove('show');});
document.getElementById('itemSave').addEventListener('click',function(){
  var img=itemImg.value.trim();
  var url=document.getElementById('itemUrl').value.trim();
  var nm=document.getElementById('itemName').value.trim();
  if(!img){ alert('이미지 URL을 입력하세요'); return; }
  var row={img:img,url:url,name:nm};
  if(itemEdit<0) data.cats[active].items.push(row);
  else data.cats[active].items[itemEdit]=row;
  saveData(); itemBack.classList.remove('show'); renderGrid();
});

/* 탭 편집 */
var tabBack=document.getElementById('tabBack'), tabList=document.getElementById('tabList');
function renderTabList(){
  tabList.innerHTML='';
  data.cats.forEach(function(c,i){
    var row=document.createElement('div'); row.className='ch-row';
    var nm=document.createElement('div'); nm.className='nm'; nm.textContent=c.label; row.appendChild(nm);
    var cnt=document.createElement('span'); cnt.className='cnt'; cnt.textContent=c.items.length; row.appendChild(cnt);
    row.appendChild(miniBtn('✎','이름변경',function(){openCatModal(i);}));
    row.appendChild(miniBtn('▲','위로',function(){moveCat(i,-1);}));
    row.appendChild(miniBtn('▼','아래로',function(){moveCat(i,1);}));
    var dl=miniBtn('✕','삭제',function(){delCat(i);}); dl.classList.add('del'); row.appendChild(dl);
    tabList.appendChild(row);
  });
}
function moveCat(i,dir){ var j=i+dir; if(j<0||j>=data.cats.length)return; var t=data.cats[i];data.cats[i]=data.cats[j];data.cats[j]=t; if(active===i)active=j; else if(active===j)active=i; saveData(); renderNav(); renderTabList(); renderGrid(); }
function delCat(i){
  if(data.cats.length<=1){ alert('마지막 탭은 삭제할 수 없어요'); return; }
  if(!confirm('이 탭과 안의 모든 항목을 삭제할까요?'))return;
  data.cats.splice(i,1);
  if(active>=data.cats.length) active=data.cats.length-1;
  saveData(); renderNav(); renderTabList(); renderGrid();
}
document.getElementById('tabClose').addEventListener('click',function(){tabBack.classList.remove('show');});
document.getElementById('tabAdd').addEventListener('click',function(){openCatModal(-1);});

/* 탭 이름 폼 */
var catBack=document.getElementById('catBack'), catEdit=-1;
function openCatModal(i){
  catEdit=i;
  document.getElementById('catTitle').textContent = i<0?'탭 추가':'탭 이름변경';
  document.getElementById('catName').value = i<0?'':data.cats[i].label;
  catBack.classList.add('show');
}
document.getElementById('catCancel').addEventListener('click',function(){catBack.classList.remove('show');});
document.getElementById('catSave').addEventListener('click',function(){
  var nm=document.getElementById('catName').value.trim();
  if(!nm){ alert('탭 이름을 입력하세요'); return; }
  if(catEdit<0){ data.cats.push({label:nm,items:[]}); }
  else data.cats[catEdit].label=nm;
  saveData(); catBack.classList.remove('show'); renderNav(); renderTabList(); renderGrid();
});

/* 가져오기 / 내보내기 */
var impBack=document.getElementById('impBack');
function doExport(){
  var payload={kind:DATA_KIND, cats:data.cats};
  var blob=new Blob([JSON.stringify(payload,null,2)],{type:'application/json'});
  var a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=EXPORT_NAME;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(function(){URL.revokeObjectURL(a.href);},1500);
}
function applyImport(text){
  var raw=(text||'').replace(/^\uFEFF/,'').trim();
  if(!raw){ alert('가져올 내용이 없어요'); return; }
  var obj; try{ obj=JSON.parse(raw); }catch(e){ alert('JSON 형식이 아니에요'); return; }
  if(obj && obj.kind && obj.kind!==DATA_KIND){
    if(!confirm('다른 도구의 데이터(' + obj.kind + ')로 보여요. 그래도 가져올까요?')) return;
  }
  var c=coerceData(obj);
  if(!c){ alert('데이터 형식이 아니에요'); return; }
  data=c; active=0; saveData();
  impBack.classList.remove('show');
  document.getElementById('impText').value='';
  renderNav(); renderGrid();
  alert('가져왔어요');
}
document.getElementById('impFileBtn').addEventListener('click',function(){document.getElementById('impFile').click();});
document.getElementById('impFile').addEventListener('change',function(e){
  var f=e.target.files&&e.target.files[0]; if(!f)return;
  var r=new FileReader(); r.onload=function(){ applyImport(r.result); }; r.readAsText(f);
  e.target.value='';
});
document.getElementById('impCancel').addEventListener('click',function(){impBack.classList.remove('show');});
document.getElementById('impApply').addEventListener('click',function(){ applyImport(document.getElementById('impText').value); });

        '/* ========= @CONFIG_END ========= */';
  }
  html=html.replace(/\/\* ========= @CONFIG \(빌드 시 통째 교체\) ========= \*\/[\s\S]*?\/\* ========= @CONFIG_END ========= \*\//, cfg);

  var defBlock='/* ========= @DEFAULTS (빌드 시 통째 교체) ========= */\n'+
    'var DEFAULT_DATA = '+JSON.stringify({cats:data.cats})+';\n'+
    '/* ========= @DEFAULTS_END ========= */';
  html=html.replace(/\/\* ========= @DEFAULTS \(빌드 시 통째 교체\) ========= \*\/[\s\S]*?\/\* ========= @DEFAULTS_END ========= \*\//, defBlock);

  var fname = mode==='view' ? 'movie-view.html' : 'movie-edit.html';
  var blob=new Blob([html],{type:'text/html'});
  var a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=fname;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(function(){URL.revokeObjectURL(a.href);},1500);
}

/* ---- 복사 방지 (보기전용에서만) ---- */
if(COPY_PROTECT){(function(){
  var isField=function(el){ return el&&(el.tagName==='INPUT'||el.tagName==='TEXTAREA'||el.tagName==='SELECT'||el.isContentEditable); };
  ['contextmenu','selectstart','dragstart','copy','cut'].forEach(function(ev){
    document.addEventListener(ev,function(e){ if(isField(e.target)) return; e.preventDefault(); });
  });
  document.addEventListener('keydown',function(e){
    var k=(e.key||'').toLowerCase();
    if(e.key==='F12'){e.preventDefault();return;}
    if(e.ctrlKey&&e.shiftKey&&['i','j','c'].includes(k)){e.preventDefault();return;}
    if(e.ctrlKey&&['u','s','c','x','a'].includes(k)){ if(isField(e.target)&&['c','x','a'].includes(k)) return; e.preventDefault(); }
  });
})();}
</script>
<script>
/* 모바일: 외부 링크를 최상위 창에서 열어 뒤로가기로 MYWAY 복귀. PC·태블릿은 새 탭. */
(function(){
  if(!/Mobi/i.test(navigator.userAgent)) return;
  document.addEventListener("click", function(e){
    var a = e.target.closest ? e.target.closest("a[href]") : null;
    if(!a) return;
    var href = a.getAttribute("href") || "";
    if(!href || href.charAt(0) === "#" || /^javascript:/i.test(href)) return;
    if(document.body.classList.contains('editing')) return;
    e.preventDefault();
    try { (window.top || window).location.href = a.href; }
    catch(_) { window.open(a.href, "_blank"); }
  }, true);
  var _open = window.open.bind(window);
  window.open = function(url, name, feat){
    if(url){ try{ (window.top||window).location.href = url; }catch(_){ location.href = url; } return null; }
    return _open(url, name, feat);
  };
})();
</script>
