<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>주요 사이트 - 포털·뉴스·BBS·방송사 모음 | MYWAY.KR</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="포털·뉴스·BBS·방송사 한 곳에 모은 사이트 디렉토리 - MYWAY.KR">

  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <link rel="manifest" href="/site.webmanifest">
  <link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; }

    :root {
      --bg-base: #0d1424;
      --bg-glow: #1a2440;
      --card-bg: linear-gradient(135deg, #2a3658 0%, #1d2745 100%);
      --card-bg-hover: linear-gradient(135deg, #38477a 0%, #28345e 100%);
      --card-border: rgba(255,255,255,0.06);
      --card-border-hover: rgba(255,255,255,0.15);
      --text-main: #ffffff;
      --text-sub: #8b96b8;
      --text-muted: #5a6a8f;
      --accent: #4ade80;          /* 녹색 (미국 상승) */
      --accent-glow: rgba(74,222,128,0.15);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    html, body {
      margin: 0; padding: 0;
      font-family: 'Segoe UI', '맑은 고딕', Arial, sans-serif;
      -webkit-text-size-adjust: 100%;
      background: var(--bg-base);
    }
    body {
      min-height: 100vh;
      min-height: 100dvh;
      overflow-x: hidden;
      background:
        radial-gradient(ellipse at top left, var(--bg-glow) 0%, transparent 50%),
        radial-gradient(ellipse at top right, rgba(74,222,128,0.06) 0%, transparent 40%),
        var(--bg-base);
      color: var(--text-main);
      -webkit-user-select: none;
      -moz-user-select: none;
      -ms-user-select: none;
      user-select: none;
    }
    img { -webkit-user-drag: none; user-drag: none; -webkit-touch-callout: none; }
    input, textarea, [contenteditable] {
      -webkit-user-select: text; -moz-user-select: text; -ms-user-select: text; user-select: text;
    }

    /* ===== 상단 헤더 ===== */
    .topbar {
      position: sticky;
      top: 0;
      z-index: 20;
      background: rgba(13, 20, 36, 0.85);
      backdrop-filter: saturate(180%) blur(12px);
      -webkit-backdrop-filter: saturate(180%) blur(12px);
      border-bottom: 1px solid rgba(255,255,255,0.06);
      padding: 12px 14px;
      padding-left: max(14px, env(safe-area-inset-left));
      padding-right: max(14px, env(safe-area-inset-right));
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .home-link {
      flex: 0 0 auto;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 36px; height: 36px;
      border-radius: 50%;
      text-decoration: none;
      color: #fff;
      background: linear-gradient(135deg, #5b6ef0, #883cea);
      box-shadow: 0 6px 18px rgba(91, 110, 240, 0.4);
      transition: transform .15s, box-shadow .15s;
      -webkit-tap-highlight-color: transparent;
    }
    .home-link:hover { transform: translateY(-1px); box-shadow: 0 10px 24px rgba(91, 110, 240, 0.55); }
    .home-link svg { width: 19px; height: 19px; fill: currentColor; }

    /* 탭 네비 (다크 톤) */
    .tab-nav {
      flex: 1 1 auto;
      min-width: 0;
      display: flex;
      gap: 8px;
      overflow-x: auto;
      scrollbar-width: none;
      -ms-overflow-style: none;
      padding: 2px 0;
    }
    .tab-nav::-webkit-scrollbar { display: none; }
    .tab-btn {
      font: inherit;
      font-size: .9rem;
      font-weight: 700;
      letter-spacing: -0.2px;
      padding: 7px 14px;
      border-radius: 999px;
      border: 1.5px solid rgba(255,255,255,0.10);
      background: rgba(255,255,255,0.04);
      color: var(--text-sub);
      cursor: pointer;
      transition: all .18s;
      white-space: nowrap;
      flex: 0 0 auto;
      -webkit-tap-highlight-color: transparent;
    }
    .tab-btn:hover {
      background: rgba(255,255,255,0.10);
      color: var(--text-main);
      border-color: rgba(255,255,255,0.18);
    }
    .tab-btn:active { transform: scale(0.96); }
    .tab-btn.is-active {
      background: rgba(74,222,128,0.14);
      color: var(--accent);
      border-color: rgba(74,222,128,0.5);
      box-shadow: 0 0 18px rgba(74,222,128,0.18);
    }
    .tab-btn .count {
      display: inline-block;
      margin-left: 4px;
      font-size: .72rem;
      opacity: .7;
      font-weight: 500;
    }

    /* ===== 본체 ===== */
    .main {
      max-width: 1200px;
      margin: 0 auto;
      padding: 28px 16px 60px;
      padding-bottom: calc(60px + var(--safe-bottom));
    }

    .section { margin-bottom: 32px; }
    .section:last-child { margin-bottom: 0; }

    .section-head {
      display: flex;
      align-items: baseline;
      gap: 10px;
      padding: 0 4px;
      margin-bottom: 12px;
    }
    .section-label {
      font-size: .85rem;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: 0.5px;
      text-transform: uppercase;
      text-shadow: 0 0 16px var(--accent-glow);
    }
    .section-sub {
      font-size: .75rem;
      color: var(--text-muted);
      font-weight: 500;
      letter-spacing: -0.1px;
    }

    /* 카드 그리드 */
    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }

    .card {
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 18px 18px;
      text-decoration: none;
      color: inherit;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 12px;
      position: relative;
      overflow: hidden;
      transition: transform .15s, box-shadow .15s, border-color .15s, background .2s;
      -webkit-tap-highlight-color: transparent;
      min-height: 78px;
    }
    /* 카드 좌상단 미세한 글로우 (이미지 디자인 차용) */
    .card::before {
      content: "";
      position: absolute;
      top: 0; left: 0;
      width: 60%; height: 100%;
      background: linear-gradient(120deg, rgba(255,255,255,0.04) 0%, transparent 60%);
      pointer-events: none;
    }
    .card:hover {
      background: var(--card-bg-hover);
      border-color: var(--card-border-hover);
      transform: translateY(-2px);
      box-shadow: 0 12px 28px rgba(0,0,0,0.35), 0 0 0 1px rgba(74,222,128,0.12);
    }
    .card:active { transform: translateY(0); }

    .card .ticker {
      font-size: 1.25rem;
      font-weight: 800;
      color: var(--text-main);
      letter-spacing: -0.4px;
      line-height: 1.15;
      margin-bottom: 4px;
      word-break: keep-all;
      overflow-wrap: anywhere;
    }
    /* 글자 수가 많은 카드(사이트명 등)는 자동으로 살짝 작게 */
    .card .ticker:has(+ .name-ko) { /* 보조 라벨 있는 모든 카드 */ }
    .card[data-long="1"] .ticker { font-size: 1.05rem; }
    .card .name-ko {
      font-size: .82rem;
      font-weight: 500;
      color: var(--text-sub);
      letter-spacing: -0.2px;
      line-height: 1.2;
    }
    /* 우상단 외부 링크 마커 */
    .card .arrow {
      position: absolute;
      top: 12px; right: 14px;
      font-size: .85rem;
      color: var(--text-muted);
      opacity: 0;
      transition: opacity .15s, transform .15s;
    }
    .card:hover .arrow {
      opacity: 1;
      transform: translate(2px, -2px);
      color: var(--accent);
    }

    /* 반응형 */
    @media (max-width: 720px) {
      .grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
      .card { padding: 16px 16px; min-height: 72px; }
      .card .ticker { font-size: 1.1rem; }
      .card .name-ko { font-size: .78rem; }
      .main { padding: 22px 14px 60px; }
    }
    @media (max-width: 380px) {
      .grid { grid-template-columns: repeat(2, 1fr); gap: 9px; }
      .card { padding: 14px 14px; }
      .card .ticker { font-size: 1.05rem; }
    }

    /* ===== 생활정보 탭 전용 : 라이트 톤 + 원형 로고 ===== */
    body[data-active-tab="daily"] {
      background: #ffffff;
    }
    body[data-active-tab="daily"] .topbar {
      background: rgba(255, 255, 255, 0.95);
      border-bottom: 1px solid #eef0f4;
      backdrop-filter: saturate(180%) blur(8px);
    }
    body[data-active-tab="daily"] .tab-btn {
      background: rgba(0, 0, 0, 0.04);
      border-color: rgba(0, 0, 0, 0.08);
      color: #4a5170;
    }
    body[data-active-tab="daily"] .tab-btn:hover {
      background: rgba(0, 0, 0, 0.08);
      color: #1f2740;
      border-color: rgba(0, 0, 0, 0.16);
    }
    body[data-active-tab="daily"] .tab-btn.is-active {
      background: #333862;
      color: #fff;
      border-color: #333862;
      box-shadow: 0 4px 16px rgba(51, 56, 98, 0.28);
    }
    body[data-active-tab="daily"] .myway-footer {
      border-top: 1px solid #eef0f4;
      color: #8590ad;
    }
    body[data-active-tab="daily"] .myway-footer a { color: #4a5170; }
    body[data-active-tab="daily"] .myway-footer a:hover { color: #1f2740; }

    /* 원형 로고 그리드 (INDEXMAIN 디자인) - 기본: 고정 10열 74px */
    .logo-grid {
      display: grid;
      grid-template-columns: repeat(10, 74px);
      gap: 24px;
      justify-content: center;
      width: 100%;
      max-width: 100%;
      margin-bottom: 24px;
    }
    .logo-tile {
      width: 74px;
      height: 74px;
      border-radius: 50%;
      background: #fff;
      box-shadow: 0 3px 24px 0 #b1c7e866;
      border: 3px solid #e5e8f6;
      display: flex;
      justify-content: center;
      align-items: center;
      transition: box-shadow 0.15s, border-color 0.15s, transform 0.12s;
      cursor: pointer;
      overflow: hidden;
      margin: 0;
      text-decoration: none;
      -webkit-tap-highlight-color: transparent;
    }
    .logo-tile:hover,
    .logo-tile:active {
      box-shadow: 0 8px 32px 0 #7e94ff99;
      border-color: #94a2ff;
      background: #f7faff;
      /* 박스는 정지 — 회전/스케일은 이미지가 담당 */
    }
    .logo-tile img {
      width: 54px;
      height: 54px;
      object-fit: contain;
      background: transparent;
      border-radius: 50%;
      transition: transform 0.12s;
      pointer-events: none;
      display: block;
    }
    .logo-tile:hover img {
      transform: scale(1.08) rotate(-3deg);
    }

    /* ===== logo-grid 반응형 (INDEXMAIN과 동일한 9분기) ===== */
    /* 1) 초대형 PC (1600px+) */
    @media (min-width: 1600px) {
      .logo-grid {
        grid-template-columns: repeat(12, 80px);
        gap: 28px;
      }
      .logo-tile { width: 80px; height: 80px; }
      .logo-tile img { width: 58px; height: 58px; }
    }
    /* 2) 일반 PC (1101 ~ 1599px) */
    @media (min-width: 1101px) and (max-width: 1599px) {
      .logo-grid {
        grid-template-columns: repeat(10, 74px);
        gap: 22px;
      }
      .logo-tile { width: 74px; height: 74px; }
      .logo-tile img { width: 54px; height: 54px; }
    }
    /* 3) 노트북 / 작은 PC (901 ~ 1100px) */
    @media (min-width: 901px) and (max-width: 1100px) {
      .logo-grid {
        grid-template-columns: repeat(8, 70px);
        gap: 18px;
      }
      .logo-tile { width: 70px; height: 70px; }
      .logo-tile img { width: 50px; height: 50px; }
    }
    /* 4) 태블릿 (701 ~ 900px) */
    @media (min-width: 701px) and (max-width: 900px) {
      .logo-grid {
        grid-template-columns: repeat(7, 70px);
        gap: 16px;
      }
      .logo-tile { width: 70px; height: 70px; }
      .logo-tile img { width: 50px; height: 50px; }
    }
    /* 5) 핸드폰 세로 (~ 700px) */
    @media (max-width: 700px) {
      .logo-grid {
        grid-template-columns: repeat(5, minmax(0, 64px));
        gap: 12px;
        justify-content: center;
        margin-bottom: 18px;
      }
      .logo-tile { width: 64px; height: 64px; }
      .logo-tile img { width: 46px; height: 46px; }
    }
    /* 6) 작은 핸드폰 세로 (~ 420px) */
    @media (max-width: 420px) {
      .logo-grid {
        grid-template-columns: repeat(4, minmax(0, 64px));
        gap: 10px;
      }
      .logo-tile { width: 60px; height: 60px; }
      .logo-tile img { width: 42px; height: 42px; }
    }
    /* 7) 매우 작은 핸드폰 세로 (~ 340px) */
    @media (max-width: 340px) {
      .logo-grid {
        grid-template-columns: repeat(4, minmax(0, 56px));
        gap: 8px;
      }
      .logo-tile { width: 54px; height: 54px; border-width: 2px; }
      .logo-tile img { width: 38px; height: 38px; }
    }
    /* 8) 핸드폰 가로 모드 (landscape + 짧은 높이) */
    @media (orientation: landscape) and (max-height: 500px) {
      .logo-grid {
        grid-template-columns: repeat(10, minmax(0, 52px));
        gap: 10px;
        margin-bottom: 10px;
      }
      .logo-tile {
        width: 52px; height: 52px;
        border-width: 2px;
        box-shadow: 0 2px 12px 0 #b1c7e855;
      }
      .logo-tile img { width: 36px; height: 36px; }
    }
    /* 9) 작은 핸드폰 가로 (iPhone SE 가로 등) */
    @media (orientation: landscape) and (max-height: 380px) {
      .logo-grid {
        grid-template-columns: repeat(11, minmax(0, 46px));
        gap: 8px;
        margin-bottom: 8px;
      }
      .logo-tile { width: 46px; height: 46px; }
      .logo-tile img { width: 32px; height: 32px; }
    }

    /* 생활정보 탭에서는 섹션 헤더 숨김 (텍스트 제거) */
    body[data-active-tab="daily"] .section-head { display: none; }

    /* ===== MYWAY.KR 공통 ===== */
    .myway-home-btn {
      position: fixed;
      right: 14px;
      bottom: calc(14px + var(--safe-bottom));
      z-index: 9999;
      display: inline-flex; align-items: center; gap: 7px;
      padding: 9px 14px 9px 12px;
      background: linear-gradient(135deg, #5b6ef0, #883cea);
      color: #fff;
      border-radius: 999px;
      font-size: .82rem; font-weight: 700;
      text-decoration: none; letter-spacing: -0.2px;
      box-shadow: 0 6px 20px rgba(91, 110, 240, 0.5);
      transition: transform .15s, box-shadow .15s;
      -webkit-tap-highlight-color: transparent;
    }
    .myway-home-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 26px rgba(91, 110, 240, 0.65); }
    .myway-home-btn svg { width: 15px; height: 15px; fill: currentColor; flex-shrink: 0; }

    .myway-footer {
      width: 100%;
      text-align: center;
      padding: 22px 14px calc(28px + var(--safe-bottom));
      margin-top: 28px;
      border-top: 1px solid rgba(255,255,255,0.06);
      font-size: .82rem;
      color: var(--text-muted);
    }
    .myway-footer a {
      color: var(--text-sub);
      text-decoration: none;
      font-weight: 700;
    }
    .myway-footer a:hover { color: var(--accent); }
    .myway-footer .sep { display: inline-block; margin: 0 8px; opacity: .5; }
  .sc-section {
      width: 100%;
      max-width: 1280px;
      margin: 28px auto 24px;
      padding: 0 24px;
      font-family: 'Segoe UI', '맑은 고딕', Arial, sans-serif;
      color: #333862;
    }

    .sc-header {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 10px;
      padding: 0 2px 14px;
      margin-bottom: 14px;
    }
    .sc-title {
      grid-column: 2;
      margin: 0;
      text-align: center;
      font-family: 'Gowun Batang', 'Segoe UI', '맑은 고딕', serif;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 0.04em;
      color: #2a2f55;
      white-space: nowrap;
    }
    .sc-actions {
      grid-column: 3;
      justify-self: end;
      display: inline-flex;
      align-items: center;
      gap: 2px;
    }
    .sc-icon-btn {
      width: 30px; height: 30px;
      border: none;
      background: transparent;
      color: #8a93b8;
      border-radius: 7px;
      cursor: pointer;
      font-size: 14px;
      line-height: 1;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: all 0.12s;
      padding: 0;
    }
    .sc-icon-btn:hover { color: #333862; background: #f1f3f8; }
    .sc-icon-btn.danger:hover { color: #d33; background: #fdecec; }

    /* ───── 그리드: .logo-row와 동일한 구조 ───── */
    .sc-grid {
      display: grid;
      grid-template-columns: repeat(10, 74px);
      gap: 24px;
      justify-content: center;
      width: 100%;
      max-width: 100%;
    }

    /* ───── 타일: .ai-logo-wrap와 동일한 원형 ───── */
    .sc-tile {
      position: relative;
      width: 74px;
      height: 74px;
      border-radius: 50%;
      background: #fff;
      box-shadow: 0 3px 24px 0 #b1c7e866;
      border: 3px solid #e5e8f6;
      display: flex;
      justify-content: center;
      align-items: center;
      transition: box-shadow 0.15s, border-color 0.15s, transform 0.12s;
      cursor: pointer;
      overflow: hidden;
      text-decoration: none;
      -webkit-tap-highlight-color: transparent;
      color: inherit;
    }
    .sc-tile:hover {
      box-shadow: 0 8px 32px 0 #7e94ff99;
      border-color: #94a2ff;
      background: #f7faff;
    }
    .sc-tile.sc-dragging { opacity: 0.4; }
    .sc-tile.sc-drag-over {
      border-color: #4a9eff;
      box-shadow: 0 0 0 3px rgba(74,158,255,0.3);
    }

    .sc-fav {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: transparent;
      border: none;
      border-radius: 50%;
      overflow: hidden;
    }
    .sc-fav img {
      width: 60%;
      height: 60%;
      object-fit: contain;
    }
    .sc-fav.sc-ph {
      background: linear-gradient(135deg, #6fc8ff, #4a9eff);
      color: #fff;
      font-weight: 700;
      font-size: 28px;
    }

    /* + 추가 타일 (점선 원) */
    .sc-tile.sc-add {
      background: transparent;
      border: 2.5px dashed #cdd2de;
      box-shadow: none;
      color: #aab1c4;
    }
    .sc-tile.sc-add:hover {
      border-color: #94a2ff;
      color: #6fc8ff;
      background: #f7faff;
      box-shadow: none;
    }
    .sc-tile.sc-add .sc-fav {
      background: transparent;
      font-size: 32px;
      font-weight: 300;
    }

    /* × 삭제 버튼 - 평소엔 숨김, 호버 시 빨갛게 표시 */
    .sc-menu-btn {
      position: absolute;
      top: -4px; right: -4px;
      width: 24px; height: 24px;
      border-radius: 50%;
      background: #ef4444;
      border: 2px solid #fff;
      color: #fff;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      line-height: 1;
      z-index: 2;
      opacity: 0;
      pointer-events: none;
      transform: scale(0.7);
      box-shadow: 0 3px 10px rgba(239,68,68,0.5);
      transition: opacity 0.15s, transform 0.15s, background 0.15s;
    }
    .sc-tile:hover .sc-menu-btn {
      opacity: 1;
      pointer-events: auto;
      transform: scale(1);
    }
    .sc-menu-btn:hover {
      background: #dc2626 !important;
      transform: scale(1.15) !important;
      box-shadow: 0 4px 14px rgba(239,68,68,0.65) !important;
    }
    /* 모바일(호버 없음)에선 살짝 보이게 */
    @media (hover: none) {
      .sc-menu-btn {
        opacity: 0.75;
        pointer-events: auto;
        transform: scale(1);
        background: rgba(26,26,26,0.6);
      }
    }

    /* ───── 반응형 (logo-row와 완전 동일하게) ───── */
    @media (min-width: 1600px) {
      .sc-section { max-width: 1280px; padding: 0 24px; }

      display: block;

    .masonry .gcard img {

    (function(){
      function isEditable(t) {
        if (!t) return false;
        const tag = (t.tagName || '').toLowerCase();
        if (tag === 'input' || tag === 'textarea') return true;
        if (t.isContentEditable) return true;
        /* 자주가는 사이트 영역(.sc-section)은 우클릭 편집·드래그 정렬 필요해서 예외 */
        if (t.closest && t.closest('.sc-section')) return true;
        return false;
      }
      ['contextmenu','dragstart','selectstart','copy','cut'].forEach(ev => {
        document.addEventListener(ev, e => {
          if (isEditable(e.target)) return;
          e.preventDefault();
        }, { capture: true });
      });
      document.addEventListener('keydown', e => {
        if (isEditable(e.target)) return;
        const k = (e.key || '').toLowerCase();
        if (k === 'f12') { e.preventDefault(); return; }
        if (e.ctrlKey && e.shiftKey && (k === 'i' || k === 'j' || k === 'c')) { e.preventDefault(); return; }
        if (e.ctrlKey && !e.shiftKey && (k === 'u' || k === 's' || k === 'c' || k === 'x' || k === 'a')) { e.preventDefault(); return; }

    /* ============ 렌더 ============ */
    function renderTab(tabId) {
      // body 속성 변경 → CSS 라이트/다크 톤 토글
      document.body.dataset.activeTab = tabId;

      const root = document.getElementById('main');
      const frag = document.createDocumentFragment();
      const tab = tabs[tabId];
      if (!tab) return;

      const isLogo = !!tab.logoStyle;

      tab.sections.forEach(sec => {
        const section = document.createElement('section');
        section.className = 'section';

        const head = document.createElement('div');
        head.className = 'section-head';
        const label = document.createElement('span');
        label.className = 'section-label';
        label.textContent = sec.label;
        const sub = document.createElement('span');
        sub.className = 'section-sub';
        sub.textContent = sec.sub;
        head.appendChild(label);
        head.appendChild(sub);
        section.appendChild(head);

        const grid = document.createElement('div');
        grid.className = isLogo ? 'logo-grid' : 'grid';

        sec.items.forEach(it => {
          if (isLogo) {
            // 원형 로고 타일 (INDEXMAIN 스타일)
            const a = document.createElement('a');
            a.className = 'logo-tile';
            a.href = it.url;
            a.target = '_blank';
            a.rel = 'noopener noreferrer';
            a.setAttribute('aria-label', it.name || '');
            const img = document.createElement('img');
            img.src = it.img;
            img.alt = it.name || '';
            img.loading = 'lazy';
            img.decoding = 'async';
            img.referrerPolicy = 'no-referrer';
            a.appendChild(img);
            grid.appendChild(a);
          } else {
            // 기존 다크 카드
            const a = document.createElement('a');
            a.className = 'card';
            a.href = it.url;
            a.target = '_blank';
            a.rel = 'noopener';
            a.setAttribute('aria-label', it.ko || it.ticker);
            const tk = document.createElement('div');
            tk.className = 'ticker';
            tk.textContent = it.ticker;
            a.appendChild(tk);
            if (String(it.ticker).length > 6) a.dataset.long = '1';
            const ko = document.createElement('div');
            ko.className = 'name-ko';
            ko.textContent = it.ko;
            a.appendChild(ko);
            const arr = document.createElement('span');
            arr.className = 'arrow';
            arr.textContent = '↗';
            a.appendChild(arr);
            grid.appendChild(a);
          }
        });
        section.appendChild(grid);
        frag.appendChild(section);
      });

      root.replaceChildren(frag);
    }

    /* ============ 탭 네비 ============ */
    function setupTabs() {
      const nav = document.getElementById('tabNav');
      nav.addEventListener('click', e => {
        const btn = e.target.closest('.tab-btn');
        if (!btn) return;
        nav.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('is-active'));
        btn.classList.add('is-active');
        renderTab(btn.dataset.tab);
        window.scrollTo({ top: 0, behavior: 'smooth' });
        // 클릭한 탭을 가시 영역 가운데로 부드럽게 가로 스크롤
        // block: 'nearest' → 세로 페이지 스크롤은 건드리지 않음
        btn.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
      });
    }

  <script>
  
  (function() {
    'use strict';
    const KEY = 'mywayShortcutsV1';
    const FAV = 'https://www.google.com/s2/favicons?sz=64&domain=';
    const SAMPLES = [
      { name: '네이버', url: 'https://www.naver.com' },
      { name: '다음', url: 'https://www.daum.net' },
      { name: '구글', url: 'https://www.google.com' },
      { name: '유튜브', url: 'https://www.youtube.com' },
      { name: '카카오', url: 'https://www.kakaocorp.com' },
    ];

    let items = [];
    let editingId = null;
    let pending = null;
    let ctxId = null;
    let dragId = null;

    const $ = (id) => document.getElementById(id);

    function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 8); }
    function normUrl(u) {
      u = (u || '').trim();
      if (!u) return '';
      if (!/^https?:\/\//i.test(u)) u = 'https://' + u;
      try { new URL(u); return u; } catch (e) { return ''; }
    }
    function dom(u) { try { return new URL(u).hostname; } catch (e) { return ''; } }
    function guess(u) { const d = dom(u); return d ? d.replace(/^www\./, '').split('.')[0] : ''; }

    function load() {
      try {
        const r = localStorage.getItem(KEY);
        if (r) { const a = JSON.parse(r); if (Array.isArray(a)) return a; }
      } catch (e) {}
      return SAMPLES.map(s => ({ id: uid(), ...s }));
    }
    function persist() { try { localStorage.setItem(KEY, JSON.stringify(items)); } catch (e) {} }

    function toast(msg) {
      const t = $('sc-toast');
      t.textContent = msg;
      t.classList.add('sc-show');
      clearTimeout(toast._t);
      toast._t = setTimeout(() => t.classList.remove('sc-show'), 1900);
    }

    function render() {
      const grid = $('sc-grid');
      grid.innerHTML = '';
      items.forEach(s => {
        const tile = document.createElement('a');
        tile.className = 'sc-tile';
        tile.href = s.url;
        tile.target = '_blank';
        tile.rel = 'noopener';
        tile.title = s.name || dom(s.url);
        tile.draggable = true;
        tile.dataset.id = s.id;

        const d = dom(s.url);
        const fav = document.createElement('div');
        fav.className = 'sc-fav';
        if (d) {
          const img = document.createElement('img');
          img.src = FAV + encodeURIComponent(d);
          img.alt = '';
          img.onerror = () => {
            fav.classList.add('sc-ph');
            fav.textContent = (s.name || d).charAt(0).toUpperCase();
          };
          fav.appendChild(img);
        } else {
          fav.classList.add('sc-ph');
          fav.textContent = (s.name || '?').charAt(0).toUpperCase();
        }
        tile.appendChild(fav);

        const mb = document.createElement('button');
        mb.className = 'sc-menu-btn';
        mb.textContent = '×';
        mb.title = '삭제 (편집은 우클릭)';
        mb.setAttribute('aria-label', '삭제');
        mb.onclick = (e) => {
          e.preventDefault(); e.stopPropagation();
          if (confirm('"' + (s.name || dom(s.url)) + '" 삭제할까요?')) {
            items = items.filter(x => x.id !== s.id);
            persist();
            render();
            toast('삭제됨');
          }
        };
        tile.appendChild(mb);

        // 우클릭으로 편집 메뉴 (편집/삭제 둘 다 가능)
        tile.addEventListener('contextmenu', (e) => {
          e.preventDefault();
          openCtx(e, s.id);
        });

        tile.addEventListener('dragstart', dStart);
        tile.addEventListener('dragover', dOver);
        tile.addEventListener('dragleave', dLeave);
        tile.addEventListener('drop', dDrop);
        tile.addEventListener('dragend', dEnd);
        grid.appendChild(tile);
      });

      const add = document.createElement('div');
      add.className = 'sc-tile sc-add';
      add.title = '새 바로가기 추가';
      add.innerHTML = '<div class="sc-fav">+</div>';
      add.onclick = () => openEdit(null);
      grid.appendChild(add);
    }

    function dStart(e) {
      dragId = this.dataset.id;
      this.classList.add('sc-dragging');
      e.dataTransfer.effectAllowed = 'move';
      try { e.dataTransfer.setData('text/plain', dragId); } catch (err) {}
    }
    function dOver(e) {
      if (!dragId || this.dataset.id === dragId) return;
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      this.classList.add('sc-drag-over');
    }
    function dLeave() { this.classList.remove('sc-drag-over'); }
    function dDrop(e) {
      e.preventDefault();
      this.classList.remove('sc-drag-over');
      if (!dragId || this.dataset.id === dragId) return;
      const f = items.findIndex(x => x.id === dragId);
      const t = items.findIndex(x => x.id === this.dataset.id);
      if (f < 0 || t < 0) return;
      const [m] = items.splice(f, 1);
      items.splice(t, 0, m);
      persist();
      render();
    }
    function dEnd() {
      document.querySelectorAll('.sc-tile').forEach(t =>
        t.classList.remove('sc-dragging', 'sc-drag-over'));
      dragId = null;
    }

    function openEdit(id) {
      editingId = id;
      const m = $('sc-edit-modal');
      const t = $('sc-modal-title');
      const u = $('sc-url');
      const n = $('sc-name');
      if (id) {
        const s = items.find(x => x.id === id);
        if (!s) return;
        t.textContent = '바로가기 편집';
        u.value = s.url;
        n.value = s.name || '';
      } else {
        t.textContent = '바로가기 추가';
        u.value = '';
        n.value = '';
      }
      m.classList.add('sc-show');
      setTimeout(() => u.focus(), 50);
    }
    function closeEdit() { $('sc-edit-modal').classList.remove('sc-show'); editingId = null; }
    function saveEdit() {
      const u = $('sc-url'), n = $('sc-name');
      const url = normUrl(u.value);
      if (!url) { toast('올바른 URL을 입력해주세요'); u.focus(); return; }
      const name = n.value.trim() || guess(url);
      if (editingId) {
        const s = items.find(x => x.id === editingId);
        if (s) { s.url = url; s.name = name; }
        toast('수정 완료');
      } else {
        items.push({ id: uid(), name, url });
        toast('추가됨');
      }
      persist();
      render();
      closeEdit();
    }

    function openCtx(e, id) {
      ctxId = id;
      const m = $('sc-ctx');
      m.style.left = Math.min(e.clientX, window.innerWidth - 140) + 'px';
      m.style.top = Math.min(e.clientY, window.innerHeight - 100) + 'px';
      m.classList.add('sc-show');
    }
    function closeCtx() { $('sc-ctx').classList.remove('sc-show'); ctxId = null; }
    document.addEventListener('click', (e) => {
      if (!e.target.closest('#sc-ctx') && !e.target.closest('.sc-menu-btn')) closeCtx();
    });
    $('sc-ctx').addEventListener('click', (e) => {
      const b = e.target.closest('button');
      if (!b || !ctxId) return;
      if (b.dataset.act === 'edit') openEdit(ctxId);
      else if (b.dataset.act === 'delete') {
        const s = items.find(x => x.id === ctxId);
        if (s && confirm('"' + (s.name || dom(s.url)) + '" 삭제할까요?')) {
          items = items.filter(x => x.id !== ctxId);
          persist();
          render();
          toast('삭제됨');
        }
      }
      closeCtx();
    });

    function doExport() {
      const data = {
        app: 'myway.kr', type: 'shortcuts', version: 1,
        exportedAt: new Date().toISOString(),
        count: items.length, shortcuts: items,
      };
      const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
      const ymd = new Date().toISOString().slice(0,10).replace(/-/g, '');
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'myway-shortcuts-' + ymd + '.json';
      document.body.appendChild(a);
      a.click();
      setTimeout(() => { URL.revokeObjectURL(a.href); a.remove(); }, 100);
      toast(items.length + '개 내보내기 완료');
    }
    function readFile(file) {
      const r = new FileReader();
      r.onload = () => {
        try {
          const d = JSON.parse(r.result);
          const arr = Array.isArray(d) ? d : (Array.isArray(d.shortcuts) ? d.shortcuts : null);
          if (!arr) throw new Error('형식 오류');
          const v = arr.filter(s => s && s.url && normUrl(s.url));
          if (!v.length) { toast('유효한 항목 없음'); return; }
          pending = v.map(s => ({ id: s.id || uid(), name: s.name || guess(s.url), url: normUrl(s.url) }));
          $('sc-import-count').textContent = pending.length;
          $('sc-current-count').textContent = items.length;
          $('sc-import-modal').classList.add('sc-show');
        } catch (e) { toast('파일 읽기 실패'); }
      };
      r.readAsText(file);
    }
    function doImport(mode) {
      if (!pending) return;
      if (mode === 'replace') {
        items = pending.map(s => ({ ...s, id: uid() }));
        toast('전체 교체: ' + items.length + '개');
      } else {
        const ex = new Set(items.map(s => s.url));
        const add = pending.filter(s => !ex.has(s.url));
        add.forEach(s => items.push({ ...s, id: uid() }));
        toast(add.length + '개 추가');
      }
      persist(); render();
      pending = null;
      $('sc-import-modal').classList.remove('sc-show');
    }

    $('sc-export').onclick = doExport;
    $('sc-import').onclick = () => $('sc-file').click();
    $('sc-file').onchange = (e) => { if (e.target.files[0]) readFile(e.target.files[0]); e.target.value = ''; };
    $('sc-clear').onclick = () => {
      if (!items.length) { toast('비어있음'); return; }
      if (confirm(items.length + '개 전부 삭제할까요?')) {
        items = []; persist(); render(); toast('모두 삭제됨');
      }
    };
    $('sc-cancel').onclick = closeEdit;
    $('sc-save').onclick = saveEdit;
    $('sc-url').addEventListener('keydown', (e) => { if (e.key === 'Enter') $('sc-name').focus(); });
    $('sc-name').addEventListener('keydown', (e) => { if (e.key === 'Enter') saveEdit(); });
    $('sc-imp-merge').onclick = () => doImport('merge');
    $('sc-imp-replace').onclick = () => doImport('replace');
    $('sc-imp-cancel').onclick = () => { pending = null; $('sc-import-modal').classList.remove('sc-show'); };
    document.querySelectorAll('.sc-modal').forEach(m => {
      m.addEventListener('click', (e) => { if (e.target === m) m.classList.remove('sc-show'); });
    });
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        document.querySelectorAll('.sc-modal.sc-show').forEach(m => m.classList.remove('sc-show'));
        closeCtx();
      }
    });

    items = load();
    render();
  })();
  
  </script>
</body>
</html>
