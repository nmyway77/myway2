/* ===== 디렉터리 로드/저장 (편집 데이터 우선) ===== */
function cloneDir(d){ return d.map(s=>({label:s.label, items:s.items.map(it=>it.slice())})); }
function coerceDir(p){
  if(Array.isArray(p)&&p.length&&p[0]&&typeof p[0]==='object'&&'items' in p[0]){
    return p.map(s=>({label:String(s.label||''),items:(s.items||[]).map(it=>[String(it[0]||''),String(it[1]||''),String(it[2]||'')])}));
  }
  if(Array.isArray(p)&&p.length&&Array.isArray(p[0])){
    return [{label:'가져온 목록',items:p.map(it=>[String(it[0]||''),String(it[1]||''),String(it[2]||'')])}];
  }
  return null;
}
function loadDir(){
  ensureDistFresh();
  try{
    var raw=localStorage.getItem(STORE_KEY);
    if(raw){ var c=coerceDir(JSON.parse(raw)); if(c) return c; }
  }catch(_){}
  return cloneDir(DEFAULT_DIRECTORY);
}
let DIRECTORY = loadDir();
function saveDir(){ try{ localStorage.setItem(STORE_KEY, JSON.stringify(DIRECTORY)); }catch(_){} }

function setViewerSrc(url){
  /* 영상 디렉토리 파일과 동일한 방식:
     고정 컨테이너(#viewerBox) 안에 innerHTML로 iframe을 통째로 그려 넣음.
     → allow(자동재생 권한)가 src와 함께 파싱되어 PC·모바일 모두 안정적으로 재생됨. */
  var box=document.getElementById('viewerBox');
  var safe=String(url).replace(/"/g,'%22');
  box.innerHTML='<iframe title="LIVE TV 뷰어" referrerpolicy="no-referrer" allow="autoplay; encrypted-media; fullscreen" allowfullscreen src="'+safe+'"></iframe>';
}

  saveDir(); renderGrid();
}
function deleteItem(si,ii){
  if(!confirm('이 항목을 삭제할까요?\n'+DIRECTORY[si].items[ii][0])) return;

}
function moveSection(si,dir){
  const ni=si+dir; if(ni<0||ni>=DIRECTORY.length) return;

}

/* ===== 내보내기 / 가져오기 ===== */
function exportDir(){
  const payload={ kind:DATA_KIND, sites:SITES, dir:DIRECTORY };
  const blob=new Blob([JSON.stringify(payload,null,2)],{type:'application/json'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='myway-useful.json'; a.click();
  setTimeout(()=>URL.revokeObjectURL(a.href),1500);
}
function importDir(){
  const inp=document.createElement('input'); inp.type='file'; inp.accept='.json,.html,.htm,text/html,application/json';
  inp.onchange=()=>{
    const f=inp.files[0]; if(!f) return;
    const r=new FileReader();
    r.onload=()=>{
      let dir=null, sites=null; const txt=String(r.result);
      try{
        const p=JSON.parse(txt);
        if(p&&typeof p==='object'&&!Array.isArray(p)){
          if(p.kind && p.kind!==DATA_KIND){
            alert('다른 도구에서 만든 JSON이에요. (종류: '+p.kind+')\n이 파일에는 가져올 수 없어요.');
            return;
          }
          if(p.dir||p.sites){ dir=coerceDir(p.dir); sites=coerceSites(p.sites); }
          else dir=coerceDir(p);
        } else { dir=coerceDir(p); }
      }catch(_){}
      if(!dir){
        const md=txt.match(/DEFAULT_DIRECTORY\s*=\s*(\[[\s\S]*?\])\s*;\s*\/\* @DIR_END/);
        if(md){ try{ dir=coerceDir(eval('('+md[1]+')')); }catch(_){} }
      }
      if(!sites){
        const ms=txt.match(/DEFAULT_SITES\s*=\s*(\[[\s\S]*?\])\s*;\s*\/\* @SITES_END/);
        if(ms){ try{ sites=coerceSites(eval('('+ms[1]+')')); }catch(_){} }
      }
      if(!dir&&!sites){ alert('읽을 수 있는 데이터가 없어요.'); return; }
      let msg=[];
      if(sites){ SITES=sites; saveSites(); renderNav(); msg.push('채널 '+SITES.length+'개'); }
      if(dir){ DIRECTORY=dir; saveDir(); msg.push('섹션 '+DIRECTORY.length+'개'); }
      renderGrid();
      alert('가져왔어요. '+msg.join(' · '));
    };
    r.readAsText(f);
  };
  inp.click();
}

const codeBack=document.getElementById('codeBack');
function openCode(){ codeBack.classList.add('show'); }
function closeCode(){ codeBack.classList.remove('show'); }

codeBack.addEventListener('click',e=>{ if(e.target===codeBack) closeCode(); });
function serializeDir(dir){
  let out='[\n';
  dir.forEach(sec=>{
    out+='  { label:'+JSON.stringify(sec.label)+', items:[\n';
    sec.items.forEach(it=>{ out+='    ['+JSON.stringify(it[0])+','+JSON.stringify(it[1])+','+JSON.stringify(it[2])+'],\n'; });
    out+='  ]},\n';
  });
  out+=']'; return out;
}
function serializeSites(s){
  let out='[\n';
  s.forEach(x=>{ out+='  ['+JSON.stringify(x[0])+','+JSON.stringify(x[1])+(x[2]?','+JSON.stringify(x[2]):'')+'],\n'; });
  out+=']'; return out;
}
function buildHTML(cfg){
  const clone=document.documentElement.cloneNode(true);
  const tn=clone.querySelector('#topnav');
  if(tn){ Array.prototype.slice.call(tn.children).forEach(ch=>{ if(!ch.classList.contains('nav-home')&&ch.id!=='navTrack') ch.remove(); }); }
  const nt=clone.querySelector('#navTrack'); if(nt) nt.innerHTML='';
  const gp=clone.querySelector('#gridPanel'); if(gp){ gp.innerHTML=''; gp.classList.remove('show'); }
  const vb=clone.querySelector('#viewerBox'); if(vb){ vb.innerHTML=''; vb.style.display=''; }
  ['#dlgBack','#codeBack','#navBack','#chBack'].forEach(id=>{ const m=clone.querySelector(id); if(m) m.classList.remove('show'); });
  const ns=clone.querySelector('#dlgNewSecWrap'); if(ns) ns.style.display='none';
  const nl=clone.querySelector('#navList'); if(nl) nl.innerHTML='';
  const et=clone.querySelector('#editToolbar'); if(et) et.innerHTML='';
  let html='<!DOCTYPE html>\n'+clone.outerHTML;
  html=html.replace(/\/\* @SITES_START \*\/[\s\S]*?\/\* @SITES_END \*\//,
    '/* @SITES_START */\nconst DEFAULT_SITES = '+serializeSites(SITES)+';\n/* @SITES_END */');
  html=html.replace(/\/\* @DIR_START \*\/[\s\S]*?\/\* @DIR_END \*\//,
    '/* @DIR_START */\nconst DEFAULT_DIRECTORY = '+serializeDir(DIRECTORY)+';\n/* @DIR_END */');
  html=html.replace(/\/\* @CONFIG \*\/[\s\S]*?\/\* @CONFIG_END \*\//,
    '/* @CONFIG */\nconst IS_DIST = '+cfg.dist+';\nconst SHOW_EDIT = '+cfg.edit+';\nconst COPY_PROTECT = '+cfg.prot+';\nconst STORE_KEY = '+JSON.stringify(cfg.key)+';\nconst DIST_SIG = '+JSON.stringify(cfg.sig)+';\n/* @CONFIG_END */');
  return html;
}

}
renderNav();
buildToolbar();
document.addEventListener('click', function(e){ if(toolOpen && !e.target.closest('.edit-toolbar')) closeTool(); });
/* 전체목록 버튼 (맨 왼쪽 - 홈 다음) */
const gridBtn=document.createElement('button'); gridBtn.textContent='📺 전체목록'; gridBtn.dataset.grid='1'; gridBtn.className='grid-btn';
gridBtn.addEventListener('click',()=>showGrid(gridBtn));
nav.appendChild(gridBtn);
/* 새 탭으로 열기 (맨 앞 - 홈 버튼 다음, 항상 보이게) */
const openBtn=document.createElement('button'); openBtn.className='open-btn'; openBtn.textContent='↗ 새 탭';
openBtn.addEventListener('click',()=>window.open(currentUrl,'_blank','noopener'));
nav.insertBefore(openBtn, track);

/* 네비 드래그 스크롤 */
(function(){
  let down=false,startX=0,startL=0,moved=false;
  nav.addEventListener('pointerdown',e=>{ if(e.button!==0) return; down=true;moved=false;startX=e.clientX;startL=nav.scrollLeft;nav.classList.add('dragging'); });
  nav.addEventListener('pointermove',e=>{ if(!down) return; const dx=e.clientX-startX; if(Math.abs(dx)>4) moved=true; nav.scrollLeft=startL-dx; });
  const end=()=>{ down=false; nav.classList.remove('dragging'); };
  nav.addEventListener('pointerup',end);
  nav.addEventListener('pointercancel',end);
  nav.addEventListener('pointerleave',end);
  nav.addEventListener('click',e=>{ if(moved){ e.stopPropagation(); e.preventDefault(); moved=false; } },true);
  nav.addEventListener('wheel',e=>{ if(Math.abs(e.deltaY)>Math.abs(e.deltaX)){ nav.scrollLeft+=e.deltaY; e.preventDefault(); } },{passive:false});
})();

/* 초기화: 저장된 마지막 화면 복원(없으면 기본 = 전체목록) */
(function(){
  var saved='';
  try { saved = sessionStorage.getItem('mywayUseful') || ''; } catch(_) {}
  if(saved==='grid'){ showGrid(gridBtn); return; }
  var ms = /^site:(\d+)$/.exec(saved);
  if(ms){
    var i=parseInt(ms[1],10);
    var b=track.querySelector('button[data-site="'+i+'"]');
    if(b){
      if(SITES[i] && SITES[i][2]==='newwin'){ showGrid(gridBtn); return; }
      loadSite(i,b); return;
    }
  }
  var mu = /^url:(.+)$/.exec(saved);
  if(mu){ loadUrl(mu[1]); return; }
  showGrid(gridBtn);
})();

/* 복사 방지 */
(function(){
  if(typeof COPY_PROTECT!=='undefined' && !COPY_PROTECT) return;
  const isField=el=>el&&(el.tagName==='INPUT'||el.tagName==='TEXTAREA'||el.tagName==='SELECT');
  ['contextmenu','selectstart','dragstart','copy','cut'].forEach(ev=>{
    document.addEventListener(ev,e=>{ if(isField(e.target)) return; e.preventDefault(); });
  });
  document.addEventListener('keydown',e=>{
    const k=(e.key||'').toLowerCase();
    if(e.key==='F12'){e.preventDefault();return;}
    if(e.ctrlKey&&e.shiftKey&&['i','j','c'].includes(k)){e.preventDefault();return;}
    if(e.ctrlKey&&['u','s','c','x','a'].includes(k)){ if(isField(e.target)&&['c','x','a'].includes(k)) return; e.preventDefault(); }
  });
})();
</script>
<script>
/* 모바일: 외부 링크를 최상위 창에서 열어 뒤로가기로 MYWAY 복귀. PC·태블릿은 새 탭. */
(function(){
  if(!/Mobi/i.test(navigator.userAgent)) return;
  document.addEventListener("click", function(e){
    if(document.body.classList.contains('editing')) return;
    var a = e.target.closest ? e.target.closest("a[href]") : null;
    if(!a) return;
    var href = a.getAttribute("href") || "";
    if(!href || href.charAt(0) === "#" || /^javascript:/i.test(href)) return;
    e.preventDefault();
    try { (window.top || window).location.href = a.href; }
    catch(_) { window.open(a.href, "_blank"); }
  }, true);
  var _open = window.open.bind(window);
  window.open = function(url, name, feat){
    if(url){ try{ (window.top||window).location.href = url; }catch(_){ location.href = url; } return null; }
    return _open(url, name, feat);
  };
})();
</script>
