    .searchbar-mic {

    .screen-links-wrap {

    }

    .screen-links::-webkit-scrollbar { display: none; }

    /* 네비바 텍스트 그라데이션 */
    .screen-links a {
      text-decoration: none;
      padding: 2px 8px;
      border-radius: 8px;
      font-weight: 500;
      font-size: 1em;
      margin: 0 2px;
      background: none;
      border: none;

      display: inline-block;
      opacity: 0.93;
      letter-spacing: 0.01em;
      background-image: linear-gradient(135deg,#48b6e0 0%,#b176f3 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      color: transparent;
      position: relative;
      transition: background 0.12s, color 0.14s, transform 0.12s ease, box-shadow 0.14s ease;
      -webkit-tap-highlight-color: transparent;
    }

    /* 밑줄 기본 숨김 */
    .screen-links a::after {
      content: "";
      position: absolute;
      left: 8px;
      right: 8px;
      bottom: -2px;
      height: 3px;
      background: linear-gradient(90deg,#48b6e0,#b176f3);
      border-radius: 2px;
      opacity: 0;
      transform: scaleX(.4);
      transition: transform .18s ease, opacity .18s ease;
      pointer-events: none;
    }

    /* hover/active에서 밑줄 + 부드러운 효과 */
    .screen-links a:hover,
    .screen-links a:focus,
    .screen-links a.active {
      background: rgba(255,255,255,0.14);
      background-image: linear-gradient(135deg,#48b6e0 0%,#b176f3 100%) !important;

      background-clip: text !important;

      color: transparent !important;

      transform: translateY(-1px);
    }

    .screen-links a:hover::after,
    .screen-links a:focus::after,
    .screen-links a.active::after {
      opacity: 1;
      transform: scaleX(1);
    }

    .screen-links a:active {

    /* ========== iframe 영역 (펼치기/접기 토글) ========== */
    /* 헤더 높이를 CSS 변수로 관리 - 동적으로 조정 가능 */
    :root {
      --header-height: 158px;
    }

    /* iframe을 감싸는 wrapper - 펼치기/접기는 이걸로 제어 */
    .main-frame-wrap {
      position: fixed;
      left: 0;
      top: var(--header-height);
      width: 100%;
      /* dvh로 모바일 주소창 변화 대응 */
      height: calc(100vh - var(--header-height));
      height: calc(100dvh - var(--header-height));
      z-index: 10;
      overflow: hidden;
      transform: translateY(0);
      opacity: 1;
      transition: transform 0.38s cubic-bezier(0.22, 0.61, 0.36, 1),
                  opacity 0.28s ease;
      /* 노치 디바이스 하단 안전영역 */
      padding-bottom: env(safe-area-inset-bottom);
      will-change: transform;
    }

    /* 접힌 상태: 위로 슬라이드 아웃 */
    .main-frame-wrap.collapsed {
      transform: translateY(-12px);
      opacity: 0;
      pointer-events: none;
      visibility: hidden;
      transition: transform 0.32s cubic-bezier(0.4, 0, 1, 1),
                  opacity 0.22s ease,
                  visibility 0s linear 0.32s;
    }

    .main-frame {

      height: 100%;

    .collapsed-hint {

      align-items: center;

      font-size: 0.95rem;
      letter-spacing: 0.02em;
      user-select: none;
      text-align: center;
      padding: 20px;
    }

    body.frame-collapsed .collapsed-hint {
      display: flex;
    }

    @media (max-width: 700px) {

       =================================================================*/
    const NAVER_API_ENABLED = false;     // ← API 시도 활성화 스위치
    let naverApiStatus = 'untested';     // 'untested' | 'working' | 'failed'
    let naverApiBestUrl = null;          // 작동 확인된 endpoint 캐시

    // 가능한 endpoint 후보 (자주 쓰이는 네이버 자동완성 URL 패턴)
    const NAVER_AC_ENDPOINTS = [

    /** JSONP 호출 (CORS 우회) - script 태그로 외부 스크립트 로드 */
    function jsonpRequest(urlTemplate, query, timeoutMs) {
      return new Promise((resolve, reject) => {
        const cb = '__nsAc_' + Date.now() + Math.floor(Math.random() * 1e6);
        const sep = urlTemplate.includes('?') ? '&' : '?';
        const url = urlTemplate.replace('{Q}', encodeURIComponent(query))
                   + sep + '_callback=' + cb;
        const script = document.createElement('script');
        let done = false;

        const cleanup = () => {
          done = true;
          try { delete window[cb]; } catch (e) { window[cb] = undefined; }
          if (script.parentNode) script.parentNode.removeChild(script);
        };
        const timer = setTimeout(() => {
          if (!done) { cleanup(); reject(new Error('timeout')); }
        }, timeoutMs);

        window[cb] = (data) => {
          clearTimeout(timer); cleanup(); resolve(data);
        };
        script.onerror = () => {
          clearTimeout(timer); cleanup(); reject(new Error('load error'));
        };
        script.src = url;
        document.body.appendChild(script);
      });
    }

    /** 응답 형식이 제각각일 수 있어 여러 형식 시도하여 파싱 */
    function parseNaverStockResponse(data) {
      if (!data) return null;
      const results = [];
      const inferMarket = (code, hint) => {
        if (hint) {
          const h = String(hint).toLowerCase();
          if (h.includes('nasdaq') || h === 'o') return 'O';
          if (h.includes('nyse') || h === 'n') return 'N';
          if (h.includes('kospi') || h.includes('kosdaq') || h === 'kr' || h === 'k') return 'KR';
        }
        if (/^\d{6}$/.test(code)) return 'KR';
        if (code.endsWith && code.endsWith('.O')) return 'O';
        if (code.endsWith && code.endsWith('.N')) return 'N';
        return 'O';
      };
      const buildUrl = (code, market) => market === 'KR'
        ? `https://m.stock.naver.com/fchart/domestic/stock/${code.replace(/\..*$/, '')}`
        : `https://m.stock.naver.com/fchart/foreign/stock/${code}`;

      // 형식 1: { items|list|result.items|searchResult: [...] }
      const items = data.items || data.list || (data.result && data.result.items) || data.searchResult;
      if (Array.isArray(items)) {
        items.forEach(it => {
          if (!it) return;
          const code = it.code || it.stockCode || it.reutersCode || it.symbol || it.itemCode;
          if (!code) return;
          const name = it.name || it.stockName || it.korName || it.kor || it.cmpKor || code;
          const market = inferMarket(code, it.market || it.marketCategory || it.nationType);
          results.push({ code, name, market, url: buildUrl(code, market), source: 'api' });
        });
      }

      // 형식 2: 네이버 일반 자동완성 형식 [query, [[item], ...]]
      if (results.length === 0 && Array.isArray(data) && data.length >= 2 && Array.isArray(data[1])) {
        data[1].forEach(item => {
          if (Array.isArray(item)) {
            const [name, code, market] = item;
            if (code) {
              const m = inferMarket(code, market);
              results.push({ code, name, market: m, url: buildUrl(code, m), source: 'api' });
            }
          }
        });
      }

      return results.slice(0, 10);
    }

    /** 가능한 endpoint들을 시도하여 자동완성 결과 받기 */
    async function tryNaverStockAc(query) {
      if (!NAVER_API_ENABLED) return null;     // ← API 비활성화 시 즉시 종료 (timeout 방지)
      if (!query) return null;
      if (naverApiStatus === 'failed') return null;

      // 이미 작동하는 URL이 있으면 그것만 시도
      const toTry = naverApiBestUrl ? [naverApiBestUrl] : NAVER_AC_ENDPOINTS;

      for (const tpl of toTry) {
        try {
          const data = await jsonpRequest(tpl, query, 1500);
          const parsed = parseNaverStockResponse(data);
          if (parsed && parsed.length > 0) {
            if (naverApiStatus !== 'working') {
              console.log('[stockchart] ✅ 자동완성 API 작동 확인:', tpl);
              naverApiStatus = 'working';
              naverApiBestUrl = tpl;
            }
            return parsed;
          }
        } catch (e) { /* 다음 endpoint 시도 */ }
      }

      if (naverApiStatus === 'untested') {
        console.log('[stockchart] ❌ 모든 자동완성 API 시도 실패 - 로컬 매핑만 사용');
        console.log('[stockchart]   시도한 endpoint:', NAVER_AC_ENDPOINTS);
        naverApiStatus = 'failed';
      }
      return null;
    }

    /* ================================================================
       주식차트 자동완성 드롭다운
       =================================================================*/
    const queryInputEl = document.getElementById('queryParent');
    const engineSelectEl = document.getElementById('engineParent');
    const suggestionsBox = document.getElementById('stockSuggestions');
    let currentSuggestions = [];
    let activeIndex = -1;

    /** 입력값에 매칭되는 종목을 prefix 일치로 검색 (별칭 어디든 매칭) */
    function searchStocksLocal(query) {
      if (!query) return [];
      const q = query.toLowerCase().trim();
      if (!q) return [];
      const results = [];
      const seen = new Set();

      for (const row of stockChartData) {
        const [code, market, ...aliases] = row;
        const allKeys = [code, ...aliases];
        // 별칭 중 하나라도 query로 시작하면 매칭
        const matched = allKeys.some(a => a && a.toLowerCase().startsWith(q));
        if (matched && !seen.has(code)) {
          seen.add(code);
          const url = buildStockChartUrl(code, market);
          results.push({
            code,
            market,
            name: aliases[0] || code,      // 정식 한글명 (첫 번째 별칭)
            ticker: market === 'KR' ? code : `${code}.${market}`,
            url
          });
          if (results.length >= 10) break;  // 최대 10개
        }
      }
      return results;
    }

    /** 코인 prefix 검색 - 별칭 어디든 매칭 */
    function searchCoinsLocal(query) {
      if (!query) return [];
      const q = query.toLowerCase().trim();
      if (!q) return [];
      const results = [];
      const seen = new Set();

      for (const row of coinChartData) {
        const [ticker, ...aliases] = row;
        const allKeys = [ticker, ...aliases];
        const matched = allKeys.some(a => a && a.toLowerCase().startsWith(q));
        if (matched && !seen.has(ticker)) {
          seen.add(ticker);
          results.push({
            code: ticker,
            market: 'COIN',
            name: aliases[0] || ticker,
            ticker: ticker,
            url: `https://coinone.co.kr/chart?site=coinone${ticker.toLowerCase()}`
          });
          if (results.length >= 10) break;
        }
      }
      return results;
    }

    /** CFGI 공포탐욕지수 prefix 검색 - cfgi 지원 코인만 노출 */
    function searchFgiLocal(query) {
      if (!query) return [];
      const q = query.toLowerCase().trim();
      if (!q) return [];
      const results = [];
      const seen = new Set();

      for (const row of coinChartData) {
        const [ticker, ...aliases] = row;
        const fgiUrl = buildCoinFgiUrl(ticker);
        if (!fgiUrl) continue;  // CFGI 미지원 코인 스킵
        const allKeys = [ticker, ...aliases];
        const matched = allKeys.some(a => a && a.toLowerCase().startsWith(q));
        if (matched && !seen.has(ticker)) {
          seen.add(ticker);
          results.push({
            code: ticker,
            market: 'FGI',
            name: aliases[0] || ticker,
            ticker: ticker,
            url: fgiUrl
          });
          if (results.length >= 10) break;
        }
      }
      return results;
    }

    /** 드롭다운 렌더링 */
    function renderSuggestions() {
      if (currentSuggestions.length === 0) {
        suggestionsBox.hidden = true;
        suggestionsBox.innerHTML = '';
        return;
      }
      suggestionsBox.hidden = false;
      suggestionsBox.innerHTML = currentSuggestions.map((s, i) => {
        let marketLabel, marketClass, icon;
        if (s.market === 'COIN') {
          marketLabel = 'COIN'; marketClass = 'coin'; icon = '🪙';
        } else if (s.market === 'FGI') {
          marketLabel = 'FGI';  marketClass = 'coin'; icon = '📊';
        } else if (s.market === 'KR') {
          marketLabel = 'KR';   marketClass = 'kr';   icon = '📈';
        } else {
          marketLabel = 'US';   marketClass = 'us';   icon = '📈';
        }
        return `
          <div class="stock-suggestion-item ${i === activeIndex ? 'active' : ''}"
               role="option" data-index="${i}">
            <span class="stock-suggestion-icon">${icon}</span>
            <span class="stock-suggestion-name">${s.name}</span>
            <span class="stock-suggestion-code">${s.ticker}</span>
            <span class="stock-suggestion-market ${marketClass}">${marketLabel}</span>
          </div>
        `;
      }).join('');

      // 항목 클릭 (마우스 + 터치)
      suggestionsBox.querySelectorAll('.stock-suggestion-item').forEach(el => {
        el.addEventListener('mousedown', (e) => {
          // mousedown으로 처리하여 input blur 전에 동작
          e.preventDefault();
          selectSuggestion(parseInt(el.dataset.index));
        });
      });

      // 활성 항목이 보이도록 스크롤
      if (activeIndex >= 0) {
        const activeEl = suggestionsBox.children[activeIndex];
        if (activeEl) activeEl.scrollIntoView({ block: 'nearest' });
      }
    }

    /** 항목 선택 → 차트 새 창 + 드롭다운 닫기 */
    function selectSuggestion(idx) {
      const s = currentSuggestions[idx];
      if (!s) return;
      window.open(s.url, '_blank', 'noopener,noreferrer');
      closeSuggestions();
    }

    function closeSuggestions() {
      currentSuggestions = [];
      activeIndex = -1;
      suggestionsBox.hidden = true;
      suggestionsBox.innerHTML = '';
    }

    /** 입력값이나 엔진 변경 시 호출 - 주식차트/코인원/CFGI 모드에서만 표시 */
    let apiDebounceTimer = null;
    function updateSuggestions() {
      const mode = engineSelectEl.value;
      if (mode !== 'stockchart' && mode !== 'coinone' && mode !== 'cfgi') {
        closeSuggestions();
        return;
      }
      const query = queryInputEl.value.trim();

      // 모드별 로컬 매핑 결과 즉시 표시
      if (mode === 'coinone')      currentSuggestions = searchCoinsLocal(query);
      else if (mode === 'cfgi')    currentSuggestions = searchFgiLocal(query);
      else                         currentSuggestions = searchStocksLocal(query);
      activeIndex = -1;
      renderSuggestions();

      // 자동완성 API는 주식차트에서만 시도
      clearTimeout(apiDebounceTimer);
      if (!query || mode !== 'stockchart') return;
      apiDebounceTimer = setTimeout(() => callApiAndMerge(query), 150);
    }

    /** 자동완성 API 결과를 받아 기존 로컬 결과에 병합 */
    async function callApiAndMerge(query) {
      // 사용자가 더 입력했거나 닫혔으면 무시
      if (queryInputEl.value.trim() !== query) return;
      if (engineSelectEl.value !== 'stockchart') return;

      try {
        const apiResults = await tryNaverStockAc(query);
        if (!apiResults || apiResults.length === 0) return;
        // race condition 방지: 응답 도착 시 현재 입력값과 다르면 무시
        if (queryInputEl.value.trim() !== query) return;
        if (engineSelectEl.value !== 'stockchart') return;

        // 로컬 결과의 코드 집합 (중복 방지)
        const localCodes = new Set(currentSuggestions.map(r => r.code));
        const newOnes = apiResults.filter(r => {
          const cleanCode = String(r.code).split('.')[0];
          return !localCodes.has(cleanCode) && !localCodes.has(r.code);
        });
        if (newOnes.length === 0) return;

        // 로컬 결과 + API 추가분 (최대 15개)
        const merged = [
          ...currentSuggestions,
          ...newOnes.map(r => ({
            code: String(r.code).split('.')[0],
            market: r.market,
            name: r.name,
            ticker: r.market === 'KR' ? String(r.code).split('.')[0] : r.code,
            url: r.url
          }))
        ].slice(0, 15);
        currentSuggestions = merged;
        renderSuggestions();
      } catch (e) {
        // API 실패 → 로컬만 사용 (이미 표시됨)
      }
    }

    queryInputEl.addEventListener('input', updateSuggestions);
    queryInputEl.addEventListener('focus', updateSuggestions);
    engineSelectEl.addEventListener('change', updateSuggestions);

    // 키보드 네비게이션 (↑↓ Enter Esc)
    queryInputEl.addEventListener('keydown', (e) => {
      if (suggestionsBox.hidden || currentSuggestions.length === 0) return;

      if (e.key === 'ArrowDown') {
        e.preventDefault();
        activeIndex = Math.min(activeIndex + 1, currentSuggestions.length - 1);
        renderSuggestions();
      } else if (e.key === 'ArrowUp') {
        e.preventDefault();
        activeIndex = activeIndex <= 0 ? -1 : activeIndex - 1;
        renderSuggestions();
      } else if (e.key === 'Escape') {
        closeSuggestions();
      }
      // Enter는 form submit이 처리 (아래 submit 핸들러에서 첫 항목 자동 선택)
    });

    // 검색바 밖 클릭 시 드롭다운 닫기
    document.addEventListener('click', (e) => {
      if (!e.target.closest('.searchbar-wrap')) {
        closeSuggestions();
      }
    });

    /* === 음성 검색 (Web Speech API) === */
    (function setupVoiceSearch() {
      const micBtn = document.getElementById('micBtnParent');
      const queryInput = document.getElementById('queryParent');
      const searchForm = document.getElementById('searchFormParent');
      if (!micBtn || !queryInput || !searchForm) return;

      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      // 미지원 브라우저: 마이크 버튼 숨김
      if (!SpeechRecognition) {
        micBtn.classList.add('unsupported');
        return;
      }

      const recognition = new SpeechRecognition();
      recognition.lang = 'ko-KR';            // 한국어 인식
      recognition.interimResults = false;     // 최종 결과만
      recognition.maxAlternatives = 1;
      recognition.continuous = false;

      let listening = false;

      micBtn.addEventListener('click', () => {
        if (listening) {
          recognition.stop();
          return;
        }
        try {
          recognition.start();
        } catch (err) {
          /* 이미 시작된 경우 등 무시 */
        }
      });

      recognition.onstart = () => {
        listening = true;
        micBtn.classList.add('listening');
        micBtn.title = '듣는 중... (다시 누르면 중지)';
      };

      recognition.onend = () => {
        listening = false;
        micBtn.classList.remove('listening');
        micBtn.title = '음성 검색';
      };

      recognition.onerror = (e) => {
        listening = false;
        micBtn.classList.remove('listening');
        micBtn.title = '음성 검색';
        if (e.error === 'not-allowed' || e.error === 'service-not-allowed') {
          alert('마이크 권한이 필요합니다. 브라우저 설정에서 마이크 사용을 허용해주세요.');
        }
      };

      recognition.onresult = (e) => {
        const text = (e.results[0][0].transcript || '').trim();
        if (!text) return;
        /* 검색바에 인식 결과를 확실히 표시 (자동 검색하지 않음 - 사용자가 확인 후 검색) */
        queryInput.value = text;
        /* 자동완성 로직 갱신 */
        queryInput.dispatchEvent(new Event('input', { bubbles: true }));
        /* 모바일에서 화면 갱신·커서 이동 확실히 */
        try {
          queryInput.focus();
          queryInput.setSelectionRange(text.length, text.length);
        } catch (err) {}
        /* 인식 결과 토스트 피드백 */
        showVoiceToast('🎤 "' + text + '" 인식됨 — 검색 버튼을 누르세요');
      };

      /* 음성 인식 결과 토스트 */
      let voiceToastTimer;
      function showVoiceToast(msg) {
        let t = document.getElementById('voiceToast');
        if (!t) {
          t = document.createElement('div');
          t.id = 'voiceToast';
          t.style.cssText = 'position:fixed;left:50%;bottom:32px;transform:translateX(-50%);background:rgba(31,39,64,0.95);color:#fff;font-size:0.92rem;font-weight:600;padding:12px 22px;border-radius:999px;box-shadow:0 8px 24px rgba(31,39,64,0.35);z-index:99999;opacity:0;transition:opacity 0.2s;pointer-events:none;max-width:90vw;text-align:center;';
          document.body.appendChild(t);
        }
        t.textContent = msg;
        t.style.opacity = '1';
        clearTimeout(voiceToastTimer);
        voiceToastTimer = setTimeout(() => { t.style.opacity = '0'; }, 2600);
      }
    })();

    document.getElementById('searchFormParent').onsubmit = function(e) {
      e.preventDefault();
      const engineKey = document.getElementById('engineParent').value;
      const query = document.getElementById('queryParent').value.trim();

      // ── 주식차트 모드: 매핑 우선, 없으면 네이버 검색 fallback ──
      if (engineKey === 'stockchart') {
        if (!query) {
          // 빈 검색 → 네이버 증권 홈 (PC/모바일 자동 분기)
          window.open(
            IS_MOBILE_DEVICE ? 'https://m.stock.naver.com/' : 'https://finance.naver.com/',
            '_blank', 'noopener,noreferrer'
          );
          return;
        }
        // 0) 자동완성 드롭다운에 결과 있으면 첫 항목으로 (또는 활성 항목)
        //    → 사용자가 "엔비"만 쳐도 첫 후보(엔비디아)로 자동 이동
        if (currentSuggestions.length > 0) {
          const idx = activeIndex >= 0 ? activeIndex : 0;
          selectSuggestion(idx);
          return;
        }
        // 1) 정확 매핑 시도 (원형 + 소문자)
        const directUrl = stockChartShortcuts[query] || stockChartShortcuts[query.toLowerCase()];
        if (directUrl) {
          window.open(directUrl, '_blank', 'noopener,noreferrer');
          return;
        }
        // 2) Fallback: 네이버 증권 통합 검색 (모바일은 m.stock, PC는 search.naver)
        const fallbackUrl = IS_MOBILE_DEVICE
          ? 'https://m.stock.naver.com/search?q=' + encodeURIComponent(query)
            + '&resultTab=stock%2Cindex%2Cmarketindicator%2Ccoin%2Cipo%2Cfund'
          : 'https://search.naver.com/search.naver?where=nexearch&query='
            + encodeURIComponent(query + ' 주가');
        window.open(fallbackUrl, '_blank', 'noopener,noreferrer');
        return;
      }

      // ── 코인원 차트 모드: 매핑 우선, 없으면 코인원 거래소로 ──
      if (engineKey === 'coinone') {
        if (!query) {
          window.open('https://coinone.co.kr/exchange', '_blank', 'noopener,noreferrer');
          return;
        }
        // 0) 자동완성 결과 있으면 첫 항목 (또는 활성 항목)
        if (currentSuggestions.length > 0) {
          const idx = activeIndex >= 0 ? activeIndex : 0;
          selectSuggestion(idx);
          return;
        }
        // 1) 정확 매핑 시도
        const directUrl = coinChartShortcuts[query] || coinChartShortcuts[query.toLowerCase()];
        if (directUrl) {
          window.open(directUrl, '_blank', 'noopener,noreferrer');
          return;
        }
        // 2) Fallback: 입력값을 그대로 티커로 시도 (영문/숫자만)
        //    예: 매핑에 없는 신상 코인 "RAY" 입력 시 coinoneray로 시도
        const cleanedTicker = query.replace(/[^a-zA-Z0-9]/g, '').toLowerCase();
        if (cleanedTicker && /^[a-z0-9]{2,10}$/.test(cleanedTicker)) {
          window.open(
            `https://coinone.co.kr/chart?site=coinone${cleanedTicker}`,
            '_blank', 'noopener,noreferrer'
          );
          return;
        }
        // 3) 최종 fallback: 코인원 거래소 메인
        window.open('https://coinone.co.kr/exchange', '_blank', 'noopener,noreferrer');
        return;
      }

      // ── CFGI 공포탐욕지수 모드: 매핑 코인만 직행, 그 외 cfgi.io 홈으로 ──
      if (engineKey === 'cfgi') {
        if (!query) {
          window.open('https://cfgi.io/', '_blank', 'noopener,noreferrer');
          return;
        }
        // 0) 자동완성 결과 있으면 첫 항목 (또는 활성 항목)
        if (currentSuggestions.length > 0) {
          const idx = activeIndex >= 0 ? activeIndex : 0;
          selectSuggestion(idx);
          return;
        }
        // 1) 정확 매핑 시도
        const directUrl = coinFgiShortcuts[query] || coinFgiShortcuts[query.toLowerCase()];
        if (directUrl) {
          window.open(directUrl, '_blank', 'noopener,noreferrer');
          return;
        }
        // 2) Fallback: 입력값을 슬러그로 추측해서 시도 (소문자, 공백→하이픈)
        const guessSlug = query.toLowerCase().trim()
          .replace(/[^a-z0-9가-힣\s-]/g, '')
          .replace(/\s+/g, '-');
        if (guessSlug && /^[a-z0-9-]{2,40}$/.test(guessSlug)) {
          window.open(`https://cfgi.io/${guessSlug}-fear-greed-index/`, '_blank', 'noopener,noreferrer');
          return;
        }
        // 3) 최종 fallback: cfgi 홈
        window.open('https://cfgi.io/', '_blank', 'noopener,noreferrer');
        return;
      }

      // ── 일반 검색엔진 모드 (기존 동작) ──
      const engineObj = snarkEnginesParent.find(e => e.key === engineKey);
      if (engineObj) {
        let url = query
          ? (engineObj.search + encodeURIComponent(query) + (engineObj.searchPostfix || ''))
          : engineObj.home;
        window.open(url, "_blank", "noopener,noreferrer");
      }
    };

    /**
     * 네비게이션 클릭 핸들러
     *  - 처음 상태: indexmain.html 펼쳐져 있음, H가 active
     *  - 어떤 메뉴든 현재 활성 상태 + 펼쳐진 상태에서 다시 누름 → 접힘 (토글)
     *  - 접힌 상태에서 메뉴 누름 → 펼치며 해당 URL 로드
     *  - 다른 메뉴 누름 → 펼친 상태로 해당 URL 로드 + active 갱신
     */
    function showScreenParent(e, url) {
      e.preventDefault();
      const link = e.currentTarget || e.target;
      const wrap = document.getElementById('frameWrap');
      const frame = document.getElementById('main-frame');
      const currentUrl = frame.getAttribute('data-current-url');
      const isCollapsed = wrap.classList.contains('collapsed');
      const sameUrl = (currentUrl === url);

      // 같은 메뉴를 다시 누른 경우 + 펼쳐진 상태 → 접기 (토글)
      if (sameUrl && !isCollapsed) {
        wrap.classList.add('collapsed');
        document.body.classList.add('frame-collapsed');
        // active는 유지 (어떤 화면을 닫았는지 시각적으로 보여줌)
        return;
      }

      // 그 외: 펼치기 + 필요시 URL 변경
      document.querySelectorAll('#parent-links a').forEach(a => a.classList.remove('active'));
      link.classList.add('active');

      // URL이 다르면 새로 로드
      if (!sameUrl) {
        frame.src = url;
        frame.setAttribute('data-current-url', url);
      }

      // 펼치기
      wrap.classList.remove('collapsed');
      document.body.classList.remove('frame-collapsed');

      // 네비바에서 클릭한 항목을 가운데로 스크롤
      const parent = document.getElementById('parent-links');
      if (parent && link) {
        const offset = link.offsetLeft - parent.offsetLeft
          - parent.clientWidth / 2
          + link.clientWidth / 2;
        parent.scrollTo({ left: offset, behavior: 'smooth' });
      }
    }

    // ========== 데스크톱 마우스 드래그 핸들러만 (모바일은 네이티브 사용) ==========
    (function(){
      const nav = document.querySelector('.screen-links');
      if (!nav) return;

      // 터치 디바이스 감지 - 터치 디바이스에서는 브라우저 네이티브 스크롤 사용
      const isTouchDevice = 'ontouchstart' in window ||
                            navigator.maxTouchPoints > 0;

      if (isTouchDevice) {
        // 모바일: 네이티브 터치 스크롤만 사용 (커스텀 핸들러 X)
        nav.style.cursor = 'default';
        return;
      }

      // 데스크톱: 마우스 드래그 스크롤 활성화
      let isDown = false, startX = 0, scrollLeft = 0;

      nav.addEventListener('mousedown', (e) => {
        isDown = true;
        startX = e.pageX - nav.offsetLeft;
        scrollLeft = nav.scrollLeft;
        nav.style.cursor = 'grabbing';
      });

      nav.addEventListener('mouseleave', () => {
        isDown = false;
        nav.style.cursor = '';
      });

      nav.addEventListener('mouseup', () => {
        isDown = false;
        nav.style.cursor = '';
      });

      nav.addEventListener('mousemove', (e) => {
        if (!isDown) return;
        e.preventDefault();
        const x = e.pageX - nav.offsetLeft;
        nav.scrollLeft = scrollLeft - (x - startX);
      });
    })();

    // ========== 헤더 높이 동적 측정 (iframe 위치 정확도 향상) ==========
    function adjustHeaderHeight() {
      const header = document.getElementById('headerArea');
      if (!header) return;
      const actualHeight = header.offsetHeight;
      document.documentElement.style.setProperty('--header-height', actualHeight + 'px');
    }

    // 초기 1회만 측정 + 화면 회전/크기 변경 시 측정
    window.addEventListener('load', adjustHeaderHeight);
    let widthCache = window.innerWidth;
    window.addEventListener('resize', () => {
      // 너비 변경 시에만 재측정 (모바일 주소창 변화로 인한 height 변화는 무시)
      if (window.innerWidth !== widthCache) {
        widthCache = window.innerWidth;
        adjustHeaderHeight();
      }
    }, { passive: true });
  </script>
