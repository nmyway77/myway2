<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>HTML 편집기 · MYWAY</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="왼쪽에서 HTML·CSS·자바스크립트를 직접 수정하고 오른쪽에서 실시간으로 결과를 확인하는 브라우저 코드 편집기입니다.">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/theme/material-darker.min.css">

<style>
  :root{
    --paper:#f4efe4; --panel:#fffdf8; --panel-2:#ece5d6;
    --ink:#26221c; --ink-soft:#6f6757; --line:#e0d8c6;
    --accent:#0f766e; --accent-deep:#0b5a54; --accent-soft:#d9eeea;
    --serif:"Fraunces",Georgia,serif;
    --sans:"Pretendard",system-ui,-apple-system,"Apple SD Gothic Neo",sans-serif;
    --mono:"JetBrains Mono",ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
    --editor-bg:#212121;
    --shadow:0 4px 16px rgba(50,40,25,.10),0 1px 3px rgba(0,0,0,.05);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;height:100%;}
  body{
    height:100vh;height:100dvh;overflow:hidden;
    background:var(--paper);color:var(--ink);font-family:var(--sans);
    display:flex;flex-direction:column;
    background-image:radial-gradient(circle at 1px 1px, rgba(120,100,70,.05) 1px, transparent 0);
    background-size:22px 22px;
  }

  /* ===== 헤더 / 툴바 ===== */
  header{
    flex:0 0 auto;display:flex;align-items:center;gap:14px;
    padding:11px 18px;background:var(--panel);border-bottom:1px solid var(--line);
    box-shadow:0 1px 0 rgba(255,255,255,.6) inset;
  }
  .home-mini{flex:0 0 auto;width:34px;height:34px;border-radius:9px;background:var(--accent);display:flex;align-items:center;justify-content:center;text-decoration:none;box-shadow:0 2px 7px rgba(15,118,110,.34);transition:.16s;}
  .home-mini:hover{background:var(--accent-deep);transform:translateY(-1px);}
  .home-mini svg{width:18px;height:18px;fill:#fff;}
  .title-wrap{display:flex;flex-direction:column;line-height:1.05;margin-right:6px;}
  .title-wrap .t{font-family:var(--serif);font-weight:600;font-size:1.18rem;letter-spacing:-.01em;}
  .title-wrap .s{font-family:var(--mono);font-size:.6rem;letter-spacing:.22em;text-transform:uppercase;color:var(--ink-soft);margin-top:2px;}

  .toolbar{display:flex;align-items:center;gap:7px;margin-left:auto;flex-wrap:wrap;justify-content:flex-end;}
  .btn{display:inline-flex;align-items:center;gap:6px;padding:8px 13px;border-radius:9px;border:1px solid var(--line);background:var(--panel-2);color:var(--ink);font-family:var(--sans);font-size:.82rem;font-weight:600;cursor:pointer;transition:.15s;white-space:nowrap;}
  .btn:hover{background:#e4dcc9;}
  .btn svg{width:15px;height:15px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
  .btn.primary{background:var(--accent);color:#fff;border-color:var(--accent);}
  .btn.primary:hover{background:var(--accent-deep);}
  .btn.toggle.on{background:var(--accent);color:#fff;border-color:var(--accent);}
  .btn.icon{padding:8px;}

  /* ===== 모바일 뷰 전환 탭 ===== */
  .view-tabs{display:none;gap:0;margin-left:auto;border:1px solid var(--line);border-radius:9px;overflow:hidden;background:var(--panel-2);}
  .view-tabs button{padding:8px 16px;border:none;background:transparent;font-family:var(--sans);font-size:.82rem;font-weight:600;color:var(--ink-soft);cursor:pointer;}
  .view-tabs button.active{background:var(--accent);color:#fff;}

  /* ===== 작업 영역 ===== */
  .workspace{flex:1 1 auto;display:flex;min-height:0;}
  .pane{display:flex;flex-direction:column;min-width:0;min-height:0;}
  .pane-left{flex:1 1 50%;background:var(--editor-bg);}
  .pane-right{flex:1 1 50%;background:#fff;border-left:1px solid var(--line);}
  .pane-head{flex:0 0 auto;display:flex;align-items:center;gap:8px;padding:6px 13px;font-family:var(--mono);font-size:.66rem;letter-spacing:.16em;text-transform:uppercase;}
  .pane-left .pane-head{background:#1a1a1a;color:#8a8a8a;border-bottom:1px solid #000;}
  .pane-right .pane-head{background:var(--panel);color:var(--ink-soft);border-bottom:1px solid var(--line);}
  .dot{width:8px;height:8px;border-radius:50%;}
  .dot.g{background:#3fb950;} .dot.a{background:var(--accent);}

  .editor-host{flex:1 1 auto;min-height:0;position:relative;overflow:hidden;}
  .CodeMirror{height:100%!important;font-family:var(--mono)!important;font-size:13.5px;line-height:1.55;}
  #code{display:none;width:100%;height:100%;border:0;outline:0;resize:none;background:var(--editor-bg);color:#eee;font-family:var(--mono);font-size:13.5px;line-height:1.55;padding:12px 14px;}

  .preview-host{flex:1 1 auto;min-height:0;position:relative;background:#fff;}
  #preview{position:absolute;inset:0;width:100%;height:100%;border:0;background:#fff;}

  /* 리사이저 */
  .resizer{flex:0 0 8px;cursor:col-resize;background:var(--panel-2);position:relative;display:flex;align-items:center;justify-content:center;}
  .resizer::before{content:"";width:2px;height:34px;border-radius:2px;background:var(--line);transition:.15s;}
  .resizer:hover::before,.resizer.active::before{background:var(--accent);height:54px;}

  /* ===== 상태바 ===== */
  footer{flex:0 0 auto;display:flex;align-items:center;gap:16px;padding:6px 18px;background:var(--panel);border-top:1px solid var(--line);font-family:var(--mono);font-size:.68rem;color:var(--ink-soft);}
  footer .stat b{color:var(--accent-deep);font-weight:600;}
  footer .spacer{margin-left:auto;}
  footer a{color:var(--accent-deep);text-decoration:none;font-weight:600;}
  footer a:hover{text-decoration:underline;}
  .saved-flash{color:var(--accent);font-weight:600;opacity:0;transition:opacity .2s;}
  .saved-flash.show{opacity:1;}

  /* 드래그앤드롭 오버레이 */
  .drop-overlay{position:fixed;inset:0;z-index:300;display:none;align-items:center;justify-content:center;background:rgba(15,118,110,.16);backdrop-filter:blur(2px);}
  .drop-overlay.show{display:flex;}
  .drop-card{display:flex;flex-direction:column;align-items:center;gap:12px;background:var(--panel);border:2.5px dashed var(--accent);border-radius:18px;padding:34px 50px;font-family:var(--serif);font-size:1.25rem;font-weight:600;color:var(--accent-deep);box-shadow:0 18px 50px rgba(40,30,20,.28);}
  .drop-card svg{width:34px;height:34px;fill:none;stroke:var(--accent);stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}

  /* ===== 반응형 ===== */
  @media (max-width:760px){
    header{flex-wrap:wrap;gap:10px;padding:9px 13px;}
    .title-wrap{margin-right:0;}
    .toolbar{order:3;width:100%;margin-left:0;justify-content:flex-start;}
    .view-tabs{display:flex;order:2;}
    .resizer{display:none;}
    .workspace{position:relative;}
    .pane-left,.pane-right{flex:1 1 100%;position:absolute;inset:0;}
    body[data-view="code"] .pane-right{display:none;}
    body[data-view="preview"] .pane-left{display:none;}
    .btn{font-size:.78rem;padding:7px 11px;}
  }
</style>
</head>
<body data-view="code">

  <header>
    <a class="home-mini" href="https://myway.kr" target="_top" title="홈으로">
      <svg viewBox="0 0 24 24"><path d="M12 3 2 12h3v8h6v-5h2v5h6v-8h3z"/></svg>
    </a>
    <div class="title-wrap">
      <span class="t">HTML 편집기</span>
      <span class="s">Live Editor</span>
    </div>

    <div class="view-tabs" id="viewTabs">
      <button data-v="code" class="active">코드</button>
      <button data-v="preview">미리보기</button>
    </div>

    <div class="toolbar">
      <button class="btn" id="openBtn"><svg viewBox="0 0 24 24"><path d="M4 5h6l2 2h8v11H4z"/></svg>열기</button>
      <button class="btn toggle on" id="autoBtn" title="타이핑하면 자동으로 미리보기 갱신"><svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>자동</button>
      <button class="btn" id="runBtn"><svg viewBox="0 0 24 24"><path d="M6 4l14 8-14 8z"/></svg>미리보기</button>
      <button class="btn" id="wrapBtn" title="긴 줄 줄바꿈"><svg viewBox="0 0 24 24"><path d="M4 6h16M4 12h13a3 3 0 010 6h-3m0 0l2-2m-2 2l2 2M4 18h6"/></svg>줄바꿈</button>
      <button class="btn primary" id="dlBtn"><svg viewBox="0 0 24 24"><path d="M12 4v11m0 0l-4-4m4 4l4-4M5 20h14"/></svg>저장</button>
      <input type="file" id="fileInput" accept=".html,.htm,text/html" hidden>
    </div>
  </header>

  <div class="workspace" id="workspace">
    <section class="pane pane-left" id="paneLeft">
      <div class="pane-head"><span class="dot g"></span> CODE · HTML / CSS / JS</div>
      <div class="editor-host">
        <textarea id="code"></textarea>
      </div>
    </section>

    <div class="resizer" id="resizer" title="드래그해서 너비 조절"></div>

    <section class="pane pane-right" id="paneRight">
      <div class="pane-head"><span class="dot a"></span> PREVIEW</div>
      <div class="preview-host">
        <iframe id="preview"
          sandbox="allow-scripts allow-same-origin allow-popups allow-modals allow-forms allow-presentation allow-downloads allow-popups-to-escape-sandbox"
          allow="autoplay; encrypted-media; fullscreen; clipboard-write"></iframe>
      </div>
    </section>
  </div>

  <footer>
    <span class="stat">줄 <b id="lineCount">0</b></span>
    <span class="stat">문자 <b id="charCount">0</b></span>
    <span class="stat" id="fileName">제목 없음</span>
    <span class="saved-flash" id="savedFlash">저장됨!</span>
    <span class="spacer"></span>
    <a href="https://myway.kr" target="_top">myway.kr</a>
  </footer>

  <div class="drop-overlay" id="dropOverlay">
    <div class="drop-card">
      <svg viewBox="0 0 24 24"><path d="M12 4v11m0 0l-4-4m4 4l4-4M5 20h14"/></svg>
      <span>여기에 HTML 파일을 놓으세요</span>
    </div>
  </div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/xml/xml.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/javascript/javascript.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/css/css.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/htmlmixed/htmlmixed.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/edit/closetag.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/edit/closebrackets.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/edit/matchbrackets.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/selection/active-line.min.js"></script>

<script>
(function(){
  "use strict";

  var SAMPLE = [
    '<!DOCTYPE html>',
    '<html lang="ko">',
    '<head>',
    '  <meta charset="UTF-8">',
    '  <meta name="viewport" content="width=device-width, initial-scale=1.0">',
    '  <title>내 페이지</title>',
    '  <style>',
    '    body{margin:0;height:100vh;display:grid;place-items:center;',
    '         font-family:system-ui;background:#0f766e;color:#fff;text-align:center;}',
    '    h1{font-size:2.4rem;margin:0 0 8px;}',
    '    p{opacity:.85;}',
    '  </style>',
    '</head>',
    '<body>',
    '  <div>',
    '    <h1>여기에 코드를 작성하세요 ✍️</h1>',
    '    <p>왼쪽에서 수정하면 오른쪽에 바로 보여요.</p>',
    '  </div>',
    '</body>',
    '</html>'
  ].join('\n');

  var ta = document.getElementById('code');
  var preview = document.getElementById('preview');
  var editor = null, useCM = false;
  var autoPreview = true;
  var currentName = '';
  var debounceTimer = null;

  function getValue(){ return useCM ? editor.getValue() : ta.value; }
  function setValue(v){ if(useCM){ editor.setValue(v); } else { ta.value = v; } }

  function initEditor(){
    if (window.CodeMirror){
      useCM = true;
      editor = CodeMirror.fromTextArea(ta, {
        mode:'htmlmixed', theme:'material-darker',
        lineNumbers:true, lineWrapping:false,
        indentUnit:2, tabSize:2, smartIndent:true, indentWithTabs:false,
        autoCloseTags:true, autoCloseBrackets:true, matchBrackets:true,
        styleActiveLine:true
      });
      editor.setSize('100%','100%');
      editor.on('change', onChange);
    } else {
      // CodeMirror 로드 실패 시: 기본 textarea로 폴백
      useCM = false;
      ta.style.display = 'block';
      ta.addEventListener('input', onChange);
      ta.addEventListener('keydown', function(e){
        if(e.key==='Tab'){ e.preventDefault();
          var s=ta.selectionStart, en=ta.selectionEnd;
          ta.value=ta.value.slice(0,s)+'  '+ta.value.slice(en);
          ta.selectionStart=ta.selectionEnd=s+2;
        }
      });
    }
  }

  function onChange(){
    updateStats();
    if(autoPreview){
      clearTimeout(debounceTimer);
      debounceTimer = setTimeout(renderPreview, 450);
    }
  }

  function renderPreview(){
    preview.srcdoc = getValue();
  }

  function updateStats(){
    var v = getValue();
    var lines = useCM ? editor.lineCount() : (v.split('\n').length);
    document.getElementById('lineCount').textContent = lines;
    document.getElementById('charCount').textContent = v.length;
  }

  // 파일 열기 (버튼 / 드래그앤드롭 공용)
  function loadFile(file){
    if(!file) return;
    var reader = new FileReader();
    reader.onload = function(ev){
      setValue(ev.target.result);
      currentName = file.name || currentName;
      document.getElementById('fileName').textContent = currentName || '제목 없음';
      updateStats(); renderPreview();
    };
    reader.readAsText(file);
  }
  document.getElementById('openBtn').addEventListener('click', function(){
    document.getElementById('fileInput').click();
  });
  document.getElementById('fileInput').addEventListener('change', function(e){
    loadFile(e.target.files[0]);
    e.target.value = '';
  });

  // 저장(다운로드)
  function download(){
    var blob = new Blob([getValue()], {type:'text/html;charset=utf-8'});
    var a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = currentName || 'index.html';
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(function(){ URL.revokeObjectURL(a.href); }, 1500);
    var f = document.getElementById('savedFlash');
    f.classList.add('show'); setTimeout(function(){ f.classList.remove('show'); }, 1300);
  }
  document.getElementById('dlBtn').addEventListener('click', download);

  // 미리보기 수동 갱신
  document.getElementById('runBtn').addEventListener('click', renderPreview);

  // 자동 미리보기 토글
  document.getElementById('autoBtn').addEventListener('click', function(){
    autoPreview = !autoPreview;
    this.classList.toggle('on', autoPreview);
    if(autoPreview) renderPreview();
  });

  // 줄바꿈 토글
  document.getElementById('wrapBtn').addEventListener('click', function(){
    this.classList.toggle('on');
    var on = this.classList.contains('on');
    if(useCM) editor.setOption('lineWrapping', on);
    else ta.style.whiteSpace = on ? 'pre-wrap' : 'pre';
  });

  // Ctrl/Cmd + S → 저장
  document.addEventListener('keydown', function(e){
    if((e.ctrlKey||e.metaKey) && (e.key==='s'||e.key==='S')){ e.preventDefault(); download(); }
  });

  // 모바일 뷰 전환 탭
  document.getElementById('viewTabs').addEventListener('click', function(e){
    var b = e.target.closest('button[data-v]'); if(!b) return;
    document.body.setAttribute('data-view', b.dataset.v);
    this.querySelectorAll('button').forEach(function(x){ x.classList.toggle('active', x===b); });
    if(b.dataset.v==='preview') renderPreview();
    if(useCM) setTimeout(function(){ editor.refresh(); }, 60);
  });

  // 리사이저 드래그 (데스크탑)
  (function(){
    var resizer = document.getElementById('resizer');
    var left = document.getElementById('paneLeft');
    var ws = document.getElementById('workspace');
    var dragging = false;
    function start(){ dragging=true; resizer.classList.add('active'); document.body.style.cursor='col-resize'; document.body.style.userSelect='none'; if(preview) preview.style.pointerEvents='none'; }
    function move(clientX){
      if(!dragging) return;
      var rect = ws.getBoundingClientRect();
      var pct = (clientX - rect.left) / rect.width * 100;
      pct = Math.max(18, Math.min(82, pct));
      left.style.flex = '0 0 ' + pct + '%';
    }
    function end(){ if(!dragging) return; dragging=false; resizer.classList.remove('active'); document.body.style.cursor=''; document.body.style.userSelect=''; if(preview) preview.style.pointerEvents=''; }
    resizer.addEventListener('mousedown', function(e){ start(); e.preventDefault(); });
    window.addEventListener('mousemove', function(e){ move(e.clientX); });
    window.addEventListener('mouseup', end);
    resizer.addEventListener('touchstart', function(e){ start(); }, {passive:true});
    window.addEventListener('touchmove', function(e){ if(dragging && e.touches[0]) move(e.touches[0].clientX); }, {passive:true});
    window.addEventListener('touchend', end);
  })();

  // 드래그앤드롭으로 파일 열기
  (function(){
    var overlay = document.getElementById('dropOverlay');
    var depth = 0;
    function hasFiles(e){
      return e.dataTransfer && Array.prototype.indexOf.call(e.dataTransfer.types || [], 'Files') >= 0;
    }
    window.addEventListener('dragenter', function(e){
      if(!hasFiles(e)) return; e.preventDefault(); depth++; overlay.classList.add('show');
    });
    window.addEventListener('dragover', function(e){
      if(!hasFiles(e)) return; e.preventDefault();
    });
    window.addEventListener('dragleave', function(e){
      if(!hasFiles(e)) return; depth--; if(depth<=0){ depth=0; overlay.classList.remove('show'); }
    });
    window.addEventListener('drop', function(e){
      e.preventDefault(); depth=0; overlay.classList.remove('show');
      var f = e.dataTransfer && e.dataTransfer.files && e.dataTransfer.files[0];
      if(f) loadFile(f);
    });
  })();

  // 초기화
  initEditor();
  setValue(SAMPLE);
  updateStats();
  renderPreview();
})();
</script>
</body>
</html>
