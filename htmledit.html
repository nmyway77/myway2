<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HTML 편집기 · MYWAY.KR</title>
<meta name="description" content="좌측 코드와 우측 시각 편집이 실시간으로 양방향 연동되고, 하단에 최종 결과를 확인하며 수정된 HTML 파일로 내려받는 무료 편집기입니다.">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;1,9..144,500&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css">

<style>
:root{
  --paper:#f7f3eb; --ink:#1d1b16; --ink-soft:#5a554a; --line:#ddd5c5;
  --accent:#0b7285; --accent-deep:#0a6072; --panel:#fffdf8;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;}
body{
  font-family:"Pretendard",sans-serif;background:var(--paper);color:var(--ink);
  -webkit-user-select:none;user-select:none;display:flex;flex-direction:column;overflow:hidden;
}
input,textarea,.CodeMirror,.CodeMirror *{-webkit-user-select:text!important;user-select:text!important;}

/* Header */
header{flex:0 0 auto;display:flex;align-items:center;gap:14px;padding:12px 20px;
  border-bottom:1px solid var(--line);background:var(--panel);flex-wrap:wrap;}
.home-link{font-family:"JetBrains Mono",monospace;font-size:12px;letter-spacing:.08em;text-transform:uppercase;
  color:var(--ink-soft);text-decoration:none;border:1px solid var(--line);border-radius:6px;padding:6px 11px;transition:.18s;white-space:nowrap;}
.home-link:hover{color:var(--accent);border-color:var(--accent);}
.title{font-family:"Fraunces",serif;font-weight:600;font-size:23px;line-height:1;letter-spacing:-.01em;}
.title span{color:var(--accent);}
.subtitle{font-family:"JetBrains Mono",monospace;font-size:11px;color:var(--ink-soft);letter-spacing:.04em;margin-top:3px;}
.title-wrap{flex:1 1 auto;min-width:120px;}
.toolbar{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.btn{font-family:"JetBrains Mono",monospace;font-size:12.5px;font-weight:500;letter-spacing:.02em;
  border:1px solid var(--line);background:var(--paper);color:var(--ink);padding:9px 13px;border-radius:7px;
  cursor:pointer;transition:.18s;white-space:nowrap;display:inline-flex;align-items:center;gap:7px;}
.btn:hover{border-color:var(--accent);color:var(--accent);}
.btn svg{width:15px;height:15px;}
.btn.primary{background:var(--accent);color:#fff;border-color:var(--accent);}
.btn.primary:hover{background:var(--accent-deep);color:#fff;}
.btn.primary svg{stroke:#fff;}

/* Layout */
main{flex:1 1 auto;display:flex;flex-direction:column;min-height:0;}
#topRow{flex:1 1 60%;display:flex;min-height:0;}
.pane{display:flex;flex-direction:column;min-width:0;min-height:0;}
.pane-head{flex:0 0 auto;font-family:"JetBrains Mono",monospace;font-size:11px;letter-spacing:.09em;text-transform:uppercase;
  color:var(--ink-soft);padding:8px 14px;border-bottom:1px solid var(--line);background:var(--panel);
  display:flex;align-items:center;justify-content:space-between;gap:10px;}
.pane-head .dot{width:8px;height:8px;border-radius:50%;background:var(--accent);display:inline-block;margin-right:7px;}
.pane-head .label{display:flex;align-items:center;white-space:nowrap;}

#codePane{flex:1 1 50%;border-right:1px solid var(--line);}
#visualPane{flex:1 1 50%;}
.CodeMirror{height:100%!important;flex:1 1 auto;font-family:"JetBrains Mono",monospace!important;font-size:13.5px;line-height:1.65;}
.cm-flash{background:rgba(59,201,219,.30)!important;box-shadow:inset 3px 0 0 #3bc9db!important;transition:background .4s;}

#visualFrame,#resultFrame{flex:1 1 auto;width:100%;height:100%;border:0;background:#fff;}

/* Format toolbar (visual pane) */
.fmt{display:flex;align-items:center;gap:3px;flex-wrap:wrap;}
.fmt button{font-family:"JetBrains Mono",monospace;font-size:12px;border:1px solid var(--line);background:var(--paper);
  color:var(--ink);min-width:28px;height:26px;padding:0 7px;border-radius:5px;cursor:pointer;transition:.15s;line-height:1;}
.fmt button:hover{border-color:var(--accent);color:var(--accent);}
.fmt b{font-weight:700;} .fmt i{font-style:italic;} .fmt u{text-decoration:underline;}

/* Horizontal splitter */
.hsplit{flex:0 0 6px;cursor:row-resize;background:var(--line);position:relative;transition:background .15s;}
.hsplit:hover,.hsplit.active{background:var(--accent);}
.hsplit::after{content:"";position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:30px;height:2px;background:rgba(255,255,255,.6);border-radius:2px;}
.vsplit{flex:0 0 6px;cursor:col-resize;background:var(--line);position:relative;transition:background .15s;}
.vsplit:hover,.vsplit.active{background:var(--accent);}
.vsplit::after{content:"";position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:2px;height:30px;background:rgba(255,255,255,.6);border-radius:2px;}

#bottomPane{flex:0 0 32%;display:flex;flex-direction:column;min-height:60px;}
#bottomPane .pane-head .dot{background:#c2410c;}

/* Floating home */
.float-home{position:fixed;right:18px;bottom:18px;z-index:999;width:46px;height:46px;border-radius:50%;
  background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;
  box-shadow:0 6px 18px rgba(11,114,133,.35);text-decoration:none;transition:.2s;}
.float-home:hover{transform:translateY(-3px) scale(1.05);background:var(--accent-deep);}
.float-home svg{width:20px;height:20px;stroke:#fff;}

footer{flex:0 0 auto;text-align:center;padding:8px;font-family:"JetBrains Mono",monospace;font-size:11px;
  color:var(--ink-soft);border-top:1px solid var(--line);background:var(--panel);}
footer a{color:var(--accent);text-decoration:none;font-weight:500;}
footer a:hover{text-decoration:underline;}

.drop-overlay{position:fixed;inset:0;z-index:1000;display:none;background:rgba(247,243,235,.93);
  align-items:center;justify-content:center;flex-direction:column;gap:12px;border:4px dashed var(--accent);}
.drop-overlay.show{display:flex;}
.drop-overlay .t{font-family:"Fraunces",serif;font-size:28px;color:var(--accent);}
.drop-overlay .s{font-family:"JetBrains Mono",monospace;font-size:13px;color:var(--ink-soft);}

.mobile-tabs{display:none;}

@media (max-width:820px){
  header{gap:9px;padding:11px 13px;}
  .title{font-size:19px;}
  #topRow{flex-direction:column;}
  .vsplit{display:none;}
  #codePane,#visualPane{flex:1 1 100%;border-right:0;display:none;}
  #bottomPane{display:none;flex:1 1 100%;}
  body.m-code #codePane{display:flex;}
  body.m-visual #visualPane{display:flex;}
  body.m-result #bottomPane{display:flex;}
  .hsplit{display:none;}
  .mobile-tabs{display:flex;flex:0 0 auto;border-bottom:1px solid var(--line);background:var(--panel);}
  .mobile-tabs button{flex:1;border:0;background:none;cursor:pointer;font-family:"JetBrains Mono",monospace;
    font-size:11.5px;letter-spacing:.05em;padding:10px 4px;color:var(--ink-soft);border-bottom:2px solid transparent;}
  .mobile-tabs button.active{color:var(--accent);border-bottom-color:var(--accent);}
}
</style>
</head>

<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/xml/xml.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/javascript/javascript.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/css/css.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/htmlmixed/htmlmixed.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/edit/closetag.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/edit/matchbrackets.min.js"></script>

<script>
(function(){
  "use strict";

  var SAMPLE =
'<!DOCTYPE html>\n'+
'<html lang="ko">\n'+
'<head>\n'+
'  <meta charset="UTF-8">\n'+
'  <title>샘플 페이지</title>\n'+
'  <style>\n'+
'    body{font-family:sans-serif;max-width:640px;margin:0 auto;padding:40px 24px;color:#222;line-height:1.7;}\n'+
'    h1{color:#0b7285;}\n'+
'    a{color:#0b7285;}\n'+
'    .box{background:#f0f7f8;border:1px solid #cfe6e9;border-radius:10px;padding:18px;margin-top:20px;}\n'+
'  </style>\n'+
'</head>\n'+
'<body>\n'+
'  <h1>안녕하세요 👋</h1>\n'+
'  <p>오른쪽 화면에서 글자를 직접 고치거나 링크를 걸어보세요. 왼쪽 코드가 바로 바뀝니다.</p>\n'+
'  <p>반대로 왼쪽 코드를 수정하면 오른쪽 화면이 바뀌고, 하단에 최종 결과가 보입니다.</p>\n'+
'  <div class="box">오른쪽에서 클릭하면 왼쪽 코드의 해당 위치로 이동합니다.</div>\n'+
'</body>\n'+
'</html>';

  // ---- 줄번호 주입 / 제거 (정규식 역추적 없는 선형 스캐너) ----
  function injectLineMarkers(src){
    function countNL(s){var c=0,p=-1;while((p=s.indexOf("\n",p+1))>=0)c++;return c;}
    var out=[], i=0, n=src.length, line=1;
    while(i<n){
      var lt=src.indexOf("<",i);
      if(lt<0){ out.push(src.slice(i)); break; }
      if(lt>i){ var txt=src.slice(i,lt); out.push(txt); line+=countNL(txt); i=lt; }
      if(src.substr(i,4)==="<!--"){ var e=src.indexOf("-->",i); e=e<0?n:e+3; var s0=src.slice(i,e); out.push(s0); line+=countNL(s0); i=e; continue; }
      var nx=src[i+1];
      if(nx==="!"||nx==="?"){ var e2=src.indexOf(">",i); e2=e2<0?n:e2+1; var s2=src.slice(i,e2); out.push(s2); line+=countNL(s2); i=e2; continue; }
      if(nx==="/"){ var e3=src.indexOf(">",i); e3=e3<0?n:e3+1; var s3=src.slice(i,e3); out.push(s3); line+=countNL(s3); i=e3; continue; }
      var c1=nx?nx.charCodeAt(0):0;
      if(!((c1>=65&&c1<=90)||(c1>=97&&c1<=122))){ out.push("<"); i++; continue; }
      var j=i+1;
      while(j<n){ var cc=src.charCodeAt(j); if((cc>=48&&cc<=57)||(cc>=65&&cc<=90)||(cc>=97&&cc<=122)||cc===45||cc===58||cc===95) j++; else break; }
      var tagName=src.slice(i+1,j);
      var k=j,q=0;
      while(k<n){ var d=src[k]; if(q){ if(d===q)q=0; k++; continue; } if(d==='"'||d==="'"){q=d;k++;continue;} if(d===">")break; k++; }
      var hasGt=(k<n), inner=src.slice(j,k);
      out.push("<"+tagName+' data-srcline="'+line+'"'+inner+(hasGt?">":""));
      var consumed=src.slice(i, hasGt?k+1:k); line+=countNL(consumed); i=hasGt?k+1:k;
      var tl=tagName.toLowerCase();
      if(tl==="script"||tl==="style"||tl==="textarea"||tl==="title"){
        var rest=src.slice(i), mr=new RegExp("</"+tl+"[\\s>]","i").exec(rest);
        if(mr){ var raw=rest.slice(0,mr.index); out.push(raw); line+=countNL(raw); i=i+mr.index; }
        else { out.push(rest); line+=countNL(rest); i=n; }
      }
    }
    return out.join("");
  }
  function stripMarkers(html){ return html.replace(/\s*data-srcline="\d+"/g,""); }

  // 시각편집 화면에서만 스크립트 실행 차단(페이지가 편집창을 비워버리는 것 방지) — 코드는 보존
  function neutralizeScripts(html){
    return html.replace(/<script\b([^>]*)>/gi, function(mm, attrs){
      var tm=attrs.match(/\stype\s*=\s*("([^"]*)"|'([^']*)'|[^\s>]+)/i);
      var orig=tm?(tm[2]!=null?tm[2]:(tm[3]!=null?tm[3]:tm[1])):"";
      var rest=tm?attrs.replace(tm[0],""):attrs;
      return '<script data-cmtype="'+String(orig).replace(/"/g,"&quot;")+'"'+rest+' type="cmoff">';
    });
  }
  function restoreScripts(html){
    return html.replace(/<script\b([^>]*)>/gi, function(mm, attrs){
      var dm=attrs.match(/\sdata-cmtype\s*=\s*"([^"]*)"/i);
      if(!dm) return mm;
      var orig=dm[1].replace(/&quot;/g,'"');
      var rest=attrs.replace(dm[0],"").replace(/\stype\s*=\s*("cmoff"|'cmoff')/i,"");
      return '<script'+rest+(orig?' type="'+orig+'"':"")+'>';
    });
  }

  // ---- 요소 ----
  var editor = CodeMirror.fromTextArea(document.getElementById("code"), {
    mode:"htmlmixed", theme:"material-darker", lineNumbers:true, lineWrapping:true,
    autoCloseTags:true, matchBrackets:true, indentUnit:2, tabSize:2
  });
  var visual = document.getElementById("visualFrame");
  var result = document.getElementById("resultFrame");
  var charCnt= document.getElementById("charCount");

  var visualDoc = null;
  var editingSide = null;       // 'visual' 이면 코드 변경이 시각편집에서 온 메아리
  var codeTimer=null, visualTimer=null, currentName="edited";

  // ---- 코드 → 시각편집 + 결과 ----
  function renderFromCode(){
    var clean = editor.getValue();
    var marked;
    try{ marked = injectLineMarkers(clean); }catch(e){ marked = clean; }   // 실패해도 빈 화면 방지
    var forVisual;
    try{ forVisual = neutralizeScripts(marked); }catch(e){ forVisual = marked; }
    try{ writeVisual(forVisual); }catch(e){ try{ writeVisual(clean); }catch(_){} }
    updateResult(clean);
  }
  function writeVisual(markedHtml){
    var doc;
    try{ doc = visual.contentDocument || visual.contentWindow.document; }catch(e){ return; }
    try{ doc.open(); doc.write(markedHtml); doc.close(); }catch(e){ return; }
    try{ doc.designMode="on"; }catch(e){}
    doc.addEventListener("input", onVisualInput, true);
    doc.addEventListener("click", onVisualClick, true);
    visualDoc = doc;
  }
  function updateResult(cleanHtml){ result.srcdoc = cleanHtml; }

  // ---- 시각편집 → 코드 ----
  function onVisualInput(){ clearTimeout(visualTimer); visualTimer=setTimeout(syncVisualToCode,250); }
  function syncVisualToCode(){
    if(!visualDoc) return;
    var html;
    try{ html = "<!DOCTYPE html>\n"+visualDoc.documentElement.outerHTML; }catch(e){ return; }
    html = restoreScripts(stripMarkers(html));
    editingSide="visual";
    editor.setValue(html);
    editingSide=null;
    updateResult(editor.getValue());
    refreshCount();
  }

  // ---- 시각편집 클릭 → 코드 위치로 이동 ----
  var flashLn=null, flashTimer=null;
  function flashLine(ln){
    if(flashLn!==null){ try{editor.removeLineClass(flashLn,"background","cm-flash");}catch(e){} }
    editor.addLineClass(ln,"background","cm-flash"); flashLn=ln;
    clearTimeout(flashTimer);
    flashTimer=setTimeout(function(){ try{editor.removeLineClass(ln,"background","cm-flash");}catch(e){} if(flashLn===ln)flashLn=null; },1100);
  }
  function onVisualClick(e){
    var el=e.target;
    while(el&&el.nodeType===1&&!el.getAttribute("data-srcline")) el=el.parentElement;
    if(!el||el.nodeType!==1) return;
    var ln=parseInt(el.getAttribute("data-srcline"),10);
    if(ln>0 && ln<=editor.lineCount()){
      var i=ln-1;
      editor.setCursor({line:i,ch:0});
      var sc=editor.getScrollInfo(), c=editor.charCoords({line:i,ch:0},"local");
      if(c.top<sc.top+12 || c.bottom>sc.top+sc.clientHeight-12){ editor.scrollTo(null,Math.max(0,c.top-sc.clientHeight*0.35)); }
      flashLine(i);
    }
  }

  // ---- 코드 편집 감지 ----
  function refreshCount(){ charCnt.textContent = editor.getValue().length.toLocaleString("ko-KR")+"자"; }
  editor.on("change", function(){
    refreshCount();
    if(editingSide==="visual") return;            // 시각편집發 메아리 → 시각화면 다시 안 그림
    clearTimeout(codeTimer);
    codeTimer=setTimeout(renderFromCode,300);
  });

  // ---- 서식 툴바 ----
  document.getElementById("fmtBar").addEventListener("mousedown", function(e){ e.preventDefault(); }); // 선택영역 유지
  document.getElementById("fmtBar").addEventListener("click", function(e){
    var b=e.target.closest("button"); if(!b||!visualDoc) return;
    var cmd=b.getAttribute("data-cmd"), val=b.getAttribute("data-val")||null;
    try{ visualDoc.defaultView.focus(); }catch(_){}
    try{
      if(cmd==="link"){ var u=prompt("링크 주소를 입력하세요:","https://"); if(u) visualDoc.execCommand("createLink",false,u); }
      else if(cmd==="formatBlock"){ visualDoc.execCommand("formatBlock",false,val); }
      else { visualDoc.execCommand(cmd,false,null); }
    }catch(_){}
    clearTimeout(visualTimer); visualTimer=setTimeout(syncVisualToCode,120);
  });

  // ---- 버튼 ----
  document.getElementById("syncBtn").addEventListener("click", renderFromCode);
  document.getElementById("openBtn").addEventListener("click", function(){ document.getElementById("fileInput").click(); });
  document.getElementById("fileInput").addEventListener("change", function(e){ var f=e.target.files[0]; if(f) loadFile(f); e.target.value=""; });
  function loadFile(file){
    var r=new FileReader();
    r.onload=function(ev){ editor.setValue(ev.target.result); currentName=file.name.replace(/\.html?$/i,""); renderFromCode(); refreshCount(); };
    r.readAsText(file,"UTF-8");
  }
  document.getElementById("downloadBtn").addEventListener("click", function(){
    var blob=new Blob([editor.getValue()],{type:"text/html;charset=utf-8"});
    var url=URL.createObjectURL(blob), a=document.createElement("a");
    a.href=url; a.download=(currentName||"edited")+".html";
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    setTimeout(function(){ URL.revokeObjectURL(url); },1000);
  });

  // ---- 드래그&드롭 ----
  var overlay=document.getElementById("dropOverlay"), dd=0;
  window.addEventListener("dragenter",function(e){ if(e.dataTransfer&&Array.prototype.some.call(e.dataTransfer.types,function(t){return t==="Files";})){ e.preventDefault(); dd++; overlay.classList.add("show"); }});
  window.addEventListener("dragover",function(e){ e.preventDefault(); });
  window.addEventListener("dragleave",function(){ dd--; if(dd<=0){ dd=0; overlay.classList.remove("show"); }});
  window.addEventListener("drop",function(e){ e.preventDefault(); dd=0; overlay.classList.remove("show"); var f=e.dataTransfer.files[0]; if(f&&/\.html?$/i.test(f.name)) loadFile(f); });

  // ---- 세로 분할(코드/시각) ----
  (function(){
    var s=document.getElementById("vsplit"), cp=document.getElementById("codePane"), vp=document.getElementById("visualPane"), drag=false;
    s.addEventListener("mousedown",function(){ drag=true; s.classList.add("active"); document.body.style.cursor="col-resize"; });
    window.addEventListener("mousemove",function(e){ if(!drag)return; var row=document.getElementById("topRow"), r=row.getBoundingClientRect();
      var pct=((e.clientX-r.left)/r.width)*100; pct=Math.max(18,Math.min(82,pct)); cp.style.flex="0 0 "+pct+"%"; vp.style.flex="1 1 auto"; });
    window.addEventListener("mouseup",function(){ if(drag){ drag=false; s.classList.remove("active"); document.body.style.cursor=""; }});
  })();
  // ---- 가로 분할(상단/하단) ----
  (function(){
    var s=document.getElementById("hsplit"), top=document.getElementById("topRow"), bot=document.getElementById("bottomPane"), drag=false;
    s.addEventListener("mousedown",function(){ drag=true; s.classList.add("active"); document.body.style.cursor="row-resize"; });
    window.addEventListener("mousemove",function(e){ if(!drag)return; var m=document.querySelector("main"), r=m.getBoundingClientRect();
      var bottomPx=r.bottom-e.clientY; bottomPx=Math.max(60,Math.min(r.height-120,bottomPx)); bot.style.flex="0 0 "+bottomPx+"px"; top.style.flex="1 1 auto"; });
    window.addEventListener("mouseup",function(){ if(drag){ drag=false; s.classList.remove("active"); document.body.style.cursor=""; }});
  })();

  // ---- 모바일 탭 ----
  function mtab(cls,btn){ document.body.className=cls; [mtCode,mtVisual,mtResult].forEach(function(b){b.classList.remove("active");}); btn.classList.add("active");
    setTimeout(function(){ editor.refresh(); },40); }
  var mtCode=document.getElementById("mtCode"), mtVisual=document.getElementById("mtVisual"), mtResult=document.getElementById("mtResult");
  mtCode.addEventListener("click",function(){ mtab("m-code",mtCode); });
  mtVisual.addEventListener("click",function(){ mtab("m-visual",mtVisual); });
  mtResult.addEventListener("click",function(){ mtab("m-result",mtResult); });

  // ---- 초기화 ----
  editor.setValue(SAMPLE);
  visual.addEventListener("load", function(){});
  renderFromCode();
  refreshCount();
  setTimeout(function(){ editor.refresh(); },60);

  // ====== 복사 방지 (MYWAY.KR 정책) — 코드/입력 영역 예외 ======
  function inEditable(t){ return t && t.closest && (t.closest(".CodeMirror")||t.closest("input")||t.closest("textarea")); }
  ["contextmenu","selectstart","dragstart","copy","cut"].forEach(function(evt){
    document.addEventListener(evt,function(e){
      if(inEditable(e.target)) return;
      if(evt==="dragstart"&&e.dataTransfer&&Array.prototype.includes.call(e.dataTransfer.types||[],"Files")) return;
      e.preventDefault();
    });
  });
  document.addEventListener("keydown",function(e){
    if(e.key==="F12"){ e.preventDefault(); return; }
    var k=(e.key||"").toLowerCase(), edit=inEditable(document.activeElement);
    if(e.ctrlKey||e.metaKey){
      if(edit&&["c","x","a","v","z","y"].indexOf(k)>=0) return;
      if(["u","s","c","x","a"].indexOf(k)>=0) e.preventDefault();
      if(e.shiftKey&&["i","j","c"].indexOf(k)>=0) e.preventDefault();
    }
  });
})();
</script>
</body>
</html>
