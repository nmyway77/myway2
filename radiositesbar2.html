  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0;height:100%}
  body{display:flex;flex-direction:column;height:100vh;height:100dvh;overflow:hidden;background:#fff;color:var(--ink);font-family:var(--body);-webkit-font-smoothing:antialiased;user-select:none;-webkit-user-select:none}

  .nav-home{flex:none;order:0;display:inline-flex;align-items:center;justify-content:center;color:var(--ink-sub);padding:8px;border-radius:10px;transition:color .15s,background .15s}

  .nav-home svg{width:20px;height:20px;display:block}
  .nav-track{flex:none;order:3;display:flex;align-items:center;gap:8px;margin:0 auto}
  .topnav button{flex:none;display:inline-flex;align-items:center;gap:6px;border:1px solid var(--line);background:#fff;border-radius:999px;padding:9px 16px;font-family:var(--body);font-size:14px;font-weight:700;color:var(--ink-sub);cursor:pointer;transition:all .16s}
  .topnav button:hover{border-color:#cfd3da;color:var(--ink)}
  .topnav button.active{background:var(--accent);border-color:var(--accent);color:#fff}
  .topnav .grid-btn{order:1;border-color:#b9e0d4;color:var(--accent)}
  .open-btn{flex:none;order:2;color:var(--ink-sub);font-weight:700}

  .viewer{flex:1;position:relative;overflow:hidden;background:#0d0f12}
  .viewer iframe{position:absolute;top:0;left:0;width:100%;height:100%;border:0}

  /* 전체목록(디렉터리) 패널 */
  .grid-panel{position:absolute;inset:0;overflow-y:auto;display:none;padding:30px 16px 60px;background:#fff;scrollbar-width:none}
  .grid-panel::-webkit-scrollbar{display:none}
  .grid-panel.show{display:block}
  .grid-title{text-align:center;font-size:20px;font-weight:800;letter-spacing:-0.02em;color:#244;margin:0 0 6px}
  .grid-sub{text-align:center;font-size:13px;color:var(--ink-sub);margin:0 0 26px}
  .dir-section{max-width:1040px;margin:0 auto 24px}
  .dir-head{display:flex;align-items:center;gap:8px;margin:0 0 10px;padding:0 4px}
  .dir-label{font-size:12.5px;font-weight:800;color:var(--accent);letter-spacing:.5px;text-transform:uppercase}
  .dir-grid{display:grid;grid-template-columns:repeat(4,1fr);column-gap:10px;row-gap:26px}
  .dir-card{display:flex;flex-direction:column;justify-content:center;gap:3px;padding:14px 15px;border:1px solid var(--line);border-radius:10px;background:#fff;cursor:pointer;text-align:left;text-decoration:none;color:inherit;font-family:var(--body);transition:all .15s;box-shadow:0 2px 4px rgba(90,90,130,.06);position:relative;overflow:visible}
  .dir-card::after{content:"";position:absolute;left:2.5%;right:2.5%;top:100%;height:18px;background:url('https://64.media.tumblr.com/f5f06009df6584ebb5539cad61f73c63/tumblr_inline_qsghz3XZRQ1r45nlo_500.png') center top / 100% 100% no-repeat;pointer-events:none;z-index:1}
  .dir-card:hover{border-color:var(--accent);background:#f5fbf8;transform:translateY(-2px);box-shadow:0 4px 10px rgba(11,107,83,.12)}
  .dir-card .t{font-size:15px;font-weight:800;color:var(--ink);letter-spacing:-0.3px;line-height:1.15}
  .dir-card .k{font-size:11px;color:var(--ink-sub);line-height:1.2}
  @media (max-width:720px){ .dir-grid{grid-template-columns:repeat(2,1fr);row-gap:24px} .grid-panel{padding:24px 12px 50px} }

  /* ===== 편집 머신러리 ===== */
  /* 연필 FAB (우측 상단) */
  .pentool-bar{position:fixed;top:60px;right:16px;z-index:60;display:flex;flex-direction:column;align-items:flex-end;gap:8px}
  .pentool-fab{width:40px;height:40px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#fff;background:linear-gradient(135deg,#0b8f6f,#0b6b53);box-shadow:0 4px 14px rgba(11,107,83,.4);transition:transform .15s}
  .pentool-fab:hover{transform:scale(1.06)}
  .pentool-fab svg{width:19px;height:19px;display:block}
  .pentool-menu{display:none;flex-direction:column;gap:4px;background:#fff;border:1px solid var(--line);border-radius:12px;padding:6px;box-shadow:0 8px 26px rgba(40,40,70,.18);min-width:150px}
  .pentool-menu.show{display:flex}
  .pentool-menu button{border:none;background:transparent;text-align:left;padding:9px 12px;border-radius:8px;font-family:var(--body);font-size:13.5px;font-weight:700;color:var(--ink);cursor:pointer}
  .pentool-menu button:hover{background:#f0f7f4;color:var(--accent)}
  .pentool-menu button.danger:hover{background:#fdecec;color:#c0392b}
  .pentool-menu .sep{height:1px;background:var(--line);margin:4px 2px}

  body.editing .dir-card{cursor:default}
  .card-tools{display:none;position:absolute;top:-9px;right:-6px;z-index:5;gap:3px}
  body.editing .card-tools{display:flex}
  .card-move{display:none;position:absolute;top:-9px;left:-6px;z-index:5;gap:3px}
  body.editing .card-move{display:flex}
  .mini-btn{width:24px;height:24px;border-radius:50%;border:1px solid var(--line);background:#fff;color:var(--ink-sub);font-size:12px;font-weight:800;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 1px 4px rgba(0,0,0,.12);padding:0}
  .mini-btn:hover{color:var(--accent);border-color:var(--accent)}
  .mini-btn.del:hover{color:#c0392b;border-color:#c0392b}
  .sec-tools{display:none;gap:5px;margin-left:auto}
  body.editing .sec-tools{display:flex}
  .sec-tools .mini-btn{width:26px;height:26px}
  .add-card-btn{display:none;align-items:center;justify-content:center;gap:6px;border:1.5px dashed #b9d8cd;border-radius:10px;background:#f7fbf9;color:var(--accent);font-weight:800;font-size:13px;cursor:pointer;min-height:64px;font-family:var(--body)}
  body.editing .add-card-btn{display:flex}
  .add-card-btn:hover{background:#eef7f3;border-color:var(--accent)}
  .add-sec-btn{display:none;margin:8px auto 0;max-width:1040px;width:100%;align-items:center;justify-content:center;gap:6px;border:1.5px dashed #c9cdd6;border-radius:10px;background:#fafbfc;color:var(--ink-sub);font-weight:800;font-size:13.5px;cursor:pointer;padding:14px;font-family:var(--body)}
  body.editing .add-sec-btn{display:flex}
  .add-sec-btn:hover{color:var(--accent);border-color:var(--accent);background:#f5fbf8}

  /* 모달 */
  .modal-back{position:fixed;inset:0;z-index:120;background:rgba(20,24,30,.5);display:none;align-items:center;justify-content:center;padding:18px}
  .modal-back.show{display:flex}
  .modal{width:100%;max-width:430px;max-height:86vh;overflow-y:auto;background:#fff;border-radius:16px;padding:20px;box-shadow:0 20px 60px rgba(0,0,0,.3);scrollbar-width:none}
  .modal::-webkit-scrollbar{display:none}
  .modal h3{margin:0 0 14px;font-size:17px;font-weight:800;color:var(--ink)}
  .modal label{display:block;font-size:12px;font-weight:700;color:var(--ink-sub);margin:12px 0 5px}
  .modal input[type=text],.modal input[type=url],.modal textarea{width:100%;border:1px solid var(--line);border-radius:9px;padding:10px 12px;font-family:var(--body);font-size:14px;color:var(--ink);background:#fafbfc;-webkit-user-select:text;user-select:text}
  .modal input:focus,.modal textarea:focus{outline:none;border-color:var(--accent);background:#fff}
  .modal textarea{min-height:140px;resize:vertical;font-family:"JetBrains Mono",ui-monospace,monospace;font-size:12px}
  .chk-row{display:flex;align-items:center;gap:8px;margin-top:12px}
  .chk-row input{width:17px;height:17px}
  .chk-row span{font-size:13px;font-weight:700;color:var(--ink)}
  .modal-row{display:flex;gap:8px;margin-top:18px}
  .modal-row button{flex:1;border:none;border-radius:9px;padding:11px;font-family:var(--body);font-size:14px;font-weight:800;cursor:pointer}
  .btn-ok{background:var(--accent);color:#fff}
  .btn-ok:hover{background:#0a5c47}
  .btn-cancel{background:#eef0f3;color:var(--ink-sub)}
  .btn-cancel:hover{background:#e3e6ea}
  .tb-btn{width:100%;border:1px solid var(--line);background:#fafbfc;border-radius:9px;padding:11px;font-family:var(--body);font-size:13.5px;font-weight:800;color:var(--accent);cursor:pointer}
  .tb-btn:hover{background:#f0f7f4;border-color:var(--accent)}
  /* 채널 편집 목록 */
  .ch-list{display:flex;flex-direction:column;gap:6px}
  .ch-row{display:flex;align-items:center;gap:6px;border:1px solid var(--line);border-radius:9px;padding:7px 9px;background:#fafbfc}
  .ch-row .nm{flex:1;font-size:13.5px;font-weight:700;color:var(--ink);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

  .ch-row .mini-btn{width:26px;height:26px}
  .hint{font-size:11.5px;color:var(--ink-sub);line-height:1.5;margin-top:10px}

/* ---- 데이터 로드/저장 ---- */
function cloneData(d){ return JSON.parse(JSON.stringify(d)); }
function coerceData(o){
  if(!o || typeof o!=='object') return null;
  if(!Array.isArray(o.sites) || !Array.isArray(o.directory)) return null;
  var d={ sites:[], defaultName:(typeof o.defaultName==='string'?o.defaultName:''), directory:[] };
  o.sites.forEach(function(s){
    if(Array.isArray(s) && typeof s[0]==='string' && typeof s[1]==='string'){
      var row=[s[0],s[1]]; if(s[2]===true) row.push(true); d.sites.push(row);
    }
  });
  o.directory.forEach(function(sec){
    if(!sec||typeof sec.label!=='string'||!Array.isArray(sec.items)) return;
    var items=[];
    sec.items.forEach(function(it){
      if(Array.isArray(it)&&typeof it[0]==='string') items.push([it[0],(it[1]||''),(it[2]||'')]);
    });
    d.directory.push({label:sec.label,items:items});
  });
  if(!d.sites.length && !d.directory.length) return null;
  return d;
}
function loadData(){
  if(IS_DIST) return cloneData(DEFAULT_DATA);
  try{
    var raw=localStorage.getItem(STORE_KEY);
    if(raw){ var c=coerceData(JSON.parse(raw)); if(c) return c; }
  }catch(_){}
  return cloneData(DEFAULT_DATA);
}
function saveData(){
  if(IS_DIST) return;
  try{ localStorage.setItem(STORE_KEY, JSON.stringify({kind:DATA_KIND, sites:data.sites, defaultName:data.defaultName, directory:data.directory})); }catch(_){}
}

}

  nav.addEventListener('pointerup',end);

  nav.addEventListener('click',function(e){ if(moved){ e.stopPropagation(); e.preventDefault(); moved=false; } },true);

function applyImport(text){
  var raw=(text||'').replace(/^\uFEFF/,'').trim();
  if(!raw){ alert('가져올 내용이 없어요'); return; }
  var obj; try{ obj=JSON.parse(raw); }catch(e){ alert('JSON 형식이 아니에요'); return; }
  if(obj && obj.kind && obj.kind!==DATA_KIND){
    if(!confirm('다른 도구의 데이터(' + obj.kind + ')로 보여요. 그래도 가져올까요?')) return;

  var c=coerceData(obj);

  data=c; saveData();
  impBack.classList.remove('show');

  if(saved==='grid'){ showGrid(gridBtn); return; }
  var ms=/^site:(\d+)$/.exec(saved);
  if(ms){
    var i=parseInt(ms[1],10);
    if(data.sites[i] && !data.sites[i][2]){
      var b=track.querySelector('button[data-site="'+i+'"]');
      if(b){ loadSite(i,b); return; }
    }
  }
  showGrid(gridBtn);
})();

/* ---- 복사 방지 (보기전용에서만) ---- */
if(COPY_PROTECT){(function(){
  var isField=function(el){ return el&&(el.tagName==='INPUT'||el.tagName==='TEXTAREA'||el.tagName==='SELECT'||el.isContentEditable); };
  ['contextmenu','selectstart','dragstart','copy','cut'].forEach(function(ev){
    document.addEventListener(ev,function(e){ if(isField(e.target)) return; e.preventDefault(); });
  });
  document.addEventListener('keydown',function(e){
    var k=(e.key||'').toLowerCase();
    if(e.key==='F12'){e.preventDefault();return;}
    if(e.ctrlKey&&e.shiftKey&&['i','j','c'].includes(k)){e.preventDefault();return;}
    if(e.ctrlKey&&['u','s','c','x','a'].includes(k)){ if(isField(e.target)&&['c','x','a'].includes(k)) return; e.preventDefault(); }
  });
})();}
</script>
<script>
/* 모바일: 외부 링크를 최상위 창에서 열어 뒤로가기로 MYWAY 복귀. PC·태블릿은 새 탭. */
(function(){
  if(!/Mobi/i.test(navigator.userAgent)) return;
  document.addEventListener("click", function(e){
    var a = e.target.closest ? e.target.closest("a[href]") : null;
    if(!a) return;
    var href = a.getAttribute("href") || "";
    if(!href || href.charAt(0) === "#" || /^javascript:/i.test(href)) return;
    if(document.body.classList.contains('editing')) return; /* 편집 모드에선 이동 막음 */
    e.preventDefault();
    try { (window.top || window).location.href = a.href; }
    catch(_) { window.open(a.href, "_blank"); }
  }, true);
  var _open = window.open.bind(window);
  window.open = function(url, name, feat){
    if(url){ try{ (window.top||window).location.href = url; }catch(_){ location.href = url; } return null; }
    return _open(url, name, feat);
  };
})();
</script>
