<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400" role="img" aria-label="공연정보 로고">
  <title>공연정보</title>
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Black+Han+Sans&amp;family=Gowun+Batang:wght@400;700&amp;display=swap');
      .bg     { fill: #ff7a59; }
      .ink    { fill: #2a0e07; }
      .label  { fill: #4a1f10; font-family: 'Gowun Batang', 'Apple SD Gothic Neo', serif; font-size: 16px; letter-spacing: 3.2px; }
      .label2 { fill: #4a1f10; font-family: 'Gowun Batang', 'Apple SD Gothic Neo', serif; font-size: 13px; letter-spacing: 4.5px; }
      .main   { fill: #2a0e07; font-family: 'Black Han Sans', 'Apple SD Gothic Neo', sans-serif; font-size: 160px; letter-spacing: -9px; }
      .dot    { fill: #fff8e1; }
    </style>
  </defs>

  <!-- 배경: 둥근 사각형 -->
  <rect x="0" y="0" width="400" height="400" rx="20" ry="20" class="bg"/>

  <!-- 상단 라벨 SHOWS -->
  <text x="24" y="38" class="label">SHOWS</text>

  <!-- 상단 점 -->
  <circle cx="378" cy="32" r="6.5" class="dot"/>

  <!-- 메인 글자 - 공연 -->
  <text x="200" y="195" text-anchor="middle" class="main">공연</text>
  <!-- 메인 글자 - 정보 -->
  <text x="200" y="325" text-anchor="middle" class="main">정보</text>

  <!-- 하단 라벨 PERFORMANCE -->
  <text x="200" y="382" text-anchor="middle" class="label2">PERFORMANCE</text>
</svg>
