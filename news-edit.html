<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>내 즐겨찾기 - 사이트·영상·사진 | MYWAY.KR</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="사이트·영상·사진 즐겨찾기를 직접 추가·관리하는 나만의 북마크 - MYWAY.KR">

  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <link rel="manifest" href="/site.webmanifest">

  <style>
    *, *::before, *::after { box-sizing: border-box; }

    :root {
      --nav-grad: linear-gradient(95deg, #7ed6fb 10%, #b176f3 90%);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    html, body {
      margin: 0; padding: 0;
      background: #fff;
      font-family: 'Segoe UI', '맑은 고딕', Arial, sans-serif;
      -webkit-text-size-adjust: 100%;
    }
    body {
      min-height: 100vh;
      min-height: 100dvh;
      overflow-x: hidden;
      -webkit-user-select: none;
      -moz-user-select: none;
      -ms-user-select: none;
      user-select: none;
    }
    img { -webkit-user-drag: none; user-drag: none; -webkit-touch-callout: none; }
    input, textarea, [contenteditable] {
      -webkit-user-select: text; -moz-user-select: text; -ms-user-select: text; user-select: text;
    }

    /* ===== 상단 sticky 헤더 ===== */
    .topbar {
      position: sticky;
      top: 0;
      z-index: 20;
      background: rgba(255,255,255,.96);
      backdrop-filter: saturate(180%) blur(8px);
      -webkit-backdrop-filter: saturate(180%) blur(8px);
      padding: 12px 14px 10px;
      padding-left: max(14px, env(safe-area-inset-left));
      padding-right: max(14px, env(safe-area-inset-right));
    }
    .topbar-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    /* 좌측 홈 아이콘 */
    .home-link {
      flex: 0 0 auto;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 34px; height: 34px;
      border-radius: 50%;
      text-decoration: none;
      color: #fff;
      background: var(--nav-grad);
      box-shadow: 0 6px 18px rgba(177,118,243,0.28);
      transition: transform .15s, box-shadow .15s;
      -webkit-tap-highlight-color: transparent;
    }
    .home-link:hover { transform: translateY(-1px); box-shadow: 0 8px 22px rgba(177,118,243,0.36); }
    .home-link svg { width: 18px; height: 18px; fill: currentColor; }

    .page-title {
      font-size: 1.0rem; font-weight: 700;
      color: #1f2740;
      margin: 0;
      letter-spacing: -0.3px;
      flex: 0 0 auto;
      white-space: nowrap;
    }
    .page-title .sub {
      font-size: .78rem; font-weight: 500;
      color: #8590ad;
      margin-left: 6px;
    }

    /* 카테고리 네비 */
    .cat-nav {
      display: flex;
      gap: 8px;
      flex: 1 1 auto;
      min-width: 0;
      justify-content: safe center;
      overflow-x: auto;
      scrollbar-width: none;
      -ms-overflow-style: none;
    }
    .cat-nav::-webkit-scrollbar { display: none; }
    .cat-btn {
      font: inherit;
      font-size: .88rem;
      font-weight: 600;
      padding: 7px 14px;
      border-radius: 999px;
      border: 1.5px solid #dfe3ec;
      background: #fff;
      color: #4a5170;
      cursor: pointer;
      transition: all .15s;
      white-space: nowrap;
      flex: 0 0 auto;
      -webkit-tap-highlight-color: transparent;
    }
    .cat-btn:hover { background: #f4f6fb; border-color: #c7cee0; }
    .cat-btn:active { transform: scale(0.96); }
    .cat-btn.is-active { background: #1f2740; color: #fff; border-color: #1f2740; }
    .cat-btn .count {
      display: inline-block;
      margin-left: 4px;
      font-size: .72rem;
      opacity: .65;
      font-weight: 500;
    }
    .cat-btn.is-active .count { opacity: .85; }

    /* 접기 / 펼치기 토글 (티나지 않게) */
    .collapse-toggle {
      flex: 0 0 auto;
      display: inline-flex; align-items: center; justify-content: center;
      width: 32px; height: 32px; border-radius: 50%;
      border: 1.5px solid #d3d8e4; background: #fff; color: #5a627e;
      cursor: pointer; transition: color .2s, border-color .2s, background .2s;
      -webkit-tap-highlight-color: transparent;
    }
    .collapse-toggle:hover { color: #1f2740; border-color: #b9c0d2; background: #f4f6fb; }
    .collapse-toggle:active { transform: scale(0.94); }
    .collapse-toggle svg {
      width: 15px; height: 15px; fill: currentColor; stroke: none;
      transition: transform .25s ease;
    }
    body.is-collapsed .collapse-toggle svg { transform: rotate(180deg); }
    body.is-collapsed .gallery-section { display: none; }

    /* ===== 갤러리 섹션 ===== */
    .gallery-section {
      width: 100%;
      max-width: 1100px;
      padding: 12px 14px 48px;
      margin: 0 auto;
    }

    /* 드래그 정렬 */
    .masonry .card.dragging { opacity: .4; }
    .masonry .card.drag-over { outline: 2.5px solid #7e94ff; outline-offset: 2px; border-radius: 14px; }

    /* Masonry: CSS column 기반 */
    .masonry {
      column-count: 4;
      column-gap: 12px;
    }
    .masonry .card {
      display: block;
      break-inside: avoid;
      page-break-inside: avoid;
      -webkit-column-break-inside: avoid;
      margin: 0 0 12px;
      border-radius: 10px;
      overflow: hidden;
      background: #f4f6fb;
      position: relative;
      text-decoration: none;
      color: inherit;
      transform: translateZ(0);
    }
    .masonry .card img {
      display: block;
      width: 100%;
      height: auto;
      transition: filter .25s ease, transform .35s ease;
    }
    .masonry .card:hover img { transform: scale(1.03); }

    /* 이름 캡션 (하단 그라데이션) */
    .masonry .card .cap {
      position: absolute;
      left: 0; right: 0; bottom: 0;
      padding: 22px 10px 9px;
      font-size: .82rem; font-weight: 700;
      color: #fff;
      background: linear-gradient(180deg, transparent 0%, rgba(0,0,0,.68) 78%);
      letter-spacing: -0.2px;
      text-shadow: 0 1px 2px rgba(0,0,0,.45);
      transition: opacity .2s;
      pointer-events: none;
    }
    /* 제목 캡션: PC·모바일 모두 항상 표시 (마우스 올림과 무관) */

    /* 카테고리 필터 — CSS data 속성으로 (JS 재렌더 없음) */
    .masonry[data-filter="genNews"] .card:not([data-cats~="genNews"]),
    .masonry[data-filter="genNews"] .section-head:not([data-cats~="genNews"]) { display: none; }
    .masonry[data-filter="entNews"] .card:not([data-cats~="entNews"]),
    .masonry[data-filter="entNews"] .section-head:not([data-cats~="entNews"]) { display: none; }
    .masonry[data-filter="etcNews"] .card:not([data-cats~="etcNews"]),
    .masonry[data-filter="etcNews"] .section-head:not([data-cats~="etcNews"]) { display: none; }
    /* 분류 그룹 제목 (전체 너비) */
    .masonry .section-head {
      column-span: all;
      -webkit-column-span: all;
      break-inside: avoid;
      font-weight: 800;
      font-size: 1.02rem;
      color: #1f2740;
      letter-spacing: -0.3px;
      margin: 14px 0 12px;
      padding-bottom: 2px;
    }
    .masonry .section-head:first-child { margin-top: 0; }

    /* 카드 위치 기준 (하단 캡션 고정용) */
    .masonry .card { position: relative; }


    /* 삭제 버튼 */
    .btn-danger { background: #fdeaed; color: #d6455c; flex: 0 0 auto !important; padding-left: 16px !important; padding-right: 16px !important; }
    .btn-danger:hover { background: #f9d8dd; }

    /* 추가 모달 */
    .modal-overlay {
      position: fixed; inset: 0; z-index: 1000;
      background: rgba(20,24,38,.5);
      -webkit-backdrop-filter: blur(3px); backdrop-filter: blur(3px);
      display: none; align-items: center; justify-content: center; padding: 18px;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      width: 100%; max-width: 380px; background: #fff; border-radius: 16px;
      padding: 22px 20px 18px; box-shadow: 0 18px 50px rgba(20,24,38,.3);
    }
    .modal-title { margin: 0 0 16px; font-size: 1.15rem; font-weight: 800; color: #1f2740; }
    .field { display: block; margin-bottom: 13px; }
    .field > span { display: block; font-size: .8rem; font-weight: 700; color: #6a739c; margin-bottom: 5px; }
    .field input, .field select {
      width: 100%; padding: 10px 12px; border: 1.5px solid #dde2ee; border-radius: 9px;
      font-size: .92rem; font-family: inherit; color: #1f2740; background: #fafbfe;
      outline: none; transition: border-color .15s;
    }
    .field input:focus, .field select:focus { border-color: #7e94ff; }
    .modal-actions { display: flex; gap: 9px; margin-top: 18px; }
    .modal-actions button { flex: 1; padding: 11px; border-radius: 9px; font-size: .92rem; font-weight: 700; cursor: pointer; border: none; }
    .btn-ghost { background: #eef0f6; color: #4a5170; }
    .btn-ghost:hover { background: #e2e6f0; }
    .btn-primary { background: #1f2740; color: #fff; }
    .btn-primary:hover { background: #2a3358; }

    /* 사진 미입력 시 이름 커버 플레이스홀더 */
    .masonry .card .cover-ph {
      width: 100%; aspect-ratio: 3 / 4;
      display: flex; align-items: center; justify-content: center;
      text-align: center; padding: 16px;
      background: linear-gradient(135deg, #eef1f7, #dde3ef);
      color: #3a426a; font-weight: 700;
      font-size: 1.02rem; line-height: 1.45; letter-spacing: -0.3px;
      word-break: keep-all;
    }

    /* 사이트 텍스트 카드 (indexmain7 스타일) */
    .masonry .card.site-card {
      background: #fff;
      padding: 20px 18px 18px;
      box-shadow: 0 2px 10px rgba(31,39,64,.06);
      overflow: visible;
      margin-bottom: 26px;
    }
    /* 카드 밑 음영 — 입체감 (바매거진 전체목록 스타일) */
    .masonry .card.site-card::after {
      content: "";
      position: absolute;
      left: 2.5%; right: 2.5%;
      top: 100%;
      height: 18px;
      background: url('https://64.media.tumblr.com/f5f06009df6584ebb5539cad61f73c63/tumblr_inline_qsghz3XZRQ1r45nlo_500.png') center top / 100% 100% no-repeat;
      pointer-events: none;
      z-index: 1;
    }
    .masonry .card.site-card .site-name {
      font-size: 1.22rem; font-weight: 800; color: #1f2740;
      letter-spacing: -0.4px; line-height: 1.25; word-break: keep-all;
    }
    .masonry .card.site-card .site-domain {
      margin-top: 7px; font-size: .8rem; color: #8590ad;
      font-family: 'JetBrains Mono', ui-monospace, monospace; word-break: break-all;
    }

    /* 보정 프리셋 (data-preset 토글) */
    /* (제거됨) */

    /* 갤러리 반응형 */
    @media (max-width: 900px) { .masonry { column-count: 3; } }
    @media (max-width: 600px) { .masonry { column-count: 2; column-gap: 10px; } .masonry .card { margin-bottom: 10px; } }

    /* Others(etcNews): 섹션 구분 + 텍스트 카드 구조 → multi-column(+column-span) 모바일 버그 회피용 그리드 */
    .masonry[data-filter="etcNews"]{
      column-count: 1 !important;
      column-gap: normal;
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 26px 12px;
      align-items: stretch;
    }
    .masonry[data-filter="etcNews"] .card{ margin: 0; }
    .masonry[data-filter="etcNews"] .card.site-card{ margin: 0; }
    .masonry[data-filter="etcNews"] .section-head{
      grid-column: 1 / -1;
      column-span: normal;
      -webkit-column-span: none;
      margin: 12px 0 0;
    }
    .masonry[data-filter="etcNews"] .section-head:first-child{ margin-top: 0; }
    @media (max-width: 900px){
      .masonry[data-filter="etcNews"]{ grid-template-columns: repeat(3, minmax(0,1fr)); }
    }
    @media (max-width: 600px){
      .masonry[data-filter="etcNews"]{ grid-template-columns: repeat(2, minmax(0,1fr)); gap: 22px 10px; }
    }

    /* 태블릿/PC: 카테고리 네비 중앙정렬 */
    @media (min-width: 721px) {
      .cat-nav { justify-content: safe center; }
    }

    /* ===== MYWAY.KR 공통 ===== */.myway-footer {
      width: 100%;
      text-align: center;
      padding: 22px 14px calc(28px + var(--safe-bottom));
      margin-top: 24px;
      border-top: 1px solid #eef0f4;
      font-size: .82rem;
      color: #8590ad;
    }
    .myway-footer a.foot-link { color: #4a5170; text-decoration: none; font-weight: 700; }
    .myway-footer a.foot-link:hover { color: #1f2740; }
    .myway-footer .sep { display: inline-block; margin: 0 8px; opacity: .5; }

    /* 푸터 하단 홈 버튼 (고정 아님 — 페이지 맨 하단에만 노출) */
    .foot-home {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 46px; height: 46px;
      margin: 0 auto 14px;
      border-radius: 50%;
      text-decoration: none;
      color: #fff;
      background: var(--nav-grad);
      box-shadow: 0 8px 22px rgba(177,118,243,0.32);
      transition: transform .15s, box-shadow .15s;
      -webkit-tap-highlight-color: transparent;
    }
    .foot-home:hover { transform: translateY(-2px); box-shadow: 0 12px 28px rgba(177,118,243,0.42); }
    .foot-home svg { width: 21px; height: 21px; fill: currentColor; }
    .myway-footer .foot-meta { display: block; }

    @media (max-width: 700px) {
      .home-link { width: 36px; height: 36px; }
      .home-link svg { width: 19px; height: 19px; }
      .page-title { font-size: .95rem; }
      .cat-btn { padding: 7px 13px; font-size: .85rem; }
    }

    /* ===== 편집 도구 (news-edit) ===== */
    .edit-toolbar {
      display: none;
      flex-wrap: wrap;
      gap: 7px;
      justify-content: center;
      max-width: 1100px;
      margin: 0 auto;
      padding: 12px 14px 0;
    }
    body.show-edit .edit-toolbar { display: flex; }
    .tb-btn {
      font: inherit; font-size: .83rem; font-weight: 700;
      padding: 7px 14px; border-radius: 999px;
      border: 1.5px solid #dfe3ec; background: #fff; color: #4a5170;
      cursor: pointer; transition: all .15s; white-space: nowrap;
      -webkit-tap-highlight-color: transparent;
    }
    .tb-btn:hover { background: #f4f6fb; border-color: #c7cee0; }
    .tb-btn:active { transform: scale(0.96); }
    .tb-btn.on { background: #1f2740; border-color: #1f2740; color: #fff; }
    .tb-btn.code { border-color: #c9b6f3; color: #7c4bd6; }

    /* 카드 편집 오버레이 */
    .card-ctrl {
      display: none;
      position: absolute; inset: 0; z-index: 5;
      background: rgba(255,255,255,.86);
      border-radius: 10px;
      align-items: center; justify-content: center;
      gap: 5px; flex-wrap: wrap; padding: 6px;
    }
    body.editing .masonry .card .card-ctrl { display: flex; }
    body.editing .masonry .card { cursor: default; }
    body.editing .masonry .card:hover img { transform: none; }
    .card-ctrl button {
      border: 1.5px solid #dde2ee; background: #fff; border-radius: 8px;
      width: 30px; height: 30px; font-size: 14px; line-height: 1;
      cursor: pointer; color: #444; box-shadow: 0 1px 3px rgba(0,0,0,.08);
      font-family: inherit;
    }
    .card-ctrl button:hover { border-color: #7e94ff; color: #1f2740; }
    .card-ctrl button.del:hover { border-color: #d6455c; color: #d6455c; }

    /* 섹션 헤더 편집 도구 (etcNews 그룹) */
    .sec-tools { display: none; gap: 5px; margin-left: 8px; }
    body.editing .masonry .section-head .sec-tools { display: inline-flex; vertical-align: middle; }
    .sec-tools button {
      border: 1.5px solid #dde2ee; background: #fff; border-radius: 7px;
      width: 24px; height: 22px; font-size: 12px; line-height: 1;
      cursor: pointer; color: #6a739c; font-family: inherit;
    }
    .sec-tools button:hover { border-color: #7e94ff; color: #1f2740; }
    .sec-tools button.del:hover { border-color: #d6455c; color: #d6455c; }

    /* 코드 / 파일 저장 옵션 */
    .code-opt { display: flex; flex-direction: column; gap: 10px; }
    .code-opt button {
      border: 1.5px solid #dde2ee; background: #fff; border-radius: 12px;
      padding: 13px 14px; text-align: left; cursor: pointer; font-family: inherit;
    }
    .code-opt button:hover { border-color: #7e94ff; background: #f6f8ff; }
    .code-opt .ct { font-size: .92rem; font-weight: 800; color: #1f2740; }
    .code-opt .cs { font-size: .74rem; color: #8590ad; margin-top: 3px; line-height: 1.4; }
    .code-area { position: absolute; width: 1px; height: 1px; opacity: 0; pointer-events: none; }
  </style>
</head>
<body>

  <!-- 상단 sticky 헤더 -->
  <header class="topbar">
    <div class="topbar-row">
      <nav class="cat-nav" id="catNav">
        <button class="cat-btn is-active" data-cat="genNews">Magazines <span class="count" id="cnt-genNews"></span></button>
        <button class="cat-btn" data-cat="entNews">News <span class="count" id="cnt-entNews"></span></button>
        <button class="cat-btn" data-cat="etcNews">Others <span class="count" id="cnt-etcNews"></span></button>
        <button class="collapse-toggle" id="collapseToggle" aria-label="목록 접기/펼치기" aria-expanded="true" title="접기 / 펼치기">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 8l6 9H6z"/></svg>
        </button>
      </nav>
    </div>
  </header>

  <!-- 편집 툴바 (편집판에서만 노출) -->
  <div class="edit-toolbar" id="editToolbar"></div>

  <!-- 갤러리 섹션 -->
  <section class="gallery-section">
    <div class="masonry" id="masonryGallery" data-filter="genNews"></div>
  </section>

  <!-- MYWAY.KR 공통: 푸터 (홈 버튼 포함) -->
  <footer class="myway-footer">
    <a href="https://myway.kr/" class="foot-home" aria-label="MYWAY.KR 홈" title="MYWAY.KR 홈">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 3.2 2.5 11.4l1.3 1.5L5 11.85V20a1 1 0 0 0 1 1h4v-6h4v6h4a1 1 0 0 0 1-1v-8.15l1.2 1.05 1.3-1.5L12 3.2Z"/></svg>
    </a>
    <span class="foot-meta">
      <a href="https://myway.kr/" class="foot-link">myway.kr</a>
      <span class="sep">·</span>
      <span>© MYWAY.KR</span>
    </span>
  </footer>

  <!-- 추가/수정 모달 -->
  <div class="modal-overlay" id="addModal">
    <div class="modal">
      <h3 class="modal-title" id="modalTitle">즐겨찾기 추가</h3>
      <label class="field">
        <span>분류</span>
        <select id="inCat">
          <option value="genNews">Magazines</option>
          <option value="entNews">News</option>
          <option value="etcNews">Others</option>
        </select>
      </label>
      <label class="field">
        <span>텍스트 (이름)</span>
        <input id="inName" type="text" placeholder="예) 네이버" autocomplete="off">
      </label>
      <label class="field">
        <span id="lblUrl">사이트 주소</span>
        <input id="inUrl" type="text" placeholder="예) https://www.naver.com" autocomplete="off">
      </label>
      <label class="field">
        <span id="lblImg">사진 주소 (선택)</span>
        <input id="inImg" type="text" placeholder="이미지 URL · 비우면 이름 카드로 표시" autocomplete="off">
      </label>
      <div class="modal-actions">
        <button type="button" class="btn-danger" id="delBtn" style="display:none">삭제</button>
        <button type="button" class="btn-ghost" id="addCancel">취소</button>
        <button type="button" class="btn-primary" id="addSubmit">등록</button>
      </div>
    </div>
  </div>

  <!-- 코드 / 파일 저장 모달 -->
  <div class="modal-overlay" id="codeModal">
    <div class="modal">
      <h3 class="modal-title">코드 / 파일 저장</h3>
      <div class="code-opt">

    function ensureDistFresh() {
      if (_distChecked || !NEWS_IS_DIST) return; _distChecked = true;

        var sk = NEWS_STORE_KEY + '_sig';
        if (localStorage.getItem(sk) !== NEWS_DIST_SIG) {

        }

    }
    function cleanData(obj) {
      if (!obj || typeof obj !== 'object') return null;
      var out = {}; var ok = false;
      CATS.forEach(c => {
        var arr = Array.isArray(obj[c.code]) ? obj[c.code] : [];
        out[c.code] = arr.map(it => {
          if (it && it.section != null) return { section: String(it.section) };
          return { name: String((it && it.name) || ''), url: String((it && it.url) || ''), img: String((it && it.img) || '') };
        });
        if (out[c.code].length) ok = true;
      });
      return ok ? out : null;
    }

      ensureDistFresh();
      try {
        var raw = localStorage.getItem(NEWS_STORE_KEY);

      CATS.forEach(c => { if (!Array.isArray(init[c.code])) init[c.code] = []; });

    function ytId(url) {
      if (!url) return '';

      return m ? m[1] : '';

    function ytThumb(id) { return 'https://img.youtube.com/vi/' + id + '/hqdefault.jpg'; }

      if (item.img && item.img.trim()) return item.img.trim();
      if (cat === 'video') { const id = ytId(item.url); if (id) return ytThumb(id); }

    function buildCard(item, cat, idx) {
      if (item.section) {

          tools.appendChild(mk('▼', () => moveItemDir(cat, idx, 1)));
          tools.appendChild(mk('✏', () => renameSectionAt(cat, idx)));
          tools.appendChild(mk('✕', () => deleteAt(cat, idx), 'del'));
          h.appendChild(tools);
        }
        return h;
      }
      const a = document.createElement('a');
      a.className = 'card';
      const linkUrl = item.url || (cat.indexOf('photo') === 0 ? cardImage(item, cat) : '');

      a.dataset.cats = cat;
      a.setAttribute('aria-label', item.name);

      /* 드래그로 순서 변경 (같은 분류 내) */

      a.addEventListener('dragstart', e => {
        dragSrc = { cat: cat, idx: idx };

      a.addEventListener('dragend', () => { a.classList.remove('dragging'); clearDragOver(); });
      a.addEventListener('dragover', e => {
        if (!dragSrc || dragSrc.cat !== cat) return;
        e.preventDefault();
        a.classList.add('drag-over');
      });
      a.addEventListener('dragleave', () => a.classList.remove('drag-over'));
      a.addEventListener('drop', e => {
        e.preventDefault();
        a.classList.remove('drag-over');
        if (!dragSrc || dragSrc.cat !== cat) return;
        moveItem(cat, dragSrc.idx, idx);
        dragSrc = null;
      });

      const imgSrc = cardImage(item, cat);

        /* 이미지가 없으면 네임카드형(이름 + 도메인)으로 표시 — 전체목록 스타일 */

        body.appendChild(nm); body.appendChild(dm);
        a.appendChild(body);
        attachCtrl(a, cat, idx);
        return a;
      }
      const img = document.createElement('img');
      img.src = imgSrc; img.alt = item.name;
      img.loading = 'lazy'; img.decoding = 'async'; img.referrerPolicy = 'no-referrer'; img.draggable = false;
      a.appendChild(img);
      const cap = document.createElement('div');
      cap.className = 'cap'; cap.textContent = item.name;
      a.appendChild(cap);
      attachCtrl(a, cat, idx);
      return a;
    }

    /* ===== 카드 편집 컨트롤 ===== */
    function attachCtrl(a, cat, idx) {
      if (!NEWS_SHOW_EDIT) return;
      const ctrl = document.createElement('div'); ctrl.className = 'card-ctrl';
      const mk = (t, fn, cls) => { const b = document.createElement('button'); b.type = 'button'; b.textContent = t; if (cls) b.className = cls; b.addEventListener('click', e => { e.preventDefault(); e.stopPropagation(); fn(); }); return b; };

      ctrl.appendChild(mk('✏', () => openEditModal(cat, idx)));
      ctrl.appendChild(mk('✕', () => deleteAt(cat, idx), 'del'));
      ctrl.appendChild(mk('▶', () => moveItemDir(cat, idx, 1)));
      a.appendChild(ctrl);
      a.addEventListener('click', e => { if (document.body.classList.contains('editing')) e.preventDefault(); }, true);
    }
    function moveItemDir(cat, idx, dir) {
      const arr = data[cat]; const cur = arr[idx];
      let ni = idx + dir;
      if (!(cur && cur.section != null)) {
        /* 일반 항목은 섹션 헤더를 건너뛰어 이동 */
        while (ni >= 0 && ni < arr.length && arr[ni] && arr[ni].section != null) ni += dir;
      }
      if (ni < 0 || ni >= arr.length) return;
      const t = arr[idx]; arr[idx] = arr[ni]; arr[ni] = t;
      saveData(data); render();
    }
    function deleteAt(cat, idx) {
      const it = data[cat][idx];
      if (!confirm('"' + (it.name || it.section || '') + '" 항목을 삭제할까요?')) return;
      data[cat].splice(idx, 1); saveData(data); render();
    }
    function renameSectionAt(cat, idx) {
      const cur = data[cat][idx].section;
      const v = prompt('섹션(그룹) 이름', cur); if (v === null) return;
      data[cat][idx].section = (v.trim() || cur); saveData(data); render();
    }
    function addSectionHead() {
      const v = prompt('새 섹션(그룹) 이름\n(Others 탭에서 항목을 묶는 제목입니다)', ''); if (v === null) return;
      const name = v.trim(); if (!name) return;
      data[currentFilter].push({ section: name }); saveData(data);
      setActiveTab(currentFilter); render();
    }

    function buildAddCard() {
      const d = document.createElement('div');
      d.className = 'card add-card';
      d.dataset.cats = 'genNews entNews etcNews';
      d.setAttribute('role', 'button');
      d.setAttribute('aria-label', '즐겨찾기 추가');
      d.innerHTML = '<span class="plus">+</span>';
      d.addEventListener('click', () => openAddModal());
      return d;
    }

    function applyFilter() { document.getElementById('masonryGallery').dataset.filter = currentFilter; }

    function updateCounts() {
      const counts = {};
      CATS.forEach(c => { counts[c.code] = data[c.code].filter(it => !it.section).length; });
      Object.keys(counts).forEach(k => { const el = document.getElementById('cnt-' + k); if (el) el.textContent = counts[k]; });
    }
    function labelOf(code) { const c = CATS.find(x => x.code === code); return c ? c.label : ''; }
    function setActiveTab(code) {
      currentFilter = code;
      document.querySelectorAll('.cat-btn').forEach(b => b.classList.toggle('is-active', b.dataset.cat === code));
      applyFilter();
    }
    function setupCatNav() {
      document.getElementById('catNav').addEventListener('click', e => {
        const btn = e.target.closest('.cat-btn'); if (!btn) return;
        setActiveTab(btn.dataset.cat);
      });
    }

    /* ===== 모달 (추가/수정 겸용) ===== */
    function refreshUrlLabel() {
      document.getElementById('lblUrl').textContent = '기사 / 사이트 주소';
      document.getElementById('inUrl').placeholder = '예) https://news.naver.com/...';
      document.getElementById('lblImg').textContent = '사진(썸네일) 주소';
    }
    function fillModal(item, cat) {
      document.getElementById('inCat').value = cat;
      document.getElementById('inName').value = item ? item.name : '';
      document.getElementById('inUrl').value = item ? item.url : '';
      document.getElementById('inImg').value = item ? (item.img || '') : '';
      refreshUrlLabel();
    }
    function openAddModal() {
      editRef = null;
      document.getElementById('modalTitle').textContent = '즐겨찾기 추가';
      document.getElementById('addSubmit').textContent = '등록';
      document.getElementById('delBtn').style.display = 'none';
      fillModal(null, currentFilter);
      document.getElementById('addModal').classList.add('open');
      setTimeout(() => document.getElementById('inName').focus(), 50);
    }
    function openEditModal(cat, idx) {
      editRef = { cat: cat, idx: idx };
      document.getElementById('modalTitle').textContent = '즐겨찾기 수정';
      document.getElementById('addSubmit').textContent = '저장';
      document.getElementById('delBtn').style.display = '';
      fillModal(data[cat][idx], cat);
      document.getElementById('addModal').classList.add('open');
    }
    function closeAddModal() {
      document.getElementById('addModal').classList.remove('open');
      editRef = null;
    }
    function normalizeUrl(u) {
      u = (u || '').trim();
      if (!u) return '';
      if (!/^https?:\/\//i.test(u)) u = 'https://' + u;
      return u;
    }
    function submitModal() {
      const name = document.getElementById('inName').value.trim();
      const url = normalizeUrl(document.getElementById('inUrl').value);
      const img = document.getElementById('inImg').value.trim();
      const cat = document.getElementById('inCat').value;
      if (!name) { alert('텍스트(이름)를 입력하세요.'); return; }
      if (!url && cat.indexOf('photo') !== 0) { alert('주소를 입력하세요.'); return; }
      const rec = { name: name, url: url, img: img };
      if (editRef) {
        if (editRef.cat === cat) { data[cat][editRef.idx] = rec; }
        else { data[editRef.cat].splice(editRef.idx, 1); data[cat].push(rec); }
      } else {
        data[cat].push(rec);
      }
      saveData(data);
      closeAddModal();
      setActiveTab(cat);
      render();
    }
    function deleteCurrent() {
      if (!editRef) return;
      const item = data[editRef.cat][editRef.idx];
      if (confirm('"' + item.name + '" 항목을 삭제할까요?')) {
        data[editRef.cat].splice(editRef.idx, 1);
        saveData(data);
        closeAddModal();
        render();
      }
    }


    /* ===== 바인딩 ===== */
    document.getElementById('addSubmit').addEventListener('click', submitModal);
    document.getElementById('addCancel').addEventListener('click', closeAddModal);
    document.getElementById('delBtn').addEventListener('click', deleteCurrent);
    document.getElementById('inCat').addEventListener('change', refreshUrlLabel);
    document.getElementById('addModal').addEventListener('click', e => { if (e.target.id === 'addModal') closeAddModal(); });
    document.addEventListener('keydown', e => { if (e.key === 'Escape') { closeAddModal(); } });

    /* ===== 드래그 정렬 ===== */
    function clearDragOver() {
      document.querySelectorAll('.card.drag-over').forEach(el => el.classList.remove('drag-over'));
    }
    function moveItem(cat, from, to) {
      if (from === to) return;
      const arr = data[cat];
      const m = arr.splice(from, 1)[0];
      arr.splice(from < to ? to - 1 : to, 0, m);
      saveData(data);
      render();
    }

    /* ===== 편집 툴바 ===== */
    let editMode = false;
    function buildToolbar() {
      if (!NEWS_SHOW_EDIT) return;
      document.body.classList.add('show-edit');
      const tb = document.getElementById('editToolbar');
      tb.innerHTML = '';
      const mk = (label, fn, cls) => { const b = document.createElement('button'); b.type = 'button'; b.className = 'tb-btn' + (cls ? ' ' + cls : ''); b.textContent = label; b.addEventListener('click', fn); return b; };
      tb.appendChild(mk(editMode ? '✏ 편집 끝' : '✏ 편집', () => { editMode = !editMode; document.body.classList.toggle('editing', editMode); buildToolbar(); }, editMode ? 'on' : ''));
      tb.appendChild(mk('＋ 항목추가', () => openAddModal()));
      tb.appendChild(mk('▦ 섹션추가', addSectionHead));
      tb.appendChild(mk('📥 가져오기', importData));
      tb.appendChild(mk('📤 내보내기', exportData));
      if (!NEWS_IS_DIST) tb.appendChild(mk('</> 코드', openCodeModal, 'code'));
    }

    /* ===== 내보내기 / 가져오기 ===== */
    function exportData() {
      const payload = { type: 'myway-news', data: data };
      const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
      const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'myway-news.json'; a.click();
      setTimeout(() => URL.revokeObjectURL(a.href), 1500);
    }
    function importData() {
      const inp = document.createElement('input'); inp.type = 'file'; inp.accept = '.json,.html,.htm,text/html,application/json';
      inp.onchange = () => {
        const f = inp.files[0]; if (!f) return;
        const r = new FileReader();
        r.onload = () => {
          let nd = null; const txt = String(r.result);
          /* 1) JSON 시도 */
          try { const p = JSON.parse(txt); if (p && typeof p === 'object') nd = cleanData(p.data || p); } catch (_) {}
          /* 2) HTML 안의 DEFAULTS 시도 */
          if (!nd) {
            const m = txt.match(/@DEFAULTS_START\s*\*\/\s*const\s+DEFAULTS\s*=\s*(\{[\s\S]*?\})\s*;\s*\/\*\s*@DEFAULTS_END/);
            if (m) { try { nd = cleanData(eval('(' + m[1] + ')')); } catch (_) {} }
          }
          if (!nd) { alert('읽을 수 있는 데이터가 없어요.'); return; }
          data = nd; saveData(data);
          setActiveTab(currentFilter); render();
          const total = CATS.reduce((s, c) => s + data[c.code].length, 0);
          alert('가져왔어요. 항목 ' + total + '개');
        };
        r.readAsText(f);
      };
      inp.click();
    }

    /* ===== 코드 / 파일 저장 ===== */
    const codeModal = document.getElementById('codeModal');
    function openCodeModal() { codeModal.classList.add('open'); }
    function closeCodeModal() { codeModal.classList.remove('open'); }
    document.getElementById('codeClose').addEventListener('click', closeCodeModal);
    codeModal.addEventListener('click', e => { if (e.target === codeModal) closeCodeModal(); });

    function serializeDefaults(d) {
      let out = '{\n';
      CATS.forEach((c, ci) => {
        out += '      ' + c.code + ': [\n';
        d[c.code].forEach(it => {
          if (it.section != null) out += '        { section: ' + JSON.stringify(it.section) + ' },\n';
          else out += '        { name: ' + JSON.stringify(it.name) + ', url: ' + JSON.stringify(it.url) + ', img: ' + JSON.stringify(it.img) + ' },\n';
        });
        out += '      ]' + (ci < CATS.length - 1 ? ',' : '') + '\n';
      });
      out += '    }';
      return out;
    }
    function buildHTML(cfg) {
      const clone = document.documentElement.cloneNode(true);
      const g = clone.querySelector('#masonryGallery'); if (g) { g.innerHTML = ''; g.dataset.filter = 'genNews'; }
      const tb = clone.querySelector('#editToolbar'); if (tb) tb.innerHTML = '';
      const ta = clone.querySelector('#codeArea'); if (ta) ta.value = '';
      clone.querySelectorAll('.modal-overlay.open').forEach(m => m.classList.remove('open'));
      const b = clone.querySelector('body'); if (b) b.className = '';
      let html = '<!DOCTYPE html>\n' + clone.outerHTML;
      html = html.replace(/\/\* @DEFAULTS_START \*\/[\s\S]*?\/\* @DEFAULTS_END \*\//,
        '/* @DEFAULTS_START */\n    const DEFAULTS = ' + serializeDefaults(data) + ';\n    /* @DEFAULTS_END */');
      html = html.replace(/\/\* @CONFIG \*\/[\s\S]*?\/\* @CONFIG_END \*\//,
        '/* @CONFIG */\n    const NEWS_IS_DIST = ' + cfg.dist + ';\n    const NEWS_SHOW_EDIT = ' + cfg.edit + ';\n    const NEWS_COPY_PROTECT = ' + cfg.prot + ';\n    const NEWS_STORE_KEY = ' + JSON.stringify(cfg.key) + ';\n    const NEWS_DIST_SIG = ' + JSON.stringify(cfg.sig) + ';\n    /* @CONFIG_END */');
      return html;
    }
    function dl(name, html) {
      const blob = new Blob([html], { type: 'text/html' });
      const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = name; a.click();
      setTimeout(() => URL.revokeObjectURL(a.href), 1500);
    }
    document.getElementById('saveEdit').addEventListener('click', () => {
      dl('news-edit.html', buildHTML({ dist: true, edit: true, prot: false, key: 'mywayNewsEditV1', sig: 'sig' + Date.now() }));
      closeCodeModal();
    });
    document.getElementById('saveView').addEventListener('click', () => {
      dl('news.html', buildHTML({ dist: false, edit: false, prot: true, key: 'mywayNewsV1', sig: '' }));
      closeCodeModal();
    });
    document.getElementById('copyCode').addEventListener('click', () => {
      const code = 'const DEFAULTS = ' + serializeDefaults(data) + ';';
      const ta = document.getElementById('codeArea'); ta.value = code; ta.style.pointerEvents = 'auto';
      ta.select(); ta.setSelectionRange(0, code.length);
      let ok = false; try { ok = document.execCommand('copy'); } catch (_) {}
      if (navigator.clipboard) { navigator.clipboard.writeText(code).then(() => {}, () => {}); ok = true; }
      ta.style.pointerEvents = 'none';
      alert(ok ? '데이터 코드를 복사했어요.' : '복사 실패 — 수동으로 복사해 주세요.');
    });

    render();
    setupCatNav();
    buildToolbar();

    })(); /* ===== news 전용 스코프 끝 ===== */

    /* ===== iframe 임베드 시 부모에게 높이 알림 (잘림 방지) =====
       부모(indexmain7)가 'favHeightHome' 메시지를 받아 iframe 높이를 맞춥니다. */
    (function(){
      if (window.parent === window) return;   /* 단독 페이지로 열렸으면 동작 안 함 */
      /* iframe 안에서는 100vh 높이 강제를 풀어, 내용 높이만큼만 차지하도록 함
         (이게 있으면 iframe 높이가 한 번 커진 뒤 줄지 않아 하단에 빈 공간이 길게 남음) */
      document.documentElement.style.minHeight = '0';
      document.body.style.minHeight = '0';
      /* 부모(indexmain7)에 이미 푸터·홈버튼이 있으므로, iframe 안의 것은 숨겨 중복 방지 */
      var _footer = document.querySelector('.myway-footer');
      if (_footer) _footer.style.display = 'none';
      function reportHeight() {
        try {
          var h = Math.max(
            document.body ? document.body.scrollHeight : 0,
            document.body ? document.body.offsetHeight : 0
          );
          window.parent.postMessage({ type: 'favHeightHome', height: h }, '*');
        } catch (e) {}
      }
      window.addEventListener('load', reportHeight);
      window.addEventListener('resize', reportHeight);
      document.addEventListener('DOMContentLoaded', reportHeight);
      /* 카테고리 탭 전환·이미지 지연 로드로 높이가 바뀌는 경우 대응 */
      document.addEventListener('click', function (e) {
        if (e.target.closest && e.target.closest('.cat-btn')) setTimeout(reportHeight, 60);
      });
      /* 접기 / 펼치기 토글 */
      var _collapseToggle = document.getElementById('collapseToggle');
      if (_collapseToggle) {
        _collapseToggle.addEventListener('click', function () {
          var collapsed = document.body.classList.toggle('is-collapsed');
          _collapseToggle.setAttribute('aria-expanded', collapsed ? 'false' : 'true');
          reportHeight();
          setTimeout(reportHeight, 60);
          setTimeout(reportHeight, 350);
        });
      }
      window.addEventListener('load', function () {
        document.querySelectorAll('img').forEach(function (img) {
          if (!img.complete) img.addEventListener('load', reportHeight);
        });
      });
      setTimeout(reportHeight, 300);
      setTimeout(reportHeight, 1000);
      setInterval(reportHeight, 1000);
    })();

    /* ===== 모바일: iframe 안에서 열릴 때 링크를 최상위 창에서 직접 열어
       뒤로가기로 MYWAY 복귀 가능하게. PC·태블릿은 새 탭 유지. ===== */
    (function(){
      if (!/Mobi/i.test(navigator.userAgent)) return;
      document.addEventListener('click', function (e) {
        var a = e.target.closest ? e.target.closest('a[href]') : null;
        if (!a) return;
        var href = a.getAttribute('href') || '';
        if (!href || href.charAt(0) === '#' || /^javascript:/i.test(href)) return;
        e.preventDefault();
        try { (window.top || window).location.href = a.href; }
        catch (_) { window.open(a.href, '_blank'); }
      }, true);
      var _open = window.open.bind(window);
      window.open = function (url, name, feat) {
        if (url) { try { (window.top || window).location.href = url; } catch (_) { location.href = url; } return null; }
        return _open(url, name, feat);
      };
    })();
  </script>
</body>
