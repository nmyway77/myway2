<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>구슬 순위 결정기 · MYWAY.KR</title>
<meta name="description" content="구슬을 굴려 순위를 정하는 무료 게임. 다 함께 굴러내려오는 레이스 모드와, 한 알씩 떨어뜨려 꼴찌부터 거꾸로 정하는 꼴찌뽑기 모드를 제공합니다.">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,600;1,9..144,500&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">

<style>
:root{
  --paper:#f7f3eb; --ink:#1d1b16; --ink-soft:#6a6457; --line:#ddd5c5;
  --board:#141a30; --accent:#e8590c; --accent-deep:#c44608;
  --panel:#fffdf8; --gold:#f0a020; --red:#e03131;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{
  font-family:"Pretendard",sans-serif;background:var(--paper);color:var(--ink);
  min-height:100vh;-webkit-user-select:none;user-select:none;
  background-image:radial-gradient(circle at 15% 12%,#fbf8f1 0,transparent 42%),radial-gradient(circle at 85% 88%,#f0eadd 0,transparent 48%);
}
input,textarea{-webkit-user-select:text!important;user-select:text!important;}
.home-corner{position:fixed;top:16px;left:18px;z-index:50;}
.home-corner a{font-family:"JetBrains Mono",monospace;font-size:11.5px;letter-spacing:.08em;text-transform:uppercase;
  color:var(--ink-soft);text-decoration:none;border:1px solid var(--line);border-radius:6px;padding:6px 11px;background:var(--panel);transition:.18s;}
.home-corner a:hover{color:var(--accent);border-color:var(--accent);}

.wrap{max-width:920px;margin:0 auto;padding:58px 18px 90px;}
.head{text-align:center;margin-bottom:24px;}
.kicker{font-family:"JetBrains Mono",monospace;font-size:11px;letter-spacing:.3em;text-transform:uppercase;color:var(--accent);margin-bottom:12px;}
.head h1{font-family:"Fraunces",serif;font-weight:600;font-size:36px;line-height:1.1;letter-spacing:-.02em;}
.head h1 em{font-style:italic;color:var(--accent);}
.head p{font-size:14px;color:var(--ink-soft);margin-top:10px;min-height:20px;}

.layout{display:flex;gap:24px;align-items:flex-start;justify-content:center;flex-wrap:wrap;}
.panel{flex:1 1 260px;max-width:320px;min-width:240px;background:var(--panel);border:1px solid var(--line);
  border-radius:16px;padding:20px;box-shadow:0 14px 40px -24px rgba(20,26,48,.4);}
.panel h2{font-family:"JetBrains Mono",monospace;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-soft);margin-bottom:11px;}

.mode-seg{display:flex;border:1px solid var(--line);border-radius:10px;overflow:hidden;margin-bottom:18px;}
.mode-seg button{flex:1;border:0;background:var(--paper);font-family:"Pretendard",sans-serif;font-weight:600;font-size:13.5px;
  color:var(--ink-soft);padding:11px 6px;cursor:pointer;transition:.15s;}
.mode-seg button.on{background:var(--accent);color:#fff;}

#names{width:100%;height:140px;resize:vertical;border:1px solid var(--line);border-radius:10px;background:var(--paper);
  font-family:"Pretendard",sans-serif;font-size:14px;color:var(--ink);padding:12px;line-height:1.7;outline:none;}
#names:focus{border-color:var(--accent);}
.hint{font-size:11.5px;color:var(--ink-soft);margin-top:8px;line-height:1.6;}
.row{display:flex;align-items:center;gap:10px;margin-top:16px;}
.row label{font-size:13px;color:var(--ink-soft);}
.count-box{display:flex;align-items:center;border:1px solid var(--line);border-radius:9px;overflow:hidden;}
.count-box button{border:0;background:var(--paper);color:var(--ink);width:34px;height:34px;font-size:18px;cursor:pointer;transition:.15s;}
.count-box button:hover{background:var(--accent);color:#fff;}
.count-box span{min-width:40px;text-align:center;font-family:"JetBrains Mono",monospace;font-weight:700;font-size:15px;}
.btns{display:flex;gap:10px;margin-top:18px;}
.btn{flex:1;font-family:"JetBrains Mono",monospace;font-size:14px;font-weight:700;letter-spacing:.02em;border:0;padding:13px;border-radius:11px;cursor:pointer;transition:.16s;}
.btn.go{background:var(--accent);color:#fff;box-shadow:0 6px 16px -6px var(--accent-deep);}
.btn.go:hover{background:var(--accent-deep);transform:translateY(-1px);}
.btn.go:disabled{background:#d8cfc0;color:#fff;box-shadow:none;cursor:default;transform:none;}
.btn.reset{flex:0 0 auto;background:var(--paper);color:var(--ink-soft);border:1px solid var(--line);}
.btn.reset:hover{border-color:var(--accent);color:var(--accent);}

.board-wrap{flex:0 0 auto;}
#board{display:block;border-radius:16px;box-shadow:0 18px 50px -22px rgba(20,26,48,.7);
  border:6px solid #1f2742;background:var(--board);max-width:100%;height:auto;touch-action:auto;}

.side-col{display:flex;flex-direction:column;gap:16px;flex:1 1 280px;max-width:320px;min-width:240px;}
.side-col .panel,.side-col .results{flex:none;max-width:none;min-width:0;width:100%;}
.results{flex:1 1 220px;max-width:300px;min-width:200px;background:var(--panel);border:1px solid var(--line);
  border-radius:16px;padding:18px;box-shadow:0 14px 40px -24px rgba(20,26,48,.4);}
.results h2{font-family:"JetBrains Mono",monospace;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-soft);margin-bottom:14px;}
.rank-list{display:flex;flex-direction:column;gap:7px;}
.rank-cell{display:flex;align-items:center;gap:11px;padding:9px 11px;border:1px solid var(--line);border-radius:11px;background:var(--paper);min-height:46px;transition:.25s;}
.rank-cell.filled{border-color:transparent;background:#fff;box-shadow:0 4px 14px -8px rgba(20,26,48,.5);animation:pop .35s ease;}
.rank-cell.lastpick{box-shadow:0 0 0 2px var(--red);}
@keyframes pop{0%{transform:scale(.85);opacity:0;}100%{transform:scale(1);opacity:1;}}
.rank-no{font-family:"Fraunces",serif;font-weight:600;font-size:18px;width:38px;text-align:center;color:var(--ink-soft);flex:0 0 auto;}
.rank-cell.filled .rank-no{color:var(--accent);}
.rank-cell.top1 .rank-no{color:var(--gold);}
.marble-dot{width:22px;height:22px;border-radius:50%;flex:0 0 auto;box-shadow:inset -3px -3px 5px rgba(0,0,0,.25),inset 2px 2px 4px rgba(255,255,255,.45);}
.rank-name{font-size:14.5px;font-weight:500;word-break:break-all;}
.rank-cell:not(.filled) .rank-name{color:#c3bba8;}

.note{margin:30px auto 0;max-width:680px;font-size:12.5px;color:var(--ink-soft);line-height:1.7;text-align:center;}
.float-home{position:fixed;right:18px;bottom:18px;z-index:99;width:46px;height:46px;border-radius:50%;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;box-shadow:0 6px 18px rgba(232,89,12,.4);text-decoration:none;transition:.2s;}
.float-home:hover{transform:translateY(-3px) scale(1.05);background:var(--accent-deep);}
.float-home svg{width:20px;height:20px;stroke:#fff;}
footer{text-align:center;padding:30px 16px 40px;font-family:"JetBrains Mono",monospace;font-size:11px;color:var(--ink-soft);}
footer a{color:var(--accent);text-decoration:none;font-weight:500;}
footer a:hover{text-decoration:underline;}
/* 패널 헤드(제목+미니 버튼) */
.panel-head,.results-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:11px;}
.panel-head h2,.results-head h2{margin-bottom:0;}
.mini-btn{border:1px solid var(--line);background:var(--paper);color:var(--ink-soft);border-radius:8px;
  font-family:"Pretendard",sans-serif;font-size:12px;font-weight:600;padding:4px 10px;cursor:pointer;transition:.15s;}
.mini-btn:hover{border-color:var(--accent);color:var(--accent);}
.mini-btn.off{opacity:.45;}

/* 참가자 아코디언 */
.names-acc{margin-top:4px;}
.names-acc summary{list-style:none;cursor:pointer;font-family:"JetBrains Mono",monospace;font-size:11px;
  letter-spacing:.14em;text-transform:uppercase;color:var(--ink-soft);margin-bottom:11px;display:flex;align-items:center;gap:6px;}
.names-acc summary::-webkit-details-marker{display:none;}
.names-acc summary::after{content:"▾";font-size:10px;transition:.2s;}
.names-acc:not([open]) summary::after{transform:rotate(-90deg);}
.names-acc summary:hover{color:var(--accent);}

/* 인원수+버튼 한 줄 */
.ctrl-line{display:flex;align-items:center;gap:9px;margin-top:16px;}
.ctrl-line .lbl{font-size:13px;color:var(--ink-soft);flex:0 0 auto;}
.ctrl-line .count-box{flex:0 0 auto;}
.ctrl-line .btn.go{flex:1;}

@media (max-width:880px){
  .wrap{padding:48px 12px 56px;}
  .layout{flex-direction:column;align-items:center;gap:10px;}
  .side-col{display:contents;}
  .panel,.results{max-width:540px;width:100%;}
  .panel{order:0;padding:12px 14px;}
  .board-wrap{order:1;}
  .results{order:2;padding:10px 12px;}
  .head{margin-bottom:10px;}
  .head h1{font-size:23px;}
  .kicker,.head p,.note,.hint{display:none;}
  .panel h2,.panel-head{margin-bottom:7px;}
  .mode-seg{margin-bottom:8px;}
  .mode-seg button{padding:8px 6px;font-size:13px;}
  #names{height:78px;}
  .names-acc summary{margin-bottom:8px;}
  .ctrl-line{margin-top:10px;}
  .ctrl-line .btn{padding:10px;font-size:13px;}
  .results-head{margin-bottom:8px;}
  .results .rank-list{flex-direction:row;overflow-x:auto;gap:6px;padding-bottom:3px;-webkit-overflow-scrolling:touch;}
  .rank-cell{flex:0 0 auto;min-width:92px;padding:6px 9px;min-height:38px;gap:7px;}
  .rank-no{font-size:13px;width:auto;}
  .rank-name{font-size:12.5px;white-space:nowrap;word-break:normal;}
  .marble-dot{width:13px;height:13px;}
  footer{padding:16px 14px 24px;}
  .float-home{width:40px;height:40px;right:12px;bottom:12px;}
}
</style>
</head>
<body>

<div class="home-corner"><a href="https://myway.kr">← MYWAY</a></div>

<div class="wrap">
  <div class="head">
    <div class="kicker">Marble Rank Game</div>
    <h1>구슬 <em>순위</em> 결정기</h1>
    <p id="modeDesc">다 함께 굴러내려와 결승선에 먼저 닿는 순서대로 순위가 정해져요.</p>
  </div>

  <div class="layout">
    <div class="side-col">
    <div class="panel">
      <div class="panel-head">
        <h2>모드</h2>
        <button id="soundBtn" class="mini-btn" type="button" title="효과음 켜기/끄기">🔊 효과음</button>
      </div>
      <div class="mode-seg" id="modeSeg">
        <button data-mode="race" class="on">레이스</button>
        <button data-mode="last">꼴찌뽑기</button>
      </div>
      <details class="names-acc" id="namesAcc" open>
        <summary>참가자</summary>
        <textarea id="names" placeholder="한 줄에 한 명씩&#10;예)&#10;철수&#10;영희&#10;민준&#10;수아" spellcheck="false"></textarea>
        <div class="hint">비워두면 인원수만큼 1·2·3… 번호로 진행돼요. 입력한 이름은 이 기기에 저장돼요.</div>
      </details>
      <div class="ctrl-line">
        <span class="lbl">인원</span>
        <div class="count-box"><button id="minus">−</button><span id="countVal">6</span><button id="plus">+</button></div>
        <button class="btn go" id="goBtn">구슬 굴리기</button>
        <button class="btn reset" id="resetBtn">초기화</button>
      </div>
    </div>

    <div class="results">
      <div class="results-head">
        <h2>순위</h2>
        <button id="copyBtn" class="mini-btn" type="button" style="display:none">결과 복사</button>
      </div>
      <div class="rank-list" id="rankList"></div>
    </div>
    </div>

    <div class="board-wrap"><canvas id="board"></canvas></div>
  </div>

  <div class="note">사다리타기 대신 쓰는 랜덤 순위 게임이에요. 핀 튕김은 매번 달라서 결과도 매번 랜덤입니다.</div>
</div>

</a>

<script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js" defer></script>
<script>
(function(){
  "use strict";
  var W=440,H=740;
  var FINISH=H-26;
  var BIN_TOP=550, PEG_TOP=120, BIN_MARGIN=14, PEG_BOTTOM_LAST=524;
  var COLORS=["#e8590c","#1d4f9e","#2b8a3e","#c2255c","#9c36b5","#1098ad","#e67700","#5c940d","#d6336c","#1864ab","#087f5b","#862e9c","#f08c00","#3b5bdb"];

  var canvas=document.getElementById("board"), ctx=canvas.getContext("2d");
  var dpr=Math.max(1,Math.min(2,window.devicePixelRatio||1));
  canvas.width=W*dpr; canvas.height=H*dpr; canvas.style.width=W+"px"; canvas.style.height=H+"px";
  ctx.setTransform(dpr,0,0,dpr,0,0);

  /* ===== 보드 자동 스케일링: 모바일에서 한 화면에 맞춤 ===== */
  function fitBoard(){
    var vw=window.innerWidth, vh=window.innerHeight, scale;
    if(vw<=880){
      var head=document.querySelector(".head"), panel=document.querySelector(".panel"), res=document.querySelector(".results");
      var used=(head?head.offsetHeight:0)+(panel?panel.offsetHeight:0)+(res?res.offsetHeight:0);
      var availH=vh-used-92;            /* 상하 패딩·간격 여유 */
      var availW=vw-28;
      scale=Math.min(availW/W, availH/H, 1);
      if(scale<0.34) scale=0.34;        /* 최소 가독 크기 */
    } else {
      scale=Math.min(1,(vh-150)/H);
      if(scale<0.6) scale=0.6;
    }
    canvas.style.width=Math.round(W*scale)+"px";
    canvas.style.height=Math.round(H*scale)+"px";
  }
  window.addEventListener("resize",fitBoard);
  window.addEventListener("orientationchange",function(){ setTimeout(fitBoard,120); });

  /* ===== 효과음 (Web Audio) ===== */
  var SOUND_KEY="mywayMarbleRankSoundV1";
  var soundOn=(localStorage.getItem(SOUND_KEY)!=="off");
  var audioCtx=null, lastTickAt=0;
  function beep(freq,dur,gain,type){
    if(!soundOn) return;
    try{
      if(!audioCtx) audioCtx=new (window.AudioContext||window.webkitAudioContext)();
      var o=audioCtx.createOscillator(), g=audioCtx.createGain();
      o.type=type||"sine"; o.frequency.value=freq;
      g.gain.setValueAtTime(gain||0.08,audioCtx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.0001,audioCtx.currentTime+dur);
      o.connect(g); g.connect(audioCtx.destination);
      o.start(); o.stop(audioCtx.currentTime+dur);
    }catch(e){}
  }
  function tickSound(){ var now=Date.now(); if(now-lastTickAt<38) return; lastTickAt=now; beep(1900+Math.random()*900,0.045,0.028,"triangle"); }
  function popSound(){ beep(540,0.09,0.06,"square"); }
  function thudSound(){ beep(200,0.16,0.1,"sine"); }
  function chimeSound(){ beep(880,0.18,0.1); setTimeout(function(){beep(1175,0.22,0.1);},95); setTimeout(function(){beep(1568,0.32,0.12);},200); }
  function syncSoundBtn(){
    var b=document.getElementById("soundBtn");
    b.textContent=soundOn?"🔊 효과음":"🔇 효과음";
    b.classList.toggle("off",!soundOn);
  }
  document.getElementById("soundBtn").addEventListener("click",function(){
    soundOn=!soundOn;
    try{ localStorage.setItem(SOUND_KEY,soundOn?"on":"off"); }catch(e){}
    syncSoundBtn(); if(soundOn) beep(880,0.1,0.08);
  });
  syncSoundBtn();

  /* ===== 콘페티 ===== */
  var confetti=[];
  function burstConfetti(){
    for(var i=0;i<70;i++){
      confetti.push({x:W/2+(Math.random()-0.5)*140,y:H*0.32,vx:(Math.random()-0.5)*7,
        vy:-Math.random()*7-2,life:80+Math.random()*50,c:COLORS[i%COLORS.length],
        r:2.2+Math.random()*3,a:Math.random()*Math.PI});
    }
  }
  function drawConfetti(){
    for(var i=confetti.length-1;i>=0;i--){
      var p=confetti[i];
      p.x+=p.vx; p.y+=p.vy; p.vy+=0.18; p.a+=0.15; p.life--;
      if(p.life<=0||p.y>H+10){ confetti.splice(i,1); continue; }
      ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.a);
      ctx.globalAlpha=Math.min(1,p.life/30);
      ctx.fillStyle=p.c; ctx.fillRect(-p.r,-p.r*0.6,p.r*2,p.r*1.2);
      ctx.restore(); ctx.globalAlpha=1;
    }
  }

  var M=null, engine=null, runner=null, pegs=[], marbles=[];
  var mode="race", running=false, countVal=6, participants=[], results=[];
  var releaseTimer=null, stuckFrames={};
  var currentNames=[], binW=0, binCount=0, selectedBin=-1, lastPhase="idle", lastLow=0, lastFrame=0, lastMarble=null;

  function readParticipants(){
    var lines=document.getElementById("names").value.split("\n").map(function(s){return s.trim();}).filter(Boolean);
    if(lines.length>=2) return lines.slice(0,14);
    var arr=[]; for(var i=1;i<=countVal;i++) arr.push(String(i)); return arr;
  }
  function clearEngine(){
    if(releaseTimer){ clearInterval(releaseTimer); releaseTimer=null; }
    if(runner){ M.Runner.stop(runner); runner=null; }
    if(engine){ M.Events.off(engine); M.Engine.clear(engine); engine=null; }
    marbles=[]; pegs=[]; lastMarble=null;
  }
  function baseWorld(grav){
    engine=M.Engine.create(); engine.gravity.y=grav;
    var wo={isStatic:true,restitution:0.2,friction:0.4};
    M.Composite.add(engine.world,[
      M.Bodies.rectangle(-8,H/2,20,H*2,wo),
      M.Bodies.rectangle(W+8,H/2,20,H*2,wo),
      M.Bodies.rectangle(64,70,150,8,Object.assign({angle:0.5},wo)),
      M.Bodies.rectangle(W-64,70,150,8,Object.assign({angle:-0.5},wo))
    ]);
    return wo;
  }
  function addPegs(bottom){
    var row=0;
    for(var y=PEG_TOP;y<=bottom;y+=44){
      var off=(row%2===0)?23:0;
      for(var x=24+off;x<=W-24;x+=46){
        var p=M.Bodies.circle(x,y,5,{isStatic:true,restitution:0.55,friction:0});
        pegs.push(p); M.Composite.add(engine.world,p);
      }
      row++;
    }
  }
  function startRunner(){
    runner=M.Runner.create();
    M.Events.on(engine,"afterUpdate",onUpdate);
    M.Events.on(engine,"collisionStart",function(ev){
      var pr=ev.pairs;
      for(var i=0;i<pr.length;i++){
        var a=pr[i].bodyA, b=pr[i].bodyB;
        if((a._id&&b.isStatic)||(b._id&&a.isStatic)){ tickSound(); break; }
      }
    });
    M.Runner.run(runner,engine);
  }

  function makeMarble(label,color,x,r){
    var b=M.Bodies.circle(x,18,r,{restitution:0.43,friction:0.02,frictionAir:0.004,density:0.0016});
    b._label=label; b._color=color; b._finished=false; b._id=Math.random();
    M.Body.setVelocity(b,{x:(Math.random()-0.5)*3,y:0});
    return b;
  }

  function startRace(){
    clearEngine();
    var wo=baseWorld(0.9);
    M.Composite.add(engine.world, M.Bodies.rectangle(W/2,H+30,W*2,60,wo));
    addPegs(FINISH-46);
    startRunner();
    buildRankCells(participants.length);
    running=true; document.getElementById("goBtn").disabled=true;
    var idx=0;
    releaseTimer=setInterval(function(){
      if(idx>=participants.length){ clearInterval(releaseTimer); releaseTimer=null; return; }
      var b=makeMarble(participants[idx],COLORS[idx%COLORS.length],60+Math.random()*(W-120),10);
      marbles.push(b); M.Composite.add(engine.world,b); idx++;
    },280);
  }

  function startLast(){
    currentNames=participants.slice();
    buildRankCells(participants.length);
    running=true; document.getElementById("goBtn").disabled=true;
    buildLastBoard(); dropLastMarble();
  }
  function buildLastBoard(){
    clearEngine();
    var wo=baseWorld(0.95);
    M.Composite.add(engine.world, M.Bodies.rectangle(W/2,H+2,W*2,12,wo));
    addPegs(PEG_BOTTOM_LAST);
    binCount=currentNames.length; binW=(W-2*BIN_MARGIN)/binCount;
    for(var i=1;i<binCount;i++){
      var x=BIN_MARGIN+i*binW;
      M.Composite.add(engine.world, M.Bodies.rectangle(x,(BIN_TOP+H)/2,4,H-BIN_TOP,{isStatic:true,restitution:0.1,friction:0.5}));
    }
    startRunner();
  }
  function dropLastMarble(){
    selectedBin=-1; lastLow=0; lastFrame=0; lastPhase="dropping";
    lastMarble=makeMarble("","#f0a020",40+Math.random()*(W-80),9);
    marbles=[lastMarble]; M.Composite.add(engine.world,lastMarble);
  }
  function onLastSettle(bin){
    selectedBin=bin; lastPhase="settled";
    var place=currentNames.length, loser=currentNames[bin];
    fillRank(place, loser, "#f0a020", true);
    thudSound();
    currentNames.splice(bin,1);
    if(currentNames.length===1){
      lastPhase="done";
      setTimeout(function(){ fillRank(1, currentNames[0], COLORS[1], false, true); finishGame(); },900);
    } else {
      setTimeout(function(){ buildLastBoard(); dropLastMarble(); },1500);
    }
  }

  function onUpdate(){
    if(mode==="race"){
      for(var i=marbles.length-1;i>=0;i--){
        var m=marbles[i];
        if(!m._finished && m.position.y>=FINISH){
          m._finished=true; results.push(m._label);
          fillRank(results.length,m._label,m._color,false,results.length===1);
          popSound();
          M.Composite.remove(engine.world,m); marbles.splice(i,1);
          if(results.length>=participants.length) finishGame();
          continue;
        }
        var sp=Math.hypot(m.velocity.x,m.velocity.y);
        if(sp<0.25 && m.position.y<FINISH-20){ stuckFrames[m._id]=(stuckFrames[m._id]||0)+1; if(stuckFrames[m._id]>26){ M.Body.applyForce(m,m.position,{x:(Math.random()-0.5)*0.012,y:0.004}); stuckFrames[m._id]=0; } }
        else stuckFrames[m._id]=0;
      }
    } else if(mode==="last" && lastPhase==="dropping" && lastMarble){
      var mm=lastMarble, sp2=Math.hypot(mm.velocity.x,mm.velocity.y);
      lastFrame++;
      if(mm.position.y>BIN_TOP+18 && sp2<0.25){ lastLow++; if(lastLow>=12){ onLastSettle(binOf(mm.position.x)); } }
      else lastLow=0;
      if(sp2<0.35 && mm.position.y>PEG_TOP+20 && lastFrame%18===0){ M.Body.applyForce(mm,mm.position,{x:(Math.random()-0.5)*0.02,y:0.006}); }
      if(lastFrame>12*60 && mm.position.y>PEG_BOTTOM_LAST){ onLastSettle(binOf(mm.position.x)); }
    }
    draw();
  }
  function binOf(x){ return Math.max(0,Math.min(binCount-1,Math.floor((x-BIN_MARGIN)/binW))); }

  function draw(){
    ctx.clearRect(0,0,W,H);
    ctx.fillStyle="#141a30"; ctx.fillRect(0,0,W,H);
    ctx.fillStyle="rgba(255,255,255,0.018)"; for(var gy=0;gy<H;gy+=22) ctx.fillRect(0,gy,W,1);
    for(var i=0;i<pegs.length;i++){ var p=pegs[i];
      ctx.beginPath(); ctx.arc(p.position.x,p.position.y,5,0,7); ctx.fillStyle="#46507a"; ctx.fill();
      ctx.beginPath(); ctx.arc(p.position.x-1.3,p.position.y-1.3,1.8,0,7); ctx.fillStyle="rgba(255,255,255,0.5)"; ctx.fill();
    }
    if(mode==="race"){
      ctx.strokeStyle="rgba(240,160,32,0.9)"; ctx.lineWidth=2; ctx.setLineDash([7,6]);
      ctx.beginPath(); ctx.moveTo(0,FINISH); ctx.lineTo(W,FINISH); ctx.stroke(); ctx.setLineDash([]);
      ctx.fillStyle="rgba(240,160,32,0.85)"; ctx.font="600 11px 'JetBrains Mono',monospace"; ctx.fillText("FINISH",8,FINISH-6);
    } else { drawBins(); }
    for(var j=0;j<marbles.length;j++) drawMarble(marbles[j]);
    drawConfetti();
  }
  function drawBins(){
    if(selectedBin>=0){ ctx.fillStyle="rgba(224,49,49,0.22)"; ctx.fillRect(BIN_MARGIN+selectedBin*binW, BIN_TOP, binW, H-BIN_TOP); }
    ctx.strokeStyle="rgba(120,132,180,0.55)"; ctx.lineWidth=2;
    for(var i=1;i<binCount;i++){ var x=BIN_MARGIN+i*binW; ctx.beginPath(); ctx.moveTo(x,BIN_TOP); ctx.lineTo(x,H); ctx.stroke(); }
    ctx.strokeStyle="rgba(120,132,180,0.4)"; ctx.lineWidth=1; ctx.beginPath(); ctx.moveTo(0,BIN_TOP); ctx.lineTo(W,BIN_TOP); ctx.stroke();
    for(var b=0;b<binCount;b++){
      var cx=BIN_MARGIN+(b+0.5)*binW, name=currentNames[b], picked=(b===selectedBin);
      ctx.fillStyle=picked?"#ffd43b":"rgba(255,255,255,0.92)";
      if(binW>=44){
        var fs=Math.min(16,Math.max(11,binW*0.34));
        ctx.font=(picked?"700 ":"600 ")+fs+"px 'Pretendard',sans-serif"; ctx.textAlign="center"; ctx.textBaseline="middle";
        ctx.fillText(trim(name,5), cx, (BIN_TOP+H)/2); ctx.textAlign="start";
      } else {
        ctx.save(); ctx.translate(cx,(BIN_TOP+H)/2); ctx.rotate(-Math.PI/2);
        ctx.font=(picked?"700 ":"600 ")+"13px 'Pretendard',sans-serif"; ctx.textAlign="center"; ctx.textBaseline="middle";
        ctx.fillText(trim(name,7),0,0); ctx.restore(); ctx.textAlign="start";
      }
    }
  }
  function trim(s,n){ return s.length>n? s.slice(0,n) : s; }
  function drawMarble(m){
    var x=m.position.x,y=m.position.y,r=m.circleRadius||10;
    ctx.beginPath(); ctx.arc(x,y,r,0,7); ctx.fillStyle=m._color; ctx.fill();
    ctx.beginPath(); ctx.arc(x-r*0.32,y-r*0.32,r*0.34,0,7); ctx.fillStyle="rgba(255,255,255,0.55)"; ctx.fill();
    ctx.beginPath(); ctx.arc(x+r*0.3,y+r*0.3,r*0.24,0,7); ctx.fillStyle="rgba(0,0,0,0.18)"; ctx.fill();
    if(m._label){
      var lab=m._label.length>2?m._label.slice(0,2):m._label;
      ctx.fillStyle="#fff"; ctx.font="700 10px 'Pretendard',sans-serif"; ctx.textAlign="center"; ctx.textBaseline="middle";
      ctx.fillText(lab,x,y+0.5); ctx.textAlign="start";
    }
  }

  function buildRankCells(n){
    var list=document.getElementById("rankList"); list.innerHTML="";
    for(var i=1;i<=n;i++){
      var cell=document.createElement("div"); cell.className="rank-cell"; cell.id="rank"+i;
      var lab=(i===n)?"꼴찌":(i+"등");
      cell.innerHTML='<span class="rank-no">'+lab+'</span><span class="marble-dot" style="background:#e9e2d3"></span><span class="rank-name">대기</span>';
      list.appendChild(cell);
    }
    setTimeout(fitBoard,0);
  }
  function fillRank(rank,label,color,isLastPick,isTop1){
    var cell=document.getElementById("rank"+rank); if(!cell) return;
    cell.className="rank-cell filled"+(isTop1||rank===1?" top1":"")+(isLastPick?" lastpick":"");
    cell.querySelector(".marble-dot").style.background=color;
    cell.querySelector(".rank-name").textContent=label;
  }

  function start(){
    if(running) return;
    M=window.Matter; if(!M) return;
    participants=readParticipants(); if(participants.length<2) return;
    results=[]; selectedBin=-1; stuckFrames={};
    if(mode==="race") startRace(); else startLast();
  }
  function finishGame(){
    running=false; document.getElementById("goBtn").disabled=false;
    burstConfetti(); chimeSound();
    document.getElementById("copyBtn").style.display="";
  }
  function copyResults(){
    var cells=document.querySelectorAll(".rank-cell.filled");
    if(!cells.length) return;
    var lines=["🎱 구슬 순위 결과 — myway.kr"];
    cells.forEach(function(c){
      lines.push(c.querySelector(".rank-no").textContent+" · "+c.querySelector(".rank-name").textContent);
    });
    var txt=lines.join("\n");
    var btn=document.getElementById("copyBtn");
    var done=function(){ var t=btn.textContent; btn.textContent="복사됨!"; setTimeout(function(){ btn.textContent=t; },1300); };
    if(navigator.clipboard&&navigator.clipboard.writeText){
      navigator.clipboard.writeText(txt).then(done).catch(function(){ fallbackCopy(txt,done); });
    } else fallbackCopy(txt,done);
  }
  function fallbackCopy(text,done){
    var ta=document.createElement("textarea");
    ta.value=text; ta.style.position="fixed"; ta.style.opacity="0";
    document.body.appendChild(ta); ta.focus(); ta.select();
    try{ document.execCommand("copy"); done(); }catch(e){}
    document.body.removeChild(ta);
  }
  document.getElementById("copyBtn").addEventListener("click",copyResults);

  function reset(){
    running=false; clearEngine();
    results=[]; currentNames=[]; selectedBin=-1; lastPhase="idle"; confetti=[];
    document.getElementById("goBtn").disabled=false;
    document.getElementById("rankList").innerHTML="";
    document.getElementById("copyBtn").style.display="none";
    paintIdle(); setTimeout(fitBoard,0);
  }
  function paintIdle(){
    ctx.clearRect(0,0,W,H); ctx.fillStyle="#141a30"; ctx.fillRect(0,0,W,H);
    ctx.fillStyle="rgba(255,255,255,0.5)"; ctx.font="600 15px 'JetBrains Mono',monospace"; ctx.textAlign="center";
    ctx.fillText("참가자를 입력하고", W/2, H/2-12);
    ctx.fillText(mode==="race"?"구슬 굴리기 ▶":"꼴찌 뽑기 ▶", W/2, H/2+14); ctx.textAlign="start";
  }

  function setCount(v){
    countVal=Math.max(2,Math.min(14,v));
    document.getElementById("countVal").textContent=countVal;
    try{ localStorage.setItem("mywayMarbleRankCountV1",String(countVal)); }catch(e){}
  }
  document.getElementById("plus").addEventListener("click",function(){ setCount(countVal+1); });
  document.getElementById("minus").addEventListener("click",function(){ setCount(countVal-1); });
  document.getElementById("goBtn").addEventListener("click",start);
  document.getElementById("resetBtn").addEventListener("click",reset);
  document.getElementById("modeSeg").addEventListener("click",function(e){
    var b=e.target.closest("button"); if(!b||running) return;
    mode=b.getAttribute("data-mode");
    [].forEach.call(this.children,function(x){x.classList.remove("on");}); b.classList.add("on");
    document.getElementById("goBtn").textContent = mode==="race"?"구슬 굴리기":"꼴찌 뽑기 시작";
    document.getElementById("modeDesc").textContent = mode==="race"
      ? "다 함께 굴러내려와 결승선에 먼저 닿는 순서대로 순위가 정해져요."
      : "구슬 한 알이 떨어진 칸의 이름이 꼴찌! 한 명씩 거꾸로 순위가 정해져요.";
    reset();
  });

  /* ===== 이름·인원 저장/복원 (이 기기에만 저장) ===== */
  var NAMES_KEY="mywayMarbleRankNamesV1";
  try{
    var savedNames=localStorage.getItem(NAMES_KEY);
    if(savedNames) document.getElementById("names").value=savedNames;
    var savedCount=parseInt(localStorage.getItem("mywayMarbleRankCountV1"),10);
    if(savedCount) setCount(savedCount);
  }catch(e){}
  document.getElementById("names").addEventListener("input",function(){
    try{ localStorage.setItem(NAMES_KEY,this.value); }catch(e){}
  });

  /* 모바일에서는 참가자 입력을 접어 한 화면 확보 */
  var acc=document.getElementById("namesAcc");
  if(window.innerWidth<=880 && !document.getElementById("names").value.trim()) acc.removeAttribute("open");
  acc.addEventListener("toggle",function(){ setTimeout(fitBoard,0); });

  paintIdle();
  fitBoard();
  setTimeout(fitBoard,250); /* 폰트 로드 후 재계산 */

  function inEditable(t){ return t&&t.closest&&(t.closest("input")||t.closest("textarea")); }
  ["contextmenu","selectstart","dragstart","copy","cut"].forEach(function(evt){
    document.addEventListener(evt,function(e){ if(inEditable(e.target)) return; e.preventDefault(); });
  });
  document.addEventListener("keydown",function(e){
    if(e.key==="F12"){ e.preventDefault(); return; }
    var k=(e.key||"").toLowerCase(), edit=inEditable(document.activeElement);
    if(e.ctrlKey||e.metaKey){
      if(edit&&["c","x","a","v","z"].indexOf(k)>=0) return;
      if(["u","s","c","x","a"].indexOf(k)>=0) e.preventDefault();
      if(e.shiftKey&&["i","j","c"].indexOf(k)>=0) e.preventDefault();
    }
  });
})();
</script>
</body>
</html>
