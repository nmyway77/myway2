<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>시계 · 날씨 · 공학용 계산기</title>
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
<link rel="manifest" href="/site.webmanifest">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#4a5bd8">

<style>
/* ===== 기본 ===== */
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body {
  margin: 0; padding: 0;
  background: linear-gradient(135deg, #eef2fb 0%, #f4f6fb 50%, #e8edf8 100%);
  font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, '맑은 고딕', Arial, sans-serif;
  color: #233;
  min-height: 100vh;
  overflow-x: hidden;
}
button { font-family: inherit; }

.main-wrap {
  width: 100%;
  max-width: 1400px;
  margin: 0 auto;
  padding-top: clamp(16px, 3vw, 50px);
  padding-left: clamp(8px, 2vw, 24px);
  padding-right: clamp(8px, 2vw, 24px);
  /* 모바일 하단 바(주소창/홈바)가 가리는 영역까지 여유 확보 */
  padding-bottom: calc(clamp(40px, 6vw, 60px) + env(safe-area-inset-bottom, 0px));
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: clamp(28px, 5vw, 64px);
}
.widget-title {
  font-size: clamp(1.25rem, 3.5vw, 2.6rem);
  font-weight: 900;
  color: #4a5bd8;
  margin: 0 0 clamp(14px, 2.5vw, 30px) 0;
  letter-spacing: 1.5px;
  text-align: center;
  text-shadow: 0 2px 14px #e4eafd;
}
.section { width: 100%; }

/* ===== 시계 ===== */
.clock-container {
  width: 100%;
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: clamp(14px, 2.5vw, 36px);
}
.clock-card {
  background: linear-gradient(110deg, #f7f9fc 80%, #eaf0fd 100%);
  border-radius: clamp(18px, 2vw, 28px);
  box-shadow: 0 8px 38px rgba(96,115,186,0.14);
  padding: clamp(20px, 3vw, 44px) clamp(14px, 2vw, 28px);
  display: flex; flex-direction: column; align-items: center;
}
.city-select {
  margin-bottom: clamp(12px, 2vw, 22px);
  font-size: clamp(0.95rem, 2vw, 1.4rem);
  border: none;
  border-radius: clamp(10px, 1.5vw, 16px);
  background: #eef2fa;
  padding: clamp(8px, 1.5vw, 14px) clamp(14px, 2.5vw, 28px);
  font-weight: bold;
  color: #3b4263;
  box-shadow: 0 3px 13px rgba(96,115,186,0.09);
  max-width: 100%;
  cursor: pointer;
}
.clock-time {
  font-size: clamp(2rem, 6vw, 3.8rem);
  font-weight: 900;
  letter-spacing: 1.5px;
  color: #30409a;
  margin-bottom: clamp(6px, 1vw, 12px);
  font-variant-numeric: tabular-nums;
}
.clock-date {
  font-size: clamp(0.85rem, 1.6vw, 1.4rem);
  color: #7b85ab;
  letter-spacing: 0.8px;
  margin-bottom: clamp(6px, 1vw, 10px);
  text-align: center;
}
.clock-label {
  font-size: clamp(0.9rem, 1.6vw, 1.3rem);
  color: #6671a6;
  font-weight: 700;
}

/* ===== 날씨 ===== */
.weather-dashboard {
  width: 100%;
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
  gap: clamp(14px, 2.5vw, 32px);
}
.weather-card {
  background: #fff;
  border-radius: clamp(18px, 2vw, 26px);
  box-shadow: 0 8px 38px rgba(90,110,185,0.13);
  padding: clamp(18px, 2.5vw, 34px) clamp(14px, 2vw, 28px);
  display: flex; flex-direction: column; align-items: center;
  position: relative;
}
.refresh-btn {
  position: absolute;
  top: clamp(10px, 1.5vw, 22px);
  right: clamp(10px, 1.5vw, 22px);
  background: #e8ecf9;
  border: none;
  border-radius: 50%;
  width: clamp(30px, 4vw, 36px); height: clamp(30px, 4vw, 36px);
  font-size: clamp(1rem, 2vw, 1.3rem);
  color: #4262d1;
  cursor: pointer;
  box-shadow: 0 2px 10px #b8c8f840;
}
.refresh-btn:active { background: #dbe6ff; }
.weather-icon { font-size: clamp(2.2rem, 5vw, 3.5rem); margin-bottom: 6px; }
.weather-main { font-size: clamp(1rem, 2vw, 1.4rem); font-weight: 700; margin-bottom: 6px; color: #446add; }
.weather-temp { font-size: clamp(1.4rem, 3vw, 2.2rem); font-weight: 800; color: #25398e; margin-bottom: 4px; font-variant-numeric: tabular-nums; }
.weather-humid { font-size: clamp(0.85rem, 1.5vw, 1.15rem); color: #288aad; margin-bottom: 2px; }
.weather-status { font-size: clamp(0.8rem, 1.4vw, 1.05rem); font-weight: 700; color: #4c5e7a; }

/* ===== 계산기 ===== */
.calc-card {
  width: 100%;
  max-width: 480px;
  background: #fff;
  border-radius: clamp(18px, 2vw, 26px);
  box-shadow: 0 12px 44px rgba(49,64,112,0.14);
  padding: clamp(16px, 2.5vw, 28px);
  display: flex; flex-direction: column;
}
.calc-title {
  font-size: clamp(1.1rem, 2.5vw, 1.7rem);
  font-weight: 900;
  color: #5c67ef;
  margin: 0 0 clamp(10px, 1.5vw, 18px) 0;
  text-align: center;
  text-shadow: 0 2px 10px #e3eafd;
}
.calc-toolbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 8px;
  margin-bottom: 10px;
  flex-wrap: wrap;
}
.calc-mode-group {
  display: inline-flex;
  background: #eef2fa;
  border-radius: 10px;
  padding: 3px;
  gap: 2px;
}
.calc-mode-btn {
  padding: 6px 14px;
  border: none;
  background: transparent;
  color: #6671a6;
  font-weight: 700;
  font-size: clamp(0.75rem, 1.4vw, 0.9rem);
  border-radius: 8px;
  cursor: pointer;
  transition: all 0.15s;
}
.calc-mode-btn.active { background: #4a5bd8; color: #fff; box-shadow: 0 2px 8px rgba(74,91,216,0.3); }
.mem-indicator {
  font-size: 0.78rem;
  color: #4a5bd8;
  font-weight: 800;
  padding: 4px 10px;
  background: #eef2fa;
  border-radius: 8px;
  visibility: hidden;
}
.mem-indicator.active { visibility: visible; }
.calc-icon-btn {
  background: #eef2fa;
  border: none;
  border-radius: 10px;
  padding: 6px 12px;
  cursor: pointer;
  color: #4a5bd8;
  font-size: 1rem;
  transition: background 0.15s;
}
.calc-icon-btn:active { background: #dbe6ff; }

.calc-screen-wrap {
  background: linear-gradient(135deg, #f2f5ff 0%, #f7f8fc 100%);
  border-radius: clamp(14px, 1.8vw, 18px);
  padding: clamp(10px, 2vw, 16px) clamp(12px, 2.5vw, 22px);
  margin-bottom: clamp(10px, 1.5vw, 16px);
  box-shadow: inset 0 2px 8px rgba(90,108,180,0.08);
  text-align: right;
  min-height: 88px;
  display: flex; flex-direction: column; justify-content: flex-end;
}
.calc-expr {
  font-size: clamp(0.85rem, 1.8vw, 1.05rem);
  color: #7b85ab;
  font-weight: 600;
  min-height: 1.3em;
  word-break: break-all;
  font-variant-numeric: tabular-nums;
  letter-spacing: 0.5px;
}
.calc-result {
  font-size: clamp(1.8rem, 6vw, 2.6rem);
  font-weight: 900;
  color: #2c3666;
  word-break: break-all;
  font-variant-numeric: tabular-nums;
  letter-spacing: 1px;
  line-height: 1.1;
  margin-top: 4px;
}

.calc-buttons {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: clamp(5px, 1vw, 9px);
}
.calc-btn {
  font-size: clamp(0.95rem, 2vw, 1.25rem);
  padding: clamp(12px, 2.5vw, 18px) 0;
  border: none;
  border-radius: clamp(10px, 1.5vw, 14px);
  background: #f0f3fa;
  color: #365178;
  cursor: pointer;
  font-weight: 700;
  transition: transform 0.08s, background 0.15s, box-shadow 0.15s;
  box-shadow: 0 2px 10px rgba(88,112,174,0.08);
  outline: none;
  user-select: none;
  min-height: 44px;  /* 터치 영역 */
}
.calc-btn:active { transform: scale(0.96); background: #dde4ff; }
.calc-btn.op {
  background: linear-gradient(135deg, #b6cafd 0%, #637dee 100%);
  color: #fff;
}
.calc-btn.op:active { background: linear-gradient(135deg, #4f6cdf 0%, #a8bdfb 100%); }
.calc-btn.equal {
  background: linear-gradient(135deg, #6de0ca 0%, #32b896 100%);
  color: #fff;
  font-size: clamp(1.1rem, 2.2vw, 1.4rem);
}
.calc-btn.equal:active { background: linear-gradient(135deg, #28a684 0%, #5ad4be 100%); }
.calc-btn.clear {
  background: linear-gradient(135deg, #ffb1b1 0%, #ff5858 100%);
  color: #fff;
}
.calc-btn.clear:active { background: linear-gradient(135deg, #f33d3d 0%, #ffa1a1 100%); }
.calc-btn.fn {
  background: linear-gradient(135deg, #c6e6fc 0%, #79b6fa 100%);
  color: #1d4d77;
  font-size: clamp(0.82rem, 1.7vw, 1rem);
}
.calc-btn.fn:active { background: linear-gradient(135deg, #5fa0e8 0%, #b3dafa 100%); }
.calc-btn.mem {
  background: linear-gradient(135deg, #ffe0a3 0%, #f5b449 100%);
  color: #7a4d09;
  font-size: clamp(0.78rem, 1.6vw, 0.95rem);
}
.calc-btn.mem:active { background: linear-gradient(135deg, #e69b2c 0%, #ffd58a 100%); }

/* 히스토리 */
.history-panel {
  margin-top: 0;
  background: #f7f9fc;
  border-radius: 14px;
  padding: 0 14px;
  max-height: 0;
  overflow: hidden;
  opacity: 0;
  transition: max-height 0.3s ease, padding 0.3s ease, margin-top 0.3s ease, opacity 0.25s ease;
}
.history-panel.open {
  margin-top: clamp(10px, 1.5vw, 16px);
  max-height: 300px;
  padding: 14px;
  opacity: 1;
}
.history-header {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 8px;
}
.history-title { font-weight: 800; color: #4a5bd8; font-size: 0.95rem; }
.history-clear {
  background: none; border: none;
  color: #ff5858; font-weight: 700; font-size: 0.85rem;
  cursor: pointer; padding: 4px 8px; border-radius: 6px;
}
.history-clear:hover { background: #ffe5e5; }
.history-list {
  max-height: 200px; overflow-y: auto;
  display: flex; flex-direction: column; gap: 6px;
}
.history-item {
  background: #fff;
  padding: 8px 12px;
  border-radius: 10px;
  cursor: pointer;
  border-left: 3px solid #4a5bd8;
  transition: background 0.15s;
}
.history-item:hover { background: #eef2fa; }
.history-expr { font-size: 0.85rem; color: #7b85ab; font-variant-numeric: tabular-nums; }
.history-val { font-size: 1.05rem; color: #2c3666; font-weight: 800; font-variant-numeric: tabular-nums; }
.history-empty { color: #aab; font-size: 0.88rem; text-align: center; padding: 12px; }

.toast {
  position: fixed;
  bottom: 30px; left: 50%; transform: translateX(-50%);
  background: #2c3666; color: #fff;
  padding: 10px 20px; border-radius: 24px;
  font-size: 0.92rem; font-weight: 700;
  opacity: 0; pointer-events: none;
  transition: opacity 0.25s;
  z-index: 1000;
  box-shadow: 0 6px 20px rgba(0,0,0,0.2);
}
.toast.show { opacity: 1; }

/* ===== 좁은 화면(폰) 추가 조정 ===== */
@media (max-width: 480px) {
  .calc-buttons { gap: 5px; }
  .calc-btn { padding: 11px 0; min-height: 42px; }
  .clock-time { letter-spacing: 0.5px; }
  .city-select { width: 100%; }
}
@media (max-width: 360px) {
  .calc-btn { font-size: 0.85rem; padding: 9px 0; }
  .calc-result { font-size: 1.6rem; }
}

/* 가로 모드 폰 */
@media (max-height: 500px) and (orientation: landscape) {
  .main-wrap { gap: 20px; padding: 12px; }
  .calc-card { max-width: 600px; }
}
</style>
</head>
<body>

<div class="main-wrap">

  <!-- 계산기 -->
  <section class="section" style="display:flex; justify-content:center;">
    <div class="calc-card">
      <h2 class="calc-title">📐 공학용 계산기</h2>

      <div class="calc-toolbar">
        <div class="calc-mode-group" role="group" aria-label="각도 모드">
          <button class="calc-mode-btn active" id="modeDeg" onclick="setAngleMode('DEG')">DEG</button>
          <button class="calc-mode-btn" id="modeRad" onclick="setAngleMode('RAD')">RAD</button>
        </div>
        <span class="mem-indicator" id="memIndicator">M</span>
        <div style="display:flex; gap:6px;">
          <button class="calc-icon-btn" onclick="copyResult()" title="결과 복사">📋</button>
          <button class="calc-icon-btn" onclick="toggleHistory()" title="기록">🕘</button>
        </div>
      </div>

      <div class="calc-screen-wrap">
        <div class="calc-expr" id="exprDisplay">&nbsp;</div>
        <div class="calc-result" id="resultDisplay">0</div>
      </div>

      <div class="calc-buttons">
        <!-- 1행: 메모리 -->
        <button class="calc-btn mem" onclick="memClear()">MC</button>
        <button class="calc-btn mem" onclick="memRecall()">MR</button>
        <button class="calc-btn mem" onclick="memAdd()">M+</button>
        <button class="calc-btn mem" onclick="memSub()">M-</button>
        <button class="calc-btn mem" onclick="memStore()">MS</button>

        <!-- 2행: 함수 -->
        <button class="calc-btn fn" onclick="insertFn('sin(')">sin</button>
        <button class="calc-btn fn" onclick="insertFn('cos(')">cos</button>
        <button class="calc-btn fn" onclick="insertFn('tan(')">tan</button>
        <button class="calc-btn fn" onclick="insertFn('log(')">log</button>
        <button class="calc-btn fn" onclick="insertFn('ln(')">ln</button>

        <!-- 3행: 함수 -->
        <button class="calc-btn fn" onclick="insertFn('√(')">√</button>
        <button class="calc-btn fn" onclick="insert('^2')">x²</button>
        <button class="calc-btn fn" onclick="insert('^3')">x³</button>
        <button class="calc-btn fn" onclick="insert('^')">x^y</button>
        <button class="calc-btn fn" onclick="insertFn('1/(')">1/x</button>

        <!-- 4행 -->
        <button class="calc-btn fn" onclick="insert('π')">π</button>
        <button class="calc-btn fn" onclick="insert('e')">e</button>
        <button class="calc-btn fn" onclick="insert('(')">(</button>
        <button class="calc-btn fn" onclick="insert(')')">)</button>
        <button class="calc-btn fn" onclick="insertFn('|')">|x|</button>

        <!-- 5행 -->
        <button class="calc-btn clear" onclick="clearAll()">AC</button>
        <button class="calc-btn fn" onclick="backspace()">⌫</button>
        <button class="calc-btn fn" onclick="insert('!')">n!</button>
        <button class="calc-btn fn" onclick="insert('%')">%</button>
        <button class="calc-btn op" onclick="insert('÷')">÷</button>

        <!-- 6행 -->
        <button class="calc-btn" onclick="insert('7')">7</button>
        <button class="calc-btn" onclick="insert('8')">8</button>
        <button class="calc-btn" onclick="insert('9')">9</button>
        <button class="calc-btn fn" onclick="insertAns()">Ans</button>
        <button class="calc-btn op" onclick="insert('×')">×</button>

        <!-- 7행 -->
        <button class="calc-btn" onclick="insert('4')">4</button>
        <button class="calc-btn" onclick="insert('5')">5</button>
        <button class="calc-btn" onclick="insert('6')">6</button>
        <button class="calc-btn fn" onclick="negate()">±</button>
        <button class="calc-btn op" onclick="insert('-')">−</button>

        <!-- 8행 -->
        <button class="calc-btn" onclick="insert('1')">1</button>
        <button class="calc-btn" onclick="insert('2')">2</button>
        <button class="calc-btn" onclick="insert('3')">3</button>
        <button class="calc-btn op" onclick="insert('+')">+</button>
        <button class="calc-btn fn" onclick="insert('E')">EXP</button>

        <!-- 9행 -->
        <button class="calc-btn" onclick="insert('0')" style="grid-column: span 2;">0</button>
        <button class="calc-btn" onclick="insert('.')">.</button>
        <button class="calc-btn equal" onclick="calculate()" style="grid-column: span 2;">=</button>
      </div>

      <div class="history-panel" id="historyPanel">
        <div class="history-header">
          <span class="history-title">📚 계산 기록</span>
          <button class="history-clear" onclick="clearHistory()">전체 삭제</button>
        </div>
        <div class="history-list" id="historyList">
          <div class="history-empty">아직 계산 기록이 없습니다</div>
        </div>
      </div>
    </div>
  </section>

  <!-- 시계 -->
  <section class="section">
    <h2 class="widget-title">🌏 듀얼 월드 시계</h2>
    <div class="clock-container">
      <div class="clock-card">
        <select class="city-select" id="city1"></select>
        <div class="clock-time" id="time1">--:--:--</div>
        <div class="clock-date" id="date1">----</div>
        <div class="clock-label" id="label1"></div>
      </div>
      <div class="clock-card">
        <select class="city-select" id="city2"></select>
        <div class="clock-time" id="time2">--:--:--</div>
        <div class="clock-date" id="date2">----</div>
        <div class="clock-label" id="label2"></div>
      </div>
    </div>
  </section>

  <!-- 날씨 -->
  <section class="section">
    <h2 class="widget-title">🌦️ 3개 도시 날씨</h2>
    <div class="weather-dashboard">
      <div class="weather-card">
        <button class="refresh-btn" onclick="fetchWeather(1)" aria-label="새로고침">⟳</button>
        <select class="city-select" id="wcity1"></select>
        <div class="weather-icon" id="wicon1">☁️</div>
        <div class="weather-main" id="wmain1">--</div>
        <div class="weather-temp" id="wtemp1">-- ℃</div>
        <div class="weather-humid" id="whumid1">-- %</div>
        <div class="weather-status" id="wstatus1"></div>
      </div>
      <div class="weather-card">
        <button class="refresh-btn" onclick="fetchWeather(2)" aria-label="새로고침">⟳</button>
        <select class="city-select" id="wcity2"></select>
        <div class="weather-icon" id="wicon2">☁️</div>
        <div class="weather-main" id="wmain2">--</div>
        <div class="weather-temp" id="wtemp2">-- ℃</div>
        <div class="weather-humid" id="whumid2">-- %</div>
        <div class="weather-status" id="wstatus2"></div>
      </div>
      <div class="weather-card">
        <button class="refresh-btn" onclick="fetchWeather(3)" aria-label="새로고침">⟳</button>
        <select class="city-select" id="wcity3"></select>
        <div class="weather-icon" id="wicon3">☁️</div>
        <div class="weather-main" id="wmain3">--</div>
        <div class="weather-temp" id="wtemp3">-- ℃</div>
        <div class="weather-humid" id="whumid3">-- %</div>
        <div class="weather-status" id="wstatus3"></div>
      </div>
    </div>
  </section>

</div>

<div class="toast" id="toast">복사되었습니다</div>

<script>
/* ==========================================================
   ============ 시계 ============
   ========================================================== */
const clockCities = [
  { name: "서울", country: "대한민국", zone: "Asia/Seoul" },
  { name: "뉴욕", country: "미국", zone: "America/New_York" },
  { name: "도쿄", country: "일본", zone: "Asia/Tokyo" },
  { name: "런던", country: "영국", zone: "Europe/London" },
  { name: "파리", country: "프랑스", zone: "Europe/Paris" },
  { name: "베이징", country: "중국", zone: "Asia/Shanghai" },
  { name: "로스앤젤레스", country: "미국", zone: "America/Los_Angeles" },
  { name: "시드니", country: "호주", zone: "Australia/Sydney" },
  { name: "홍콩", country: "중국", zone: "Asia/Hong_Kong" },
  { name: "베를린", country: "독일", zone: "Europe/Berlin" },
  { name: "방콕", country: "태국", zone: "Asia/Bangkok" },
  { name: "두바이", country: "아랍에미리트", zone: "Asia/Dubai" },
  { name: "싱가포르", country: "싱가포르", zone: "Asia/Singapore" },
  { name: "모스크바", country: "러시아", zone: "Europe/Moscow" },
  { name: "토론토", country: "캐나다", zone: "America/Toronto" },
  { name: "상파울루", country: "브라질", zone: "America/Sao_Paulo" },
  { name: "델리", country: "인도", zone: "Asia/Kolkata" },
  { name: "이스탄불", country: "터키", zone: "Europe/Istanbul" }
];
function setupClockSelect(id, defaultIdx) {

/* ==========================================================
   ============ 계산기 ============
   - 안전한 표현식 평가(파서)
   - 메모리, 히스토리, DEG/RAD, Ans, 키보드, 복사
   ========================================================== */
let expr = '';                  // 사용자가 본 식
let lastResult = 0;             // Ans
let memory = 0;
let memSet = false;
let angleMode = 'DEG';          // 'DEG' | 'RAD'
let history = [];               // {expr, val}
const MAX_HISTORY = 30;

const exprDisplay = document.getElementById('exprDisplay');
const resultDisplay = document.getElementById('resultDisplay');
const historyPanel = document.getElementById('historyPanel');
const historyList = document.getElementById('historyList');
const memIndicator = document.getElementById('memIndicator');

function refreshDisplay() {
  exprDisplay.textContent = expr || '\u00a0';
}

function insert(token) {
  // = 직후 숫자 입력은 새 계산 시작
  if (justCalculated && /[0-9.(πe√]/.test(token)) {
    expr = '';
    resultDisplay.textContent = '0';
  }
  justCalculated = false;
  expr += token;
  refreshDisplay();
}
function insertFn(token) {
  if (justCalculated) { expr = ''; resultDisplay.textContent = '0'; }
  justCalculated = false;
  expr += token;
  refreshDisplay();
}
function insertAns() {
  if (justCalculated) { expr = ''; resultDisplay.textContent = '0'; }
  justCalculated = false;
  expr += 'Ans';
  refreshDisplay();
}
function clearAll() {
  expr = ''; resultDisplay.textContent = '0';
  justCalculated = false;
  refreshDisplay();
}
function backspace() {
  if (justCalculated) { clearAll(); return; }
  // 'Ans', 'sin(' 같은 토큰 단위로 지우기 시도
  const tokens = ['Ans', 'sin(', 'cos(', 'tan(', 'log(', 'ln(', '√(', '1/('];
  for (const t of tokens) {
    if (expr.endsWith(t)) { expr = expr.slice(0, -t.length); refreshDisplay(); return; }
  }
  expr = expr.slice(0, -1);
  refreshDisplay();
}
function negate() {
  // 마지막 숫자에 부호 토글
  const m = expr.match(/(-?\d+\.?\d*)$/);
  if (m) {
    const num = m[1];
    const newNum = num.startsWith('-') ? num.slice(1) : '-' + num;
    expr = expr.slice(0, -num.length) + newNum;
  } else {
    expr += '-';
  }
  refreshDisplay();
}

/* ===== 메모리 ===== */
function memClear() { memory = 0; memSet = false; memIndicator.classList.remove('active'); showToast('메모리 삭제'); }
function memRecall() {
  if (justCalculated) { expr = ''; resultDisplay.textContent = '0'; }
  justCalculated = false;
  expr += String(memory);
  refreshDisplay();
}
function memAdd() { const v = evalSafe(expr); if (v !== null) { memory += v; memSet = true; memIndicator.classList.add('active'); showToast(`M+ : ${memory}`); } }
function memSub() { const v = evalSafe(expr); if (v !== null) { memory -= v; memSet = true; memIndicator.classList.add('active'); showToast(`M- : ${memory}`); } }
function memStore() { const v = evalSafe(expr); if (v !== null) { memory = v; memSet = true; memIndicator.classList.add('active'); showToast(`MS : ${memory}`); } }

/* ===== 각도 모드 ===== */
function setAngleMode(m) {
  angleMode = m;
  document.getElementById('modeDeg').classList.toggle('active', m === 'DEG');
  document.getElementById('modeRad').classList.toggle('active', m === 'RAD');
}

/* ===== 토스트 ===== */
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(showToast._t);
  showToast._t = setTimeout(() => t.classList.remove('show'), 1500);
}
function copyResult() {
  const txt = resultDisplay.textContent;
  navigator.clipboard?.writeText(txt).then(
    () => showToast('결과 복사: ' + txt),
    () => showToast('복사 실패')
  );
}

/* ===== 히스토리 ===== */
function toggleHistory() { historyPanel.classList.toggle('open'); renderHistory(); }
function clearHistory() { history = []; renderHistory(); showToast('기록 삭제'); }
function pushHistory(e, v) {
  history.unshift({ expr: e, val: v });
  if (history.length > MAX_HISTORY) history.pop();
  renderHistory();
}
function renderHistory() {
  if (!historyPanel.classList.contains('open')) return;
  if (history.length === 0) {
    historyList.innerHTML = '<div class="history-empty">아직 계산 기록이 없습니다</div>';
    return;
  }
  historyList.innerHTML = history.map((h, i) =>
    `<div class="history-item" onclick="useHistory(${i})">
       <div class="history-expr">${escapeHtml(h.expr)} =</div>
       <div class="history-val">${escapeHtml(String(h.val))}</div>
     </div>`).join('');
}
function useHistory(i) {
  const h = history[i];
  if (!h) return;
  expr = String(h.val);
  refreshDisplay();
  resultDisplay.textContent = h.val;
  justCalculated = true;
}
function escapeHtml(s) { return s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

/* ==========================================================
   ===== 안전한 표현식 평가 (직접 파서) =====
   문법:
     expr   = term  (('+'|'-') term)*
     term   = pow  (('×'|'÷'|'%') pow)*       // %는 modulo
     pow    = unary ('^' pow)?                // 우결합
     unary  = ('+'|'-') unary | postfix
     postfix= factor ('!' | '%')*             // !는 팩토리얼, %는 백분율(0.01 곱)
     factor = number | ident '(' expr ')' | '(' expr ')' | '|' expr '|' | 'Ans' | 'π' | 'e'
   ========================================================== */
let justCalculated = false;

function calculate() {
  const v = evalSafe(expr);
  if (v === null) { resultDisplay.textContent = 'Error'; return; }
  const shown = formatNumber(v);
  resultDisplay.textContent = shown;
  pushHistory(expr, shown);
  lastResult = v;
  justCalculated = true;
}

function formatNumber(v) {
  if (!isFinite(v)) return 'Error';
  if (Number.isInteger(v) && Math.abs(v) < 1e16) return String(v);
  // 매우 작거나 매우 큰 수는 지수 표기
  if (Math.abs(v) >= 1e15 || (Math.abs(v) < 1e-7 && v !== 0)) return v.toExponential(10).replace(/\.?0+e/, 'e');
  // 부동소수점 오차 정리
  const r = Math.round(v * 1e12) / 1e12;
  return String(r);
}

function evalSafe(input) {
  if (!input || input.trim() === '') return null;
  try {
    const tokens = tokenize(input);
    const parser = new Parser(tokens);
    const result = parser.parseExpr();
    if (!parser.atEnd()) return null;
    return result;
  } catch (e) {
    return null;
  }
}

function tokenize(s) {
  const tokens = [];
  let i = 0;
  while (i < s.length) {
    const c = s[i];
    if (c === ' ') { i++; continue; }
    if (/\d/.test(c) || c === '.') {
      let n = '';
      while (i < s.length && /[\d.]/.test(s[i])) n += s[i++];
      // 지수 표기 1.5E3
      if (i < s.length && (s[i] === 'E' || s[i] === 'e' && /\d/.test(s[i-1] || ''))) {
        // E만 명시적 지수로 받음(e는 상수와 혼동되므로 EXP 버튼이 E를 넣음)
        if (s[i] === 'E') {
          n += 'e'; i++;
          if (s[i] === '+' || s[i] === '-') n += s[i++];
          while (i < s.length && /\d/.test(s[i])) n += s[i++];
        }
      }
      tokens.push({ type: 'NUM', value: parseFloat(n) });
      continue;
    }
    // 식별자/함수명
    if (/[a-zA-Z]/.test(c) || c === 'π' || c === '√') {
      // 함수 이름들
      const fns = ['sin', 'cos', 'tan', 'asin', 'acos', 'atan', 'log', 'ln', '1/'];
      let matched = null;
      for (const f of fns) {
        if (s.startsWith(f, i)) { matched = f; break; }
      }
      if (matched) { tokens.push({ type: 'FN', value: matched }); i += matched.length; continue; }
      if (c === '√') { tokens.push({ type: 'FN', value: 'sqrt' }); i++; continue; }
      if (s.startsWith('Ans', i)) { tokens.push({ type: 'CONST', value: lastResult }); i += 3; continue; }
      if (c === 'π') { tokens.push({ type: 'CONST', value: Math.PI }); i++; continue; }
      if (c === 'e') { tokens.push({ type: 'CONST', value: Math.E }); i++; continue; }
      throw new Error('Unknown ident: ' + c);
    }
    if ('+-×÷*/^!%(),|'.indexOf(c) >= 0) {
      // 표시는 ×÷지만 일반 */도 허용
      const map = { '×':'*', '÷':'/' };
      tokens.push({ type: 'OP', value: map[c] || c });
      i++; continue;
    }
    throw new Error('Bad char: ' + c);
  }
  return tokens;
}

class Parser {
  constructor(tokens) { this.t = tokens; this.p = 0; }
  peek() { return this.t[this.p]; }
  next() { return this.t[this.p++]; }
  atEnd() { return this.p >= this.t.length; }
  accept(type, value) {
    const tk = this.peek();
    if (tk && tk.type === type && (value === undefined || tk.value === value)) { this.p++; return tk; }
    return null;
  }
  expect(type, value) {
    const tk = this.accept(type, value);
    if (!tk) throw new Error('Expected ' + type + ' ' + value);
    return tk;
  }
  parseExpr() {
    let v = this.parseTerm();
    while (true) {
      if (this.accept('OP', '+')) v += this.parseTerm();
      else if (this.accept('OP', '-')) v -= this.parseTerm();
      else break;
    }
    return v;
  }
  parseTerm() {
    let v = this.parsePow();
    while (true) {
      if (this.accept('OP', '*')) v *= this.parsePow();
      else if (this.accept('OP', '/')) {
        const d = this.parsePow();
        if (d === 0) throw new Error('div0');
        v /= d;
      } else break;
    }
    return v;
  }
  parsePow() {
    let base = this.parseUnary();
    if (this.accept('OP', '^')) {
      const exp = this.parsePow();
      return Math.pow(base, exp);
    }
    return base;
  }
  parseUnary() {
    if (this.accept('OP', '+')) return this.parseUnary();
    if (this.accept('OP', '-')) return -this.parseUnary();
    return this.parsePostfix();
  }
  parsePostfix() {
    let v = this.parseFactor();
    while (true) {
      if (this.accept('OP', '!')) v = factorial(v);
      else if (this.accept('OP', '%')) v = v / 100;
      else break;
    }
    return v;
  }
  parseFactor() {
    const tk = this.peek();
    if (!tk) throw new Error('Unexpected end');
    if (tk.type === 'NUM') { this.next(); return tk.value; }
    if (tk.type === 'CONST') { this.next(); return tk.value; }
    if (tk.type === 'FN') {
      this.next();
      this.expect('OP', '(');
      const arg = this.parseExpr();
      this.expect('OP', ')');
      return applyFn(tk.value, arg);
    }
    if (this.accept('OP', '(')) {
      const v = this.parseExpr();
      this.expect('OP', ')');
      return v;
    }
    if (this.accept('OP', '|')) {
      const v = this.parseExpr();
      this.expect('OP', '|');
      return Math.abs(v);
    }
    throw new Error('Bad factor');
  }
}

function applyFn(name, x) {
  switch (name) {
    case 'sin': return Math.sin(angleMode === 'DEG' ? x * Math.PI / 180 : x);
    case 'cos': return Math.cos(angleMode === 'DEG' ? x * Math.PI / 180 : x);
    case 'tan': return Math.tan(angleMode === 'DEG' ? x * Math.PI / 180 : x);
    case 'asin': { const r = Math.asin(x); return angleMode === 'DEG' ? r * 180 / Math.PI : r; }
    case 'acos': { const r = Math.acos(x); return angleMode === 'DEG' ? r * 180 / Math.PI : r; }
    case 'atan': { const r = Math.atan(x); return angleMode === 'DEG' ? r * 180 / Math.PI : r; }
    case 'log': return Math.log10(x);
    case 'ln':  return Math.log(x);
    case 'sqrt':return Math.sqrt(x);
    case '1/':  if (x === 0) throw new Error('div0'); return 1 / x;
  }
  throw new Error('Unknown fn: ' + name);
}

function factorial(n) {
  if (n < 0 || !Number.isInteger(n)) throw new Error('factorial domain');
  if (n > 170) return Infinity;
  let r = 1;
  for (let i = 2; i <= n; i++) r *= i;
  return r;
}

/* ===== 키보드 입력 ===== */
document.addEventListener('keydown', (e) => {
  // 입력 요소에 포커스가 있으면 무시 (select 등)
  const ae = document.activeElement;
  if (ae && (ae.tagName === 'SELECT' || ae.tagName === 'INPUT' || ae.tagName === 'TEXTAREA')) return;

  const k = e.key;
  if (/^[0-9.]$/.test(k)) { insert(k); e.preventDefault(); return; }
  if (k === '+' || k === '-') { insert(k); e.preventDefault(); return; }
  if (k === '*') { insert('×'); e.preventDefault(); return; }
  if (k === '/') { insert('÷'); e.preventDefault(); return; }
  if (k === '(' || k === ')') { insert(k); e.preventDefault(); return; }
  if (k === '^') { insert('^'); e.preventDefault(); return; }
  if (k === '%') { insert('%'); e.preventDefault(); return; }
  if (k === '!') { insert('!'); e.preventDefault(); return; }
  if (k === 'Enter' || k === '=') { calculate(); e.preventDefault(); return; }
  if (k === 'Backspace') { backspace(); e.preventDefault(); return; }
  if (k === 'Escape' || k === 'Delete') { clearAll(); e.preventDefault(); return; }
});

refreshDisplay();
