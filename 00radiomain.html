<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>라디오 채널 모음 - MYWAY.KR</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="KBS, MBC, SBS, CBS, TBN, BBC, CNN 등 실시간 라디오 채널 모음 - MYWAY.KR">
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    html, body {
      margin: 0; padding: 0;
      background: #fff;
      font-family: 'Segoe UI', '맑은 고딕', Arial, sans-serif;
      width: 100%;
      -webkit-text-size-adjust: 100%;
    }
    html { min-height: 100%; }
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
      min-height: 100vh;
      overflow-x: hidden;
      -webkit-user-select: none;
      -moz-user-select: none;
      -ms-user-select: none;
      user-select: none;
    }
    img { -webkit-user-drag: none; user-drag: none; -webkit-touch-callout: none; }
    input, textarea, [contenteditable] {
      -webkit-user-select: text; -moz-user-select: text; -ms-user-select: text; user-select: text;
    }

    .main-title { margin: 5px 0 8px; font-size: 1.3rem; font-weight: 700; color: #333862; text-align: center; }
    .main-subtitle { font-size: 0.8rem; color: #6a739c; margin-bottom: 5px; text-align: center; }

    .container {
      width: 100%;
      max-width: 560px;
      display: flex;
      flex-direction: column;
      align-items: center;
      margin: 5px auto 10px;
      padding: 0 6px;
    }

    .logo-row {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 24px;
      margin-bottom: 32px;
      width: 100%;
      flex-wrap: nowrap;
    }
    .ai-logo-wrap {
      width: 74px; height: 74px;
      border-radius: 50%;
      background: #fff;
      box-shadow: 0 3px 24px 0 #b1c7e866;
      border: 3px solid #e5e8f6;
      display: flex; justify-content: center; align-items: center;
      transition: box-shadow 0.15s, border-color 0.15s, background-color 0.15s;
      cursor: pointer; overflow: hidden; margin: 0;
      flex: 0 0 auto;
    }
    .ai-logo-wrap:hover {
      box-shadow: 0 8px 32px 0 #7e94ff99;
      border-color: #94a2ff;
      background: #f7faff;
    }
    .ai-logo-img {
      width: 54px; height: 54px;
      object-fit: contain;
      background: transparent;
      border-radius: 50%;
      transition: transform 0.12s;
      display: block;
    }
    .ai-logo-wrap:hover .ai-logo-img { transform: scale(1.08) rotate(-3deg); }

    .group-title {
      width: 100%; max-width: 500px;
      font-size: 1.07rem; font-weight: 600;
      margin: 34px 0 10px 0;
      letter-spacing: -0.5px;
      color: #244;
      text-align: center;
      padding-left: 8px;
    }

    @media (max-width: 1100px) { .container { max-width: 98vw; } }
    @media (max-width: 900px) {
      .container { max-width: 99vw; }
      .main-title { font-size: 1.35rem; margin-top: 24px; }
      .main-subtitle { font-size: 1.07rem; }
    }
    @media (max-width: 480px) {
      .main-title { font-size: 1rem; }
      .main-subtitle { font-size: 0.95rem; }
    }

    /* MYWAY.KR 공통 */
    .myway-home-btn {
      position: fixed;
      right: 18px; bottom: 18px;
      z-index: 9999;
      display: inline-flex; align-items: center; gap: 7px;
      padding: 10px 16px 10px 14px;
      background: #1f2740; color: #fff;
      border-radius: 999px;
      font-size: .85rem; font-weight: 700;
      text-decoration: none; letter-spacing: -0.2px;
      box-shadow: 0 4px 14px rgba(31,39,64,.28), 0 1px 3px rgba(0,0,0,.1);
      transition: transform .15s, box-shadow .15s, background-color .15s;
      -webkit-tap-highlight-color: transparent;
    }
    .myway-home-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 18px rgba(31,39,64,.36); background: #2a3358; }
    .myway-home-btn:active { transform: translateY(0); }
    .myway-home-btn svg { width: 16px; height: 16px; fill: currentColor; flex-shrink: 0; }

    .myway-footer {
      width: 100%;
      text-align: center;
      padding: 22px 14px 28px;
      margin-top: 36px;
      border-top: 1px solid #eef0f4;
      font-size: .82rem;
      color: #8590ad;
    }
    .myway-footer a { color: #4a5170; text-decoration: none; font-weight: 700; }
    .myway-footer a:hover { color: #1f2740; }
    .myway-footer .sep { display: inline-block; margin: 0 8px; opacity: .5; }

    @media (max-width: 480px) {
      .myway-home-btn { right: 12px; bottom: 12px; padding: 9px 14px 9px 12px; font-size: .8rem; }
    }
  </style>
</head>
<body>

  <div class="main-title"></div>
  <div class="main-subtitle"></div>
  <div class="container" id="aiLogoContainer"></div>

  <!-- 우측 하단 홈 버튼 -->
  <a href="https://myway.kr" class="myway-home-btn" aria-label="myway.kr 홈으로 이동">
    <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 3.2 2.5 11.4l1.3 1.5L5 11.85V20a1 1 0 0 0 1 1h4v-6h4v6h4a1 1 0 0 0 1-1v-8.15l1.2 1.05 1.3-1.5L12 3.2Z"/></svg>
    myway.kr
  </a>

  <!-- 푸터 -->
  <footer class="myway-footer">
    <a href="https://myway.kr">myway.kr</a>
    <span class="sep">·</span>
    <span>© MYWAY.KR</span>
  </footer>

  <script>
    /* 복제방지 */
    (function(){
      function isEditable(t) {
        if (!t) return false;
        const tag = (t.tagName || '').toLowerCase();
        if (tag === 'input' || tag === 'textarea') return true;
        if (t.isContentEditable) return true;
        return false;
      }
      ['contextmenu','dragstart','selectstart','copy','cut'].forEach(ev => {
        document.addEventListener(ev, e => {
          if (isEditable(e.target)) return;
          e.preventDefault();
        }, { capture: true });
      });
      document.addEventListener('keydown', e => {
        if (isEditable(e.target)) return;
        const k = (e.key || '').toLowerCase();
        if (k === 'f12') { e.preventDefault(); return; }
        if (e.ctrlKey && e.shiftKey && (k === 'i' || k === 'j' || k === 'c')) { e.preventDefault(); return; }
        if (e.ctrlKey && !e.shiftKey && (k === 'u' || k === 's' || k === 'c' || k === 'x' || k === 'a')) { e.preventDefault(); return; }
      }, { capture: true });
    })();

    /* 라디오 채널 데이터 */
    const group1 = [
      { url: "https://miniwebapp.imbc.com/index?channel=mfm", img: "https://i.namu.wiki/i/vTgTt-dxXfOsfXVWIvLgMaKazq4LrBg721Be9fx_3CzjuxEza-HDXToyFRE8_E5_EsC6LJbL9oTfSwCMK-OsEA.webp", alt: "MBC FM" },
      { url: "https://onair.kbs.co.kr/index.html?sname=onair&stype=live&ch_code=25&ch_type=radioList", img: "https://cdn-radiotime-logos.tunein.com/s50603g.png", alt: "KBS Cool FM" },
      { url: "https://www.sbs.co.kr/live/S08?div=live_list", img: "https://i.namu.wiki/i/aHTv2hAN5_w3-pmqu-0q2OSQ8FnPo5rYUOheTAUk8CxWZe6FjVd1mebIbiXTgR466mD4LtQh8h7qtEe-5tw6SQ.webp", alt: "SBS 러브 FM" },
      { url: "https://www.sbs.co.kr/live/S07?div=live_list", img: "https://i.namu.wiki/i/KcxXQjQQ2xkVT-fMRDeUYdbulVXIRUALMRrImrF8NCIaxdK96z_PXByJha1RIRq3Sonib7EuS9vtNVfHnK6pcQ.webp", alt: "SBS 파워 FM" },
      { url: "https://www.cbs.co.kr/radio", img: "https://modo-phinf.pstatic.net/20150829_209/1440840503551b3k1R_JPEG/mosaF6ghCM.jpeg?type=f320_320", alt: "CBS 라디오" },
      { url: "https://www.tbn.or.kr/onair/tbnlive.tbn?area_code=2", img: "https://play-lh.googleusercontent.com/Vjbe0EONCcfvO7EUYQ-h6WgM2zCm0YyZjLIxu8iHfieEeh1x7YGwmdm2NRXhAVd3BaH1", alt: "TBN 교통방송" },
      { url: "https://tbs.seoul.kr/eFm/index.do", img: "https://cdn-profiles.tunein.com/s113003/images/logog.png?t=636294", alt: "TBS eFM" },
      { url: "https://onair.kbs.co.kr/index.html?sname=onair&stype=live&ch_code=21&ch_type=radioList&bora=on&chat=on", img: "https://static.mytuner.mobi/media/tvos_radios/952/kbs-1radio-kbs-radio-1.9dea7458.png", alt: "KBS 1라디오" },
      { url: "https://onair.kbs.co.kr/index.html?sname=onair&stype=live&ch_code=22&ch_type=radioList&bora=on&chat=on", img: "https://static.mytuner.mobi/media/tvos_radios/346/kbs-2radio-haepifm-kbs-radio-2-happy-fm.6115fe09.png", alt: "KBS 2라디오 해피 FM" },
      { url: "https://onair.kbs.co.kr/index.html?sname=onair&stype=live&ch_code=23&ch_type=radioList", img: "https://static.mytuner.mobi/media/tvos_radios/hpRfkmDEVf.png", alt: "KBS 3라디오" },
      { url: "https://onair.kbs.co.kr/index.html?sname=onair&stype=live&ch_code=24&ch_type=radioList&bora=on&chat=on", img: "https://yt3.googleusercontent.com/ytc/AIdro_kgNjzIDvp_zw-WnjRx5FhR-7W67ybj4XWRnXMcBJwgTw=w544-c-h544-k-c0x00ffffff-no-l90-rj", alt: "KBS Classic FM" },
      { url: "https://onair.kbs.co.kr/index.html?sname=onair&stype=live&ch_code=26&ch_type=radioList", img: "https://static-media.streema.com/media/cache/d9/78/d978b7562c07fd625995e62b2365ea49.png", alt: "KBS 한민족방송" },
      { url: "https://edition.cnn.com/audio", img: "https://upload.wikimedia.org/wikipedia/commons/a/a8/CNN_en_Espa%C3%B1ol_Radio_logo.jpg", alt: "CNN Radio" },
      { url: "https://www.bbc.co.uk/sounds/stations", img: "https://radioink.com/wp-content/uploads/2023/01/BBC-Radio-Logo.png", alt: "BBC Radio" },
      { url: "https://radio.garden/visit/buldana/vPxv9hwS", img: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSSlgsDYp_Uu6Js6j6oQOmzpipcJsJkp2-mMQ&s", alt: "Radio Garden" }
    ];

    /* 레이아웃 결정 - 폭(width)만 사용 (높이 의존 제거 → 모바일 흔들림 0) */
    function getLayout() {
      const w = window.innerWidth;
      if (w <= 360)  return { iconsPerRow: 3, gap: 18, size: 64, imgSize: 46 };
      if (w <= 480)  return { iconsPerRow: 3, gap: 22, size: 72, imgSize: 54 };
      if (w <= 600)  return { iconsPerRow: 4, gap: 16, size: 70, imgSize: 52 };
      if (w <= 720)  return { iconsPerRow: 4, gap: 20, size: 78, imgSize: 60 };
      if (w <= 900)  return { iconsPerRow: 5, gap: 14, size: 64, imgSize: 46 };
      if (w <= 1100) return { iconsPerRow: 6, gap: 14, size: 60, imgSize: 40 };
      return         { iconsPerRow: 7, gap: 24, size: 74, imgSize: 54 };
    }

    function renderGroup(arr, layout) {
      const { iconsPerRow, gap, size, imgSize } = layout;
      const rows = [];
      let idx = 0;
      while (idx < arr.length) {
        const count = Math.min(iconsPerRow, arr.length - idx);
        const row = document.createElement('div');
        row.className = "logo-row";
        row.style.maxWidth = (size * count + gap * (count - 1)) + "px";
        row.style.gap = gap + "px";
        for (let i = 0; i < count; i++, idx++) {
          const l = arr[idx];
          const a = document.createElement('a');
          a.className = "ai-logo-wrap";
          a.href = l.url; a.target = "_blank"; a.rel = "noopener";
          a.style.width = a.style.height = size + "px";
          const img = document.createElement('img');
          img.className = "ai-logo-img";
          img.src = l.img; img.alt = l.alt || "";
          img.loading = "lazy"; img.decoding = "async"; img.referrerPolicy = "no-referrer";
          img.style.width = img.style.height = imgSize + "px";
          a.appendChild(img);
          row.appendChild(a);
        }
        rows.push(row);
      }
      return rows;
    }

    function renderAll() {
      const container = document.getElementById('aiLogoContainer');
      const frag = document.createDocumentFragment();
      const t = document.createElement("div");
      t.className = "group-title";
      frag.appendChild(t);
      renderGroup(group1, getLayout()).forEach(row => frag.appendChild(row));
      container.replaceChildren(frag);
    }

    /* 레이아웃 키 캐시 - 실제 변화 시에만 재렌더 */
    let lastKey = "";
    function maybeRender() {
      const l = getLayout();
      const key = l.iconsPerRow + ":" + l.size + ":" + l.gap + ":" + l.imgSize;
      if (key === lastKey) return;
      lastKey = key;
      renderAll();
    }

    /* resize debounce + rAF */
    let resizeTimer = null, rafId = null;
    function onResize() {
      if (resizeTimer) clearTimeout(resizeTimer);
      resizeTimer = setTimeout(() => {
        if (rafId) cancelAnimationFrame(rafId);
        rafId = requestAnimationFrame(maybeRender);
      }, 120);
    }
    maybeRender();
    window.addEventListener('resize', onResize, { passive: true });
    window.addEventListener('orientationchange', onResize, { passive: true });
  </script>
</body>
</html>
