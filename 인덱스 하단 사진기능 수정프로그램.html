<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>MYWAY 카드 데이터 생성기</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    :root {
      --bg: #f7f8fb;
      --panel: #fff;
      --border: #e4e7ee;
      --text: #1a1f36;
      --text-sub: #6b7488;
      --accent: #2e7d4f;
      --danger: #d9534f;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: 'Segoe UI', '맑은 고딕', Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
    }
    .header {
      padding: 18px 22px;
      background: linear-gradient(135deg, #1f2740 0%, #2e3d5e 100%);
      color: #fff;
    }
    .header h1 { margin: 0; font-size: 1.2rem; font-weight: 700; letter-spacing: -0.3px; }
    .header .sub { font-size: .82rem; opacity: .85; margin-top: 4px; }

    .layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
      gap: 18px;
      padding: 18px;
      max-width: 1400px;
      margin: 0 auto;
    }
    @media (max-width: 900px) { .layout { grid-template-columns: 1fr; } }

    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 18px;
      box-shadow: 0 2px 8px rgba(31, 39, 64, 0.04);
    }
    .panel h2 {
      margin: 0 0 14px;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: -0.2px;
    }
    .panel h2 .count {
      font-size: .78rem;
      color: var(--text-sub);
      font-weight: 500;
      margin-left: 6px;
    }

    .form-grid { display: grid; gap: 10px; }
    .form-row { display: flex; flex-direction: column; gap: 4px; }
    .form-row label {
      font-size: .82rem;
      font-weight: 600;
      color: var(--text-sub);
    }
    .form-row input[type=text], .form-row input[type=url] {
      width: 100%;
      padding: 9px 12px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font: inherit;
      font-size: .92rem;
      color: var(--text);
      background: #fff;
      transition: border-color .15s;
    }
    .form-row input:focus { outline: none; border-color: var(--accent); }
    .form-row .hint { font-size: .75rem; color: var(--text-sub); margin-top: 2px; }

    .toggle-group { display: flex; gap: 6px; flex-wrap: wrap; }
    .toggle-btn {
      padding: 7px 13px;
      border: 1.5px solid var(--border);
      border-radius: 999px;
      background: #fff;
      color: var(--text-sub);
      font: inherit;
      font-size: .82rem;
      font-weight: 600;
      cursor: pointer;
      transition: all .15s;
    }
    .toggle-btn:hover { background: #f4f6fb; }
    .toggle-btn.is-active {
      background: var(--text);
      color: #fff;
      border-color: var(--text);
    }

    .actions { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
    .btn {
      padding: 9px 16px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      background: #fff;
      color: var(--text);
      font: inherit;
      font-size: .9rem;
      font-weight: 600;
      cursor: pointer;
      transition: all .15s;
    }
    .btn:hover { background: #f4f6fb; }
    .btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); }
    .btn-primary:hover { background: #266941; }
    .btn-danger { color: var(--danger); }
    .btn-danger:hover { background: #fdeaea; }

    .item-list {
      margin-top: 16px;
      max-height: 320px;
      overflow-y: auto;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: #fafbfc;
    }
    .item-list:empty::before {
      content: "아직 추가된 항목이 없습니다.";
      display: block;
      padding: 24px 16px;
      text-align: center;
      color: var(--text-sub);
      font-size: .85rem;
    }
    .item-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 10px;
      border-bottom: 1px solid var(--border);
      background: #fff;
      cursor: pointer;
      transition: background .12s;
    }
    .item-row:hover { background: #f4f8fd; }
    .item-row.is-editing { background: #fff5d6; }
    .item-row:last-child { border-bottom: 0; }
    .item-row img {
      width: 40px; height: 40px;
      object-fit: cover;
      border-radius: 6px;
      background: #eef0f4;
      flex-shrink: 0;
    }
    .item-row .info { flex: 1 1 auto; min-width: 0; }
    .item-row .name {
      font-size: .9rem; font-weight: 600;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .item-row .url {
      font-size: .76rem; color: var(--text-sub);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .item-row .ctrl { display: flex; gap: 4px; flex-shrink: 0; }
    .ctrl-btn {
      width: 28px; height: 28px;
      display: inline-flex; align-items: center; justify-content: center;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: #fff;
      color: var(--text-sub);
      cursor: pointer;
      font-size: .85rem; padding: 0;
    }
    .ctrl-btn:hover { background: #f4f6fb; color: var(--text); }
    .ctrl-btn.danger:hover { color: var(--danger); background: #fdeaea; }
    .ctrl-btn:disabled { opacity: .35; cursor: not-allowed; }

    .code-output {
      width: 100%;
      min-height: 180px;
      max-height: 280px;
      padding: 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: #1f2740;
      color: #d8def0;
      font-family: 'SF Mono', Consolas, Monaco, monospace;
      font-size: .82rem;
      line-height: 1.55;
      resize: vertical;
      white-space: pre;
      overflow: auto;
    }

    /* ===== 미리보기 ===== */
    .preview-area {
      padding: 12px;
      border-radius: 8px;
      background: #fafbfd;
      min-height: 200px;
    }
    .preview-masonry { column-count: 4; column-gap: 12px; }
    .preview-masonry .card {
      display: block;
      break-inside: avoid;
      margin: 0 0 12px;
      border-radius: 10px;
      overflow: hidden;
      background: #f4f6fb;
      position: relative;
      text-decoration: none;
      color: inherit;
    }
    .preview-masonry .card img { width: 100%; height: auto; display: block; }
    .preview-masonry .card .cap {
      position: absolute;
      left: 0; right: 0; bottom: 0;
      padding: 14px 10px 6px;
      font-size: .75rem; font-weight: 600;
      color: #fff;
      background: linear-gradient(180deg, transparent 0%, rgba(0,0,0,.7) 80%);
      text-align: center;
    }
    @media (max-width: 700px) { .preview-masonry { column-count: 3; } }
    @media (max-width: 480px) { .preview-masonry { column-count: 2; } }

    .preview-logo {
      display: grid;
      grid-template-columns: repeat(auto-fill, 74px);
      gap: 18px;
      justify-content: center;
    }
    .preview-logo .logo-tile {
      width: 74px; height: 74px;
      border-radius: 50%;
      background: #fff;
      box-shadow: 0 3px 18px 0 #b1c7e84d;
      border: 3px solid #e5e8f6;
      display: flex; align-items: center; justify-content: center;
      overflow: hidden;
    }
    .preview-logo .logo-tile img { width: 54px; height: 54px; object-fit: contain; border-radius: 50%; }

    .preview-empty {
      text-align: center;
      color: var(--text-sub);
      font-size: .88rem;
      padding: 40px 12px;
    }

    #toast {
      position: fixed;
      left: 50%;
      bottom: 28px;
      transform: translateX(-50%);
      padding: 11px 20px;
      background: rgba(31, 39, 64, 0.94);
      color: #fff;
      font-size: .88rem;
      font-weight: 600;
      border-radius: 999px;
      box-shadow: 0 8px 24px rgba(31,39,64,0.3);
      z-index: 9999;
      opacity: 0;
      pointer-events: none;
      transition: opacity .2s, transform .2s;
    }
    #toast.is-show { opacity: 1; transform: translateX(-50%) translateY(-4px); }
  </style>
</head>
<body>
  <header class="header">
    <h1>MYWAY 카드 데이터 생성기</h1>
    <div class="sub">이미지 URL + 링크 URL → JS 코드 자동 생성 + 카드 미리보기</div>
  </header>

  <div class="layout">
    <section class="panel">
      <h2>1. 항목 추가</h2>

      <div class="form-grid">
        <div class="form-row">
          <label>출력 형식</label>
          <div class="toggle-group" id="formatToggle">
            <button type="button" class="toggle-btn is-active" data-format="people">people 형식 (name + cats + url + img)</button>
            <button type="button" class="toggle-btn" data-format="logo">logo 형식 (url + img + alt)</button>
          </div>
          <div class="hint">people = indexmainpeople.html / logo = indexmain.html group2~4</div>
        </div>

        <div class="form-row">
          <label>이미지 URL <span style="color:var(--danger)">*</span></label>
          <input type="url" id="imgInput" placeholder="https://example.com/photo.jpg" autocomplete="off">
        </div>

        <div class="form-row">
          <label>링크 URL <span style="color:var(--danger)">*</span></label>
          <input type="url" id="urlInput" placeholder="https://www.youtube.com/@channel" autocomplete="off">
          <div class="hint">soundcloud search?q=... / youtube @username / ab_channel 에서 이름 자동 추정</div>
        </div>

        <div class="form-row">
          <label>이름 <span style="font-weight:500;color:var(--text-sub)">(비워두면 URL에서 자동 추정)</span></label>
          <input type="text" id="nameInput" placeholder="예: 박효신" autocomplete="off">
        </div>

      </div>

      <div class="actions">
        <button type="button" class="btn btn-primary" id="addBtn">➕ 항목 추가</button>
        <button type="button" class="btn" id="cancelEditBtn" style="display:none">↶ 수정 취소</button>
        <button type="button" class="btn btn-danger" id="clearBtn">모두 지우기</button>
      </div>
      <div id="editIndicator" style="display:none;margin-top:8px;padding:6px 10px;background:#fff5d6;border:1px solid #f0d878;border-radius:6px;font-size:.82rem;color:#7a5d10">
        ✏️ <strong id="editIndex"></strong>번 항목 수정 중 — 변경 후 [수정 적용]을 누르세요
      </div>

      <h2 style="margin-top: 22px;">2. 추가된 항목 <span class="count" id="countLbl">0개</span></h2>
      <div class="item-list" id="itemList"></div>

      <h2 style="margin-top: 22px;">3. 생성된 코드</h2>
      <textarea class="code-output" id="codeOutput" spellcheck="false" placeholder="// 항목을 추가하거나, 기존 코드를 여기에 붙여넣고 [코드 적용]을 누르세요."></textarea>
      <div class="actions">
        <button type="button" class="btn btn-primary" id="copyBtn">📋 코드 복사</button>
        <button type="button" class="btn" id="applyBtn">📥 코드 적용 (붙여넣기 후 파싱)</button>
      </div>
    </section>

    <section class="panel">
      <h2>4. 실시간 미리보기</h2>
      <div class="preview-area">
        <div id="previewBox"><div class="preview-empty">항목을 추가하면 여기에 카드가 표시됩니다.</div></div>
      </div>
    </section>
  </div>

  <div id="toast" role="status"></div>

  <script>
  (function() {
    'use strict';

    const STORAGE_KEY = 'myway_card_builder_v1';
    let items = [];
    let currentFormat = 'people';
    let editingIndex = -1;  // -1: 새 항목 추가 / >=0: 수정 중인 항목 인덱스

    const $ = (id) => document.getElementById(id);
    const imgInput = $('imgInput');
    const urlInput = $('urlInput');
    const nameInput = $('nameInput');
    const itemList = $('itemList');
    const codeOutput = $('codeOutput');
    const previewBox = $('previewBox');
    const countLbl = $('countLbl');
    const formatToggle = $('formatToggle');
    const addBtn = $('addBtn');
    const cancelEditBtn = $('cancelEditBtn');
    const editIndicator = $('editIndicator');
    const editIndexLbl = $('editIndex');

    // === 토스트 ===
    let toastTimer;
    function showToast(msg, ms) {
      const t = $('toast');
      t.textContent = msg;
      t.classList.add('is-show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => t.classList.remove('is-show'), ms || 1800);
    }

    // === localStorage (자동 저장: 새로고침해도 데이터 유지) ===
    function saveState() {
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify({ items, currentFormat }));
      } catch (e) {}
    }
    function loadState() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return;
        const data = JSON.parse(raw);
        if (Array.isArray(data.items)) items = data.items;
        if (data.currentFormat) currentFormat = data.currentFormat;
      } catch (e) {}
    }

    // === URL에서 이름 자동 추정 ===
    function guessName(url) {
      if (!url) return '';
      try {
        if (/soundcloud\.com\/search/.test(url)) {
          const q = new URL(url).searchParams.get('q');
          if (q) return decodeURIComponent(q).trim();
        }
        const m = url.match(/youtube\.com\/@([\w.\-]+)/);
        if (m) {
          const map = { 'Leesuhyun': '이수현', 'KIMFEELofficial': '김필' };
          return map[m[1]] || m[1];
        }
        if (/youtube\.com\/watch/.test(url)) {
          const ab = new URL(url).searchParams.get('ab_channel');
          if (ab) return decodeURIComponent(ab).trim();
        }
        if (/vibe\.naver\.com/.test(url)) return 'VIBE';
        if (/melon\.com/.test(url)) return '멜론';
        if (/bugs\.co\.kr/.test(url)) return '벅스';
        if (/soundcloud\.com/.test(url)) return 'SoundCloud';
      } catch (e) {}
      return '';
    }

    urlInput.addEventListener('input', () => {
      if (!nameInput.value.trim()) {
        const guessed = guessName(urlInput.value.trim());
        nameInput.placeholder = guessed ? '자동 추정: ' + guessed : '예: 박효신';
      }
    });

    // === 형식 토글 ===
    formatToggle.addEventListener('click', e => {
      const btn = e.target.closest('.toggle-btn');
      if (!btn) return;
      currentFormat = btn.dataset.format;
      formatToggle.querySelectorAll('.toggle-btn').forEach(b => b.classList.toggle('is-active', b === btn));
      saveState();
      render();
    });

    // === 항목 추가 ===
    function addItem() {
      const img = imgInput.value.trim();
      const url = urlInput.value.trim();
      let name = nameInput.value.trim();
      if (!img || !url) {
        showToast('⚠ 이미지 URL과 링크 URL은 필수입니다');
        return;
      }
      if (!name) name = guessName(url) || '미지정';

      if (editingIndex >= 0 && editingIndex < items.length) {
        /* 수정 모드: 기존 항목 갱신 */
        items[editingIndex] = { name, url, img };
        exitEditMode();
        showToast('✓ 수정 적용됨');
      } else {
        /* 추가 모드: 새 항목 push */
        items.push({ name, url, img });
        showToast('✓ 추가됨 (총 ' + items.length + '개)');
      }

      imgInput.value = '';
      urlInput.value = '';
      nameInput.value = '';
      nameInput.placeholder = '예: 박효신';
      imgInput.focus();
      saveState();
      render();
    }

    /* 항목 클릭 → 입력 폼에 로드 + 수정 모드 진입 */
    function enterEditMode(index) {
      if (index < 0 || index >= items.length) return;
      const it = items[index];
      imgInput.value = it.img;
      urlInput.value = it.url;
      nameInput.value = it.name;
      editingIndex = index;
      addBtn.textContent = '✓ 수정 적용';
      cancelEditBtn.style.display = '';
      editIndicator.style.display = '';
      editIndexLbl.textContent = (index + 1);
      /* 입력 폼 부드러운 스크롤 */
      imgInput.scrollIntoView({ behavior: 'smooth', block: 'center' });
      imgInput.focus();
      render();  /* item-row의 is-editing 클래스 갱신 */
    }

    function exitEditMode() {
      editingIndex = -1;
      addBtn.textContent = '➕ 항목 추가';
      cancelEditBtn.style.display = 'none';
      editIndicator.style.display = 'none';
    }

    cancelEditBtn.addEventListener('click', () => {
      exitEditMode();
      imgInput.value = '';
      urlInput.value = '';
      nameInput.value = '';
      render();
      showToast('수정 취소');
    });

    /* === 코드 파싱: textarea에서 항목 추출 === */
    function parseCode(text) {
      const out = [];
      if (!text || !text.trim()) return out;
      /* 각 객체 블록 추출 ({ ... }) */
      const blocks = text.match(/\{[^{}]+\}/g) || [];
      blocks.forEach(block => {
        const get = (key) => {
          /* "key: "value"" 형태 추출 - escape 처리 */
          const m = block.match(new RegExp(key + '\\s*:\\s*"((?:\\\\.|[^"\\\\])*)"'));
          if (!m) return null;
          return m[1].replace(/\\"/g, '"').replace(/\\\\/g, '\\');
        };
        const url = get('url');
        const img = get('img');
        const name = get('name') || get('alt') || '미지정';
        if (url && img) out.push({ name, url, img });
      });
      return out;
    }

    $('applyBtn').addEventListener('click', () => {
      const text = codeOutput.value;
      const parsed = parseCode(text);
      if (parsed.length === 0) {
        showToast('⚠ 파싱할 항목이 없습니다 — { url:"...", img:"..." } 형태 확인');
        return;
      }
      if (items.length > 0 && !confirm('현재 ' + items.length + '개 항목을 모두 교체하고 파싱된 ' + parsed.length + '개로 대체하시겠습니까?')) {
        return;
      }
      items = parsed;
      exitEditMode();
      saveState();
      render();
      showToast('✓ ' + parsed.length + '개 항목 적용됨');
    });
    $('addBtn').addEventListener('click', addItem);

    [imgInput, urlInput, nameInput].forEach(inp => {
      inp.addEventListener('keydown', e => {
        if (e.key === 'Enter') { e.preventDefault(); addItem(); }
      });
    });

    // === 항목 목록 액션 ===
    itemList.addEventListener('click', e => {
      const row = e.target.closest('.item-row');
      if (!row) return;
      const idx = parseInt(row.dataset.idx, 10);

      const btn = e.target.closest('.ctrl-btn');
      if (btn) {
        const act = btn.dataset.act;
        if (act === 'up' && idx > 0) {
          [items[idx-1], items[idx]] = [items[idx], items[idx-1]];
          if (editingIndex === idx) editingIndex--;
          else if (editingIndex === idx - 1) editingIndex++;
        } else if (act === 'down' && idx < items.length - 1) {
          [items[idx+1], items[idx]] = [items[idx], items[idx+1]];
          if (editingIndex === idx) editingIndex++;
          else if (editingIndex === idx + 1) editingIndex--;
        } else if (act === 'del') {
          items.splice(idx, 1);
          if (editingIndex === idx) exitEditMode();
          else if (editingIndex > idx) editingIndex--;
        }
        saveState();
        render();
        return;
      }
      /* 컨트롤 버튼이 아닌 row 자체 클릭 → 수정 모드 진입 */
      enterEditMode(idx);
    });

    $('clearBtn').addEventListener('click', () => {
      if (items.length === 0) return;
      if (!confirm(items.length + '개 항목을 모두 지우시겠습니까?')) return;
      items = [];
      exitEditMode();
      saveState();
      render();
      showToast('모두 지웠습니다');
    });

    $('copyBtn').addEventListener('click', async () => {
      const code = codeOutput.value;
      if (!code) { showToast('복사할 코드가 없습니다'); return; }
      try {
        await navigator.clipboard.writeText(code);
        showToast('✓ 클립보드에 복사됨!');
      } catch (e) {
        codeOutput.focus();
        codeOutput.select();
        document.execCommand('copy');
        showToast('✓ 복사됨!');
      }
    });

    // === 렌더 ===
    function escapeJs(s) {
      return String(s).replace(/\\/g, '\\\\').replace(/"/g, '\\"');
    }
    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, m => ({
        '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;'
      }[m]));
    }

    function buildCode() {
      if (items.length === 0) return '';
      if (currentFormat === 'people') {
        return items.map(it => {
          return `{ name: "${escapeJs(it.name)}", url: "${escapeJs(it.url)}", img: "${escapeJs(it.img)}" },`;
        }).join('\n');
      } else {
        return items.map(it => {
          return `{ url: "${escapeJs(it.url)}", img: "${escapeJs(it.img)}", alt: "${escapeJs(it.name)}" },`;
        }).join('\n');
      }
    }

    function renderItemList() {
      countLbl.textContent = items.length + '개';
      if (items.length === 0) { itemList.innerHTML = ''; return; }
      itemList.innerHTML = items.map((it, i) => `
        <div class="item-row${i === editingIndex ? ' is-editing' : ''}" data-idx="${i}">
          <img src="${escapeHtml(it.img)}" alt="" referrerpolicy="no-referrer" onerror="this.style.opacity=0.3;this.alt='✗'">
          <div class="info">
            <div class="name">${escapeHtml(it.name)}</div>
            <div class="url">${escapeHtml(it.url)}</div>
          </div>
          <div class="ctrl">
            <button class="ctrl-btn" data-act="up" title="위로" ${i===0?'disabled':''}>▲</button>
            <button class="ctrl-btn" data-act="down" title="아래" ${i===items.length-1?'disabled':''}>▼</button>
            <button class="ctrl-btn danger" data-act="del" title="삭제">✕</button>
          </div>
        </div>
      `).join('');
    }

    function renderPreview() {
      if (items.length === 0) {
        previewBox.innerHTML = '<div class="preview-empty">항목을 추가하면 여기에 카드가 표시됩니다.</div>';
        return;
      }
      if (currentFormat === 'people') {
        const cards = items.map(it => `
          <a class="card" href="${escapeHtml(it.url)}" target="_blank" rel="noopener" aria-label="${escapeHtml(it.name)}">
            <img src="${escapeHtml(it.img)}" alt="${escapeHtml(it.name)}" loading="lazy" referrerpolicy="no-referrer" onerror="this.style.background='#ddd';this.style.minHeight='120px'">
            <div class="cap">${escapeHtml(it.name)}</div>
          </a>
        `).join('');
        previewBox.innerHTML = '<div class="preview-masonry">' + cards + '</div>';
      } else {
        const tiles = items.map(it => `
          <a class="logo-tile" href="${escapeHtml(it.url)}" target="_blank" rel="noopener" title="${escapeHtml(it.name)}">
            <img src="${escapeHtml(it.img)}" alt="${escapeHtml(it.name)}" loading="lazy" referrerpolicy="no-referrer">
          </a>
        `).join('');
        previewBox.innerHTML = '<div class="preview-logo">' + tiles + '</div>';
      }
    }

    function render() {
      renderItemList();
      codeOutput.value = buildCode();
      renderPreview();
    }

    // === 초기화 ===
    loadState();
    formatToggle.querySelectorAll('.toggle-btn').forEach(b => {
      b.classList.toggle('is-active', b.dataset.format === currentFormat);
    });
    render();
  })();
  </script>
</body>
</html>
