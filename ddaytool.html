  <a href="https://myway.kr" class="float-home" aria-label="홈으로">

  <footer>© MYWAY.KR · <a href="https://myway.kr">myway.kr</a></footer>

  <!-- 음력 변환 (양력↔음력) -->
  <script src="https://cdn.jsdelivr.net/npm/lunar-javascript/lunar.js"></script>

  <script>
    const $ = id => document.getElementById(id);
    const WD = ['일','월','화','수','목','금','토'];
    const DAY = 86400000;

    /* 날짜 유틸 */
    function parse(str){
      if (!str) return null;
      const [y,m,d] = str.split('-').map(Number);
      if (!y || !m || !d) return null;
      return new Date(y, m - 1, d);
    }
    function todayStr(){
      const d = new Date(), z = n => String(n).padStart(2,'0');
      return `${d.getFullYear()}-${z(d.getMonth()+1)}-${z(d.getDate())}`;
    }
    function toStr(date){
      const z = n => String(n).padStart(2,'0');
      return `${date.getFullYear()}-${z(date.getMonth()+1)}-${z(date.getDate())}`;
    }
    function fmt(date){
      return `${date.getFullYear()}년 ${date.getMonth()+1}월 ${date.getDate()}일 (${WD[date.getDay()]})`;
    }
    function dayDiff(a,b){ return Math.round((b - a) / DAY); }
    function ymd(a,b){ // a<=b 가정, 달력 기준 차이 (음수 일수 없음)
      let months = (b.getFullYear()-a.getFullYear())*12 + (b.getMonth()-a.getMonth());
      let anchor = new Date(a.getFullYear(), a.getMonth()+months, a.getDate());
      while (anchor > b){ months--; anchor = new Date(a.getFullYear(), a.getMonth()+months, a.getDate()); }
      const d = Math.round((b - anchor) / DAY);
      return { y: Math.floor(months/12), m: months % 12, d };
    }
    function num(n){ return n.toLocaleString('ko-KR'); }

    /* 탭 전환 */
    document.querySelectorAll('.tabs button').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tabs button').forEach(b => b.setAttribute('aria-selected', String(b === btn)));
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
        $('panel-' + btn.dataset.tab).classList.add('active');
      });
    });

    /* ===== D-day ===== */
    let ddayInclude = false;
    $('ddayMode').querySelectorAll('button').forEach(btn => {
      btn.addEventListener('click', () => {
        ddayInclude = btn.dataset.inc === 'include';
        $('ddayMode').querySelectorAll('button').forEach(b => b.setAttribute('aria-pressed', String(b === btn)));
        calcDday();
      });
    });
    function calcDday(){
      const box = $('ddayResult');
      const target = parse($('ddayDate').value);
      if (!target){ box.innerHTML = '<span class="dday-label">목표 날짜를 선택하세요</span>'; return; }
      const today = parse(todayStr());
      let diff = dayDiff(today, target);   // 양수=미래
      const name = $('ddayName').value.trim();

      let big, label;
      if (ddayInclude){
        // 오늘 포함: 미래면 D-(diff+1), 당일 D-1로 세는 한국식 카운트다운 표기 대신 "n일째"
        if (diff >= 0){ big = 'D-' + (diff + 1); label = `오늘 포함 ${num(diff + 1)}일째 카운트`; }
        else { big = 'D+' + (-diff); label = '지난 날짜'; }
      } else {
        if (diff === 0){ big = 'D-DAY'; label = '바로 오늘입니다 🎉'; }
        else if (diff > 0){ big = 'D-' + num(diff); label = `${num(diff)}일 남았습니다`; }
        else { big = 'D+' + num(-diff); label = `${num(-diff)}일 지났습니다`; }
      }

      const absDays = Math.abs(diff);
      const weeks = Math.floor(absDays / 7), rem = absDays % 7;
      let breakdown = '';
      if (absDays >= 7){
        const lo = diff >= 0 ? today : target, hi = diff >= 0 ? target : today;
        const b = ymd(lo, hi);
        const parts = [];
        if (b.y) parts.push(`${b.y}년`);
        if (b.m) parts.push(`${b.m}개월`);
        if (b.d) parts.push(`${b.d}일`);
        breakdown = `<div class="result-sub">약 <b>${parts.join(' ')}</b> · <b>${num(weeks)}주 ${rem}일</b><br>목표: <b>${fmt(target)}</b></div>`;
      } else {
        breakdown = `<div class="result-sub">목표: <b>${fmt(target)}</b></div>`;
      }

      box.innerHTML =
        (name ? `<div class="target-name">${escapeHtml(name)}</div>` : '') +
        `<div class="dday-big">${big}</div><div class="dday-label">${label}</div>${breakdown}`;
    }
    ['input','change'].forEach(ev => {
      $('ddayDate').addEventListener(ev, calcDday);
      $('ddayName').addEventListener(ev, calcDday);
    });

    /* ===== 날짜 간격 ===== */
    function calcGap(){
      const box = $('gapResult');
      const a = parse($('gapFrom').value), b = parse($('gapTo').value);
      if (!a || !b){ box.innerHTML = '<span class="dday-label">두 날짜를 선택하세요</span>'; return; }
      const diff = Math.abs(dayDiff(a, b));
      const lo = a <= b ? a : b, hi = a <= b ? b : a;
      const c = ymd(lo, hi);
      const weeks = Math.floor(diff / 7), rem = diff % 7;
      const parts = [];
      if (c.y) parts.push(`${c.y}년`);
      if (c.m) parts.push(`${c.m}개월`);
      if (c.d) parts.push(`${c.d}일`);
      const human = parts.length ? parts.join(' ') : '0일';
      box.innerHTML =
        `<div class="result-main">${num(diff)}<span style="font-size:.45em;"> 일</span></div>` +
        `<div class="result-sub">약 <b>${human}</b> · <b>${num(weeks)}주 ${rem}일</b><br>` +
        `<b>${fmt(lo)}</b> → <b>${fmt(hi)}</b><br>` +
        `양 끝 포함 시 <b>${num(diff + 1)}일</b></div>`;
    }
    ['input','change'].forEach(ev => { $('gapFrom').addEventListener(ev, calcGap); $('gapTo').addEventListener(ev, calcGap); });

    /* ===== 날짜 계산 ===== */
    function calcAdd(){
      const box = $('addResult');
      const base = parse($('addBase').value);
      const n = parseInt($('addNum').value, 10);
      if (!base || isNaN(n)){ box.innerHTML = '<span class="dday-label">기준 날짜와 숫자를 입력하세요</span>'; return; }
      const dir = parseInt($('addDir').value, 10);
      const unit = $('addUnit').value;
      const amount = n * dir;
      const r = new Date(base.getFullYear(), base.getMonth(), base.getDate());
      if (unit === 'day') r.setDate(r.getDate() + amount);
      else if (unit === 'week') r.setDate(r.getDate() + amount * 7);
      else if (unit === 'month') r.setMonth(r.getMonth() + amount);
      else if (unit === 'year') r.setFullYear(r.getFullYear() + amount);

      const totalDays = dayDiff(base, r);
      const unitKo = { day:'일', week:'주', month:'개월', year:'년' }[unit];
      const dirKo = dir > 0 ? '후' : '전';
      box.innerHTML =
        `<div class="result-main">${fmt(r)}</div>` +
        `<div class="result-sub"><b>${fmt(base)}</b><br>기준 ${num(Math.abs(n))}${unitKo} ${dirKo} · 총 <b>${num(Math.abs(totalDays))}일</b> ${dirKo}</div>`;
    }
    ['input','change'].forEach(ev => {
      ['addBase','addNum','addDir','addUnit'].forEach(id => $(id).addEventListener(ev, calcAdd));
    });

    /* ===== 만 나이 ===== */
    function calcAge(){
      const box = $('ageResult');
      const birth = parse($('ageBirth').value);
      if (!birth){ box.innerHTML = '<span class="dday-label">생년월일을 입력하세요</span>'; return; }
      const base = parse($('ageOn').value) || parse(todayStr());
      if (base < birth){ box.innerHTML = '<span class="dday-label">기준일이 생년월일보다 빠릅니다</span>'; return; }
      const a = ymd(birth, base);
      const yearAge = base.getFullYear() - birth.getFullYear();
      const totalDays = dayDiff(birth, base);
      let nb = new Date(base.getFullYear(), birth.getMonth(), birth.getDate());
      if (nb < base) nb = new Date(base.getFullYear() + 1, birth.getMonth(), birth.getDate());
      const toNext = dayDiff(base, nb);
      box.innerHTML =
        `<div class="result-main">만 ${a.y}세</div>` +
        `<div class="result-sub">정확히 <b>${a.y}년 ${a.m}개월 ${a.d}일</b><br>` +
        `연 나이 <b>${yearAge}세</b> · 태어난 지 <b>${num(totalDays)}일</b><br>` +
        `다음 생일까지 <b>${toNext === 0 ? '오늘! 🎂' : 'D-' + num(toNext)}</b></div>`;
    }
    ['input','change'].forEach(ev => { $('ageBirth').addEventListener(ev, calcAge); $('ageOn').addEventListener(ev, calcAge); });

    /* ===== 양력 ↔ 음력 ===== */
    const GAN = ['갑','을','병','정','무','기','경','신','임','계'];
    const JI  = ['자','축','인','묘','진','사','오','미','신','유','술','해'];
    const ZODIAC = ['원숭이','닭','개','돼지','쥐','소','호랑이','토끼','용','뱀','말','양'];
    const mod = (n, m) => ((n % m) + m) % m;
    function ganzhi(year){ return GAN[mod(year - 4, 10)] + JI[mod(year - 4, 12)]; }
    function zodiacOf(year){ return ZODIAC[mod(year, 12)]; }
    function pad2k(n){ return String(n).padStart(2, '0'); }
    let lunarDir = 's2l';
    $('lunarDir').querySelectorAll('button').forEach(btn => {
      btn.addEventListener('click', () => {
        lunarDir = btn.dataset.dir;
        $('lunarDir').querySelectorAll('button').forEach(b => b.setAttribute('aria-pressed', String(b === btn)));
        $('lunarDateLabel').textContent = lunarDir === 's2l' ? '양력 날짜' : '음력 날짜';
        $('lunarLeapField').style.display = lunarDir === 'l2s' ? '' : 'none';
        calcLunar();
      });
    });
    function calcLunar(){
      const box = $('lunarResult');
      if (typeof Solar === 'undefined' || typeof Lunar === 'undefined'){
        box.innerHTML = '<span class="dday-label">음력 데이터를 불러오는 중입니다…</span>';
        setTimeout(calcLunar, 700); return;
      }
      const d = parse($('lunarDate').value);
      if (!d){ box.innerHTML = '<span class="dday-label">날짜를 선택하세요</span>'; return; }
      try {
        if (lunarDir === 's2l'){
          const lunar = Solar.fromYmd(d.getFullYear(), d.getMonth() + 1, d.getDate()).getLunar();
          const mr = lunar.getMonth(), leap = mr < 0, lm = Math.abs(mr), ly = lunar.getYear();
          box.innerHTML =
            `<div class="result-main">음력 ${ly}.${pad2k(lm)}.${pad2k(lunar.getDay())}</div>` +
            `<div class="result-sub">음력 <b>${ly}년 ${leap ? '윤' : ''}${lm}월 ${lunar.getDay()}일</b><br>` +
            `<b>${ganzhi(ly)}년</b> · ${zodiacOf(ly)}띠<br>(양력 ${fmt(d)})</div>`;
        } else {
          const leap = $('lunarLeap').checked;
          const month = leap ? -(d.getMonth() + 1) : (d.getMonth() + 1);
          const s = Lunar.fromYmd(d.getFullYear(), month, d.getDate()).getSolar();
          const sd = new Date(s.getYear(), s.getMonth() - 1, s.getDay());
          box.innerHTML =
            `<div class="result-main">${fmt(sd)}</div>` +
            `<div class="result-sub">음력 <b>${d.getFullYear()}년 ${leap ? '윤' : ''}${d.getMonth() + 1}월 ${d.getDate()}일</b><br>` +
            `→ 양력 <b>${s.getYear()}년 ${s.getMonth()}월 ${s.getDay()}일</b></div>`;
        }
      } catch (e){
        box.innerHTML = '<span class="dday-label">변환할 수 없는 날짜입니다 (윤달 여부를 확인하세요)</span>';
      }
    }
    ['input','change'].forEach(ev => { $('lunarDate').addEventListener(ev, calcLunar); $('lunarLeap').addEventListener(ev, calcLunar); });

    /* ===== 제대일 ===== */
    function addMonths(date, months){ return new Date(date.getFullYear(), date.getMonth() + months, date.getDate()); }
    function calcArmy(){
      const box = $('armyResult');
      const enlist = parse($('armyDate').value);
      if (!enlist){ box.innerHTML = '<span class="dday-label">입대일을 선택하세요</span>'; return; }
      const months = parseInt($('armyBranch').value, 10);
      const end = addMonths(enlist, months);
      const discharge = new Date(end.getFullYear(), end.getMonth(), end.getDate() - 1);
      const today = parse(todayStr());
      const totalDays = dayDiff(enlist, discharge) + 1;
      const elapsed = Math.max(0, Math.min(totalDays, dayDiff(enlist, today) + 1));
      const toDis = dayDiff(today, discharge);
      const pct = Math.max(0, Math.min(100, Math.round(elapsed / totalDays * 100)));
      let rank = '입대 전';
      if (today >= enlist){
        const em = ymd(enlist, today); const emM = em.y * 12 + em.m;
        rank = emM < 2 ? '이병' : emM < 8 ? '일병' : emM < 14 ? '상병' : '병장';
      }
      let status;
      if (toDis < 0) status = `전역 완료 · 전역 후 <b>${num(-toDis)}일</b>`;
      else if (toDis === 0) status = `<b>오늘 전역입니다 🎉</b>`;
      else status = `전역까지 <b>D-${num(toDis)}</b> · 진행률 <b>${pct}%</b> · 현재 <b>${rank}</b>`;
      box.innerHTML =
        `<div class="result-main">${fmt(discharge)}</div>` +
        `<div class="result-sub">입대 <b>${fmt(enlist)}</b> · 복무 <b>${months}개월</b> (총 ${num(totalDays)}일)<br>${status}</div>`;
    }
    ['input','change'].forEach(ev => { $('armyDate').addEventListener(ev, calcArmy); $('armyBranch').addEventListener(ev, calcArmy); });

    /* ===== 출산일 ===== */
    let birthMode = 'lmp';
    $('birthMode').querySelectorAll('button').forEach(btn => {
      btn.addEventListener('click', () => {
        birthMode = btn.dataset.m;
        $('birthMode').querySelectorAll('button').forEach(b => b.setAttribute('aria-pressed', String(b === btn)));
        $('birthDateLabel').textContent = birthMode === 'lmp' ? '마지막 생리 시작일' : '배란·수정일';
        calcBirth();
      });
    });
    function calcBirth(){
      const box = $('birthResult');
      const d = parse($('birthDate').value);
      if (!d){ box.innerHTML = '<span class="dday-label">날짜를 선택하세요</span>'; return; }
      const start = birthMode === 'lmp' ? d : new Date(d.getFullYear(), d.getMonth(), d.getDate() - 14);
      const due = new Date(start.getFullYear(), start.getMonth(), start.getDate() + 280);
      const today = parse(todayStr());
      const gestDays = dayDiff(start, today);
      const toDue = dayDiff(today, due);
      let cur;
      if (gestDays >= 0){
        const w = Math.floor(gestDays / 7), dd = gestDays % 7;
        const tri = w < 13 ? '1분기' : w < 28 ? '2분기' : '3분기';
        cur = `현재 임신 <b>${w}주 ${dd}일</b> (${tri})<br>`;
      } else {
        cur = `<b>아직 임신 전 기준일입니다</b><br>`;
      }
      const dueLine = toDue > 0 ? `예정일까지 <b>D-${num(toDue)}</b>` : toDue === 0 ? `<b>예정일 당일 🎉</b>` : `예정일 <b>${num(-toDue)}일</b> 지남`;
      box.innerHTML =
        `<div class="result-main">${fmt(due)}</div>` +
        `<div class="result-sub">${cur}${dueLine}<br>(40주 · 280일 기준)</div>`;
    }
    ['input','change'].forEach(ev => { $('birthDate').addEventListener(ev, calcBirth); });

    function escapeHtml(s){ return s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

    /* 초기값 */
    (function init(){
      const t = todayStr();
      $('ddayDate').value = t;
      $('gapFrom').value = t;
      $('gapTo').value = t;
      $('addBase').value = t;
      $('ageBirth').value = '2000-01-01';
      $('lunarDate').value = t;
      $('armyDate').value = t;
      $('birthDate').value = t;
      calcDday(); calcGap(); calcAdd();
      calcAge(); calcLunar(); calcArmy(); calcBirth();
    })();

    /* MYWAY.KR 복사 방지 정책 (input/textarea/select 예외) */
    (function(){
      const editable = t => t && ['INPUT','TEXTAREA','SELECT'].includes(t.tagName);
      ['contextmenu','selectstart','dragstart','copy','cut'].forEach(evt => {
        document.addEventListener(evt, e => { if (editable(e.target)) return; e.preventDefault(); });
      });
      document.addEventListener('keydown', e => {
        if (e.key === 'F12'){ e.preventDefault(); return; }
        const k = (e.key || '').toLowerCase();
        if (e.ctrlKey && e.shiftKey && ['i','j','c'].includes(k)){ e.preventDefault(); return; }
        if (e.ctrlKey && !e.shiftKey && ['u','s','c','x','a'].includes(k)){ if (editable(e.target)) return; e.preventDefault(); }
      });
    })();
  </script>
</body>
</html>
