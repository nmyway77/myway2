<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>인물 채널 모음 - 유튜버, 가수, 연예인, 배우 | MYWAY.KR</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="유튜버, 가수, 연예인, 배우 카테고리별 채널 모음 - MYWAY.KR">

  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <link rel="manifest" href="/site.webmanifest">

  <style>
    *, *::before, *::after { box-sizing: border-box; }

    :root {
      --nav-grad: linear-gradient(95deg, #7ed6fb 10%, #b176f3 90%);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    html, body {
      margin: 0; padding: 0;
      background: #fff;
      font-family: 'Segoe UI', '맑은 고딕', Arial, sans-serif;
      -webkit-text-size-adjust: 100%;
    }
    body {
      min-height: 100vh;
      min-height: 100dvh;
      overflow-x: hidden;
      -webkit-user-select: none;
      -moz-user-select: none;
      -ms-user-select: none;
      user-select: none;
    }
    img { -webkit-user-drag: none; user-drag: none; -webkit-touch-callout: none; }
    input, textarea, [contenteditable] {
      -webkit-user-select: text; -moz-user-select: text; -ms-user-select: text; user-select: text;
    }

    /* ===== 상단 sticky 헤더 ===== */
    .topbar {
      position: sticky;
      top: 0;
      z-index: 20;
      background: rgba(255,255,255,.96);
      backdrop-filter: saturate(180%) blur(8px);
      -webkit-backdrop-filter: saturate(180%) blur(8px);
      border-bottom: 1px solid #eef0f4;
      padding: 12px 14px 10px;
      padding-left: max(14px, env(safe-area-inset-left));
      padding-right: max(14px, env(safe-area-inset-right));
    }
    .topbar-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }
    /* 좌측 홈 아이콘 */
    .home-link {
      flex: 0 0 auto;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 34px; height: 34px;
      border-radius: 50%;
      text-decoration: none;
      color: #fff;
      background: var(--nav-grad);
      box-shadow: 0 6px 18px rgba(177,118,243,0.28);
      transition: transform .15s, box-shadow .15s;
      -webkit-tap-highlight-color: transparent;
    }
    .home-link:hover { transform: translateY(-1px); box-shadow: 0 8px 22px rgba(177,118,243,0.36); }
    .home-link svg { width: 18px; height: 18px; fill: currentColor; }

    .page-title {
      font-size: 1.0rem; font-weight: 700;
      color: #1f2740;
      margin: 0;
      letter-spacing: -0.3px;
      flex: 1 1 auto;
    }
    .page-title .sub {
      font-size: .78rem; font-weight: 500;
      color: #8590ad;
      margin-left: 6px;
    }

    /* 카테고리 네비 */
    .cat-nav {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      scrollbar-width: none;
      -ms-overflow-style: none;
    }
    .cat-nav::-webkit-scrollbar { display: none; }
    .cat-btn {
      font: inherit;
      font-size: .88rem;
      font-weight: 600;
      padding: 7px 14px;
      border-radius: 999px;
      border: 1.5px solid #dfe3ec;
      background: #fff;
      color: #4a5170;
      cursor: pointer;
      transition: all .15s;
      white-space: nowrap;
      flex: 0 0 auto;
      -webkit-tap-highlight-color: transparent;
    }
    .cat-btn:hover { background: #f4f6fb; border-color: #c7cee0; }
    .cat-btn:active { transform: scale(0.96); }
    .cat-btn.is-active { background: #1f2740; color: #fff; border-color: #1f2740; }
    .cat-btn .count {
      display: inline-block;
      margin-left: 4px;
      font-size: .72rem;
      opacity: .65;
      font-weight: 500;
    }
    .cat-btn.is-active .count { opacity: .85; }

    /* ===== 갤러리 섹션 ===== */
    .gallery-section {
      width: 100%;
      max-width: 1100px;
      padding: 18px 14px 48px;
      margin: 0 auto;
    }
    .gallery-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }
    .gallery-title {
      font-size: 1.0rem; font-weight: 700;
      letter-spacing: -0.3px;
      color: #1f2740;
      margin: 0;
    }
    .gallery-title .sub {
      font-size: .8rem; font-weight: 500;
      color: #8590ad;
      margin-left: 6px;
    }

    /* Masonry: CSS column 기반 */
    .masonry {
      column-count: 4;
      column-gap: 12px;
    }
    .masonry .card {
      display: block;
      break-inside: avoid;
      page-break-inside: avoid;
      -webkit-column-break-inside: avoid;
      margin: 0 0 12px;
      border-radius: 10px;
      overflow: hidden;
      background: #f4f6fb;
      position: relative;
      text-decoration: none;
      color: inherit;
      transform: translateZ(0);
    }
    .masonry .card img {
      display: block;
      width: 100%;
      height: auto;
      transition: filter .25s ease, transform .35s ease;
    }
    .masonry .card:hover img { transform: scale(1.03); }

    /* 이름 캡션 (하단 그라데이션) */
    .masonry .card .cap {
      position: absolute;
      left: 0; right: 0; bottom: 0;
      padding: 22px 10px 9px;
      font-size: .82rem; font-weight: 700;
      color: #fff;
      background: linear-gradient(180deg, transparent 0%, rgba(0,0,0,.68) 78%);
      letter-spacing: -0.2px;
      text-shadow: 0 1px 2px rgba(0,0,0,.45);
      transition: opacity .2s;
      pointer-events: none;
    }
    /* PC 호버 환경: 호버 시에만 표시 (00maincomics 디자인)
       모바일/터치: 항상 표시 (이름 확인이 핵심) */
    @media (hover: hover) and (pointer: fine) {
      .masonry .card .cap { opacity: 0; }
      .masonry .card:hover .cap { opacity: 1; }
    }

    /* 카테고리 필터 — CSS data 속성으로 (JS 재렌더 없음) */
    .masonry[data-filter="singer"]   .card:not([data-cats~="singer"])   { display: none; }
    .masonry[data-filter="actor"]    .card:not([data-cats~="actor"])    { display: none; }
    .masonry[data-filter="celeb"]    .card:not([data-cats~="celeb"])    { display: none; }
    .masonry[data-filter="youtuber"] .card:not([data-cats~="youtuber"]) { display: none; }

    /* 보정 프리셋 (data-preset 토글) */
    /* (제거됨) */

    /* 갤러리 반응형 */
    @media (max-width: 900px) { .masonry { column-count: 3; } }
    @media (max-width: 600px) { .masonry { column-count: 2; column-gap: 10px; } .masonry .card { margin-bottom: 10px; } }
    @media (max-width: 360px) { .masonry { column-count: 1; } }

    /* 태블릿/PC: 카테고리 네비 중앙정렬 (모바일은 좌측 정렬 그대로) */
    @media (min-width: 721px) {
      .cat-nav { justify-content: safe center; }
    }

    /* ===== MYWAY.KR 공통 ===== */.myway-footer {
      width: 100%;
      text-align: center;
      padding: 22px 14px calc(28px + var(--safe-bottom));
      margin-top: 24px;
      border-top: 1px solid #eef0f4;
      font-size: .82rem;
      color: #8590ad;
    }
    .myway-footer a { color: #4a5170; text-decoration: none; font-weight: 700; }
    .myway-footer a:hover { color: #1f2740; }
    .myway-footer .sep { display: inline-block; margin: 0 8px; opacity: .5; }

    @media (max-width: 700px) {
      .home-link { width: 36px; height: 36px; }
      .home-link svg { width: 19px; height: 19px; }
      .page-title { font-size: .95rem; }
      .cat-btn { padding: 7px 13px; font-size: .85rem; }
    }
    .mv-toolbar{display:flex;gap:8px;align-items:center;justify-content:center;flex-wrap:wrap;margin:0 0 16px;}
    .mv-toolbar button{font-family:inherit;font-size:.85rem;font-weight:700;padding:8px 15px;border-radius:10px;border:1px solid #d7dae8;background:#f5f6fb;color:#39406a;cursor:pointer;transition:.15s;}
    .mv-toolbar button:hover{background:#ebedf7;border-color:#b9c0dd;}
    .mv-toolbar button.primary{background:#5b6bff;color:#fff;border-color:#5b6bff;}
    .mv-toolbar button.primary:hover{background:#4757f5;}
    .mvm-bg{position:fixed;inset:0;background:rgba(20,28,55,.5);-webkit-backdrop-filter:blur(3px);backdrop-filter:blur(3px);display:none;align-items:center;justify-content:center;z-index:9999;padding:18px;}
    .mvm-bg.show{display:flex;}
    .mvm{background:#fff;border-radius:18px;width:100%;max-width:440px;padding:22px;box-shadow:0 24px 60px rgba(30,40,80,.35);max-height:90vh;overflow:auto;color:#232356;text-align:left;}
    .mvm h3{margin:0 0 4px;font-size:1.1rem;font-weight:800;}
    .mvm label{display:block;font-size:.76rem;font-weight:700;color:#6a749c;margin:11px 0 5px;}
    .mvm select,.mvm input[type=text]{width:100%;padding:10px 12px;border:1.5px solid #e2e6f3;border-radius:10px;font-size:.92rem;color:#232356;background:#fafbff;outline:none;font-family:inherit;box-sizing:border-box;}
    .mvm select:focus,.mvm input[type=text]:focus{border-color:#7e94ff;background:#fff;}
    .mvm-save{width:100%;margin-top:14px;padding:11px;border:none;border-radius:11px;background:#5b6bff;color:#fff;font-weight:700;font-size:.92rem;cursor:pointer;}
    .mvm-save:hover{background:#4757f5;}
    .mvm-list{margin-top:16px;border-top:1px solid #eef0f7;padding-top:12px;display:flex;flex-direction:column;gap:7px;max-height:240px;overflow:auto;}
    .mvm-row{display:flex;align-items:center;gap:9px;}
    .mvm-row img{width:38px;height:38px;object-fit:cover;border-radius:50%;border:1px solid #eef0f7;flex:0 0 auto;background:#f0f0f5;}
    .mvm-row .u{flex:1;font-size:.8rem;color:#39406a;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .mvm-row button{flex:0 0 auto;border:none;border-radius:7px;width:28px;height:28px;cursor:pointer;font-size:.82rem;line-height:1;}
    .mvm-row .e{background:#eef2ff;color:#4757f5;}
    .mvm-row .d{background:#fdecec;color:#e0483a;}
    .mvm-empty{font-size:.8rem;color:#9aa2c0;text-align:center;padding:8px;}
    .mvm-io{display:flex;gap:9px;margin-top:14px;}
    .mvm-done{width:100%;margin-top:12px;padding:10px;border:none;border-radius:10px;background:#eef0f7;color:#5a648c;font-weight:700;cursor:pointer;}
    .mvm-done:hover{background:#e4e7f2;}
    .mvm-code{max-width:560px;}
    .mvm-hint{font-size:.76rem;color:#8a92b5;line-height:1.55;margin:6px 0 10px;}
    .mvm-codearea{width:100%;height:300px;border:1.5px solid #e2e6f3;border-radius:10px;padding:11px;font-family:'Courier New',monospace;font-size:.74rem;color:#2a2a3a;background:#fafbff;outline:none;resize:vertical;white-space:pre;box-sizing:border-box;}
  </style>
</head>
<body>

  <!-- 상단 sticky 헤더 -->
  <header class="topbar">
    <div class="topbar-row">
      <a href="https://myway.kr/" class="home-link" aria-label="MYWAY.KR 홈" title="MYWAY.KR 홈">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 3.2 2.5 11.4l1.3 1.5L5 11.85V20a1 1 0 0 0 1 1h4v-6h4v6h4a1 1 0 0 0 1-1v-8.15l1.2 1.05 1.3-1.5L12 3.2Z"/></svg>
      </a>
      <h1 class="page-title">A <span class="sub">T</span></h1>
    </div>
    <nav class="cat-nav" id="catNav">
      <button class="cat-btn is-active" data-cat="all">전체 <span class="count" id="cnt-all"></span></button>
      <button class="cat-btn" data-cat="youtuber">A <span class="count" id="cnt-youtuber"></span></button>
      <button class="cat-btn" data-cat="singer">B <span class="count" id="cnt-singer"></span></button>
      <button class="cat-btn" data-cat="celeb">C <span class="count" id="cnt-celeb"></span></button>
      <button class="cat-btn" data-cat="actor">D <span class="count" id="cnt-actor"></span></button>
    </nav>
  </header>

  <!-- 갤러리 섹션 -->
  <section class="gallery-section">
    <div class="gallery-head">
      <h2 class="gallery-title">추천 채널 <span class="sub" id="filterSub">전체</span></h2>
    </div>
    <div class="mv-toolbar">
      <button class="primary" id="mvAddBtn">+ 추가</button>
      <button id="mvCodeBtn">코드</button>
      <button id="mvImportBtn">가져오기</button>
      <button id="mvExportBtn">내보내기</button>
    </div>
    <div class="masonry" id="masonryGallery" data-filter="all"></div>
  </section>

  <!-- 관리 모달 (추가/수정/삭제) -->
  <div class="mvm-bg" id="mvmBg">
    <div class="mvm">
      <h3>인물 항목 관리</h3>
      <label>카테고리</label>
      <select id="mvCat">
        <option value="youtuber">A</option>
        <option value="singer">B</option>
        <option value="celeb">C</option>
        <option value="actor">D</option>
      </select>
      <label>이름</label>
      <input type="text" id="mvName" placeholder="인물/채널 이름" autocomplete="off">
      <label>주소 (URL)</label>
      <input type="text" id="mvUrl" placeholder="https://www.youtube.com/..." autocomplete="off">
      <label>이미지 주소 (선택 · 비우면 유튜브 썸네일 자동)</label>
      <input type="text" id="mvImg" placeholder="https://...jpg" autocomplete="off">
      <button class="mvm-save" id="mvSaveBtn">추가하기</button>
      <div class="mvm-list" id="mvList"></div>
      <button class="mvm-done" id="mvDoneBtn">닫기</button>
    </div>
  </div>

  <!-- 코드 모달 -->
  <div class="mvm-bg" id="mvmCodeBg">
    <div class="mvm mvm-code">
      <h3>파일에 넣을 코드</h3>
      <p class="mvm-hint">아래 코드를 복사해, HTML 파일 안의 <b>let people = [ … ];</b> 부분을 통째로 교체하면 모든 기기에 영구 적용됩니다.</p>
      <textarea class="mvm-codearea" id="mvCodeArea" readonly spellcheck="false"></textarea>
      <div class="mvm-io">
        <button class="mvm-done" id="mvCodeCloseBtn" style="margin-top:0;">닫기</button>
        <button class="mvm-save" id="mvCopyBtn" style="margin-top:0;">복사</button>
      </div>
    </div>
  </div>
  <input type="file" id="mvImportFile" accept=".json,.html,.htm,application/json,text/html" style="display:none">

  <!-- MYWAY.KR 공통: 푸터 -->
  <footer class="myway-footer">
    <a href="https://myway.kr/">myway.kr</a>
    <span class="sep">·</span>
    <span>© MYWAY.KR</span>
  </footer>

  <!-- MYWAY.KR 공통: 우측 하단 홈 버튼 -->

  <script>
    /* ============ 복제방지 ============ */
    (function(){
      function isEditable(t) {
        if (!t) return false;
        const tag = (t.tagName || '').toLowerCase();
        if (tag === 'input' || tag === 'textarea') return true;
        if (t.isContentEditable) return true;
        return false;
      }
      ['contextmenu','dragstart','selectstart','copy','cut'].forEach(ev => {
        document.addEventListener(ev, e => {
          if (isEditable(e.target)) return;
          e.preventDefault();
        }, { capture: true });
      });
      document.addEventListener('keydown', e => {
        if (isEditable(e.target)) return;
        const k = (e.key || '').toLowerCase();
        if (k === 'f12') { e.preventDefault(); return; }
        if (e.ctrlKey && e.shiftKey && (k === 'i' || k === 'j' || k === 'c')) { e.preventDefault(); return; }
        if (e.ctrlKey && !e.shiftKey && (k === 'u' || k === 's' || k === 'c' || k === 'x' || k === 'a')) { e.preventDefault(); return; }
      }, { capture: true });
    })();

    /* ============ 인물 데이터 ============ */
    let people = [
      /* === mainpage43.html에서 추가된 가수들 (기존 데이터 위에 삽입) === */
   
     
      
      /* === 기존 데이터 === */
       ];

    /* ============ 갤러리 렌더 (1회) ============ */
    function renderGallery() {
      const root = document.getElementById('masonryGallery');
      const frag = document.createDocumentFragment();
      people.forEach(p => {
        const a = document.createElement('a');
        a.className = 'card';
        a.href = p.url;
        a.target = '_blank';
        a.rel = 'noopener';
        a.dataset.cats = p.cats.join(' ');
        a.setAttribute('aria-label', p.name);

        const img = document.createElement('img');
        img.src = p.img;
        img.alt = p.name;
        img.loading = 'lazy';
        img.decoding = 'async';
        img.referrerPolicy = 'no-referrer';
        a.appendChild(img);

        const cap = document.createElement('div');
        cap.className = 'cap';
        cap.textContent = p.name;
        a.appendChild(cap);

        frag.appendChild(a);
      });
      root.replaceChildren(frag);
    }

    /* ============ 카테고리 카운트 ============ */
    function updateCounts() {
      const counts = { all: people.length, singer: 0, actor: 0, celeb: 0, youtuber: 0 };
      people.forEach(p => p.cats.forEach(c => { if (counts[c] !== undefined) counts[c]++; }));
      Object.keys(counts).forEach(k => {
        const el = document.getElementById('cnt-' + k);
        if (el) el.textContent = counts[k];
      });
    }

    /* ============ 카테고리 네비 ============ */
    function setupCatNav() {
      const nav = document.getElementById('catNav');
      const grid = document.getElementById('masonryGallery');
      const sub = document.getElementById('filterSub');
      const labels = { all: '전체', youtuber: '유튜버', singer: '가수', celeb: '연예인', actor: '배우' };
      nav.addEventListener('click', e => {
        const btn = e.target.closest('.cat-btn');
        if (!btn) return;
        nav.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('is-active'));
        btn.classList.add('is-active');
        grid.dataset.filter = btn.dataset.cat;
        sub.textContent = labels[btn.dataset.cat] || '전체';
      });
    }

    /* ============ 보정 프리셋 (제거됨) ============ */

    renderGallery();
    updateCounts();
    setupCatNav();

    /* ===== 데이터 관리 (추가/수정/삭제 · 내보내기/가져오기 · 코드) ===== */
    const MV_KEY = 'mywayPeopleV1';
    const CATS = ['youtuber', 'singer', 'celeb', 'actor'];
    function normPerson(x) {
      if (!x || !(x.url || x.name)) return null;
      const cats = Array.isArray(x.cats) ? x.cats.filter(c => CATS.includes(c)) : [];
      return { name: String(x.name || ''), cats: cats, url: String(x.url || ''), img: x.img || '' };
    }
    function normPeople(arr) { return Array.isArray(arr) ? arr.map(normPerson).filter(Boolean) : []; }
    function saveP() { try { localStorage.setItem(MV_KEY, JSON.stringify(people)); } catch (_) {} }
    (function () {
      try { const o = JSON.parse(localStorage.getItem(MV_KEY)); if (Array.isArray(o) && o.length) { people = normPeople(o); } } catch (_) {}
    })();
    function refresh() { renderGallery(); updateCounts(); }
    refresh();

    function ytId(u) { const m = (u || '').match(/(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/|youtube\.com\/shorts\/|youtube\.com\/live\/)([a-zA-Z0-9_-]{11})/); return m ? m[1] : null; }
    function autoImg(u) { const id = ytId(u); return id ? ('https://img.youtube.com/vi/' + id + '/sddefault.jpg') : ''; }

    const mvmBg = document.getElementById('mvmBg');
    const mvCat = document.getElementById('mvCat');
    const mvName = document.getElementById('mvName');
    const mvUrl = document.getElementById('mvUrl');
    const mvImg = document.getElementById('mvImg');
    const mvSaveBtn = document.getElementById('mvSaveBtn');
    let mvEditIdx = null;
    function clearMv() { mvName.value = ''; mvUrl.value = ''; mvImg.value = ''; mvEditIdx = null; mvSaveBtn.textContent = '추가하기'; }
    function openManage() { clearMv(); renderItems(); mvmBg.classList.add('show'); }
    function closeManage() { mvmBg.classList.remove('show'); clearMv(); }
    function renderItems() {
      const cat = mvCat.value;
      const list = document.getElementById('mvList');
      list.innerHTML = '';
      const items = [];
      people.forEach((p, idx) => { if ((p.cats || []).includes(cat)) items.push({ p: p, idx: idx }); });
      if (!items.length) { const e = document.createElement('div'); e.className = 'mvm-empty'; e.textContent = '이 카테고리에 항목이 없어요.'; list.appendChild(e); return; }
      items.forEach(({ p, idx }) => {
        const row = document.createElement('div'); row.className = 'mvm-row';
        const im = document.createElement('img'); im.src = p.img || autoImg(p.url); im.alt = ''; im.referrerPolicy = 'no-referrer';
        const u = document.createElement('span'); u.className = 'u'; u.textContent = p.name || p.url;
        const e = document.createElement('button'); e.className = 'e'; e.textContent = '\u270E'; e.title = '수정';
        e.onclick = () => { mvName.value = p.name || ''; mvUrl.value = p.url || ''; mvImg.value = p.img || ''; mvEditIdx = idx; mvSaveBtn.textContent = '수정 저장'; mvName.focus(); };
        const d = document.createElement('button'); d.className = 'd'; d.textContent = '\u2715'; d.title = '삭제';
        d.onclick = () => { people.splice(idx, 1); saveP(); renderItems(); refresh(); clearMv(); };
        row.appendChild(im); row.appendChild(u); row.appendChild(e); row.appendChild(d);
        list.appendChild(row);
      });
    }
    mvCat.addEventListener('change', () => { clearMv(); renderItems(); });
    mvSaveBtn.addEventListener('click', () => {
      let url = mvUrl.value.trim();
      const name = mvName.value.trim();
      if (!url && !name) { alert('이름이나 주소를 입력하세요.'); mvName.focus(); return; }
      if (url && !/^https?:\/\//i.test(url)) url = 'https://' + url;
      let img = mvImg.value.trim(); if (!img) img = autoImg(url);
      if (mvEditIdx != null && people[mvEditIdx]) {
        people[mvEditIdx] = { name: name, cats: [mvCat.value], url: url, img: img };
      } else {
        people.push({ name: name, cats: [mvCat.value], url: url, img: img });
      }
      saveP(); clearMv(); renderItems(); refresh(); mvName.focus();
    });
    document.getElementById('mvAddBtn').addEventListener('click', openManage);
    document.getElementById('mvDoneBtn').addEventListener('click', closeManage);
    mvmBg.addEventListener('click', e => { if (e.target === mvmBg) closeManage(); });

    /* 코드 출력 */
    const mvmCodeBg = document.getElementById('mvmCodeBg');
    function buildCode() {
      let out = '    let people = [\n';
      out += people.map(p => '      { name: ' + JSON.stringify(p.name || '') + ', cats: ' + JSON.stringify(p.cats || []) + ', url: ' + JSON.stringify(p.url || '') + ', img: ' + JSON.stringify(p.img || '') + ' }').join(',\n');
      out += '\n    ];\n';
      return out;
    }
    document.getElementById('mvCodeBtn').addEventListener('click', () => { document.getElementById('mvCodeArea').value = buildCode(); mvmCodeBg.classList.add('show'); });
    document.getElementById('mvCodeCloseBtn').addEventListener('click', () => mvmCodeBg.classList.remove('show'));
    mvmCodeBg.addEventListener('click', e => { if (e.target === mvmCodeBg) mvmCodeBg.classList.remove('show'); });
    document.getElementById('mvCopyBtn').addEventListener('click', async () => {
      const ta = document.getElementById('mvCodeArea'); const btn = document.getElementById('mvCopyBtn');
      try { await navigator.clipboard.writeText(ta.value); btn.textContent = '복사됨!'; setTimeout(() => btn.textContent = '복사', 1200); }
      catch (_) { ta.select(); try { document.execCommand('copy'); btn.textContent = '복사됨!'; setTimeout(() => btn.textContent = '복사', 1200); } catch (e2) {} }
    });

    /* 기존 HTML 파일에서 people 추출 (cats 중첩 배열까지 정확히) */
    function parseHtmlPeople(text) {
      const sm = /(?:const|let|var)\s+people\s*=\s*\[\s*[/{]/.exec(text);
      if (!sm) return null;
      const open = text.indexOf('[', sm.index);
      let depth = 0, end = -1;
      for (let i = open; i < text.length; i++) {
        const ch = text[i];
        if (ch === '[') depth++;
        else if (ch === ']') { depth--; if (depth === 0) { end = i; break; } }
      }
      if (end < 0) return null;
      const body = text.slice(open + 1, end);
      const arr = [];
      const objRe = /\{([^{}]*)\}/g;
      let mo;
      while ((mo = objRe.exec(body)) !== null) {
        const seg = mo[1];
        const name = (seg.match(/name:\s*(['"])([\s\S]*?)\1/) || [])[2] || '';
        const url = (seg.match(/url:\s*(['"])([\s\S]*?)\1/) || [])[2] || '';
        const img = (seg.match(/img:\s*(['"])([\s\S]*?)\1/) || [])[2] || '';
        let cats = [];
        const cm = seg.match(/cats:\s*\[([^\]]*)\]/);
        if (cm) { const list = cm[1].match(/(['"])(.*?)\1/g) || []; cats = list.map(s => s.replace(/['"]/g, '')); }
        if (url || name) arr.push({ name: name, cats: cats, url: url, img: img });
      }
      return arr.length ? arr : null;
    }

    /* 내보내기 / 가져오기 */
    document.getElementById('mvExportBtn').addEventListener('click', () => {
      const blob = new Blob([JSON.stringify(people, null, 2)], { type: 'application/json' });
      const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'myway-people.json';
      document.body.appendChild(a); a.click(); setTimeout(() => { URL.revokeObjectURL(a.href); a.remove(); }, 100);
    });
    const mvFile = document.getElementById('mvImportFile');
    document.getElementById('mvImportBtn').addEventListener('click', () => mvFile.click());
    mvFile.addEventListener('change', e => {
      const f = e.target.files && e.target.files[0]; if (!f) return;
      const rd = new FileReader();
      rd.onload = () => {
        const text = rd.result || '';
        let arr = null;
        try { const o = JSON.parse(text); if (Array.isArray(o)) arr = o; else if (o && Array.isArray(o.people)) arr = o.people; } catch (_) {}
        if (!arr) arr = parseHtmlPeople(text);
        if (!arr) { alert('JSON 파일이나, people 데이터가 들어있는 HTML 파일을 선택해 주세요.'); mvFile.value = ''; return; }
        people = normPeople(arr); saveP(); renderItems(); refresh();
        alert('가져오기 완료: 총 ' + people.length + '명');
        mvFile.value = '';
      };
      rd.readAsText(f);
    });
  </script>
</body>
