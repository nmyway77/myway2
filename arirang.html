<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>아이프레임 유튜브 영상+제목</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    html, body { margin:0; padding:0; height:100%; background:#21253a; }
    .yt-container {
      min-height:100vh; width:100vw;
      display:flex; align-items:center; justify-content:center;
      background:linear-gradient(135deg, #232845 0%, #222b48 100%);
      padding-bottom:190px;
      box-sizing:border-box;
    }
    .yt-inner {
      width:92vw; max-width:880px;
      display:flex; flex-direction:column; align-items:center;
      gap:18px;
    }
    .yt-title {
      color:#fff; font-size:1.35rem; font-weight:600;
      letter-spacing:0.02em; margin-bottom:3px; margin-top:6px;
      text-shadow:0 2px 12px #0019;
      text-align:center;
      line-height:1.3;
      word-break:keep-all;
      background:rgba(36,42,82,0.7); border-radius:12px; padding:10px 22px 7px 22px;
      box-shadow:0 2px 16px #2229;
      max-width:800px;
    }
    .yt-frame-box {
      width:100%; aspect-ratio:16/9;
      background:#000; border-radius:18px; box-shadow:0 4px 40px #2232ab55;
      overflow:hidden; display:flex; align-items:center; justify-content:center;
    }
    iframe { width:100%; height:100%; border:0; border-radius:18px; background:#000; display:block; }
    .yt-err { color:#fff; padding:24px; text-align:center; font-size:1rem; line-height:1.5; }
  </style>
</head>
<body>
  <div class="yt-container">
    <div class="yt-inner">
      <!-- ===== 제목(여기만 바꿔서 사용하세요!) ===== -->
      <div class="yt-title">ABC NEWS - LIVE</div>
      <div class="yt-frame-box" id="ytBox"></div>
    </div>
  </div>

  <script>
    /* ====================================================================
       ▼▼▼ 여기에 유튜브 "주소"를 통째로 붙여넣으세요 ▼▼▼
       (watch / youtu.be / live / embed / shorts / 영상ID — 어떤 형식이든 OK)
    ==================================================================== */
    const VIDEO = "https://www.youtube.com/watch?v=CJVBX7KI5nU";
    /* ▲▲▲ 위 한 줄만 바꾸면 됩니다 ▲▲▲ */

    function extractId(input) {
      input = (input || "").trim();
      if (/^[A-Za-z0-9_-]{11}$/.test(input)) return input;           // 순수 ID
      try {
        const url = new URL(input);
        if (url.hostname.includes("youtu.be")) {                     // youtu.be/ID
          return url.pathname.split("/").filter(Boolean)[0] || "";
        }
        const v = url.searchParams.get("v");                         // watch?v=ID
        if (v) return v;
        const parts = url.pathname.split("/").filter(Boolean);       // live / embed / shorts
        const idx = parts.findIndex(p => ["live","embed","shorts","v"].includes(p));
        if (idx !== -1 && parts[idx + 1]) return parts[idx + 1];
        if (parts.length) return parts[parts.length - 1];
      } catch (e) {
        const m = input.match(/[A-Za-z0-9_-]{11}/);
        if (m) return m[0];
      }
      return "";
    }

    (function () {
      const id = extractId(VIDEO);
      const box = document.getElementById("ytBox");
      if (!id) {
        box.innerHTML = '<div class="yt-err">유튜브 주소를 인식하지 못했어요.<br>위 VIDEO 값에 올바른 주소를 넣어주세요.</div>';
        return;
      }
      const iframe = document.createElement("iframe");
      // 모바일 자동재생 핵심: mute=1 (음소거) + playsinline=1 (인라인 재생)
      iframe.src = "https://www.youtube.com/embed/" + id +
                   "?rel=0&autoplay=1&mute=1&playsinline=1";
      iframe.setAttribute("allow", "autoplay; encrypted-media; picture-in-picture; fullscreen");
      iframe.setAttribute("allowfullscreen", "");
      iframe.setAttribute("playsinline", "");
      iframe.setAttribute("title", document.querySelector(".yt-title")?.textContent || "video");
      box.appendChild(iframe);
    })();
  </script>
</body>
</html>
