  <style>
    *, *::before, *::after { box-sizing: border-box; }

    :root {
      --bg-base: #ffffff;
      --bg-glow: #eef2fb;
      --card-bg: #ffffff;
      --card-bg-hover: #fafbfd;
      --card-border: rgba(0,0,0,0.06);
      --card-border-hover: rgba(0,0,0,0.12);
      --text-main: #1a1f36;
      --text-sub: #4a5170;
      --text-muted: #8590ad;
      --accent: #2e7d4f;          /* 짙은 녹색 - 라이트 배경에 가시성 */
      --accent-glow: rgba(46,125,79,0.12);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    html, body {
      margin: 0; padding: 0;
      font-family: 'Segoe UI', '맑은 고딕', Arial, sans-serif;
      -webkit-text-size-adjust: 100%;
      background: var(--bg-base);
    }
    body {
      min-height: 100vh;
      min-height: 100dvh;
      overflow-x: hidden;
      background:
        radial-gradient(ellipse at top left, var(--bg-glow) 0%, transparent 50%),
        radial-gradient(ellipse at top right, rgba(46,125,79,0.05) 0%, transparent 40%),
        var(--bg-base);
      color: var(--text-main);
      -webkit-user-select: none;
      -moz-user-select: none;
      -ms-user-select: none;
      user-select: none;
    }
    img { -webkit-user-drag: none; user-drag: none; -webkit-touch-callout: none; }
    input, textarea, [contenteditable] {
      -webkit-user-select: text; -moz-user-select: text; -ms-user-select: text; user-select: text;
    }

    /* ===== 상단 헤더 ===== */
    .topbar {
      position: sticky;
      top: 0;
      z-index: 20;
      background: rgba(255, 255, 255, 0.92);
      backdrop-filter: saturate(180%) blur(12px);
      -webkit-backdrop-filter: saturate(180%) blur(12px);
      border-bottom: 1px solid rgba(0,0,0,0.06);
      padding: 12px 14px;
      padding-left: max(14px, env(safe-area-inset-left));
      padding-right: max(14px, env(safe-area-inset-right));
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .home-link {
      flex: 0 0 auto;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 36px; height: 36px;
      border-radius: 50%;
      text-decoration: none;
      color: #fff;
      background: linear-gradient(135deg, #5b6ef0, #883cea);
      box-shadow: 0 6px 18px rgba(91, 110, 240, 0.4);
      transition: transform .15s, box-shadow .15s;
      -webkit-tap-highlight-color: transparent;
    }
    .home-link:hover { transform: translateY(-1px); box-shadow: 0 10px 24px rgba(91, 110, 240, 0.55); }
    .home-link svg { width: 19px; height: 19px; fill: currentColor; }

    /* 탭 네비 (다크 톤) */
    .tab-nav {
      flex: 1 1 auto;
      min-width: 0;
      display: flex;
      gap: 8px;
      overflow-x: auto;
      scrollbar-width: none;
      -ms-overflow-style: none;
      padding: 2px 0;
    }
    .tab-nav::-webkit-scrollbar { display: none; }
    .tab-btn {
      font: inherit;
      font-size: .9rem;
      font-weight: 700;
      letter-spacing: -0.2px;
      padding: 7px 14px;
      border-radius: 999px;
      border: 1.5px solid rgba(0,0,0,0.08);
      background: rgba(0,0,0,0.03);
      color: var(--text-sub);
      cursor: pointer;
      transition: all .18s;
      white-space: nowrap;
      flex: 0 0 auto;
      -webkit-tap-highlight-color: transparent;
    }
    .tab-btn:hover {
      background: rgba(0,0,0,0.06);
      color: var(--text-main);
      border-color: rgba(0,0,0,0.16);
    }
    .tab-btn:active { transform: scale(0.96); }
    .tab-btn.is-active {
      background: #1f2740;
      color: #fff;
      border-color: #1f2740;
      box-shadow: 0 4px 16px rgba(31, 39, 64, 0.25);
    }
    .tab-btn .count {
      display: inline-block;
      margin-left: 4px;
      font-size: .72rem;
      opacity: .7;
      font-weight: 500;
    }

    /* ===== 본체 ===== */
    .main {
      max-width: 1200px;
      margin: 0 auto;
      padding: 28px 16px 60px;
      padding-bottom: calc(60px + var(--safe-bottom));
    }

    .section { margin-bottom: 32px; }
    .section:last-child { margin-bottom: 0; }

    .section-head {
      display: flex;
      align-items: baseline;
      gap: 10px;
      padding: 0 4px;
      margin-bottom: 12px;
    }
    .section-label {
      font-size: .85rem;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: 0.5px;
      text-transform: uppercase;
      text-shadow: 0 0 16px var(--accent-glow);
    }
    .section-sub {
      font-size: .75rem;
      color: var(--text-muted);
      font-weight: 500;
      letter-spacing: -0.1px;
    }

    /* 카드 그리드 */
    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      column-gap: 12px;
      row-gap: 28px;
    }

    .card {
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 18px 18px;
      text-decoration: none;
      color: inherit;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 10px;
      position: relative;
      overflow: visible;
      transition: transform .2s, box-shadow .2s, border-color .2s, background .2s;
      -webkit-tap-highlight-color: transparent;
      min-height: 78px;
      box-shadow: 0 2px 4px rgba(90, 90, 130, 0.06);
    }
    /* 라이트 카드에서는 좌상단 글로우 비활성 */
    .card::before { content: none; }
    /* 카드 아래 곡선 그림자 PNG (페이퍼 컬 효과) */
    .card::after {
      content: "";
      position: absolute;
      left: 3%;
      right: 3%;
      top: 100%;
      height: 22px;
      background: url('https://64.media.tumblr.com/f5f06009df6584ebb5539cad61f73c63/tumblr_inline_qsghz3XZRQ1r45nlo_500.png') center top / 100% 100% no-repeat;
      pointer-events: none;
      z-index: 1;
    }
    .card:hover {
      background: var(--card-bg-hover);
      border-color: var(--card-border-hover);
      transform: translateY(-3px);
      box-shadow: 0 4px 10px rgba(90, 90, 130, 0.12);
    }
    .card:active { transform: translateY(-1px); }

    .card .ticker {
      font-size: 1.25rem;
      font-weight: 800;
      color: var(--text-main);
      letter-spacing: -0.4px;
      line-height: 1.15;
      margin-bottom: 4px;
      word-break: keep-all;
      overflow-wrap: anywhere;
    }
    /* 글자 수가 많은 카드(사이트명 등)는 자동으로 살짝 작게 */
    .card .ticker:has(+ .name-ko) { /* 보조 라벨 있는 모든 카드 */ }
    .card[data-long="1"] .ticker { font-size: 1.05rem; }
    .card .name-ko {
      font-size: .82rem;
      font-weight: 500;
      color: var(--text-sub);
      letter-spacing: -0.2px;
      line-height: 1.2;
    }
    /* 우상단 외부 링크 마커 */
    .card .arrow {
      position: absolute;
      top: 12px; right: 14px;
      font-size: .85rem;
      color: var(--text-muted);
      opacity: 0;
      transition: opacity .15s, transform .15s;
    }
    .card:hover .arrow {
      opacity: 1;
      transform: translate(2px, -2px);
      color: var(--accent);
    }

    /* 반응형 */
    @media (max-width: 720px) {
      .grid { grid-template-columns: repeat(2, 1fr); column-gap: 10px; row-gap: 24px; }
      .card { padding: 16px 16px; min-height: 72px; }
      .card .ticker { font-size: 1.1rem; }
      .card .name-ko { font-size: .78rem; }
      .main { padding: 22px 14px 60px; }

    @media (max-width: 380px) {
      .grid { grid-template-columns: repeat(2, 1fr); column-gap: 9px; row-gap: 22px; }
      .card { padding: 14px 14px; }
      .card .ticker { font-size: 1.05rem; }

    }

    (function(){

        if (!t) return false;
        const tag = (t.tagName || '').toLowerCase();
        if (tag === 'input' || tag === 'textarea') return true;
        if (t.isContentEditable) return true;
        return false;
      }
      ['contextmenu','dragstart','selectstart','copy','cut'].forEach(ev => {
        document.addEventListener(ev, e => {
          if (isEditable(e.target)) return;
          e.preventDefault();
        }, { capture: true });
      });
      document.addEventListener('keydown', e => {
        if (isEditable(e.target)) return;
        const k = (e.key || '').toLowerCase();
        if (k === 'f12') { e.preventDefault(); return; }
        if (e.ctrlKey && e.shiftKey && (k === 'i' || k === 'j' || k === 'c')) { e.preventDefault(); return; }
        if (e.ctrlKey && !e.shiftKey && (k === 'u' || k === 's' || k === 'c' || k === 'x' || k === 'a')) { e.preventDefault(); return; }
      }, { capture: true });

    /* ============ 렌더 ============ */
    function renderTab(tabId) {
      const root = document.getElementById('main');
      const frag = document.createDocumentFragment();
      const tab = tabs[tabId];
      if (!tab) return;

      tab.sections.forEach(sec => {
        const section = document.createElement('section');
        section.className = 'section';

        const head = document.createElement('div');
        head.className = 'section-head';
        const label = document.createElement('span');
        label.className = 'section-label';
        label.textContent = sec.label;
        const sub = document.createElement('span');
        sub.className = 'section-sub';
        sub.textContent = sec.sub;
        head.appendChild(label);
        head.appendChild(sub);
        section.appendChild(head);

        const grid = document.createElement('div');
        grid.className = 'grid';
        sec.items.forEach(it => {
          const a = document.createElement('a');
          a.className = 'card';
          a.href = it.url;
          a.target = '_blank';
          a.rel = 'noopener';
          a.setAttribute('aria-label', it.ko);

          const tk = document.createElement('div');
          tk.className = 'ticker';
          tk.textContent = it.ticker;
          a.appendChild(tk);
          /* 사이트명 등 긴 라벨은 자동 축소 (6자 이상) */
          if (String(it.ticker).length > 6) a.dataset.long = '1';

          const ko = document.createElement('div');
          ko.className = 'name-ko';
          ko.textContent = it.ko;
          a.appendChild(ko);

          const arr = document.createElement('span');
          arr.className = 'arrow';
          arr.textContent = '↗';
          a.appendChild(arr);

          grid.appendChild(a);
        });
        section.appendChild(grid);
        frag.appendChild(section);
      });

      root.replaceChildren(frag);
    }

    /* ============ 탭 네비 ============ */
    function setupTabs() {
      const nav = document.getElementById('tabNav');
      nav.addEventListener('click', e => {
        const btn = e.target.closest('.tab-btn');
        if (!btn) return;
        nav.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('is-active'));
        btn.classList.add('is-active');
        renderTab(btn.dataset.tab);
        window.scrollTo({ top: 0, behavior: 'smooth' });
      });
    }

    renderTab('chart');
    setupTabs();
  </script>
