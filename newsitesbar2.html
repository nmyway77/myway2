  .nav-home{flex:none;order:0;display:inline-flex;align-items:center;justify-content:center;color:var(--ink-sub);padding:8px;border-radius:10px;transition:color .15s,background .15s}

  .nav-home svg{width:20px;height:20px;display:block}
  .nav-track{flex:none;order:3;display:flex;align-items:center;gap:8px;margin:0 auto}
  .topnav button{flex:none;display:inline-flex;align-items:center;gap:6px;border:1px solid var(--line);background:#fff;border-radius:999px;padding:9px 16px;font-family:var(--body);font-size:14px;font-weight:700;color:var(--ink-sub);cursor:pointer;transition:all .16s}
  .topnav button:hover{border-color:#cfd3da;color:var(--ink)}
  .topnav button.active{background:var(--accent);border-color:var(--accent);color:#fff}
  .topnav .grid-btn{order:1;border-color:#b9e0d4;color:var(--accent)}
  .open-btn{flex:none;order:2;color:var(--ink-sub);font-weight:700}

  .viewer{flex:1;position:relative;overflow:hidden;background:#0d0f12}
  .viewer iframe{position:absolute;top:0;left:0;width:100%;height:100%;border:0}

  /* 전체목록(디렉터리) 패널 */
  .grid-panel{position:absolute;inset:0;overflow-y:auto;display:none;padding:30px 16px 60px;background:#fff;scrollbar-width:none}
  .grid-panel::-webkit-scrollbar{display:none}
  .grid-panel.show{display:block}
  .grid-title{text-align:center;font-size:20px;font-weight:800;letter-spacing:-0.02em;color:#244;margin:0 0 6px}
  .grid-sub{text-align:center;font-size:13px;color:var(--ink-sub);margin:0 0 26px}
  .dir-section{max-width:1040px;margin:0 auto 24px}
  .dir-label{font-size:12.5px;font-weight:800;color:var(--accent);letter-spacing:.5px;text-transform:uppercase;margin:0 0 10px;padding:0 4px}
  .dir-grid{display:grid;grid-template-columns:repeat(4,1fr);column-gap:10px;row-gap:26px}
  .dir-card{display:flex;flex-direction:column;justify-content:center;gap:3px;padding:14px 15px;border:1px solid var(--line);border-radius:10px;background:#fff;cursor:pointer;text-align:left;text-decoration:none;color:inherit;font-family:var(--body);transition:all .15s;box-shadow:0 2px 4px rgba(90,90,130,.06);position:relative;overflow:visible}
  .dir-card::after{content:"";position:absolute;left:2.5%;right:2.5%;top:100%;height:18px;background:url('https://64.media.tumblr.com/f5f06009df6584ebb5539cad61f73c63/tumblr_inline_qsghz3XZRQ1r45nlo_500.png') center top / 100% 100% no-repeat;pointer-events:none;z-index:1}
  .dir-card:hover{border-color:var(--accent);background:#f5fbf8;transform:translateY(-2px);box-shadow:0 4px 10px rgba(11,107,83,.12)}
  .dir-card .t{font-size:15px;font-weight:800;color:var(--ink);letter-spacing:-0.3px;line-height:1.15}
  .dir-card .k{font-size:11px;color:var(--ink-sub);line-height:1.2}
  @media (max-width:720px){ .dir-grid{grid-template-columns:repeat(2,1fr);row-gap:24px} .grid-panel{padding:24px 12px 50px} }

  .nbedit-fab{position:fixed;right:18px;bottom:18px;z-index:9000;width:48px;height:48px;border:0;border-radius:50%;background:linear-gradient(135deg,#7c4bd6,#5b7cfa);color:#fff;font-size:20px;cursor:pointer;box-shadow:0 6px 18px rgba(91,124,250,.4);display:none;align-items:center;justify-content:center;transition:transform .15s}

  .nbedit-fab:hover{transform:scale(1.06)}
  .nbedit-menu{position:fixed;right:18px;bottom:74px;z-index:9000;display:none;flex-direction:column;gap:8px}
  .nbedit-menu.open{display:flex}

  .nbedit-menu button.danger{color:#c0392b}

  .nbedit-bg{position:fixed;inset:0;z-index:9500;background:rgba(20,22,28,.5);display:none;align-items:flex-start;justify-content:center;padding:34px 14px;overflow-y:auto}

  .nbedit-modal{width:100%;max-width:640px;background:#fff;border-radius:16px;box-shadow:0 18px 50px rgba(20,20,40,.3);font-family:var(--body);overflow:hidden;margin:auto 0}
  .nbedit-head{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--line)}
  .nbedit-head h3{margin:0;font-size:16px;font-weight:800;color:var(--ink)}
  .nbedit-x{border:0;background:none;font-size:22px;line-height:1;color:var(--ink-sub);cursor:pointer;padding:2px 6px}
  .nbedit-body{padding:16px 20px;max-height:64vh;overflow-y:auto}
  .nbedit-foot{display:flex;gap:8px;justify-content:flex-end;padding:14px 20px;border-top:1px solid var(--line)}
  .nbedit-foot button{border:0;border-radius:10px;padding:10px 18px;font-family:var(--body);font-size:14px;font-weight:700;cursor:pointer}
  .nbedit-foot .ok{background:var(--accent);color:#fff}
  .nbedit-foot .ghost{background:#eef0f4;color:var(--ink)}

  .nbedit-row{display:flex;gap:8px;align-items:center;padding:8px 0;border-bottom:1px dashed #eee}
  .nbedit-row input{flex:1;min-width:0;border:1px solid var(--line);border-radius:8px;padding:9px 10px;font-family:var(--body);font-size:13px;color:var(--ink);user-select:text;-webkit-user-select:text}

  .nbedit-row .mini{flex:none;border:1px solid var(--line);background:#fff;border-radius:8px;width:30px;height:32px;font-size:14px;cursor:pointer;color:var(--ink-sub);padding:0}
  .nbedit-row .mini:hover{border-color:#cfd3da;color:var(--ink)}
  .nbedit-row .mini.del:hover{color:#c0392b;border-color:#e6b6ae}
  .nbedit-add{margin-top:12px;border:1px dashed var(--accent);background:#f5fbf8;color:var(--accent);border-radius:10px;padding:10px;width:100%;font-family:var(--body);font-size:13px;font-weight:700;cursor:pointer}

  .nbedit-cat{border:1px solid var(--line);border-radius:12px;padding:12px;margin-bottom:14px}

/* ===== 데이터 로드 (DEFAULTS_SIG 재시드) ===== */
function nbClone(o){ return JSON.parse(JSON.stringify(o)); }
function nbNormalize(d){
  d = d || {};
  if(!Array.isArray(d.sites) || !d.sites.length) d.sites = nbClone(DEFAULTS.sites);
  if(!Array.isArray(d.directory) || !d.directory.length) d.directory = nbClone(DEFAULTS.directory);
  if(typeof d.main !== 'string' || !d.main) d.main = DEFAULTS.main;
  return d;
}
function loadData(){
  var stored=null;
  try { stored = JSON.parse(localStorage.getItem(NB_STORE_KEY) || 'null'); } catch(_){}
  var defHasContent = DEFAULTS.sites && DEFAULTS.sites.length;
  if(stored && stored.__sig === NB_DIST_SIG) return nbNormalize(stored);
  if(defHasContent) return nbNormalize(nbClone(DEFAULTS));   /* sig 불일치/최초 → 재시드 */
  return nbNormalize(stored || nbClone(DEFAULTS));
}
function saveData(){
  try {
    localStorage.setItem(NB_STORE_KEY, JSON.stringify({
      __sig: NB_DIST_SIG, main: data.main, sites: data.sites, directory: data.directory
    }));
  } catch(_){}
}

/* 네비 드래그 스크롤 */
(function(){
  var down=false,startX=0,startL=0,moved=false;
  nav.addEventListener('pointerdown',function(e){ if(e.button!==0) return; down=true;moved=false;startX=e.clientX;startL=nav.scrollLeft;nav.classList.add('dragging'); });
  nav.addEventListener('pointermove',function(e){ if(!down) return; var dx=e.clientX-startX; if(Math.abs(dx)>4) moved=true; nav.scrollLeft=startL-dx; });
  var end=function(){ down=false; nav.classList.remove('dragging'); };
  nav.addEventListener('pointerup',end);
  nav.addEventListener('pointercancel',end);
  nav.addEventListener('pointerleave',end);
  nav.addEventListener('click',function(e){ if(moved){ e.stopPropagation(); e.preventDefault(); moved=false; } },true);
  nav.addEventListener('wheel',function(e){ if(Math.abs(e.deltaY)>Math.abs(e.deltaX)){ nav.scrollLeft+=e.deltaY; e.preventDefault(); } },{passive:false});
})();

function editSites(){
  openModal('채널 버튼 편집');
  var wrap=document.createElement('div');
  function row(name,url){
    var r=document.createElement('div'); r.className='nbedit-row';
    var n=document.createElement('input'); n.value=name; n.placeholder='이름'; n.style.maxWidth='130px'; n.dataset.k='name';
    var u=document.createElement('input'); u.value=url; u.placeholder='https://…'; u.dataset.k='url';
    var up=document.createElement('button'); up.className='mini'; up.textContent='▲';
    var dn=document.createElement('button'); dn.className='mini'; dn.textContent='▼';
    var del=document.createElement('button'); del.className='mini del'; del.textContent='✕';
    up.onclick=function(){ var p=r.previousElementSibling; if(p&&p.classList.contains('nbedit-row')) r.parentNode.insertBefore(r,p); };
    dn.onclick=function(){ var nx=r.nextElementSibling; if(nx&&nx.classList.contains('nbedit-row')) r.parentNode.insertBefore(nx,r); };
    del.onclick=function(){ r.remove(); };
    r.appendChild(n); r.appendChild(u); r.appendChild(up); r.appendChild(dn); r.appendChild(del);
    return r;
  }
  SITES.forEach(function(s){ wrap.appendChild(row(s[0],s[1])); });
  var add=document.createElement('button'); add.className='nbedit-add'; add.textContent='＋ 채널 추가';
  add.onclick=function(){ wrap.insertBefore(row('','https://'), add); };
  wrap.appendChild(add);
  nbeditBody.innerHTML=''; nbeditBody.appendChild(wrap);
  footBtns([
    { label:'취소', fn:closeModal },
    { label:'저장', cls:'ok', fn:function(){
        var out=[];
        wrap.querySelectorAll('.nbedit-row').forEach(function(r){
          var n=r.querySelector('[data-k=name]').value.trim();
          var u=r.querySelector('[data-k=url]').value.trim();
          if(n&&u) out.push([n,u]);
        });
        if(!out.length){ alert('최소 1개 채널이 필요해요.'); return; }
        data.sites=out; SITES=data.sites;
        if(data.main!==GRID_MAIN && SITES.findIndex(function(s){return s[0]===data.main;})<0) data.main=SITES[0][0];
        saveData(); renderNav(); gridPanel.dataset.done='';

    cdn.onclick=function(){ var nx=box.nextElementSibling; if(nx&&nx.classList.contains('nbedit-cat')) box.parentNode.insertBefore(nx,box); };

    { label:'취소', fn:closeModal },

            var n=r.querySelector('[data-k=n]').value.trim();

/* --- 코드 / HTML 저장 (master 전용) --- */
function serializeDefaults(d){ return JSON.stringify({main:d.main,sites:d.sites,directory:d.directory},null,2); }
function buildHTML(cfg){
  var clone=document.documentElement.cloneNode(true);
  var nt=clone.querySelector('#navTrack'); if(nt) nt.innerHTML='';
  var gp=clone.querySelector('#gridPanel'); if(gp){ gp.innerHTML=''; gp.removeAttribute('data-done'); gp.classList.remove('show'); }
  var vw=clone.querySelector('#viewer'); if(vw){ vw.removeAttribute('src'); vw.style.display=''; }
  var bg=clone.querySelector('#nbeditBg'); if(bg){ bg.classList.remove('open'); }
  var bd=clone.querySelector('#nbeditBody'); if(bd) bd.innerHTML='';
  var ft=clone.querySelector('#nbeditFoot'); if(ft) ft.innerHTML='';
  var mn=clone.querySelector('#nbeditMenu'); if(mn) mn.classList.remove('open');
  var b=clone.querySelector('body'); if(b) b.className='';
  /* 동적 추가된 nav 버튼(전체목록/새탭) 제거 → 재실행 시 재생성 */
  if(b){
    var topnav=clone.querySelector('#topnav');
    if(topnav){ topnav.querySelectorAll('button[data-grid],.open-btn').forEach(function(x){x.remove();}); }
  }
  var html='<!DOCTYPE html>\n'+clone.outerHTML;
  var defStr=serializeDefaults(data).replace(/<\/script>/gi,'<\\/script>');
  html=html.replace(/\/\* @DEFAULTS_START \*\/[\s\S]*?\/\* @DEFAULTS_END \*\//,
    '/* @DEFAULTS_START */\nvar DEFAULTS = '+defStr+';\n/* @DEFAULTS_END */');
  html=html.replace(/\/\* @CONFIG \*\/[\s\S]*?\/\* @CONFIG_END \*\//,
    '/* @CONFIG */\n'+
    'var NB_IS_DIST     = '+cfg.dist+';\n'+
    'var NB_SHOW_EDIT   = '+cfg.edit+';\n'+
    'var NB_SHOW_CODE   = '+cfg.code+';\n'+
    'var NB_COPY_PROTECT= '+cfg.prot+';\n'+
    'var NB_STORE_KEY   = '+JSON.stringify(cfg.key)+';\n'+
    'var NB_DIST_SIG    = '+JSON.stringify(cfg.sig)+';\n'+
    '/* @CONFIG_END */');
  return html;
}
function dl(name,html){
  var blob=new Blob([html],{type:'text/html'});
  var a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=name; a.click();
  setTimeout(function(){ URL.revokeObjectURL(a.href); },1500);
}

        if(navigator.clipboard){ navigator.clipboard.writeText(ta.value).then(function(){},function(){}); ok=true; }
        ta.setAttribute('readonly','readonly');
        alert(ok?'데이터 코드를 복사했어요.':'복사 실패 — 수동으로 복사해 주세요.');
    }},
    { label:'편집용 저장', cls:'ok', fn:function(){
        dl('newsitesbar-edit.html', buildHTML({dist:true,edit:true,code:false,prot:false,key:'mywayNewsbarEditV1',sig:'sig'+Date.now()}));
    }},
    { label:'보기전용 저장', cls:'ok', fn:function(){
        dl('newsitesbar.html', buildHTML({dist:true,edit:false,code:false,prot:true,key:'mywayNewsbarV1',sig:''}));
    }}
  ]);
}

/* --- 전체 초기화 --- */
function resetAll(){
  nbeditMenu.classList.remove('open');
  if(!confirm('편집한 내용을 모두 지우고 기본값으로 되돌릴까요?')) return;
  try { localStorage.removeItem(NB_STORE_KEY); } catch(_){}
  try { sessionStorage.removeItem(SESS_KEY); } catch(_){}
  data=nbNormalize(nbClone(DEFAULTS)); SITES=data.sites; DIRECTORY=data.directory;
  renderNav(); gridPanel.dataset.done='';
  gotoMain();
}

/* ===== 복사 방지 (NB_COPY_PROTECT일 때만) ===== */
if(NB_COPY_PROTECT){
  (function(){
    var isField=function(el){ return el&&(el.tagName==='INPUT'||el.tagName==='TEXTAREA'||el.tagName==='SELECT'); };
    ['contextmenu','selectstart','dragstart','copy','cut'].forEach(function(ev){
      document.addEventListener(ev,function(e){ if(isField(e.target)) return; e.preventDefault(); });
    });
    document.addEventListener('keydown',function(e){
      var k=(e.key||'').toLowerCase();
      if(e.key==='F12'){e.preventDefault();return;}
      if(e.ctrlKey&&e.shiftKey&&['i','j','c'].includes(k)){e.preventDefault();return;}
      if(e.ctrlKey&&['u','s','c','x','a'].includes(k)){ if(isField(e.target)&&['c','x','a'].includes(k)) return; e.preventDefault(); }
    });
  })();
}
</script>
<script>
/* 모바일: 외부 링크를 최상위 창에서 열어 뒤로가기로 MYWAY 복귀. PC·태블릿은 새 탭. */
(function(){
  if(!/Mobi/i.test(navigator.userAgent)) return;
  document.addEventListener("click", function(e){
    /* 편집 UI 내부 클릭은 가로채지 않음 */
    if(e.target.closest && e.target.closest('.nbedit-bg, .nbedit-menu, .nbedit-fab')) return;
    var a = e.target.closest ? e.target.closest("a[href]") : null;
    if(!a) return;
    var href = a.getAttribute("href") || "";
    if(!href || href.charAt(0) === "#" || /^javascript:/i.test(href)) return;
    e.preventDefault();
    try { (window.top || window).location.href = a.href; }
    catch(_) { window.open(a.href, "_blank"); }
  }, true);
  var _open = window.open.bind(window);
  window.open = function(url, name, feat){
    if(url){ try{ (window.top||window).location.href = url; }catch(_){ location.href = url; } return null; }
    return _open(url, name, feat);
  };
})();
</script>
