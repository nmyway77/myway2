  <style>
    * { box-sizing: border-box; }
    html, body {

    /* === 네비바 영역 === */
    .nav-wrap {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 6px 8px;
      background: #fff;
      z-index: 100;
      filter: drop-shadow(0 4px 14px rgba(177, 118, 243, 0.22));
    }

    .nav-bar-inner {
      position: relative;
      display: flex;
      align-items: center;
      width: 100%;
      max-width: 100%;
      height: 100%;
    }

    .screen-links {
      display: flex;
      gap: 4px;
      font-size: 0.93rem;
      font-weight: 500;
      color: #fff;
      white-space: nowrap;
      background: linear-gradient(95deg, #7ed6fb 10%, #b176f3 90%);
      padding: 0 36px;
      align-items: center;
      border-radius: 14px;
      box-shadow: 0 4px 18px rgba(90,100,180,0.13), 0 2px 8px rgba(255,255,255,0.10) inset;
      width: 100%;
      height: 32px;
      overflow-x: auto;
      overflow-y: hidden;
      scrollbar-width: none;
      -ms-overflow-style: none;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior-x: contain;
      touch-action: pan-x;
      cursor: grab;
      scroll-behavior: smooth;
    }
    .screen-links::-webkit-scrollbar { display: none; }
    .screen-links.dragging { cursor: grabbing; scroll-behavior: auto; }

    .screen-links a {
      color: rgba(255,255,255,0.88);
      text-decoration: none;
      padding: 4px 11px;
      border-radius: 10px;
      font-weight: 500;
      font-size: 0.95em;
      background: none;
      display: inline-block;
      white-space: nowrap;
      flex: 0 0 auto;
      letter-spacing: 0.01em;
      transition: background 0.15s, color 0.13s;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      -webkit-user-select: none;
    }
    .screen-links a:hover,
    .screen-links a.active {
      background: rgba(255,255,255,0.24);
      color: #fff;
      font-weight: 600;
      box-shadow: 0 2px 12px rgba(177, 118, 243, 0.25);
    }

    /* === 좌/우 화살표 === */
    .nav-arrow {
      position: absolute;
      top: 0;
      bottom: 0;
      width: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: none;
      outline: none;
      z-index: 5;
      cursor: pointer;
      padding: 0;
      border-radius: 14px;
      -webkit-tap-highlight-color: transparent;
      transition: opacity 0.15s;
    }
    .nav-arrow.left {
      left: 0;
      background: linear-gradient(to right, #b176f3 55%, rgba(177,118,243,0) 100%);
    }
    .nav-arrow.right {
      right: 0;
      background: linear-gradient(to left, #b176f3 55%, rgba(177,118,243,0) 100%);
    }
    .nav-arrow svg {
      width: 12px;
      height: 18px;
      display: block;
    }
    .nav-arrow:active { opacity: 0.7; }
    .nav-arrow[hidden] { display: none; }

    /* === iframe === */
    #main-frame {
      position: fixed;
      left: 0;
      top: 44px;
      width: 100%;
      height: calc(100% - 44px);
      border: none;
      margin: 0;
      background: #f5f7fa;
      display: block;
    }

    /* === 모바일 === */
    @media (max-width: 700px) {
      .nav-wrap { height: 42px; padding: 5px 6px; }
      .screen-links {
        font-size: 0.88rem;
        padding: 0 32px;
        height: 30px;
      }
      .screen-links a {
        padding: 3px 9px;
        font-size: 0.92em;
      }
      .nav-arrow { width: 26px; }
      #main-frame {
        top: 42px;
        height: calc(100% - 42px);
      }
    }
  </style>
</head>
<body>

  <!-- 네비게이션 바 -->

      </div>

      <button class="nav-arrow right" id="nav-arrow-right" aria-label="오른쪽 이동" hidden>
        <svg viewBox="0 0 13 20"><polygon points="4,3 11,10 4,17" fill="#fff" opacity="0.9"/></svg>
      </button>
    </div>
  </div>

  <iframe id="main-frame" src="https://news.daum.net/"></iframe>

  <script>
    const nav = document.getElementById('parent-links');
    const leftArrow = document.getElementById('nav-arrow-left');
    const rightArrow = document.getElementById('nav-arrow-right');
    const mainFrame = document.getElementById('main-frame');

    // === 메뉴 클릭 ===
    function showScreenParent(e, url) {
      e.preventDefault();
      if (justDragged) { justDragged = false; return; }

      document.querySelectorAll('#parent-links a').forEach(a => a.classList.remove('active'));
      e.currentTarget.classList.add('active');
      mainFrame.src = url;

      const el = e.currentTarget;
      const offset = el.offsetLeft - nav.clientWidth / 2 + el.clientWidth / 2;
      nav.scrollTo({ left: offset, behavior: 'smooth' });
      setTimeout(checkNavOverflow, 250);
    }

    // === 드래그 스크롤 ===
    let isDown = false;
    let startX = 0;
    let scrollStart = 0;
    let dragDistance = 0;
    let justDragged = false;

    function dragStart(clientX) {
      isDown = true;
      dragDistance = 0;
      startX = clientX;
      scrollStart = nav.scrollLeft;
      nav.classList.add('dragging');
    }
    function dragMove(clientX) {
      if (!isDown) return;
      const dx = clientX - startX;
      dragDistance = Math.abs(dx);
      nav.scrollLeft = scrollStart - dx;
    }
    function dragEnd() {
      if (!isDown) return;
      isDown = false;
      nav.classList.remove('dragging');
      if (dragDistance > 8) {
        justDragged = true;
        setTimeout(() => { justDragged = false; }, 50);
      }
      checkNavOverflow();
    }

    nav.addEventListener('mousedown', e => dragStart(e.pageX));
    nav.addEventListener('mousemove', e => { if (isDown) { e.preventDefault(); dragMove(e.pageX); } });
    nav.addEventListener('mouseup', dragEnd);
    nav.addEventListener('mouseleave', dragEnd);

    nav.addEventListener('touchstart', e => {
      dragDistance = 0;
      startX = e.touches[0].pageX;
    }, { passive: true });
    nav.addEventListener('touchmove', e => {
      dragDistance = Math.abs(e.touches[0].pageX - startX);
    }, { passive: true });
    nav.addEventListener('touchend', () => {
      if (dragDistance > 8) {
        justDragged = true;
        setTimeout(() => { justDragged = false; }, 50);
      }
      setTimeout(checkNavOverflow, 80);
    });

    // === 좌/우 화살표 ===
    function checkNavOverflow() {
      if (nav.scrollWidth > nav.clientWidth + 2) {
        leftArrow.hidden = nav.scrollLeft < 5;
        rightArrow.hidden = nav.scrollLeft + nav.clientWidth + 5 >= nav.scrollWidth;
      } else {
        leftArrow.hidden = true;
        rightArrow.hidden = true;
      }
    }
    nav.addEventListener('scroll', checkNavOverflow, { passive: true });
    window.addEventListener('resize', () => setTimeout(checkNavOverflow, 50));
    window.addEventListener('orientationchange', () => setTimeout(checkNavOverflow, 200));

    leftArrow.addEventListener('click', () => {
      nav.scrollBy({ left: -120, behavior: 'smooth' });
      setTimeout(checkNavOverflow, 250);
    });
    rightArrow.addEventListener('click', () => {
      nav.scrollBy({ left: 120, behavior: 'smooth' });
      setTimeout(checkNavOverflow, 250);
    });

    // === 초기화 ===
    window.addEventListener('DOMContentLoaded', checkNavOverflow);
    window.addEventListener('load', checkNavOverflow);
    setTimeout(checkNavOverflow, 200);
  </script>
</body>
