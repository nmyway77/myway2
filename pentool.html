<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>펜쓰기 · MYWAY</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&display=swap" rel="stylesheet">
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --cream:#f7f3eb; --ink:#23201b; --muted:#8a8276; --line:#e4ddcf;
    --card:#fffdf8; --accent:#e0533d;
    --g1:#7b5cff; --g2:#3d8bff;
    --shadow:0 8px 30px rgba(50,40,30,.16);
    --shadow-sm:0 2px 10px rgba(50,40,30,.10);
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;width:100%;overflow:hidden;}
  body{
    font-family:'Pretendard',system-ui,sans-serif;background:var(--cream);color:var(--ink);
    -webkit-user-select:none;user-select:none;position:fixed;inset:0;
  }
  input,textarea,select{-webkit-user-select:text;user-select:text;}

  /* ===== 스크롤 뷰어 (전체화면) ===== */
  #viewer{
    position:absolute;inset:0;overflow:auto;-webkit-overflow-scrolling:touch;
    background:repeating-conic-gradient(#ece5d6 0% 25%, #f3ede0 0% 50%) 50% / 22px 22px;
    padding:60px 0 40px;
  }
  #pages{display:flex;flex-direction:column;align-items:center;gap:18px;min-height:100%;width:max-content;min-width:100%;padding:0 16px;}
  .page{position:relative;line-height:0;box-shadow:var(--shadow);border-radius:4px;background:#fff;flex:0 0 auto;}
  .page canvas{display:block;}
  .page .bg{position:relative;z-index:1;}
  .page .dr{position:absolute;top:0;left:0;z-index:2;touch-action:none;}
  .page .pno{
    position:absolute;top:-26px;left:0;font-family:'JetBrains Mono',monospace;font-size:11px;
    color:var(--muted);z-index:1;
  }

  /* ===== 빈 상태 ===== */
  #empty{
    position:absolute;inset:0;display:flex;align-items:center;justify-content:center;padding:24px;z-index:5;
  }
  #empty .box{
    text-align:center;color:var(--muted);max-width:460px;
    background:var(--card);border:1.5px dashed var(--line);border-radius:24px;padding:38px 30px;transition:.18s;
  }
  #empty .box.drag{border-color:var(--accent);background:#fff;transform:scale(1.01);}
  #empty .ei{
    width:64px;height:64px;margin:0 auto 16px;border-radius:18px;
    background:linear-gradient(135deg,var(--g1),var(--g2));display:grid;place-items:center;color:#fff;
    box-shadow:0 10px 26px rgba(123,92,255,.3);
  }
  #empty .ei svg{width:32px;height:32px;}
  #empty h2{font-family:'Fraunces',serif;font-size:22px;font-weight:600;color:var(--ink);margin-bottom:9px;}
  #empty p{font-size:13.5px;line-height:1.7;}
  #empty .ebtns{display:flex;gap:9px;justify-content:center;flex-wrap:wrap;margin-top:20px;}
  #empty .ehint{margin-top:16px;font-size:11.5px;font-family:'JetBrains Mono',monospace;opacity:.85;}

  /* ===== 공통 버튼 ===== */
  .btn{
    border:1px solid var(--line);background:var(--cream);color:var(--ink);
    height:36px;min-width:36px;padding:0 12px;border-radius:10px;cursor:pointer;
    display:inline-flex;align-items:center;justify-content:center;gap:7px;
    font-family:'Pretendard',sans-serif;font-size:13px;font-weight:500;transition:.15s;line-height:1;
  }
  .btn svg{width:17px;height:17px;flex:0 0 auto;}
  .btn:hover{border-color:var(--accent);color:var(--accent);}
  .btn.primary{background:linear-gradient(135deg,var(--g1),var(--g2));color:#fff;border:none;box-shadow:0 4px 12px rgba(61,139,255,.3);}
  .btn.primary:hover{filter:brightness(1.05);color:#fff;}
  .btn:disabled{opacity:.4;cursor:not-allowed;}

  /* ===== 플로팅 토글(좌우 상단, 아주 작게) ===== */
  .fab{
    position:fixed;top:14px;z-index:60;width:42px;height:42px;border-radius:13px;cursor:pointer;
    background:rgba(255,253,248,.92);backdrop-filter:blur(8px);border:1px solid var(--line);
    display:grid;place-items:center;color:var(--ink);box-shadow:var(--shadow-sm);transition:.16s;
  }
  .fab:hover{transform:translateY(-1px);box-shadow:var(--shadow);}
  .fab svg{width:21px;height:21px;}
  .fab.left{left:14px;}
  .fab.right{right:14px;background:linear-gradient(135deg,var(--g1),var(--g2));color:#fff;border:none;box-shadow:0 6px 18px rgba(123,92,255,.35);}

  /* 패널 공통 */
  .panel{
    position:fixed;top:64px;z-index:59;background:var(--card);border:1px solid var(--line);
    border-radius:16px;box-shadow:var(--shadow);padding:12px;
    opacity:0;transform:translateY(-8px) scale(.97);pointer-events:none;transition:.18s;
  }
  .panel.open{opacity:1;transform:translateY(0) scale(1);pointer-events:auto;}
  .panel.left{left:14px;width:188px;}
  .panel.right{right:14px;width:max-content;max-width:min(94vw,300px);}
  .panel .ph{font-size:10.5px;font-family:'JetBrains Mono',monospace;color:var(--muted);margin:0 2px 8px;text-transform:uppercase;letter-spacing:.06em;}

  /* 불러오기 패널 */
  #loadPanel .li{
    display:flex;align-items:center;gap:11px;width:100%;padding:9px 10px;border:none;background:transparent;
    border-radius:10px;cursor:pointer;font-family:'Pretendard',sans-serif;font-size:14px;color:var(--ink);text-align:left;transition:.14s;
  }
  #loadPanel .li:hover{background:var(--cream);}
  #loadPanel .li .ic{width:30px;height:30px;border-radius:9px;display:grid;place-items:center;color:#fff;flex:0 0 auto;}
  #loadPanel .li svg{width:16px;height:16px;}
  #loadPanel .li small{display:block;font-size:11px;color:var(--muted);margin-top:1px;}

  /* 도구 패널 */
  #toolPanel .grid{display:grid;grid-template-columns:repeat(5,38px);gap:5px;}
  .tool{
    width:38px;height:38px;border:1px solid var(--line);background:var(--cream);border-radius:10px;cursor:pointer;
    display:grid;place-items:center;color:var(--ink);transition:.14s;
  }
  .tool svg{width:18px;height:18px;}
  .tool:hover{border-color:var(--accent);color:var(--accent);}
  .tool.active{background:var(--accent);border-color:var(--accent);color:#fff;box-shadow:0 3px 10px rgba(224,83,61,.35);}
  .prow{display:flex;align-items:center;gap:6px;margin-top:10px;flex-wrap:wrap;}
  .swatches{display:flex;gap:5px;align-items:center;flex-wrap:wrap;}
  .swatch{width:22px;height:22px;border-radius:7px;cursor:pointer;border:2px solid transparent;box-shadow:inset 0 0 0 1px rgba(0,0,0,.08);transition:.13s;}
  .swatch:hover{transform:scale(1.12);}
  .swatch.active{border-color:var(--ink);transform:scale(1.12);}
  .cpick{width:28px;height:28px;border:1px solid var(--line);border-radius:8px;padding:2px;cursor:pointer;background:var(--cream);}
  .wrow{display:flex;align-items:center;gap:8px;margin-top:10px;}
  .wrow input[type=range]{flex:1;accent-color:var(--accent);cursor:pointer;}
  .wlabel{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);width:34px;text-align:right;}
  .pdiv{height:1px;background:var(--line);margin:10px 0;}
  .arow{display:flex;gap:5px;}
  .arow .btn{flex:1;height:34px;padding:0;}

  /* 토스트 */
  .toast{
    position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);
    background:var(--ink);color:#fff;padding:10px 18px;border-radius:99px;font-size:13px;
    box-shadow:var(--shadow);opacity:0;pointer-events:none;transition:.25s;z-index:200;max-width:88vw;text-align:center;
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

  /* 텍스트 모달 */
  .text-modal{position:fixed;inset:0;background:rgba(35,32,27,.4);backdrop-filter:blur(3px);display:none;align-items:center;justify-content:center;z-index:150;padding:20px;}
  .text-modal.show{display:flex;}
  .text-box{background:var(--card);border-radius:18px;padding:22px;width:min(400px,92vw);box-shadow:var(--shadow);border:1px solid var(--line);}
  .text-box h3{font-family:'Fraunces',serif;font-size:18px;margin-bottom:12px;}
  .text-box textarea{width:100%;min-height:84px;border:1px solid var(--line);border-radius:11px;padding:11px;font-family:'Pretendard',sans-serif;font-size:15px;resize:vertical;background:var(--cream);color:var(--ink);outline:none;}
  .text-box textarea:focus{border-color:var(--accent);}
  .text-box .tb-row{display:flex;gap:12px;align-items:center;margin-top:12px;}
  .text-box label{font-size:12px;color:var(--muted);}
  .text-box .tb-actions{display:flex;gap:9px;justify-content:flex-end;margin-top:14px;}

  /* 홈 / 푸터 */
  .home-fab{position:fixed;right:14px;bottom:18px;z-index:55;width:46px;height:46px;border-radius:50%;background:linear-gradient(135deg,var(--g1),var(--g2));display:grid;place-items:center;color:#fff;text-decoration:none;box-shadow:0 8px 22px rgba(61,139,255,.4);transition:.16s;}
  .home-fab:hover{transform:translateY(-3px) scale(1.05);}
  .home-fab svg{width:22px;height:22px;}
  footer{position:fixed;left:0;bottom:0;width:100%;text-align:center;padding:5px;font-size:10.5px;color:var(--muted);font-family:'JetBrains Mono',monospace;background:rgba(255,253,248,.7);backdrop-filter:blur(4px);z-index:50;pointer-events:none;}
  footer a{color:var(--accent);text-decoration:none;pointer-events:auto;}
  .hidden{display:none!important;}

  /* ===== 줌 컨트롤 ===== */
  .zoom-bar{
    position:fixed;left:14px;bottom:18px;z-index:55;display:none;align-items:center;gap:2px;
    background:rgba(255,253,248,.92);backdrop-filter:blur(6px);border:1px solid var(--line);
    border-radius:99px;padding:4px;box-shadow:var(--shadow-sm);
  }
  .zoom-bar.show{display:flex;}
  .zoom-bar button{
    width:32px;height:32px;border:none;border-radius:50%;background:transparent;color:var(--ink);
    font-size:17px;font-weight:600;cursor:pointer;display:grid;place-items:center;line-height:0;transition:.14s;
  }
  .zoom-bar button:hover{background:var(--cream);}
  .zoom-bar .zlabel{
    font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);min-width:44px;
    text-align:center;cursor:pointer;user-select:none;-webkit-user-select:none;padding:0 2px;
  }

  @media (max-width:560px){
    #viewer{padding-top:58px;}
    .zoom-bar{left:10px;bottom:14px;}
  }
</style>
</head>
<body>

<div id="viewer">
  <div id="pages"></div>
</div>

<!-- 빈 상태 -->
<div id="empty">
  <div class="box" id="emptyBox">
    <div class="ei"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 19l7-7 3 3-7 7-3-3z"/><path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"/><path d="M2 2l7.586 7.586"/><circle cx="11" cy="11" r="2"/></svg></div>
    <h2>무엇이든 불러와 펜으로 쓰세요</h2>
    <p>이미지·PDF·화면을 불러오면 스크롤로 전체를 보며 그릴 수 있어요.<br>이미지는 <b>드래그&amp;드롭 · 붙여넣기(Ctrl+V)</b>도 돼요.</p>
    <div class="ebtns">
      <button class="btn" data-act="img"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="9" cy="9" r="2"/><path d="M21 15l-5-5L5 21"/></svg>이미지</button>
      <button class="btn" data-act="pdf"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/></svg>PDF</button>
      <button class="btn primary" data-act="screen"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>화면 캡처</button>
      <button class="btn" data-act="blank"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18"/></svg>빈 보드</button>
    </div>
    <p class="ehint">한글(HWP)은 한글에서 띄운 뒤 "화면 캡처"로 불러오면 그대로 돼요</p>
  </div>
</div>

<div class="zoom-bar" id="zoomBar">
  <button id="zoomOut" title="축소">−</button>
  <span class="zlabel" id="zoomLabel" title="클릭하면 100%로">100%</span>
  <button id="zoomIn" title="확대">+</button>
</div>

<!-- 좌상단: 불러오기 -->
<div class="fab left" id="fabLoad" title="불러오기">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 3v4a1 1 0 0 0 1 1h4"/><path d="M17 21H7a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h7l5 5v11a2 2 0 0 1-2 2z"/><path d="M12 11v6M9 14h6"/></svg>
</div>
<div class="panel left" id="loadPanel">
  <div class="ph">불러오기</div>
  <button class="li" data-act="img"><span class="ic" style="background:linear-gradient(135deg,#f5a623,#e0533d)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="9" cy="9" r="2"/><path d="M21 15l-5-5L5 21"/></svg></span>이미지<small>드래그·붙여넣기도 OK</small></button>
  <button class="li" data-act="pdf"><span class="ic" style="background:linear-gradient(135deg,#e0533d,#c43d2c)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/></svg></span>PDF<small>전체 페이지 스크롤</small></button>
  <button class="li" data-act="screen"><span class="ic" style="background:linear-gradient(135deg,#7b5cff,#3d8bff)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg></span>화면 캡처<small>한글·웹 등 화면 그대로</small></button>
  <button class="li" data-act="blank"><span class="ic" style="background:linear-gradient(135deg,#2eb872,#3d8bff)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18"/></svg></span>빈 화이트보드</button>
</div>

<!-- 우상단: 도구 -->
<div class="fab right" id="fabTools" title="도구">
  <svg id="fabToolIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 19l7-7 3 3-7 7-3-3z"/><path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"/><path d="M2 2l7.586 7.586"/></svg>
</div>
<div class="panel right" id="toolPanel">
  <div class="ph">도구</div>
  <div class="grid" id="toolGrid">
    <button class="tool" data-tool="pan" title="이동/스크롤"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 11V6a2 2 0 0 0-4 0M14 10V4a2 2 0 0 0-4 0v2M10 10.5V6a2 2 0 0 0-4 0v8"/><path d="M18 8a2 2 0 1 1 4 0v6a8 8 0 0 1-8 8h-2c-2.8 0-4.5-.86-5.99-2.34l-3.6-3.6a2 2 0 0 1 2.83-2.82L7 15"/></svg></button>
    <button class="tool active" data-tool="pen" title="펜"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 19l7-7 3 3-7 7-3-3z"/><path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"/><path d="M2 2l7.586 7.586"/></svg></button>
    <button class="tool" data-tool="highlighter" title="형광펜"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l-6 6v3h9l3-3"/><path d="M22 12l-4.6 4.6a2 2 0 0 1-2.8 0l-5.2-5.2a2 2 0 0 1 0-2.8L14 4z"/></svg></button>
    <button class="tool" data-tool="line" title="직선"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="4" y1="20" x2="20" y2="4"/></svg></button>
    <button class="tool" data-tool="arrow" title="화살표"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="4" y1="20" x2="18" y2="6"/><polyline points="9 6 18 6 18 15"/></svg></button>
    <button class="tool" data-tool="rect" title="사각형"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="14" rx="1"/></svg></button>
    <button class="tool" data-tool="ellipse" title="원/타원"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><ellipse cx="12" cy="12" rx="9" ry="7"/></svg></button>
    <button class="tool" data-tool="text" title="텍스트"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="4 7 4 4 20 4 20 7"/><line x1="9" y1="20" x2="15" y2="20"/><line x1="12" y1="4" x2="12" y2="20"/></svg></button>
    <button class="tool" data-tool="eraser" title="지우개"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 20H7L3 16a2 2 0 0 1 0-3l9-9a2 2 0 0 1 3 0l5 5a2 2 0 0 1 0 3l-7 7"/><line x1="18" y1="13" x2="9" y2="22"/></svg></button>
  </div>
  <div class="prow">
    <div class="swatches" id="swatches"></div>
    <input type="color" class="cpick" id="colorPick" value="#e0533d" title="사용자 색상">
  </div>
  <div class="wrow">
    <input type="range" id="widthRange" min="1" max="40" value="4">
    <span class="wlabel" id="widthLabel">4px</span>
  </div>
  <div class="pdiv"></div>
  <div class="arow">
    <button class="btn" id="btnUndo" title="실행취소 (Ctrl+Z)" disabled><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7v6h6"/><path d="M21 17a9 9 0 0 0-9-9 9 9 0 0 0-6 2.3L3 13"/></svg></button>
    <button class="btn" id="btnRedo" title="다시실행 (Ctrl+Y)" disabled><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 7v6h-6"/><path d="M3 17a9 9 0 0 1 9-9 9 9 0 0 1 6 2.3L21 13"/></svg></button>
    <button class="btn" id="btnClear" title="전체 지우기" disabled><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg></button>
    <button class="btn primary" id="btnSave" title="PNG 저장" disabled><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg></button>
  </div>
</div>

<!-- 텍스트 모달 -->
<div class="text-modal" id="textModal">
  <div class="text-box">
    <h3>텍스트 추가</h3>
    <textarea id="textInput" placeholder="입력할 내용..."></textarea>
    <div class="tb-row"><label>크기</label><input type="range" id="textSize" min="12" max="120" value="28" style="flex:1;accent-color:var(--accent);"><span class="wlabel" id="textSizeLabel">28px</span></div>
    <div class="tb-actions"><button class="btn" id="textCancel">취소</button><button class="btn primary" id="textOk">추가</button></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<input type="file" id="fileImg" class="hidden" accept="image/*">
<input type="file" id="filePdf" class="hidden" accept="application/pdf,.pdf">

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>
/* ===== 복사 방지 (MYWAY 공통 정책) ===== */
(function(){
  const editable=el=>el&&(el.tagName==='INPUT'||el.tagName==='TEXTAREA'||el.tagName==='SELECT'||el.isContentEditable);
  ['contextmenu','selectstart','dragstart','copy','cut'].forEach(ev=>{
    document.addEventListener(ev,e=>{ if(editable(e.target))return; e.preventDefault(); },false);
  });
  document.addEventListener('keydown',e=>{
    if(editable(e.target))return;
    const k=(e.key||'').toLowerCase();
    if(e.key==='F12'){e.preventDefault();return;}
    if((e.ctrlKey||e.metaKey)&&e.shiftKey&&['i','j','c'].includes(k)){e.preventDefault();return;}
    if((e.ctrlKey||e.metaKey)&&['u','s','c','x','a'].includes(k)){
      e.preventDefault();
      if(k==='s'){ window.PEN&&window.PEN.save(); }
    }
  },false);
})();

/* ===== 본체 ===== */
(function(){
  const viewer=document.getElementById('viewer');
  const pagesEl=document.getElementById('pages');
  const empty=document.getElementById('empty');
  const emptyBox=document.getElementById('emptyBox');

  const toastEl=document.getElementById('toast');

  if(window.pdfjsLib){
    pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
  }

  let tool='pen', color='#e0533d', width=4;
  let sourceType=null;
  let pages=[];
  let history=[], future=[];
  const PALETTE=['#23201b','#e0533d','#f5a623','#2eb872','#3d8bff','#7b5cff','#ffffff'];

  let toastTimer=null;
  function toast(m){ toastEl.textContent=m; toastEl.classList.add('show'); clearTimeout(toastTimer); toastTimer=setTimeout(()=>toastEl.classList.remove('show'),2400); }

  /* ---- 패널 토글 ---- */
  const loadPanel=document.getElementById('loadPanel');
  const toolPanel=document.getElementById('toolPanel');
  const fabLoad=document.getElementById('fabLoad');
  const fabTools=document.getElementById('fabTools');
  function toggle(p,other){ other.classList.remove('open'); p.classList.toggle('open'); }
  fabLoad.onclick=e=>{e.stopPropagation();toggle(loadPanel,toolPanel);};
  fabTools.onclick=e=>{e.stopPropagation();toggle(toolPanel,loadPanel);};
  document.addEventListener('pointerdown',e=>{
    if(!loadPanel.contains(e.target)&&e.target!==fabLoad&&!fabLoad.contains(e.target)) loadPanel.classList.remove('open');
    if(!toolPanel.contains(e.target)&&e.target!==fabTools&&!fabTools.contains(e.target)) toolPanel.classList.remove('open');
  },true);

  /* ---- 도구 ---- */
  const fabToolIcon=document.getElementById('fabToolIcon');
  function syncToolIcon(){ const a=document.querySelector('.tool.active'); if(a)fabToolIcon.innerHTML=a.querySelector('svg').innerHTML; }
  document.querySelectorAll('.tool').forEach(b=>{
    b.onclick=()=>{
      document.querySelectorAll('.tool').forEach(x=>x.classList.remove('active'));
      b.classList.add('active'); tool=b.dataset.tool;
      syncToolIcon(); applyToolMode();
      toolPanel.classList.remove('open');
    };
  });
  function applyToolMode(){
    const panMode=(tool==='pan');
    pages.forEach(pg=>{ pg.dr.style.pointerEvents=panMode?'none':'auto'; pg.dr.style.cursor=(tool==='text')?'text':'crosshair'; });
    viewer.style.cursor=(panMode&&sourceType)?'grab':'';
  }

  /* ---- 색상/두께 ---- */
  const swEl=document.getElementById('swatches');
  PALETTE.forEach((c,i)=>{
    const s=document.createElement('div');
    s.className='swatch'+(i===1?' active':''); s.style.background=c; s.dataset.c=c; s.title=c;
    s.onclick=()=>setColor(c); swEl.appendChild(s);
  });
  const colorPick=document.getElementById('colorPick');
  function setColor(c){ color=c; colorPick.value=c; document.querySelectorAll('.swatch').forEach(x=>x.classList.toggle('active',x.dataset.c===c)); }
  colorPick.oninput=()=>{ color=colorPick.value; document.querySelectorAll('.swatch').forEach(x=>x.classList.remove('active')); };
  const widthRange=document.getElementById('widthRange');
  const widthLabel=document.getElementById('widthLabel');
  widthRange.oninput=()=>{ width=+widthRange.value; widthLabel.textContent=width+'px'; };

  /* ---- 그리기 스타일 ---- */
  function applyStyle(ctx,s,sc){
    ctx.lineCap='round'; ctx.lineJoin='round';
    ctx.strokeStyle=s.color; ctx.fillStyle=s.color; ctx.lineWidth=s.width*sc;
    ctx.globalAlpha=1; ctx.globalCompositeOperation='source-over';
    if(s.tool==='highlighter'){ ctx.globalAlpha=0.32; ctx.lineCap='butt'; }
    if(s.tool==='eraser'){ ctx.globalCompositeOperation='destination-out'; }
  }
  function drawShape(ctx,s,sc){
    ctx.save(); applyStyle(ctx,s,sc);
    if(s.tool==='pen'||s.tool==='highlighter'||s.tool==='eraser'){
      const p=s.points; if(!p||!p.length){ctx.restore();return;}
      if(p.length===1){ ctx.beginPath(); ctx.arc(p[0].x,p[0].y,Math.max(s.width*sc/2,0.5),0,Math.PI*2); ctx.fill(); ctx.restore(); return; }
      ctx.beginPath(); ctx.moveTo(p[0].x,p[0].y);
      for(let i=1;i<p.length;i++) ctx.lineTo(p[i].x,p[i].y);
      ctx.stroke();
    } else if(s.tool==='line'){ ctx.beginPath(); ctx.moveTo(s.x0,s.y0); ctx.lineTo(s.x1,s.y1); ctx.stroke(); }
    else if(s.tool==='arrow'){ drawArrow(ctx,s.x0,s.y0,s.x1,s.y1,s.width*sc); }
    else if(s.tool==='rect'){ ctx.beginPath(); ctx.rect(Math.min(s.x0,s.x1),Math.min(s.y0,s.y1),Math.abs(s.x1-s.x0),Math.abs(s.y1-s.y0)); ctx.stroke(); }
    else if(s.tool==='ellipse'){ const cx=(s.x0+s.x1)/2,cy=(s.y0+s.y1)/2,rx=Math.abs(s.x1-s.x0)/2,ry=Math.abs(s.y1-s.y0)/2; ctx.beginPath(); ctx.ellipse(cx,cy,rx,ry,0,0,Math.PI*2); ctx.stroke(); }
    else if(s.tool==='text'){ ctx.font=`600 ${s.size*sc}px Pretendard, sans-serif`; ctx.textBaseline='top'; String(s.text).split('\n').forEach((ln,i)=>ctx.fillText(ln,s.x,s.y+i*s.size*sc*1.25)); }
    ctx.restore();
  }
  function drawArrow(ctx,x0,y0,x1,y1,w){
    const head=Math.max(10,w*3); const ang=Math.atan2(y1-y0,x1-x0);
    ctx.beginPath(); ctx.moveTo(x0,y0); ctx.lineTo(x1,y1); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x1-head*Math.cos(ang-Math.PI/7),y1-head*Math.sin(ang-Math.PI/7)); ctx.moveTo(x1,y1); ctx.lineTo(x1-head*Math.cos(ang+Math.PI/7),y1-head*Math.sin(ang+Math.PI/7)); ctx.stroke();
  }
  function redrawPage(pg){
    pg.dctx.clearRect(0,0,pg.dr.width,pg.dr.height);
    for(const s of pg.shapes) drawShape(pg.dctx,s,pg.scale);
    if(pg.current) drawShape(pg.dctx,pg.current,pg.scale);
  }

  /* ---- 좌표 ---- */
  function pos(pg,e){
    const r=pg.dr.getBoundingClientRect();
    const sx=pg.dr.width/r.width, sy=pg.dr.height/r.height;
    const cx=(e.touches?e.touches[0].clientX:e.clientX);
    const cy=(e.touches?e.touches[0].clientY:e.clientY);
    return {x:(cx-r.left)*sx,y:(cy-r.top)*sy};
  }

  /* ---- 페이지 생성 ---- */
  function availWidth(){ return Math.max(280, viewer.clientWidth-32); }

  /* ---- 줌 ---- */
  const zoomBar=document.getElementById('zoomBar');
  const zoomLabel=document.getElementById('zoomLabel');
  const Z_MIN=0.4, Z_MAX=4;
  let zoom=1;
  function applyPageZoom(pg){
    const w=Math.round(pg.baseW*zoom), h=Math.round(w*pg.ratio);
    pg.bg.style.width=w+'px'; pg.bg.style.height=h+'px';
    pg.dr.style.width=w+'px'; pg.dr.style.height=h+'px';
  }
  function setZoom(z,anchorX,anchorY){
    z=Math.min(Z_MAX,Math.max(Z_MIN,z));
    if(Math.abs(z-zoom)<0.0001){ zoomLabel.textContent=Math.round(zoom*100)+'%'; return; }
    // 앵커(화면 좌표) 기준 스크롤 보정
    const r=viewer.getBoundingClientRect();
    const ax=(anchorX===undefined? r.width/2 : anchorX-r.left);
    const ay=(anchorY===undefined? r.height/2 : anchorY-r.top);
    const cx=(viewer.scrollLeft+ax)/zoom, cy=(viewer.scrollTop+ay)/zoom;
    zoom=z;
    pages.forEach(applyPageZoom);
    viewer.scrollLeft=cx*zoom-ax;
    viewer.scrollTop=cy*zoom-ay;
    zoomLabel.textContent=Math.round(zoom*100)+'%';
  }
  document.getElementById('zoomIn').onclick=()=>setZoom(zoom*1.25);
  document.getElementById('zoomOut').onclick=()=>setZoom(zoom/1.25);
  zoomLabel.onclick=()=>setZoom(1);
  // Ctrl(⌘)+휠 확대/축소
  viewer.addEventListener('wheel',e=>{
    if(!(e.ctrlKey||e.metaKey))return;
    e.preventDefault();
    setZoom(zoom*(e.deltaY<0?1.12:1/1.12), e.clientX, e.clientY);
  },{passive:false});
  // 두 손가락: 핀치 확대/축소 + 드래그 이동
  let pinch=null;
  function tDist(t){ const dx=t[0].clientX-t[1].clientX, dy=t[0].clientY-t[1].clientY; return Math.hypot(dx,dy); }
  function tMid(t){ return {x:(t[0].clientX+t[1].clientX)/2, y:(t[0].clientY+t[1].clientY)/2}; }
  viewer.addEventListener('touchstart',e=>{
    if(e.touches.length===2){ const m=tMid(e.touches); pinch={d:tDist(e.touches), z:zoom, mx:m.x, my:m.y}; }
  },{passive:true});
  viewer.addEventListener('touchmove',e=>{
    if(pinch&&e.touches.length===2){
      e.preventDefault();
      const m=tMid(e.touches);
      setZoom(pinch.z*tDist(e.touches)/pinch.d, m.x, m.y);
      viewer.scrollLeft-=(m.x-pinch.mx);
      viewer.scrollTop-=(m.y-pinch.my);
      pinch.mx=m.x; pinch.my=m.y;
    }
  },{passive:false});
  viewer.addEventListener('touchend',()=>{ pinch=null; });
  viewer.addEventListener('touchcancel',()=>{ pinch=null; });
  // 마우스 드래그 이동: 이동 도구 / 가운데 버튼 / Space 누른 채 드래그
  let mpan=null, spaceHeld=false;
  window.addEventListener('keydown',e=>{ if(e.code==='Space'&&!e.repeat){ const t=e.target; if(t&&(t.tagName==='INPUT'||t.tagName==='TEXTAREA'))return; spaceHeld=true; if(sourceType)viewer.style.cursor='grab'; e.preventDefault(); } });
  window.addEventListener('keyup',e=>{ if(e.code==='Space'){ spaceHeld=false; if(!mpan)viewer.style.cursor=(tool==='pan'&&sourceType)?'grab':''; } });
  viewer.addEventListener('mousedown',e=>{
    if(!sourceType)return;
    const uiHit=e.target.closest&&e.target.closest('.fab,.panel,.zoom-bar,.home-fab,footer,.text-modal');
    if(uiHit)return;
    if(e.button===1 || spaceHeld || tool==='pan'){
      e.preventDefault();
      mpan={x:e.clientX,y:e.clientY,sl:viewer.scrollLeft,st:viewer.scrollTop};
      viewer.style.cursor='grabbing';
    }
  });
  window.addEventListener('mousemove',e=>{
    if(!mpan)return;
    viewer.scrollLeft=mpan.sl-(e.clientX-mpan.x);
    viewer.scrollTop=mpan.st-(e.clientY-mpan.y);
  });
  window.addEventListener('mouseup',()=>{ if(mpan){ mpan=null; viewer.style.cursor=(tool==='pan'&&sourceType)?'grab':(spaceHeld?'grab':''); } });
  function buildPage(internalW,internalH,dispW,label){
    const el=document.createElement('div'); el.className='page';
    if(label){ const pn=document.createElement('div'); pn.className='pno'; pn.textContent=label; el.appendChild(pn); }
    const bg=document.createElement('canvas'); bg.className='bg';
    const dr=document.createElement('canvas'); dr.className='dr';
    bg.width=internalW; bg.height=internalH; dr.width=internalW; dr.height=internalH;
    el.appendChild(bg); el.appendChild(dr);
    pagesEl.appendChild(el);
    const pg={ idx:pages.length, el, bg, dr, bctx:bg.getContext('2d'), dctx:dr.getContext('2d'), scale:internalW/dispW, baseW:dispW, ratio:internalH/internalW, shapes:[], current:null };
    applyPageZoom(pg);
    pages.push(pg); attachDraw(pg); return pg;
  }
  function clearPages(){ pages.forEach(p=>p.el.remove()); pages=[]; history=[]; future=[]; }

  /* ---- 그리기 이벤트 ---- */
  function attachDraw(pg){
    let drawing=false;
    function start(e){
      if(e.touches&&e.touches.length>1){ drawing=false; pg.current=null; redrawPage(pg); return; }
      if(e.button!==undefined&&e.button!==0)return;
      if(spaceHeld)return;
      if(tool==='pan')return;
      if(tool==='text'){ pendingPage=pg; pendingPos=pos(pg,e); openTextModal(); return; }
      e.preventDefault(); drawing=true; future=[];
      const p=pos(pg,e);
      if(tool==='pen'||tool==='highlighter'||tool==='eraser'){
        pg.current={tool,color,width:(tool==='eraser'?Math.max(width*2.2,14):width),points:[p]};
      } else { pg.current={tool,color,width,x0:p.x,y0:p.y,x1:p.x,y1:p.y}; }
      redrawPage(pg);
    }
    function move(e){
      if(e.touches&&e.touches.length>1){ drawing=false; pg.current=null; redrawPage(pg); return; }
      if(!drawing||!pg.current)return; e.preventDefault();
      const p=pos(pg,e);
      if(pg.current.points) pg.current.points.push(p);
      else { pg.current.x1=p.x; pg.current.y1=p.y; }
      redrawPage(pg);
    }
    function end(){
      if(!drawing)return; drawing=false;
      if(pg.current){ pg.shapes.push(pg.current); history.push({t:'add',pg,s:pg.current}); pg.current=null; }
      redrawPage(pg); syncBtns();
    }
    pg.dr.addEventListener('mousedown',start);
    pg.dr.addEventListener('mousemove',move);
    window.addEventListener('mouseup',end);
    pg.dr.addEventListener('touchstart',start,{passive:false});
    pg.dr.addEventListener('touchmove',move,{passive:false});
    pg.dr.addEventListener('touchend',end);
    pg.dr.addEventListener('touchcancel',end);
  }

  /* ---- 텍스트 모달 ---- */
  const textModal=document.getElementById('textModal');
  const textInput=document.getElementById('textInput');
  const textSize=document.getElementById('textSize');
  const textSizeLabel=document.getElementById('textSizeLabel');
  let pendingPage=null, pendingPos=null;
  function openTextModal(){ textInput.value=''; textModal.classList.add('show'); setTimeout(()=>textInput.focus(),50); }
  document.getElementById('textCancel').onclick=()=>textModal.classList.remove('show');
  document.getElementById('textOk').onclick=()=>{
    const t=textInput.value.trim();
    if(t&&pendingPage&&pendingPos){
      future=[];
      const s={tool:'text',color,text:t,x:pendingPos.x,y:pendingPos.y,size:+textSize.value};
      pendingPage.shapes.push(s); history.push({t:'add',pg:pendingPage,s});
      redrawPage(pendingPage); syncBtns();
    }
    textModal.classList.remove('show');
  };
  textSize.oninput=()=>textSizeLabel.textContent=textSize.value+'px';
  textInput.addEventListener('keydown',e=>{ if(e.key==='Enter'&&(e.ctrlKey||e.metaKey))document.getElementById('textOk').click(); if(e.key==='Escape')textModal.classList.remove('show'); });

  /* ---- undo/redo/clear ---- */
  function syncBtns(){
    const has=pages.some(p=>p.shapes.length>0);
    document.getElementById('btnUndo').disabled=history.length===0;
    document.getElementById('btnRedo').disabled=future.length===0;
    document.getElementById('btnClear').disabled=!has;
    document.getElementById('btnSave').disabled=!sourceType;
  }
  function undo(){
    if(!history.length)return; const a=history.pop();
    if(a.t==='add'){ const i=a.pg.shapes.lastIndexOf(a.s); if(i>=0)a.pg.shapes.splice(i,1); redrawPage(a.pg); }
    else if(a.t==='clear'){ a.snap.forEach((arr,i)=>{ if(pages[i]){pages[i].shapes=arr.slice(); redrawPage(pages[i]);} }); }
    future.push(a); syncBtns();
  }
  function redo(){
    if(!future.length)return; const a=future.pop();
    if(a.t==='add'){ a.pg.shapes.push(a.s); redrawPage(a.pg); }
    else if(a.t==='clear'){ pages.forEach(p=>{p.shapes=[];redrawPage(p);}); }
    history.push(a); syncBtns();
  }
  function clearAll(){
    const has=pages.some(p=>p.shapes.length>0); if(!has)return;
    const snap=pages.map(p=>p.shapes.slice());
    pages.forEach(p=>{p.shapes=[];redrawPage(p);});
    history.push({t:'clear',snap}); future=[]; syncBtns(); toast('주석을 모두 지웠어요');
  }
  document.getElementById('btnUndo').onclick=undo;
  document.getElementById('btnRedo').onclick=redo;
  document.getElementById('btnClear').onclick=clearAll;

  /* ---- 소스 적용 ---- */
  function startSource(type,label){
    sourceType=type; clearPages();
    empty.classList.add('hidden'); emptyBox.classList.remove('drag');
    setZoom(1); zoomBar.classList.add('show');
    loadPanel.classList.remove('open'); viewer.scrollTop=0;
  }
  function loadImage(srcUrl,label,type){
    const img=new Image();
    img.onload=()=>{
      startSource(type||'image',label);
      const dispW=Math.min(img.naturalWidth, availWidth(), 1100);
      const pg=buildPage(img.naturalWidth,img.naturalHeight,dispW,null);
      pg.bctx.drawImage(img,0,0); applyToolMode(); syncBtns();
    };
    img.onerror=()=>toast('이미지를 불러오지 못했어요');
    img.src=srcUrl;
  }
  function loadBlank(){
    startSource('blank','빈 화이트보드');
    const dispW=Math.min(availWidth(),1100);
    const iw=Math.round(dispW*1.6), ih=Math.round(iw*1.35);
    const pg=buildPage(iw,ih,dispW,null);
    pg.bctx.fillStyle='#fff'; pg.bctx.fillRect(0,0,iw,ih);
    applyToolMode(); syncBtns(); toast('빈 보드 준비 완료');
  }

  /* 이미지 파일 */
  const fileImg=document.getElementById('fileImg');
  function pickImage(){ fileImg.value=''; fileImg.click(); }
  fileImg.onchange=()=>{ const f=fileImg.files[0]; if(!f)return; const r=new FileReader(); r.onload=()=>loadImage(r.result,f.name,'image'); r.readAsDataURL(f); };

  /* PDF - 전체 페이지 연속 렌더 */
  const filePdf=document.getElementById('filePdf');
  function pickPdf(){ if(!window.pdfjsLib){toast('PDF 모듈 로딩 실패 — 새로고침 후 재시도');return;} filePdf.value=''; filePdf.click(); }
  filePdf.onchange=()=>{ const f=filePdf.files[0]; if(!f)return; loadPdfFile(f); };
  async function loadPdfFile(f){
    const r=new FileReader();
    r.onload=async()=>{
      try{
        const doc=await pdfjsLib.getDocument({data:new Uint8Array(r.result)}).promise;
        startSource('pdf',f.name);
        const total=doc.numPages;
        const dispW=Math.min(availWidth(),1000);
        toast('PDF '+total+'페이지 불러오는 중...');
        for(let n=1;n<=total;n++){
          const page=await doc.getPage(n);
          const base=page.getViewport({scale:1});
          const internalW=Math.round(dispW*1.8);
          const scale=internalW/base.width;
          const vp=page.getViewport({scale});
          const pg=buildPage(Math.round(vp.width),Math.round(vp.height),dispW, n+' / '+total);
          pg.bctx.fillStyle='#fff'; pg.bctx.fillRect(0,0,pg.bg.width,pg.bg.height);
          await page.render({canvasContext:pg.bctx,viewport:vp}).promise;
        }
        applyToolMode(); syncBtns();
        toast('PDF '+total+'페이지 준비 완료 — 스크롤로 보세요');
      }catch(err){ console.error(err); toast('PDF를 불러오지 못했어요'); empty.classList.remove('hidden'); sourceType=null; zoomBar.classList.remove('show'); }
    };
    r.readAsArrayBuffer(f);
  }

  /* 화면 캡처 */
  async function captureScreen(){
    if(!navigator.mediaDevices||!navigator.mediaDevices.getDisplayMedia){ toast('이 브라우저는 화면 캡처를 지원하지 않아요'); return; }
    try{
      const stream=await navigator.mediaDevices.getDisplayMedia({video:{frameRate:5},audio:false});
      const video=document.createElement('video'); video.srcObject=stream; video.muted=true;
      await video.play();
      await new Promise(res=>setTimeout(res,350));
      const w=video.videoWidth||1280,h=video.videoHeight||720;
      const tmp=document.createElement('canvas'); tmp.width=w; tmp.height=h;
      tmp.getContext('2d').drawImage(video,0,0,w,h);
      stream.getTracks().forEach(t=>t.stop());
      loadImage(tmp.toDataURL('image/png'),'화면 캡처','screen');
      toast('화면을 캡처했어요 — 그 위에 쓰세요');
    }catch(err){
      if(err&&err.name==='NotAllowedError') toast('화면 공유가 취소되었어요');
      else { console.error(err); toast('화면 캡처에 실패했어요'); }
    }
  }

  /* 저장 - 전체 페이지 합성 */
  function save(){
    if(!sourceType||!pages.length)return;
    const gap=20;
    const maxW=Math.max(...pages.map(p=>p.bg.width));
    const totalH=pages.reduce((s,p)=>s+p.bg.height,0)+gap*(pages.length-1);
    const out=document.createElement('canvas'); out.width=maxW; out.height=totalH;
    const o=out.getContext('2d'); o.fillStyle='#fff'; o.fillRect(0,0,maxW,totalH);
    let y=0;
    for(const p of pages){ const x=Math.round((maxW-p.bg.width)/2); o.drawImage(p.bg,x,y); o.drawImage(p.dr,x,y); y+=p.bg.height+gap; }
    out.toBlob(blob=>{
      const a=document.createElement('a');
      const ts=new Date().toISOString().replace(/[-:T]/g,'').slice(0,14);
      a.href=URL.createObjectURL(blob); a.download='펜쓰기_'+ts+'.png';
      document.body.appendChild(a); a.click();
      setTimeout(()=>{URL.revokeObjectURL(a.href);a.remove();},1000);
      toast('PNG로 저장했어요');
    },'image/png');
  }
  document.getElementById('btnSave').onclick=save;
  window.PEN={save};

  /* ---- 액션 라우팅 ---- */
  function doAct(act){ if(act==='img')pickImage(); else if(act==='pdf')pickPdf(); else if(act==='screen')captureScreen(); else if(act==='blank')loadBlank(); }
  document.querySelectorAll('[data-act]').forEach(b=>b.onclick=()=>doAct(b.dataset.act));

  /* ---- 단축키 ---- */
  window.addEventListener('keydown',e=>{
    const t=e.target; if(t&&(t.tagName==='INPUT'||t.tagName==='TEXTAREA'))return;
    const k=(e.key||'').toLowerCase();
    if((e.ctrlKey||e.metaKey)&&!e.shiftKey&&k==='z'){ e.preventDefault(); undo(); }
    else if((e.ctrlKey||e.metaKey)&&(k==='y'||(k==='z'&&e.shiftKey))){ e.preventDefault(); redo(); }
    else if((e.ctrlKey||e.metaKey)&&(k==='='||k==='+')){ e.preventDefault(); setZoom(zoom*1.25); }
    else if((e.ctrlKey||e.metaKey)&&k==='-'){ e.preventDefault(); setZoom(zoom/1.25); }
    else if((e.ctrlKey||e.metaKey)&&k==='0'){ e.preventDefault(); setZoom(1); }
  });

  /* ---- 드래그&드롭 / 붙여넣기 ---- */
  ['dragenter','dragover'].forEach(ev=>viewer.addEventListener(ev,e=>{ e.preventDefault(); if(!sourceType)emptyBox.classList.add('drag'); }));
  ['dragleave','dragend'].forEach(ev=>viewer.addEventListener(ev,e=>{ if(e.target===viewer)emptyBox.classList.remove('drag'); }));
  viewer.addEventListener('drop',e=>{
    e.preventDefault(); emptyBox.classList.remove('drag');
    const f=e.dataTransfer.files&&e.dataTransfer.files[0]; if(!f)return;
    if(f.type.startsWith('image/')){ const r=new FileReader(); r.onload=()=>loadImage(r.result,f.name,'image'); r.readAsDataURL(f); }
    else if(f.type==='application/pdf'||/\.pdf$/i.test(f.name)){ loadPdfFile(f); }
    else toast('이미지 또는 PDF만 불러올 수 있어요');
  });
  window.addEventListener('paste',e=>{
    const items=e.clipboardData&&e.clipboardData.items; if(!items)return;
    for(const it of items){ if(it.type&&it.type.startsWith('image/')){ const r=new FileReader(); r.onload=()=>loadImage(r.result,'붙여넣은 이미지','image'); r.readAsDataURL(it.getAsFile()); break; } }
  });

  /* ---- 리사이즈: 표시 폭만 재계산 (내부 해상도 고정) ---- */
  let rz=null;
  window.addEventListener('resize',()=>{
    if(!pages.length)return; clearTimeout(rz);
    rz=setTimeout(()=>{
      const cap=sourceType==='pdf'?1000:1100;
      pages.forEach(pg=>{
        const dispW=Math.min(pg.bg.width, availWidth(), cap);
        const dispH=Math.round(dispW*pg.bg.height/pg.bg.width);
        pg.bg.style.width=dispW+'px'; pg.bg.style.height=dispH+'px';
        pg.dr.style.width=dispW+'px'; pg.dr.style.height=dispH+'px';
      });
    },140);
  });

  syncBtns(); syncToolIcon();
})();
</script>
</body>
</html>
