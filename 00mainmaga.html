<!DOCTYPE html>
<html lang="ko">
<head>
  <base target="_blank76">
  <meta charset="UTF-8">
  <title>MYWAY 인플루언서 influencer </title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#ffffff">
  <meta name="format-detection" content="telephone=no">
  <style>
    /* ================================================================
       기본 안정화 - 모든 디바이스에서 견고하게
       =================================================================*/
    *, *::before, *::after { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      max-width: 100%;
      overflow-x: hidden;       /* 가로 스크롤 차단 - 흔들림 방지 */
      overscroll-behavior-x: none;
      background: #fff;
      font-family: 'Segoe UI','맑은 고딕','NanumGothic',Arial,sans-serif;
      -webkit-text-size-adjust: 100%;
      -webkit-font-smoothing: antialiased;
    }

    body {
      /* 모바일 주소창 변화 대응: dvh 지원 시 dvh 사용 */
      min-height: 100vh;
      min-height: 100dvh;
    }

    /* === 대시보드 (전체 컨테이너) === */
    .dashboard {
      max-width: 1200px;
      margin: 0 auto;
      padding: 34px 0 60px 0;
      /* 노치 디바이스 좌우 안전영역 대응 */
      padding-left: max(0px, env(safe-area-inset-left));
      padding-right: max(0px, env(safe-area-inset-right));
    }

    .gallery-label {
      font-weight: bold;
      font-size: 1.15rem;
      margin: 34px 0 18px 0;
      color: #232356;
      text-align: center;
      letter-spacing: 0.5px;
      display: block;
      width: 100%;
    }

    /* === 갤러리 행: flex로 변경 (안정적인 자동 정렬/wrap) ===
       이전 inline-block은 카드 사이 공백으로 인한 정렬 흔들림이 있었음.
       flex + gap 조합으로 PC/태블릿/모바일 모두 일관되게 정렬됨. */
    .gallery-row {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      align-items: flex-start;
      width: 100%;
      max-width: 1080px;
      margin: 0 auto;
      gap: 16px 12px;
      padding: 0 12px;
    }

    .list-row {
      vertical-align: top;
      position: relative;
      background: #fff;
      flex: 0 0 auto;
    }
    .list-row:last-child { margin-right: 0; }

    .imgframe {
      width: 100%;
      height: 100%;
      background: #fff;
      position: relative;
      z-index: 0;
      border-radius: 0;
      box-shadow: 0 6px 6px 0 rgba(90,90,130,0.11);
      overflow: hidden;
      display: flex;
      align-items: flex-start;
      justify-content: center;
    }
    .img-wrap {
      position: relative;
      height: 100%;
      width: 100%;
      overflow: hidden;
      margin: 0;
      padding: 0;
    }
    .img-item {
      position: relative;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
    .img-item img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: #fff;
      margin: 0;
      border: none;
      padding: 0;
      /* 모바일 이미지 드래그 방지 */
      -webkit-user-drag: none;
      -webkit-touch-callout: none;
    }
    .shadow-line {
      text-align: center;
      margin: 0;
      padding: 0;
      width: 100%;
      max-width: 100%;
      overflow: hidden !important;
    }
    .shadow-line img {
      display: block;
      margin: 0 auto;
      width: 95%;
      height: 20px;
      pointer-events: none;
      user-select: none;
    }

    /* ================================================================
       매거진 카드 - 디바이스별 크기 (margin 대신 gap 사용)
       =================================================================*/

    /* === 기본 (일반 PC, 1081~1399px) === */
    .list-row.magazine {
      width: 150px;
      height: 213px;
      margin: 0;
    }
    .img-wrap.magazine { height: 100%; }
    .img-item.magazine { height: 100%; }

    /* === 큰 PC (1400px+): 카드 약간 크게, 컨테이너 넓게 === */
    @media (min-width: 1400px) {
      .gallery-row { max-width: 1200px; gap: 18px 14px; }
      .list-row.magazine {
        width: 160px;
        height: 227px;
      }
    }

    /* === 노트북 / 작은 PC (901~1080px) === */
    @media (min-width: 901px) and (max-width: 1080px) {
      .gallery-row { gap: 14px 10px; }
      .list-row.magazine {
        width: 140px;
        height: 198px;
      }
    }

    /* === 태블릿 (701~900px) === */
    @media (min-width: 701px) and (max-width: 900px) {
      .dashboard { padding: 28px 0 50px 0; }
      .gallery-row { gap: 14px 10px; padding: 0 10px; }
      .list-row.magazine {
        width: 130px;
        height: 184px;
      }
    }

    /* === 큰 모바일 / 작은 태블릿 (501~700px) === */
    @media (min-width: 501px) and (max-width: 700px) {
      .dashboard { padding: 22px 0 50px 0; }
      .gallery-row { gap: 12px 10px; padding: 0 10px; }
      .list-row.magazine {
        width: 120px;
        height: 170px;
      }
    }

    /* === 모바일 세로 (~500px): 3개 한 줄, aspect-ratio로 비율 유지 === */
    @media (max-width: 500px) {
      .dashboard { padding: 18px 0 40px 0; }
      .gallery-row {
        gap: 14px 8px;
        padding: 0 8px;
      }
      .list-row.magazine {
        width: calc((100% - 16px) / 3);   /* 3개 한 줄, 사이 gap 8px × 2 = 16px */
        aspect-ratio: 150 / 213;
        height: auto;
        min-width: 85px;
      }
    }

    /* === 작은 모바일 (~380px): 3개 유지하되 폭 더 작게 === */
    @media (max-width: 380px) {
      .gallery-row { gap: 12px 6px; padding: 0 6px; }
      .list-row.magazine {
        width: calc((100% - 12px) / 3);
        min-width: 80px;
      }
    }

    /* === 매우 작은 모바일 (~320px): 2개 한 줄로 전환 === */
    @media (max-width: 320px) {
      .list-row.magazine {
        width: calc((100% - 6px) / 2);
        min-width: 0;
      }
    }

    /* === 핸드폰 가로 모드 (높이 짧음): 카드 작게, 여백 줄임 ===
       세로 공간이 짧을 때 카드가 너무 크면 한 화면에 거의 안 보임 */
    @media (orientation: landscape) and (max-height: 500px) {
      .dashboard { padding: 14px 0 30px 0; }
      .gallery-label { margin: 20px 0 12px 0; font-size: 1rem; }
      .gallery-row { gap: 12px 10px; padding: 0 12px; }
      .list-row.magazine {
        width: 110px;
        height: 156px;
      }
    }

    /* === 매우 짧은 가로 (높이 ~380px) === */
    @media (orientation: landscape) and (max-height: 380px) {
      .dashboard { padding: 10px 0 24px 0; }
      .gallery-label { margin: 14px 0 8px 0; font-size: 0.9rem; }
      .gallery-row { gap: 10px 8px; }
      .list-row.magazine {
        width: 96px;
        height: 136px;
      }
    }

    /* === 빈 갤러리 행 / 빈 라벨이 공간 잡지 않게 === */
    .gallery-row:empty { display: none; }

    /* === 접근성: 모션 감소 선호 시 트랜지션 비활성 === */
    @media (prefers-reduced-motion: reduce) {
      .list-row { transition: none !important; }
    }
  </style>
